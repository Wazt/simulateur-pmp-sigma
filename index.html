  {"id": "q-0058", "question": "Un chef de projet a été affecté à un projet important qui contribuera à définir l'avenir de l'entreprise. Pendant ce temps, le Bureau des projets PMO met en œuvre des outils adaptatifs dans un environnement principalement prédictif et demande au chef de projet de suivre ce processus également. Mais le responsable fonctionnel exprime des inquiétudes quant à l'utilisation de nouveaux outils sur un projet aussi important que doit faire le chef de projet?", "options": {"A": "suivre la recommandation du responsable fonctionnel, à savoir mettre en œuvre uniquement des outils prédictifs sur le projet.", "B": "suivre la demande du bureau des projets PMO, à savoir mettre en œuvre des outils adaptatifs sur le projet.", "C": "passer en revue l'impact des outils adaptatifs et obtenir l'accord du responsable fonctionnel.", "D": "décider de l'approche à utiliser sur le projet selon ce qui convient le mieux au projet."}, "correct": "C", "domain": "Process", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (Tailoring), face a une divergence entre PMO et fonctionnel, le chef de projet evalue l'impact reel des outils adaptatifs et obtient l'accord du responsable fonctionnel par concertation. Suivre aveuglement l'un (A, B) ou decider seul (D) ignore la gouvernance et les parties prenantes cles.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 58},
  {"id": "q-0059", "question": "Un chef de projet a préparé un plan de gestion des bénéfices du projet. Parmi les propositions suivantes, que faut-il inclure dans ce document?", "options": {"A": "Exigence du projet, bénéfice cible, journal des points à traiter, métriques.", "B": "Alignement stratégique, responsable du bénéfice, registre des risques.", "C": "Bénéfice d'alignement stratégique, calendrier de réalisation des bénéfices.", "D": "Bénéfices cibles, responsables des bénéfices, retour d'expérience."}, "correct": "C", "domain": "Business", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Livraison de Valeur), le plan de gestion des benefices contient: les benefices cibles, l'alignement strategique, le calendrier de realisation, les responsables (benefit owners) et les metriques. L'option C couvre l'alignement strategique et le calendrier de realisation, elements specifiques au plan benefices. A et D melangent avec d'autres documents (points a traiter, retours d'experience). B mele registre des risques.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 59},
  {"id": "q-0060", "question": "Un nouveau projet a été lancé suite à une session planification. Le projet est sous la supervision directe d'un cadre de l'organisation. Après une réunion d'évaluation, le chef de projet entend par hasard un cadre demander à l'un des membres de l'équipe de présenter un tableau de bord indiquant l'état global du projet. Que doit faire le chef de projet?", "options": {"A": "dire aux membres de l'équipe de faire passer la demande par le chef de projet.", "B": "demander aux membres de l'équipe d'élaborer un tableau de bord pour répondre à la demande.", "C": "mettre à jour le plan de gestion de la communication pour inclure une demande informelle.", "D": "mettre à jour la matrice d'évaluation de l'engagement des parties prenantes."}, "correct": "A", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Stewardship et de Leadership), toute demande adressee a un membre de l'equipe doit passer par le chef de projet pour preserver l'integrite de la gouvernance et eviter le contournement de la chaine. Faire developper sans process (B) court-circuite le chef de projet. Mettre a jour le plan de communication pour formaliser l'informel (C) ou la matrice d'engagement (D) sont des reactions partielles.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 60},
  {"id": "q-0061", "question": "une organisation se lance dans le déploiement d'une nouvelle solution numérique qui va révolutionner les services d'achat. Le chef de projet a créé tous les plans et activités nécessaires pour garantir la réussite de l'intégration et du lancement de la solution. Il y a un risque que le système d'un partenaire ne soit pas disponible, ce qui pourrait nuire au projet. Quelle activité clé est nécessaire pour garantir la réussite du projet?", "options": {"A": "Suivre en permanence les risques d'indisponibilité du système du partenaire et mettre en place des plans de résolution appropriés au cas où le risque devient un problème concret.", "B": "Atténuer le risque en élaborant des plans alternatifs pour que la solution soit prête et disponible sans capacité d'intégration complète.", "C": "Informer partie prenantes du projet que l'intégration complète peut ne pas être possible et que le projet risque d'être retardé en conséquence.", "D": "Éliminer le risque en exigeant du partenaire que l'on modifie les paramètres du système afin de faciliter l'intégration à la nouvelle solution"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Incertitude), pour un risque identifie d'indisponibilite partenaire, le chef de projet le suit en permanence et prepare des plans de reponse pour le declencher si le risque devient probleme. Mitiger en livrant sans integration complete (B) abandonne la valeur. Annoncer le retard (C) est defaitiste. Exiger une modification du partenaire (D) ne 'elimine' pas le risque, c'est irrealiste.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 61},
  {"id": "q-0062", "question": "Une équipe multiculturelle travaille sur un projet. Après quelques mois d'observation, le chef de projet se rend compte que deux membres de l'équipe ne répondent pas correctement au responsable de la construction. Le chef de projet a parlé individuellement aux membres de l'équipe et constate qu'ils avaient tous les deux des différences culturelles avec le responsable de la construction. Que doit faire le chef de projet pour améliorer la situation?", "options": {"A": "Fournir au responsable de la construction des instructions sur la façon de résoudre la situation.", "B": "Discuter des préoccupations des membres de l'équipe avec le responsable de la construction et chercher des solutions.", "C": "Demander au responsable de la construction de s'entretenir avec les deux membres de l'équipe pour résoudre la situation.", "D": "Demander aux membres de l'équipe d'être tolérants envers les différences culturelles car ils sont issus de milieux culturels différents."}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Leadership et resolution collaborative), apres avoir entendu les deux membres, le chef de projet discute des preoccupations avec le responsable de la construction et co-cherche des solutions. Donner des instructions (A) au manager est presomptueux. Lui demander d'aller voir les membres seul (C) sans cadrage risque d'aggraver. Demander aux membres d'etre tolerants (D) ignore le probleme reel.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 62},
  {"id": "q-0063", "question": "Un chef de projet gère un projet depuis plusieurs mois lorsqu'un problème qui n'a pas été documenté en tant que risque apparaît. Ce problème peut avoir un impact important sur le projet. Que doit faire le chef de projet?", "options": {"A": "Organiser une réunion de l'équipe du projet et des parties prenantes concernées pour convenir de la meilleure façon de gérer le problème.", "B": "Informer les sponsors que le problème est survenu, que la réussite du projet peut être compromise.", "C": "Retarder le projet jusqu'à ce que le problème soit réglé et qu'il ne présente plus de risque pour le projet.", "D": "Éviter de gérer le problème car il n'a pas été documenté en tant que risque pour le projet et aucune réponse n'a été prévue pour la résoudre."}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Incertitude et Equipe), face a un risque non documente qui se materialise, le chef de projet organise une reunion avec l'equipe et les parties prenantes concernees pour convenir collectivement de la meilleure reponse. Informer le sponsor (B) sans plan est defaitiste. Retarder (C) est extreme. Ignorer (D) viole le principe de gestion proactive.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 63},
  {"id": "q-0064", "question": "Un projet logiciel utilisant une approche agile est sujet à des problèmes de qualité à chaque version, générant de nombreux problèmes de production. Que doit faire le chef de projet pour remédier au problème et améliorer la qualité?", "options": {"A": "Utiliser la réunion rétrospective pour mieux comprendre la cause originale des problèmes de qualité et mettre en place un plan avec l'équipe pour corriger le problème.", "B": "Faire appel à une société externe pour acheter un niveau de test supplémentaire en veillant à ce que le produit final soit bien inspecté avant sa sortie.", "C": "Demander l'approbation d'un financement supplémentaire aux sponsors pour remplacer les membres de l'équipe juniors par des membres plus expérimentés.", "D": "Créer un système de récompense qui accorde des primes d'intéressement aux membres de l'équipe capables de détecter plus de défauts."}, "correct": "A", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Qualite) et le Guide Agile, la retrospective est l'instrument natif d'amelioration continue: analyser la cause-racine des problemes qualite et co-construire un plan correctif avec l'equipe. Externaliser le test (B) traite le symptome. Remplacer les juniors (C) ne traite pas la cause systemique. Recompenser la detection de defauts (D) cree des effets pervers.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 64},
  {"id": "q-0065", "question": "Une entreprise prévoit de lancer un projet impliquant les nouvelles technologies. L'approbation est requise pour ce projet. Que doit faire le chef de projet?", "options": {"A": "Identifier les risques liés à la mise en œuvre de la nouvelle technologie.", "B": "Définir la gestion des changements pour la nouvelle technologie.", "C": "Analyser le coût identifié des bénéfices du projet.", "D": "Examiner les références de base de l'efficience des coûts pour l'exécution."}, "correct": "C", "domain": "Business", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (Livraison de Valeur), pour obtenir l'approbation d'un projet (business case), le chef de projet analyse le cout et les benefices identifies (cost-benefit analysis). C'est le levier d'approbation executive. Identifier les risques (A) ou definir le change management (B) viennent apres. La baseline d'efficience (D) est un outil d'execution, pas d'approbation.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 65},
  {"id": "q-0066", "question": "Un membre de l'équipe partage avec son responsable fonctionnel certains détails négatifs concernant les performances d'un autre membre de l'équipe qui ont été rencontrés lors de la rétrospective. Le chef de projet apprend que cette discussion a eu lieu. Quelles sont les actions que doit entreprendre le chef de projet? Choisissez deux réponses?", "options": {"A": "Contacter le membre de l'équipe pour lui expliquer quelle information peut être partagée en dehors de l'équipe.", "B": "Contacter le responsable fonctionnel du membre de l'équipe et l'inviter à la prochaine rétrospective.", "C": "Rencontrer l'ensemble de l'équipe pour revoir les règles de base relatives aux environnements sûrs.", "D": "Rencontrer le product owner pour parler de la situation. E. Rencontrer le sponsor pour examiner la situation."}, "correct": "AC", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Equipe et environnement sur), la retrospective est un espace sur dont le contenu reste interne. Le chef de projet contacte le membre pour rappeler les regles de confidentialite (A) ET rencontre l'equipe pour revoir les regles de base de l'environnement sur (C). Inviter le responsable fonctionnel en retro (B) viole le safe space. Impliquer PO (D) ou sponsor (E) est une escalade inutile.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 66},
  {"id": "q-0067", "question": "Au cours d'une rétrospective d'une équipe agile, un membre de l'équipe du projet mentionne que la qualité du code se dégrade, ce qui pourrait entraîner des reprises ultérieures qui pourraient devenir ingérables avec le temps. Que doit faire le chef de projet?", "options": {"A": "Aider l'équipe à créer la définition d'accompli DOD afin d'améliorer la qualité de la livraison.", "B": "Élargir l'équipe afin d'améliorer la qualité.", "C": "Ajouter des éléments de test du backlog pour évaluer la qualité périodiquement.", "D": "Comparer le coût de l'amélioration de la qualité au coût de l'échec et ajuster le budget."}, "correct": "A", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Guide Agile et le PMBOK 7 (Qualite), la Definition of Done (DOD) est l'outil structurant pour prevenir la degradation qualite et le rework. Aider l'equipe a creer/renforcer la DOD est la reponse appropriee. Elargir l'equipe (B) est couteux. Ajouter des tests au backlog (C) traite le symptome. Comparer les couts (D) est gestionnaire mais ne corrige pas le probleme.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 67},
  {"id": "q-0068", "question": "Un projet pétrolier et gazier a commencé sans un financement intégral. Il était entendu que les fonds manquants seraient réunis au fil de l'exécution du projet. L'obtention des fonds restants a été retardée de plusieurs mois, ce qui a entraîné la suspension du travail par tous les prestataires. Qu'aurait dû faire le chef de projet pour empêcher une telle situation de se produire?", "options": {"A": "S'assurer que l'équipe du projet surveille et examine périodiquement le registre des risques du projet.", "B": "S'assurer que les risques avaient été évalués et atténués de façon adéquate par les bonnes parties prenantes.", "C": "S'assurer que la partie prenante qui devait fournir les fonds supplémentaires demeurait intéressée par le projet.", "D": "S'assurer que la partie prenante avait anticipé les obstacles au montage financier des fonds restants."}, "correct": "D", "domain": "Business", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Parties prenantes), le chef de projet aurait du s'assurer que la partie prenante chargee de fournir les fonds avait anticipe les obstacles au montage financier. La gestion proactive des risques de financement par la PP responsable etait la prevention adequate. Surveiller le registre (A) ou evaluer les risques (B) sont vagues. Maintenir l'interet (C) ne traite pas l'anticipation operationnelle.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 68},
  {"id": "q-0069", "question": "Un fournisseur a informé la chef de projet qu'une ressource essentielle sera en congé prolongé. L'équipe du projet a passé en revue les livrables en attente de la part du fournisseur et a identifié une solution alternative qui entraînera un coût supplémentaire. Le projet respecte actuellement les échéanciers et est légèrement en deçà du budget. Que doit faire le chef de projet à présent?", "options": {"A": "Effectuer une analyse coût-bénéfice.", "B": "Maîtriser les changements.", "C": "Exécuter les réponses aux risques.", "D": "Demander un remplaçant pour la ressource."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Gouvernance), une solution alternative qui entraine un cout supplementaire doit etre traitee via le processus formel de maitrise des changements (CCB). L'analyse cout-benefice (A) est une etape de l'analyse d'impact dans le change control. Executer les reponses au risque (C) ne couvre pas l'aspect contractuel. Demander un remplacant (D) court-circuite l'analyse.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 69},
  {"id": "q-0070", "question": "Dans un projet hybride, le client a émis un contrat qui spécifie les livrables pour chaque trimestre. Le client souhaite montrer à ses parties prenantes un résultat tangible au cours du premier trimestre et souhaite passer le deuxième jalon le premier trimestre. Le chef de projet explique au client que ce n'est pas réalisable à moins que les exigences du deuxième jalon soient modifiées. Quelles sont les deux actions que doit entreprendre le chef de projet? Choisissez deux réponses?", "options": {"A": "Revenir vers l'équipe de développement et réfléchir aux exigences du deuxième jalon qui peuvent être réalisées au cours du premier trimestre.", "B": "Demander au client ses priorités en ce qui concerne les exigences du deuxième jalon.", "C": "Informer le client que le déplacement du jalon aura un impact très important sur le coût du projet.", "D": "Faire remonter le point à traiter à la direction pour résoudre et suggérer un plan. E. Convaincre le client de ne pas toucher au deuxième jalon et de ne pas modifier. Partie 3"}, "correct": "AB", "domain": "Process", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (Adaptation et Tailoring), le chef de projet revient vers l'equipe de developpement pour identifier ce qui peut etre fait au T1 (A) et demande au client ses priorites pour le jalon T2 (B). Annoncer un cout enorme (C) ferme la negociation. Escalader (D) sans analyse interne est premature. Convaincre de ne rien changer (E) ignore le besoin client.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 70},
  {"id": "q-0071", "question": "Un chef de projet gère un projet extrêmement complexe et s'est assuré que toutes les tâches requises ont été exécutées. Lors d'un récent audit externe, le chef de projet a été informé de l'application d'une lourde pénalité au projet pour le dernier module mis en œuvre. Qu'aurait dû faire le chef de projet pour se protéger de toute responsabilité résultant de la mise en œuvre récente?", "options": {"A": "S'assurer que toutes les tâches requises identifiées dans le périmètre avaient été menées à bien.", "B": "S'assurer que tous les défauts lors des tests avaient été résolus avant la mise en œuvre.", "C": "S'assurer que toutes les approbations requises avaient été reçues conformément aux procédures organisationnelles.", "D": "S'assurer que toute la documentation avait été complétée après la mise en œuvre et avant la clôture du projet."}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Conformite/Stewardship), pour se proteger d'une responsabilite externe, le chef de projet doit s'assurer que toutes les approbations requises ont ete obtenues conformement aux procedures organisationnelles. Le respect du perimetre (A), la resolution des defauts (B) et la documentation finale (D) sont importants mais c'est l'obtention formelle des approbations qui protege juridiquement.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 71},
  {"id": "q-0072", "question": "Le chef de projet senior est en milieu d'un projet d'expansion des capacités industrielles avec de nombreuses parties prenantes de divers pays. Les parties prenantes sont en désaccord sur plusieurs composantes du projet, ce qui nuit à l'avancement du projet. Le sponsor du projet a demandé au chef de projet de gérer ces désaccords. Quelles sont les trois choses que le chef de projet peut faire pour résoudre ce problème de désaccord?", "options": {"A": "Intégrer ce changement et le considérer comme un changement des exigences des parties prenantes.", "B": "Réviser le projet pour lier gouvernance organisationnelle et gouvernance du projet.", "C": "Aviser le responsable de la sécurité web qu'il s'agit d'une dérive du périmètre et que cela sera pris en compte lors de la prochaine phase.", "D": "Aviser le responsable de la sécurité web que ce changement sera considéré comme une demande de changement."}, "correct": "BCD", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Gouvernance et Adaptation), face a des desaccords entre parties prenantes internationales, le chef de projet (B) revise la gouvernance projet/organisationnelle, (C) cadre tout changement de perimetre dans la phase appropriee et (D) traite formellement chaque modification comme demande de changement. (A) integrer sans process viole le change control.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 72},
  {"id": "q-0073", "question": "Au cours de la mise en œuvre d'un projet, l'équipe du projet a découvert une nouvelle opportunité. Après un examen interne, l'équipe de projet a convenu que l'opportunité se trouve en dehors du périmètre du projet. Le chef de projet a décidé de mettre à jour le registre des risques et de faire remonter l'opportunité à un niveau supérieur. Que doit alors faire le chef de projet avec cette opportunité?", "options": {"A": "aucune action supplémentaire n'est requise.", "B": "Partager cette opportunité avec un autre projet.", "C": "Établir une réserve pour aléas afin d'appuyer l'opportunité.", "D": "Suivre de plus près l'opportunité."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Incertitude), une opportunite hors perimetre identifiee doit etre partagee avec un autre projet ou programme qui pourrait l'exploiter (strategie de partage pour les opportunites). Ne rien faire (A) detruit de la valeur. Etablir une reserve (C) pour une opportunite hors-perimetre est incoherent. Suivre de pres (D) sans destinataire est inefficace.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 73},
  {"id": "q-0074", "question": "Un projet agile commence sa septième itération sur huit. Lors d'une réunion de planification, l'équipe se rend compte qu'un risque non identifié est devenu un problème et que la réserve pour aléas doit être utilisée. Que doit faire le chef de projet?", "options": {"A": "Demander de l'argent au sponsor pour mettre en œuvre le plan de contingence,", "B": "demander à l'équipe d'inclure le plan de contingence dans le backlog carnet de l'itération,", "C": "aider l'équipe à revoir l'approche du projet pour lancer les actions correctives", "D": "demander au sponsor d'approuver l'inclusion d'une itération supplémentaire dans le projet."}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Guide Agile et le PMBOK 7 (Tailoring), face a un risque devenu probleme, l'equipe inclut le plan de contingence comme element du backlog d'iteration pour l'executer dans la cadence agile. Demander de l'argent au sponsor (A) ou une iteration supplementaire (D) sont des escalades premature. Revoir l'approche globale (C) est trop large face a un probleme cible.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 74},
  {"id": "q-0075", "question": "Le projet est à mi-cours de sa phase d'exécution. Les spécifications de qualité délivrables du projet sont officiellement acceptées, toutefois, une partie prenante clé n'est pas satisfaite. Elle prétend que le livrable ne répond pas aux spécifications de qualité. Que doit faire le chef de projet dans cette situation?", "options": {"A": "Informer le sponsor du projet de l'insatisfaction de la partie prenante.", "B": "Passer en revue la matrice de traçabilité des exigences et mener des inspections.", "C": "Aviser la partie prenante que les procédures d'arbitrage seront suivies.", "D": "Documenter la situation dans le journal des points à traiter et envoyer un rapport à la direction."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Livraison et Mesure), face a une partie prenante qui conteste la qualite apres acceptation, le chef de projet revise la matrice de tracabilite des exigences et conduit des inspections objectives. Informer le sponsor (A) sans donnees est faible. Recourir a l'arbitrage (C) est conflictuel premature. Documenter en points a traiter (D) ne resout pas.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 75},
  {"id": "q-0076", "question": "Lors de la réunion quotidienne visant à faire le point, un membre informe l'équipe du projet que les licences de l'un des composants qui seront utilisées expirent dans quelques mois. Le coût des licences est considérable. Que doit faire le chef de projet?", "options": {"A": "Ajouter un spike (exploration) au backlog pour trouver une alternative de conception.", "B": "Soumettre une demande de changement pour s'assurer du renouvellement.", "C": "Faire remonter le problème des licences au product owner (le représentant du métier )", "D": "Évaluer l'impact du non-renouvellement des licences."}, "correct": "D", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Incertitude), avant toute action sur les licences, le chef de projet evalue l'impact du non-renouvellement. Cette analyse alimente ensuite les decisions (renouveler via change request, chercher une alternative via spike, etc.). Lancer une demande de changement (B) ou un spike (A) sans evaluation est premature. Escalader au PO (C) sans analyse est passif.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 76},
  {"id": "q-0077", "question": "Une organisation est sur le point de démarrer un projet en plusieurs phases. En raison de réglementations strictes, certaines phases doivent être entièrement planifiées à l'avance. Toutefois, d'autres phases permettent et plus grande flexibilité davantage d'expérimentation quant au périmètre et à l'échéancier. Le sponsor veut poursuivre les objectifs du projet comme prévu, mais souhaite aussi tenir compte des nouvelles informations et des changements à mesure de l'avancée du projet. Quelle approche de management de projet le chef de projet doit-il choisir?", "options": {"A": "agile,", "B": "Échelonné,", "C": "hybride,", "D": "incrémentiel."}, "correct": "C", "domain": "Process", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (Tailoring), un projet avec phases tres reglementees (planification complete requise) ET phases experimentales/flexibles correspond exactement a l'approche hybride. Tout-agile (A) viole le besoin de planification reglementaire. Echelonne (B) ou incrementiel (D) ne couvrent pas la dualite.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 77},
  {"id": "q-0078", "question": "Pendant l'étape de planification d'un projet, le chef de projet s'aperçoit qu'une approche standard d'engagement des parties prenantes ne suffira pas. L'un des représentants du client, qui n'est pas un décideur clé, a des avis extrêmement arrêtés. Ce représentant pourrait faire obstacle à la progression du projet du fait de l'autorité qu'il dégage lors des réunions. Comment le chef de projet doit-il gérer cette situation à venir?", "options": {"A": "Mettre à jour l’échéancier du projet pour tenir compte de cette partie prenante.", "B": "Mettre à jour le registre des risques pour prendre en compte les impacts possibles sur le projet.", "C": "Prévoir du temps pour obtenir l'adhésion totale de cette partie prenante avant les réunions déterminantes.", "D": "Demander que seuls les décideurs clés assistent aux réunions du projet."}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Parties prenantes), face a une partie prenante influente non-decisionnaire, le chef de projet investit du temps pour obtenir son adhesion avant les reunions cles (gestion proactive d'engagement). Mettre a jour l'echeancier (A) ou le registre des risques (B) est reactif. Exclure des reunions (D) est conflictuel et inefficace.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 78},
  {"id": "q-0079", "question": "Plusieurs composants d'un projet de fabricant ont été retournés par le client. Le client se plaint de la mauvaise qualité des composants et craint que, de ce fait, ses produits soient retournés au motif de problèmes de qualité. Le chef de projet est certain que la qualité a été préservée. Comment le chef de projet doit-il communiquer avec le client pour l'assurer que le projet a abouti à des produits de qualité?", "options": {"A": "Montrer au client l'historique de qualité à l'aide d'échantillons.", "B": "Montrer au client les seuils de tolérance et de contrôle.", "C": "Montrer au client les mesures de contrôle de la qualité.", "D": "Montrer les résultats d'échantillons clients du lot en cours."}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Qualite), pour rassurer un client sur la qualite, le chef de projet montre les mesures de controle qualite (control charts, results, metriques) qui demontrent objectivement la conformite continue. Des echantillons historiques (A) ou les tolerances (B) sont moins concluantes. Des echantillons du lot en cours (D) sans contexte de mesure structuree est faible.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 79},
  {"id": "q-0080", "question": "Dans le projet Agile, qui a démarré il y a six mois, depuis le début du projet, des désaccords sont apparus entre les membres de l'équipe au sujet des réunions quotidiennes, car certains ne sont pas disponibles en même temps. Le chef de projet est convaincu qu'une équipe agile devrait s'auto-organiser et que les horaires des réunions devraient être décidés par l'équipe. Que doit faire le chef de projet?", "options": {"A": "Mettre au point une charte d'équipe.", "B": "Désigner un chef d'équipe.", "C": "Reconnaître les contributions de l'équipe.", "D": "Mettre au point un échéancier du projet."}, "correct": "A", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Guide Agile, la charte d'equipe formalise les valeurs, les regles de travail et les decisions partagees (incluant les horaires de daily). Elle est le vehicule de l'auto-organisation. Designer un chef d'equipe (B) viole l'auto-organisation. Reconnaitre les contributions (C) est utile mais ne resout pas le probleme structurel. L'echeancier de projet (D) ne traite pas les rituels.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 80},
  {"id": "q-0081", "question": "Le chef de projet est en milieu d'un projet lorsque l'un des membres clés de l'équipe du projet doit prendre un congé imprévu et prolonger. Le projet est en avance sur l'échéancier et en deçà du budget. Quelles sont les deux actions que le chef de projet doit prendre en premier lieu pour résoudre ce problème ? Choisissez deux réponses?", "options": {"A": "Vérifier la matrice des responsabilités, la RAM du projet, puis déterminer les activités qui seront affectées.", "B": "Consulter le registre des risques pour obtenir une réponse préparée à l'absence inattendue d'une ressource.", "C": "Réassigner les responsabilités entre les autres membres à l'aide de la marge disponible pour la formation.", "D": "Obtenir l'appui du sponsor du projet pour remplacer le membre de l'équipe. E. Vérifier si les activités du membre de l'équipe sont suffisamment documentées pour faciliter le transfert des activités."}, "correct": "AE", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Equipe et Planification), face a un conge prolonge imprevu, le chef de projet (A) verifie la RAM pour identifier les activites affectees et (E) verifie que les activites sont documentees pour faciliter le transfert. Consulter le registre des risques (B) est utile mais moins prioritaire. Reaffecter immediatement (C) ou demander un remplacement (D) sont premature avant analyse.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 81},
  {"id": "q-0082", "question": "Une entreprise déplace son siège social dans une autre ville. Le chef de projet responsable de la affectation a utilisé une approche prédictive pendant la transition. Toutefois, les systèmes d'information seront migrés selon une approche agile. Le chef de projet doit décider du type de contrat à signer avec le fournisseur responsable de la migration des systèmes. Le chef de projet est préoccupé par le fait de devoir maîtriser les finances tout en produisant des résultats. Alors, comment le chef de projet doit-il gérer cette situation?", "options": {"A": "utiliser des incréments de prix fixes lorsque les user stories (les récits) sont terminés,", "B": "signer un accord unique pour l'ensemble du projet", "C": "c'est négocier le paiement une fois la migration du projet terminée,", "D": "confirmer le paiement après chaque rétrospective du projet."}, "correct": "A", "domain": "Process", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Approvisionnement) et le Guide Agile, dans un projet hybride avec une partie agile, les paiements en increments de prix fixes lies a l'acceptation des user stories permettent de controler les couts tout en preservant la flexibilite agile. Un contrat unique (B) ou un paiement final (C) ne s'adaptent pas. Le paiement par retrospective (D) lie le paiement a une ceremonie sans livrable acceptable.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 82},
  {"id": "q-0083", "question": "Les test d’acceptation par l'utilisateur identifient un défaut qui pourrait avoir un impact significatif sur les performances du système. L'équipe du projet indique que ces défauts met en péril la date de livraison. Quel processus de gestion des risques doit être exécuté?", "options": {"A": "Effectuer l'analyse quantitative des risques pour décrire en détail les problèmes de performance.", "B": "Effectuer l'analyse qualitative des risques pour évaluer l'ampleur de l'impact sur les performances.", "C": "Planifier les réponses aux risques pour décrire les options possibles afin de contourner le problème de performance.", "D": "maîtriser les risques pour installer des outils de suivi des performances du risque et mettre à jour le registre des risques."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Incertitude), face a un defaut significatif identifie en UAT, l'etape immediate est l'analyse qualitative des risques pour evaluer l'ampleur de l'impact (probabilite x impact) sur les performances. L'analyse quantitative (A) est plus lourde et vient apres. La planification des reponses (C) suit l'evaluation. Maitriser les risques (D) est l'etape ulterieure.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 83},
  {"id": "q-0084", "question": "un chef de projet à été affecté à un projet pédagogique visant à former une équipe au développement d'applications, l'un des livrables consiste à proposer des stages aux meilleurs étudiants participant aux projets actifs du client. Cependant, le client n'a pas assez de projets en cours pour le moment. Le chef de projet décide de créer plusieurs projets internes afin d'assurer les stages. Quelles sont les trois actions que le chef de projet doit entreprendre pour répondre à cette problématique sans ajouter de coûts pour le client ? En choisir trois?", "options": {"A": "Gérer la qualité de la livraison.", "B": "Utiliser le budget pour aléas du projet.", "C": "Créer une demande de changement avec le périmètre des nouveaux projets internes.", "D": "Créer un organigramme des travaux du projet (WBS) du nouveau périmètre avec les projets internes. E. Inciter le client à lancer un nouveau projet."}, "correct": "BCD", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Adaptation et Approvisionnement), pour creer des projets internes sans ajouter de cout client: (B) utiliser le budget pour aleas, (C) creer une demande de changement formelle avec le nouveau perimetre, (D) elaborer un WBS pour structurer. Gerer la qualite (A) ne resout pas le financement. Demander au client de lancer un projet (E) ajoute des couts au client.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 84},
  {"id": "q-0085", "question": "Le projet de développement est sur le point de démarrer. Le chef de projet sait que le client très influent fait des demandes fréquentes et très spécifiques à tous les sprints. Ce projet exigera une coordination des contrats avec les tiers. Et le chef de projet doit trouver un meilleur moyen pour gérer les attentes du client et des partenaires .Quelles stratégies le chef de projet doit-il adopter?", "options": {"A": "Travailler en étroite collaboration avec les clients et les tiers pour répondre à leurs besoins.", "B": "Se concentrer sur la mise en œuvre de solutions SAAS, software as a service, pour le client.", "C": "Préciser clairement le périmètre des fonctionnalités à déployer dans le contrat.", "D": "Modifier les définitions du marketing et de la gestion du produit pour répondre aux besoins des parties prenantes."}, "correct": "A", "domain": "People", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Engagement et de Collaboration), face a un client exigeant et des tiers, le chef de projet travaille en etroite collaboration avec clients et tiers pour repondre aux besoins evolutifs. Imposer une solution SaaS (B) ne traite pas les attentes. Figer le perimetre dans le contrat (C) est contraire a l'esprit iteratif. Modifier les definitions marketing (D) est hors-perimetre.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 85},
  {"id": "q-0086", "question": "Un membre de l'équipe se plaint d'un accord conclu au cours de la dernière réunion. Ce membre était présent à la réunion et a participé aux décisions inscrites dans les comptes rendus de la réunion. Que doit faire le chef de projet à présent?", "options": {"A": "Rencontrer le membre de l'équipe et rechercher la cause originale de son comportement.", "B": "Organiser une réunion supplémentaire avec l'équipe pour communiquer l'accord passé lors de la dernière réunion.", "C": "Discuter avec le membre de l'équipe et lui expliquer qu'une fois la réunion terminée, l'accord doit être respecté.", "D": "Planifier une nouvelle réunion pour évaluer l'accord et en négocier un nouveau."}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Leadership et de Responsabilite), un accord acte en reunion engage les participants. Le chef de projet discute avec le membre et lui rappelle qu'une fois la reunion close, l'accord doit etre respecte (sauf nouvelle decision formelle). Chercher la cause-racine (A) est utile mais l'integrite des engagements prime. Reconvoquer toute l'equipe (B) ou renegocier (D) erodent les decisions deja prises.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 86},
  {"id": "q-0087", "question": "L'équipe du projet a des difficultés à comprendre les détails techniques concernant les exigences. Les informations n'ont pas été communiquées au départ par le client, mais elles sont essentielles dans l'itération en cours pour clarifier la manière dont les tâches doivent être accomplies. Comment le chef de projet doit-il gérer cette situation?", "options": {"A": "Planifier des réunions hebdomadaires et des examens de produit avec les clients pour clarifier les exigences.", "B": "Demander aux clients de revoir et de clarifier les définitions des fonctionnalités au sprint en cours.", "C": "Informer le client et lui demander de participer aux réunions quotidiennes.", "D": "Envoyer au client un burn down chart ( graphique d'avancement) du sprint en cours, et demander des précisions."}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Guide Agile, lorsqu'une exigence cle manque de detail technique dans l'iteration en cours, le chef de projet demande au client de revoir et clarifier les definitions de fonctionnalite du sprint courant (just-in-time). Reunions hebdomadaires generales (A) sont moins ciblees. Faire participer le client aux dailies (C) est intrusif. Un burn-down (D) ne resout pas un probleme d'exigence.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 87},
  {"id": "q-0088", "question": "Une équipe de projet donne la priorité à la création d'artefacts de projet et applique ce principe de manière rigide, alors qu'elle est confrontée à des problèmes de retard dans les livrables. Comment le chef de projet doit-il réagir?", "options": {"A": "Reconnaître les efforts de l'équipe dans la documentation des artefacts et la motiver au moyen d'un mécanisme de récompense.", "B": "Indiquer à l'équipe qu'elle ne produira pas de livrables réussis en concentrant toute son énergie sur les artefacts.", "C": "Favoriser la mise en œuvre d'outils automatisés permettant à l'équipe de gérer les artefacts du projet.", "D": "Mettre en œuvre des contrôles plus stricts pour accorder la plus haute importance à la création d'artefacts de projet."}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Livraison de Valeur), l'equipe priorise les livrables de valeur sur les artefacts. Le chef de projet indique a l'equipe que produire des artefacts au detriment des livrables compromet la reussite. Recompenser la documentation rigide (A) ou imposer des controles plus stricts (D) renforce le probleme. Automatiser (C) est utile mais ne corrige pas la priorisation erronee.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 88},
  {"id": "q-0089", "question": "Le chef de projet dirige un projet dans une organisation avec une structure fonctionnelle. Le chef de projet a été informé par l'équipe que les tâches liées à l'achat des services prenaient trop de temps, car le service des achats a d'autres priorités. Que doit faire le chef de projet?", "options": {"A": "Modifier l’échéancier du projet pour tenir compte des retards dans l'achat des services.", "B": "Demander à l'équipe de projet de continuer à travailler sur d'autres tâches qui ne dépendent pas de l'achat des services.", "C": "S'entretenir avec le responsable des achats pour identifier la source des retards et convenir d'un échéancier d'achats.", "D": "Demander que les tâches d'achat soient externalisées par l'intermédiaire d'un fournisseur existant."}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Leadership et de Collaboration), en organisation fonctionnelle, le chef de projet s'entretient avec le responsable achats pour identifier la cause des retards et convenir d'un echeancier. Modifier l'echeancier (A) cede sans negocier. Faire travailler l'equipe sur autre chose (B) ne resout pas le retard. Externaliser (D) court-circuite le service achats.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 89},
  {"id": "q-0090", "question": "L'équipe projet malade ne pourra pas revenir dans le projet avant plusieurs semaines. En cours de la réunion quotidienne, l'équipe chiffre part de leurs préoccupations, car la personne malade était la seule compétente pour le composant qu'elle développait. Qu'aurait dû faire le chef de projet pour éviter cette situation?", "options": {"A": "Faciliter le transfert de connaissances transversales pendant le projet.", "B": "Demander une documentation solide pour la création du composant.", "C": "Se procurer plusieurs ressources qualifiées pour chaque composant.", "D": "Externaliser le développement du composant en question à une entreprise."}, "correct": "A", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Equipe et Stewardship), le chef de projet aurait du faciliter le transfert de connaissances transverses (cross-training, pair-programming) pendant le projet pour eviter le SPOF d'une ressource unique. Documenter (B) est utile mais moins efficace que le partage actif. Recruter plusieurs ressources (C) est couteux. Externaliser (D) cree de la dependance.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 90},
  {"id": "q-0091", "question": "Le projet rejoint un projet existant. Une des parties prenantes du projet n'est pas satisfaite de la fréquence et des types d'informations qui sur la avancement du projet. Elle demande que davantage d'informations soient partagées. Que doit faire le chef de projet à présent?", "options": {"A": "Consulter le document de référence de base et périmètre pour effectuer le suivi des informations transmises.", "B": "Mettre à jour le plan de gestion des communications du projet immédiatement.", "C": "Informer la participante qu'elle doit attendre la réunion annuelle d'aujourd'hui.", "D": "Programmer une réunion avec la partie prenante afin de mieux comprendre sa demande."}, "correct": "D", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Engagement), avant de modifier le plan de communication, le chef de projet rencontre la partie prenante pour comprendre precisement sa demande (besoins, frequence, format). Mettre a jour immediatement (B) sans diagnostic est premature. Renvoyer aux documents (A) ou a la prochaine reunion (C) est dilatoire.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 91},
  {"id": "q-0092", "question": "L'équipe de projet Agile découvre qu'elle n'est pas en mesure de finaliser la mise en œuvre d'une fonctionnalité au cours de la première itération. L'équipe estime qu'elle ne peut pas effectuer les tâches de la deuxième itération. La fonctionnalité est un composant essentiel que le client a priorisé. Que doit faire l'équipe?", "options": {"A": "Revenir vers le client et expliquer qu'elle ne peut pas finaliser l'implémentation de la fonctionnalité en une seule itération.", "B": "Réduire le périmètre de la fonctionnalité pour qu'elle passe en une itération et la livrer au client.", "C": "Diviser la fonctionnalité en sous-fonctionnalités plus petites, les implémenter puis les livrer par incréments à plusieurs itérations.", "D": "Demander au client de simplifier la fonctionnalité afin qu'elle puisse être implémentée en une seule itération."}, "correct": "C", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Guide Agile, lorsqu'une fonctionnalite ne tient pas dans une iteration, on la divise en sous-fonctionnalites livrables par increments sur plusieurs iterations (slicing). Cette approche preserve la livraison de valeur incrementale. Expliquer sans solution (A) est passif. Reduire le perimetre (B) ou demander une simplification (D) peuvent sacrifier la valeur cliente prioritaire.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 92},
  {"id": "q-0093", "question": "un chef de projet se voit confier un projet de construction d’envergure. Le projet est essentiel pour les habitants de la ville et en particulier pour le dirigeant politique local, qui s'est engagé par ses promesses électorales à livrer le projet à temps. Un nouveau sponsor de projet a été désigné et souhaite inclure des aspects que le sponsor précédent n'a pas approuvés. Que doit faire le chef de projet?", "options": {"A": "Informer le nouveau sponsor du projet que les nouveaux aspects ne sont pas inclus dans ce projet.", "B": "Rencontrer le nouveau sponsor du projet pour examiner le périmètre actuel du projet et les changements demandés.", "C": "Inviter le sponsor du projet à un briefing avec l'équipe du projet pour démontrer les progrès réalisés et remobiliser autour des livrables du projet ayant fait l'objet d'un engagement.", "D": "Redéfinir la référence de base du projet, car l'arrivée d'un nouveau sponsor représente une occasion de passer en revue et réétalonner les objectifs du projet."}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Engagement et de Leadership), face a un nouveau sponsor avec des demandes additionnelles, le chef de projet le rencontre pour examiner le perimetre actuel et les changements demandes. Refuser frontalement (A) est conflictuel. Inviter au briefing equipe (C) sans cadrage executif est premature. Redefinir la baseline (D) est extreme et non-justifie.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 93},
  {"id": "q-0094", "question": "Lors de la fusion de deux grandes entreprises, un chef de projet est affecté à un projet. L'entreprise embauche un consultant pour s'assurer de l'utilisation des meilleures pratiques en matière de sécurité des informations. Au cours d'une itération, le consultant demande des modifications sur un composant logiciel au motif qu'il ne répond pas aux exigences du marché. Que doit faire le chef de projet?", "options": {"A": "Annuler l'itération et ajouter des changements demandés.", "B": "Annuler l'itération et consulter le Product Owner.", "C": "Poursuivre l'itération et examiner le changement avec le client.", "D": "Poursuivre l'itération et ajouter les changements demandés."}, "correct": "C", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Guide Agile, une iteration en cours n'est PAS annulee sauf cas extreme; les changements sont integres dans le backlog et examines avec le client/PO pour les iterations suivantes. Annuler une iteration (A, B) gaspille le travail. Ajouter en cours d'iteration (D) viole l'esprit timeboxed. Poursuivre et examiner avec le client est la bonne pratique.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 94},
  {"id": "q-0095", "question": "Un employé sénior ayant une expérience pertinente pour un projet très complexe convoite une promotion pour pouvoir rejoindre le projet. L'employé fait une recommandation concernant le projet. La charte du projet a été récemment approuvée. Comment le chef de projet doit-il gérer la demande de l'employé?", "options": {"A": "Demander au sponsor du projet de revoir la charte du projet pour tenir compte de la recommandation de l'employé.", "B": "Créer un modèle de prédominance pour déterminer si l'employé aura une influence sur le projet.", "C": "Évaluer la recommandation de l'employé en examinant les retours d'expérience d'un projet similaire.", "D": "Évaluer l'influence et le pouvoir de l'employé pour déterminer s'il ajoutera de la valeur."}, "correct": "D", "domain": "Business", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Parties prenantes), evaluer l'influence et le pouvoir de l'employe (et donc la valeur ajoutee de sa recommandation) est l'outil approprie (matrice power/influence). Modifier la charte (A) sur la base d'une demande individuelle est premature. Un modele de predominance (B) n'est pas standard. Les retours d'experience (C) ne valident pas l'employe.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 95},
  {"id": "q-0096", "question": "Au milieu d'une itération, une équipe agile travaillant sur le développement d'un nouveau produit est informée qu'un membre important de l'équipe s'absentera du projet pendant quelques semaines en raison de problèmes personnels urgents. Que doit faire ce projet en ce qui concerne les activités qui étaient sous la responsabilité de ce membre de l'équipe?", "options": {"A": "Demander à l'équipe de gestion des approvisionnements d'embaucher un remplaçant.", "B": "Convaincre le membre de l'équipe de ne pas partir tant que le projet n'est pas terminé.", "C": "Laisser la direction générale décider de la façon de procéder avec le projet.", "D": "Parvenir à un accord avec l'équipe sur la façon de gérer la situation."}, "correct": "D", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Guide Agile et le PMBOK 7 (principe d'Equipe auto-organisee), face a l'absence d'un membre, le chef de projet parvient a un accord avec l'equipe sur la reorganisation. Embaucher un remplacant (A) en cours d'iteration est lourd. Forcer la personne (B) est ethiquement inacceptable. Laisser la direction generale decider (C) court-circuite l'equipe.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 96},
  {"id": "q-0097", "question": "Le projet est sur le point de démarrer avec une équipe de projet mondiale. Les déplacements n'étant pas une option viable pour les membres de l'équipe de projet, la plupart participeront virtuellement. Que doivent faire les chefs de projet pour impliquer l'équipe?", "options": {"A": "Investir dans un environnement de collaboration /collaboration virtuel", "B": "Demander aux ressources humaines des recommandations en matière de cohésion d'équipe.", "C": "Organiser des réunions individuelles avec les membres de l'équipe afin d'améliorer la communication.", "D": "Planifier des réunions d'équipe hebdomadaires pour encourager la collaboration."}, "correct": "A", "domain": "People", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Equipe et environnement collaboratif), pour engager une equipe globale virtuelle, investir dans un environnement de collaboration virtuelle robuste est la base structurelle. Consulter les RH (B) est secondaire. Reunions individuelles (C) ou hebdomadaires (D) sont utiles mais l'infrastructure de collaboration est le prealable.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 97},
  {"id": "q-0098", "question": "Un chef de projet est en charge d'un projet lié aux taxes, que sera géré selon une approche agile. En examinant les retours d'expérience d'un projet précédent, le chef de projet s'aperçoit qu'une partie prenante clé est un expert en fiscalité disposé en aide. Comment le chef de projet doit-il exploiter cette information?", "options": {"A": "Demander au responsable fonctionnel d'affecter l'équipe du projet des retours d'expérience au projet en cours afin d'éviter une courbe d'apprentissage.", "B": "Reconnaître que les compétences de la partie prenante sont importantes pour le projet et évaluer la possibilité qu'elle apporte un soutien à l'équipe de projet.", "C": "Envoyer une demande au sponsor du projet pour qu'il recrute la partie prenante et qu'il intègre à l'équipe du projet.", "D": "Demander à l'équipe du projet de passer en revue les retours d'expérience et demander à l'équipe de communiquer directement avec la partie prenante en cas de questions."}, "correct": "B", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Parties prenantes et Equipe), reconnaitre les competences d'une partie prenante experte et evaluer la possibilite qu'elle apporte un soutien est la demarche d'engagement appropriee. Faire affecter une autre equipe (A) est lourd. Recruter formellement (C) est premature. Inviter l'equipe a contacter sans cadrage (D) deresponsabilise.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 98},
  {"id": "q-0099", "question": "Un chef de projet gère un projet avec des membres d'équipe qui travaillent dans le monde entier. Le chef de projet remarque que les livrables de chacun des membres de l'équipe ne répondent pas aux exigences. Que doit faire le chef de projet en premier lieu?", "options": {"A": "S'entretenir avec l'équipe du projet pour expliquer que les livrables non conformes doivent être travaillés et soumis immédiatement afin d'éviter les retards.", "B": "Réunir l'équipe du projet par téléconférence pour lui dire que des mesures disciplinaires seront prises en cas de soumission d'autres livrables non conformes.", "C": "Prévoir du temps avec le sponsor du projet pour l'informer que les finances du projet commencent à glisser en raison du temps qu'il sera nécessaire pour retravailler les livrables.", "D": "Discuter du processus utilisé pour créer des livrables non conformes avec l'équipe du projet pour voir s'il y a eu un malentendu"}, "correct": "D", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Leadership et de Cause-racine), face a des livrables non conformes, le chef de projet discute du PROCESSUS utilise avec l'equipe pour detecter une cause systemique (malentendu, manque de standards). Menacer (A, B) est punitif sans diagnostic. Informer le sponsor (C) sans analyse est defaitiste.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 99},
  {"id": "q-0100", "question": "Le projet a terminé ses activités de conception en avance sur l’échéancier. Soudain, le chef de projet est informé par un fournisseur que des délais de livraison convenus pour un livrable risquent de ne pas être tenus en raison d'une pénurie de ressources. L'équipe interne demande si elle doit continuer à livrer conformément à l'échéancier. Que doit faire le chef de projet?", "options": {"A": "devenir un servant leader en soutenant la collaboration d'équipe et en supprimant les obstacles", "B": "présenter les nouveaux outils de communication aux membres d'équipe.", "C": "déléguer les activités de coordination au Product Owner pour permettre au chef de projet de se concentrer sur la gestion de la collaboration.", "D": "demander à Scrum Master de se concentrer sur la collaboration tandis que le chef de projet se concentre sur la coordination."}, "correct": "A", "domain": "People", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Servant Leadership), face a une perturbation fournisseur, le chef de projet devient servant-leader en soutenant la collaboration et en supprimant les obstacles. Presenter de nouveaux outils (B) est hors-sujet. Deleguer la coordination au PO (C) ou au SM (D) court-circuite la responsabilite du PM.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 100},
  {"id": "q-0101", "question": "Un fournisseur à fabriqué un produit complexe. Au cours d'un test d'acceptation en usine, plusieurs lacunes sont identifiées. La livraison du produit est sur le chemin critique et tout retard aurait un impact sur l'achèvement du projet. Que doit faire le chef de projet?", "options": {"A": "Expédier la marchandise en l'état et effectuer le travail reporté sur le site et facturer la reprise au fournisseur.", "B": "Mettre l'expédition en attente jusqu'à exécution de la reprise dans les locaux du fournisseur afin d'éliminer tout travail supplémentaire sur site.", "C": "Déterminer l'impact sur l’échéancier et évaluer la solution la plus réalisable pour maintenir le projet sur les rails.", "D": "Organiser des conférences téléphoniques régulières avec le fournisseur pour faire le point sur l'avancement et maintenir la tension sur cette problématique."}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Livraison et Qualite), face a un produit non-conforme sur le chemin critique, le chef de projet determine l'impact sur l'echeancier et evalue la solution la plus realiste (retravail in-situ vs chez le fournisseur). Expedier en l'etat (A) ou bloquer (B) sans analyse est premature. Des telecons regulieres (D) ne resolvent pas la decision.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 101},
  {"id": "q-0102", "question": "Un chef de projet rencontre un problème de gouvernance au cours de la phase d'exécution d'un projet. L'un des membres de l'équipe se plaint de recevoir des tâches à effectuer de la part de plusieurs personnes et affirme ne pas pouvoir travailler efficacement. Que doit d'abord établir le chef de projet dans la structure de gouvernance du projet?", "options": {"A": "Un organigramme des travaux WBS et un calendrier clair.", "B": "Un plan de gestion des risques et de résolution des problèmes.", "C": "Une matrice réalisateurs, approbateurs, consultants, informés RACI claire.", "D": "Un plan de gestion des ressources et de résolution des conflits."}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Equipe et Gouvernance), face a un membre recevant des taches de plusieurs sources, la matrice RACI claire est l'outil de gouvernance qui clarifie qui realise, qui approuve, qui est consulte et qui est informe. WBS et calendrier (A) ne traitent pas le qui-fait-quoi. Plan de risques (B) ou de ressources (D) sont complementaires mais non-prioritaires.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 102},
  {"id": "q-0103", "question": "Un membre d’une équipe de test dans un projet agile, travail bien avec l'équipe du projet cependant lors des deux itérations précédentes, il ne s'est pas montrée très performant et l'équipe a eu des difficultés à atteindre les objectifs de l'itération. Comme recherche de projet dont il gère la situation?", "options": {"A": "discuter du problème avec le responsable fonctionnel du membre de l'équipe.", "B": "parler aux membres de l'équipe de la nécessité d'améliorer ses performances.", "C": "laisser l'équipe du projet discuter du problème avec ce membre de l'équipe.", "D": "informer le service des ressources humaines du problème."}, "correct": "C", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Guide Agile et le PMBOK 7 (principe d'Equipe auto-organisee), en agile c'est l'equipe qui adresse les problemes de performance individuels via la retrospective et le feedback pair-a-pair. Le chef de projet laisse l'equipe discuter du probleme avec le membre concerne. Impliquer le fonctionnel (A) ou les RH (D) court-circuite l'auto-organisation. Parler seul au membre (B) viole l'esprit collectif.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 103},
  {"id": "q-0104", "question": "Un membre de l'équipe a connu des conflits personnels sur des projets antérieurs, ce qui le rend nerveux à l'idée de travailler sur le projet en cours. Le chef de projet sait que ce membre de l'équipe pourrait ajouter de la valeur au projet. Que doit faire le chef de projet pour tirer la meilleure partie de ce membre?", "options": {"A": "Consulter les ressources humaines et vérifier les politiques de l'entreprise sur ce qu’il est permis de conseiller aux membres de l'équipe.", "B": "Conseiller aux membres de l'équipe de se concentrer sur le projet en cours et de considérer les conflits passés comme des retours d'expérience.", "C": "Conseiller aux membres de l'équipe de ne pas partager d'informations personnelles issues des projets antérieurs avec l'équipe.", "D": "Consulter le sponsor du projet pour savoir s'il permet de partager des informations personnelles avec toute l'équipe."}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Leadership et d'intelligence emotionnelle), le chef de projet conseille au membre de se concentrer sur le projet en cours et de considerer les conflits passes comme des retours d'experience. Consulter les RH (A) est une escalade prematuree. Lui interdire de partager (C) cree de la repression. Consulter le sponsor (D) est inadapte pour un sujet personnel.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 104},
  {"id": "q-0105", "question": "Un grand projet perturbe le quartier dans lequel il est situé. Les voisins sont mécontents et la résistance au projet peut avoir des incidences sur son échéance. Quelles sont les deux actions que doit entreprendre le chef de projet ? Choisissez deux réponses?", "options": {"A": "Organiser une réunion avec les représentants du quartier afin de gagner leur coopération.", "B": "Analyser la situation et découvrir ce qui est l'origine de l'attitude négative dans le quartier.", "C": "Demander au client de repousser l'échéance du projet afin de laisser du temps de résoudre le conflit.", "D": "Envoyer un courrier aux habitants du quartier leur demandant de ne pas perturber le projet. e. Demander au maire de la ville d'user de son autorité pour mettre fin à la résistance dans le quartier."}, "correct": "AB", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Parties prenantes), face a une opposition d'un quartier, le chef de projet (A) rencontre les representants pour gagner leur cooperation et (B) analyse les causes de l'attitude negative. Reporter le projet (C) ou recourir a l'autorite (E) sont conflictuels. Un courrier comminatoire (D) aggrave les tensions.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 105},
  {"id": "q-0106", "question": "Le projet de construction d'une centrale nucléaire vise à réduire la dépendance énergétique de la région à l'égard des sources d'électricité externes. Le chef de projet a reçu le soutien de plusieurs dirigeants de la région, cependant, certains membres du gouvernement souhaitent l'arrêt du projet pour privilégier le développement de sources d'énergie renouvelables. Quelles parties prenantes ce projet doit-il inclure dans le plan d'engagement des parties prenantes?", "options": {"A": "Les parties prenantes qui ont été identifiées et qui ont des besoins et un impact potentiel sur le projet.", "B": "Les parties prenantes qui soutiennent le projet afin d'obtenir des ressources supplémentaires.", "C": "Les parties prenantes qui s'opposent au projet afin de gérer leurs attentes.", "D": "Les parties prenantes sélectionnées par le sponsor du projet qui ont un impact potentiel sur le projet."}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Parties prenantes), le plan d'engagement doit inclure TOUTES les parties prenantes identifiees qui ont un besoin OU un impact potentiel, qu'elles soient pour ou contre le projet. Inclure seulement les supports (B) ou seulement les opposants (C) est partiel. Une selection par le sponsor (D) est insuffisante.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 106},
  {"id": "q-0107", "question": "Un projet agile comporte une liste documentée des exigences classées selon trois catégories de priorités élevées, moyennes, basses. L'équipe du projet a exprimé sa difficulté à savoir sur quoi travailler ensuite, car un grand nombre d'éléments ont une priorité élevée. Que doit recommander le chef de projet?", "options": {"A": "demander à l'équipe de privilégier les éléments à priorité élevée, moyenne , basses en fonction de ce qu'elle estime être trans logique,", "B": "abandonner la classification actuelle des exigences au profit d'un classement numérique,", "C": "s'assurer que le Product Owner fixe la priorité sur la base d'une feuille de route produit, d'un plan de lancement et d'un plan d'itération,", "D": "demander à l'équipe de privilégier les éléments à priorité élevée en fonction du plan de lancement et de ce qui permet de renforcer l'efficacité des tests."}, "correct": "C", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Guide Agile, le Product Owner est responsable de la priorisation du backlog sur la base d'une feuille de route produit, d'un plan de lancement et de plans d'iteration. Laisser l'equipe deviner (A) viole le role du PO. Un classement numerique (B) est cosmetique. Combiner priorite et efficience des tests (D) detourne le critere business.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 107},
  {"id": "q-0108", "question": "Le projet est sur le point d'être achevé. Le temps réservé aux aléas était utilisé pour garantir la réalisation des livrables suivants dans le respect des délais et du budget. La chef de projet a demandé à l'équipe de suivre un processus rigoureux, ce qui a suscité certaines résistances de la part des membres de l'équipe. Que doit faire le chef de projet pour atténuer cette résistance?", "options": {"A": "Présenter aux membres de l'équipe la manière dont ils peuvent utiliser les outils et des techniques spécifiques pour terminer à temps.", "B": "Comprimer le financement du projet et demander aux membres de l'équipe projet de faire des heures supplémentaires pour respecter le nouveau calendrier.", "C": "Convaincre les membres de l'équipe d'utiliser une méthodologie spécifique pour terminer le projet à temps.", "D": "Motiver les membres de l'équipe projet grâce à des mesures incitatives liées à l'aboutissement du projet dans les délais prévus."}, "correct": "A", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Leadership et Equipe), pour reduire la resistance, le chef de projet presente clairement aux membres comment les outils et techniques specifiques les aideront a terminer a temps (transparence + sens). Comprimer le budget + heures sup (B) renforce la resistance. Convaincre par autorite (C) ne resout pas la cause. Incitations financieres (D) sont court-termistes.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 108},
  {"id": "q-0109", "question": "Un stagiaire remplace une ressource essentielle en plein milieu d'un sprint. Pour aider le stagiaire à se mettre au niveau, le chef de projet désigne un ingénieur senior au sein de l'équipe comme mentor du stagiaire. Deux mois plus tard, le projet passe en statut critique à ce que le retard d'un mois le jalon de lancement. Quelles stratégies à chaque projet pour éviter ce scénario?", "options": {"A": "Convaincre la ressource critique de rester sur le projet.", "B": "Demander une ressource supplémentaire comme remplaçant.", "C": "Négocier du temps supplémentaire pour terminer le projet.", "D": "Allouer du temps supplémentaire au mentor."}, "correct": "D", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Equipe et de Leadership), le retard est cause par le temps que le mentor passe avec le stagiaire sans temps additionnel alloue. Le chef de projet aurait du allouer du temps supplementaire au mentor pour preserver sa productivite tout en encadrant. Convaincre la ressource critique (A) n'est pas toujours faisable. Demander un remplacant (B) ou negocier du temps (C) sont des reactions, pas des preventions.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 109},
  {"id": "q-0110", "question": "À mi-parcours de l'exécution d'un projet, les parties prenantes demandent de l'équipement dont l’achat était prévu. Le chef de projet explique que l'équipement a été acheté, mais qu'il diffère de ce que les parties prenantes demandent actuellement. En effet, les exigences initiales ont été modifiées lors d'une réunion précédente. Qu’aurait dû faire le chef de projet pour éviter ces situations?", "options": {"A": "s'assurer de suivre correctement l'évolution des besoins et des demandes des parties prenantes.", "B": "s'assurer de la validation des exigences du projet et de leur communication à l'équipe de gestion des approvisionnements.", "C": "s'assurer que les contrats d'approvisionnement puissent être annulés dans ce type de situation.", "D": "s'assurer de l'envoi des communications à toutes les parties prenantes en cas de changement des exigences."}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Parties prenantes et Adaptation), pour eviter ce scenario, le chef de projet aurait du suivre correctement l'evolution des besoins et demandes des parties prenantes (changement d'exigences trace et communique). Communiquer aux achats (B) est partiel. Annuler les contrats (C) est reactif. Communiquer apres coup a toutes les PP (D) ne previent pas la divergence d'attente.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 110},
  {"id": "q-0111", "question": "Lors d'une réunion de rétrospective, un membre de l'équipe accuse un autre d'avoir bloqué son travail. La tension monte. Que doit faire le chef de projet ?", "options": {"A": "Trancher immédiatement en faveur du membre le plus expérimenté.", "B": "Reporter la discussion à la prochaine rétrospective.", "C": "Faciliter une discussion ouverte axée sur les faits et les besoins, pas sur les personnes.", "D": "Demander au sponsor d'arbitrer le conflit."}, "correct": "C", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de leadership) et l'Agile Practice Guide, le chef de projet servant-leader facilite la résolution collaborative des conflits en se concentrant sur les faits, pas les personnes. Reporter (B) laisse pourrir la situation. Trancher (A) ou escalader (D) prive l'équipe de son autonomie. La technique du « problem-solving » (Thomas-Kilmann) est la plus efficace pour préserver la cohésion.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 111},
  {"id": "q-0112", "question": "Un membre clé de l'équipe agile a quitté l'entreprise au milieu d'un sprint. Le sprint est désormais en retard. Quelle est la meilleure action ?", "options": {"A": "Demander un membre supplémentaire immédiatement au sponsor.", "B": "Réorganiser le sprint avec l'équipe pour réajuster la portée et la vélocité.", "C": "Travailler en heures supplémentaires pour rattraper.", "D": "Annuler le sprint et démarrer un nouveau."}, "correct": "B", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "L'Agile Practice Guide recommande l'auto-organisation et la transparence. L'équipe doit se réunir, réévaluer la capacité (vélocité) et adapter la portée du sprint. Ajouter une ressource (A) au milieu d'un sprint réduit souvent la productivité (loi de Brooks). Les heures supplémentaires (C) génèrent du burnout. Annuler (D) est une option extrême réservée à un changement majeur de priorité.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 112},
  {"id": "q-0113", "question": "Une équipe virtuelle internationale a du mal à communiquer à cause des fuseaux horaires. Quelle est la meilleure approche ?", "options": {"A": "Imposer un seul fuseau horaire pour toutes les réunions.", "B": "Établir des règles de communication asynchrone et faire tourner les horaires des réunions synchrones.", "C": "Limiter les communications aux e-mails uniquement.", "D": "Demander à l'équipe de travailler en horaires décalés."}, "correct": "B", "domain": "People", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 souligne l'importance d'adapter la communication au contexte. Pour les équipes virtuelles distribuées, mixer communication asynchrone (documentation, messages, vidéos courtes) avec réunions synchrones tournantes équilibre la charge entre membres. Imposer un fuseau (A) ou des horaires décalés (D) crée du ressentiment. Limiter aux e-mails (C) appauvrit la communication.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 113},
  {"id": "q-0114", "question": "Un nouveau chef de projet hérite d'une équipe démotivée par un échec précédent. Quelle est sa première action ?", "options": {"A": "Remplacer plusieurs membres pour insuffler du sang neuf.", "B": "Organiser des entretiens individuels pour écouter et comprendre les préoccupations.", "C": "Lancer immédiatement le projet pour ne pas perdre de temps.", "D": "Annoncer un bonus financier à la livraison."}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine de performance Équipe), construire la confiance commence par l'écoute active. Les entretiens individuels permettent d'identifier les freins et de reconstruire la motivation. Remplacer (A) détruit le capital relationnel. Lancer sans écouter (C) reproduira l'échec. Un bonus (D) est une motivation extrinsèque inefficace à long terme (théorie de Herzberg).", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 114},
  {"id": "q-0115", "question": "Lors du planning d'un sprint, le Product Owner ajoute des fonctionnalités qui doublent la charge prévue. Que fait le Scrum Master ?", "options": {"A": "Accepter et demander à l'équipe de faire des heures supplémentaires.", "B": "Rappeler que la capacité du sprint est définie par l'équipe et faciliter une priorisation.", "C": "Refuser catégoriquement et clore la réunion.", "D": "Escalader au sponsor du projet."}, "correct": "B", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Scrum Guide et l'Agile Practice Guide, c'est l'équipe de développement qui définit la capacité du sprint. Le rôle du Scrum Master est de coacher le Product Owner sur la priorisation et la valeur. Accepter aveuglément (A) compromet la qualité. Refuser sans dialogue (C) bloque la collaboration. Escalader (D) court-circuite le rôle du Product Owner.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 115},
