  {"id": "q-0116", "question": "Un sponsor demande de retirer un membre senior de l'équipe sans expliquer pourquoi. Que doit faire le chef de projet ?", "options": {"A": "S'exécuter immédiatement par respect hiérarchique.", "B": "Refuser au nom de la stabilité de l'équipe.", "C": "Discuter avec le sponsor pour comprendre les raisons et évaluer l'impact sur le projet.", "D": "Demander au membre concerné s'il veut partir."}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 prône la collaboration avec les parties prenantes et la transparence. Le chef de projet doit comprendre le contexte avant d'agir, évaluer l'impact sur le calendrier et le moral, puis proposer un plan d'atténuation. Obéir aveuglément (A) ou refuser (B) sans dialogue sont inappropriés. Impliquer le membre (D) avant le sponsor crée des problèmes politiques.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 116},
  {"id": "q-0117", "question": "Pendant un daily standup, un développeur signale un blocage technique récurrent. Que doit faire le chef de projet ?", "options": {"A": "Organiser une session technique séparée après le standup pour le résoudre.", "B": "Demander au développeur de chercher seul une solution.", "C": "Lever le standup et résoudre immédiatement le problème en groupe.", "D": "Reporter le sujet à la rétrospective."}, "correct": "A", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Le Scrum Guide précise que le daily standup est un point de synchronisation court (15 min). Les détails techniques se traitent dans une réunion séparée immédiatement après (« after party »). Forcer la résolution en groupe (C) viole la timebox. Laisser seul (B) le développeur ralentit le sprint. Attendre la rétrospective (D) est trop tard.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 117},
  {"id": "q-0118", "question": "Un membre de l'équipe sous-performe constamment. Comment le chef de projet doit-il agir ?", "options": {"A": "Documenter immédiatement pour son licenciement.", "B": "Avoir un entretien individuel franc pour comprendre les causes et établir un plan d'action.", "C": "Ignorer en espérant une amélioration spontanée.", "D": "En parler aux autres membres pour avoir leur avis."}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le principe de leadership du PMBOK 7 demande au PM d'agir en coach. Un entretien individuel permet d'identifier les causes (manque de formation, problèmes personnels, mauvaise affectation) et de définir un plan d'amélioration mesurable. Documenter pour licencier (A) est prématuré. Ignorer (C) aggrave. Discuter avec d'autres (D) viole la confidentialité et nuit à la confiance.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 118},
  {"id": "q-0119", "question": "Deux équipes interdépendantes se rejettent la faute pour un retard. Quelle technique appliquer ?", "options": {"A": "Forcing : imposer une décision rapide.", "B": "Avoiding : laisser les équipes se débrouiller.", "C": "Collaborating : organiser un atelier conjoint pour analyser la cause racine.", "D": "Compromising : couper la poire en deux sur les responsabilités."}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon Thomas-Kilmann, « Collaborating » (problem-solving) produit la solution gagnant-gagnant et durable. Un atelier conjoint avec analyse de cause racine (5 pourquoi, fishbone) identifie le vrai problème. Forcing (A) crée du ressentiment. Avoiding (B) ne résout rien. Compromising (D) est un demi-succès qui laisse des frustrations.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 119},
  {"id": "q-0120", "question": "Un membre exprime publiquement son désaccord avec une décision du chef de projet pendant une réunion client. Comment réagir ?", "options": {"A": "Le contredire publiquement pour rétablir l'autorité.", "B": "Demander une pause, traiter la divergence en privé, et revenir avec une position alignée.", "C": "Accepter immédiatement sa position devant le client.", "D": "L'écarter de la suite de la réunion."}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "L'intelligence émotionnelle (Goleman) et le PMBOK 7 imposent de préserver le professionnalisme devant le client. Une pause permet d'aligner l'équipe en privé via une discussion respectueuse. Contredire publiquement (A) humilie. Accepter sous pression (C) crée un précédent. Écarter (D) est punitif et destructif pour la confiance.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 120},
  {"id": "q-0121", "question": "L'équipe atteint la phase de « storming » selon Tuckman. Comportements à adopter ?", "options": {"A": "Renforcer les règles strictes pour calmer les tensions.", "B": "Coacher activement, clarifier les rôles, faciliter la résolution de conflits.", "C": "Attendre passivement que la phase se termine.", "D": "Réorganiser l'équipe."}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le modèle de Tuckman (Forming-Storming-Norming-Performing) prévoit que le storming est une phase normale et nécessaire. Le chef de projet doit coacher, clarifier les rôles/responsabilités (RACI), et faciliter les conflits sans les éviter. Imposer des règles (A) bloque la dynamique. Attendre (C) prolonge la phase. Réorganiser (D) réinitialise tout.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 121},
  {"id": "q-0122", "question": "Une partie prenante influente n'a pas été identifiée et critique publiquement le projet. Action prioritaire ?", "options": {"A": "L'ajouter au registre des parties prenantes, analyser son pouvoir/intérêt et adapter le plan d'engagement.", "B": "Lui répondre publiquement pour défendre le projet.", "C": "L'ignorer pour ne pas amplifier sa visibilité.", "D": "Demander au sponsor de la faire taire."}, "correct": "A", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (domaine Parties prenantes) prescrit d'identifier en continu les parties prenantes, d'analyser leur influence (matrice pouvoir/intérêt) et d'adapter la stratégie d'engagement. Répondre publiquement (B) escalade. Ignorer (C) aggrave. Faire taire (D) est non-éthique et inefficace.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 122},
  {"id": "q-0123", "question": "Le chef de projet souhaite responsabiliser davantage l'équipe. Meilleure pratique ?", "options": {"A": "Donner des ordres précis pour éviter les erreurs.", "B": "Déléguer la prise de décision dans le cadre de leur expertise, et fournir un soutien.", "C": "Contrôler chaque tâche personnellement.", "D": "Limiter l'accès à l'information."}, "correct": "B", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "L'empowerment est un principe clé du PMBOK 7 et de l'agilité. Déléguer dans la zone d'expertise développe les compétences, augmente la motivation intrinsèque (Drive de D. Pink) et améliore la qualité. Donner des ordres (A) infantilise. Microgérer (C) démotive. Limiter l'info (D) bloque l'autonomie.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 123},
  {"id": "q-0124", "question": "Un membre de l'équipe a une compétence rare critique pour le projet. Quel risque RH et comment l'atténuer ?", "options": {"A": "Risque de monopole — formaliser le transfert de connaissance et identifier un binôme.", "B": "Aucun risque — la personne est compétente.", "C": "Risque de surcharge — le faire travailler en heures supplémentaires.", "D": "Risque de jalousie — masquer son rôle aux autres."}, "correct": "A", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 considère la dépendance à une ressource unique (« bus factor ») comme un risque humain majeur. Documenter, former un binôme et créer une base de connaissances partagée atténue ce risque. Nier (B) ou exploiter (C) la personne sont contre-productifs. Masquer son rôle (D) est non-éthique.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 124},
  {"id": "q-0125", "question": "Le sponsor demande au chef de projet de cacher un retard aux parties prenantes. Que faire ?", "options": {"A": "Obéir au sponsor par loyauté.", "B": "Refuser et expliquer que la transparence est une obligation éthique selon le Code de PMI.", "C": "Cacher le retard mais avertir discrètement quelques parties prenantes.", "D": "Démissionner du projet."}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le Code d'éthique et de conduite professionnelle PMI repose sur quatre valeurs : Responsabilité, Respect, Équité et Honnêteté. La transparence est non-négociable. Le PM doit refuser respectueusement et expliquer l'enjeu réputationnel et éthique. Obéir (A) ou contourner (C) viole l'éthique. Démissionner (D) est extrême avant d'avoir essayé le dialogue.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 125},
  {"id": "q-0126", "question": "Le chef de projet observe que la courbe de l'EVM montre CPI=0,85 et SPI=0,92. Que conclure ?", "options": {"A": "Le projet est en avance et sous-budget.", "B": "Le projet est en retard et en dépassement de coût.", "C": "Le projet est en avance mais en dépassement.", "D": "Tous les indicateurs sont normaux."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7, CPI < 1 indique un dépassement de coût (on dépense plus que la valeur acquise) et SPI < 1 indique du retard sur le planning. Ici, CPI=0,85 et SPI=0,92 : projet en retard ET en dépassement. Les autres options ignorent la signification mathématique des indices.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 126},
  {"id": "q-0127", "question": "Pendant l'exécution, un risque non identifié se matérialise. Quelle action prioritaire ?", "options": {"A": "Appliquer immédiatement la réserve pour aléas.", "B": "Documenter le risque, analyser l'impact, et déclencher une demande de changement si nécessaire.", "C": "Ignorer si l'impact est faible.", "D": "Escalader systématiquement au sponsor."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (domaine Incertitude) impose d'ajouter tout nouveau risque au registre, d'évaluer sa probabilité et son impact, et de gérer via le processus de maîtrise intégrée des changements si besoin. Utiliser directement la réserve (A) court-circuite le processus. Ignorer (C) est imprudent. Escalader systématiquement (D) surcharge la gouvernance.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 127},
  {"id": "q-0128", "question": "En agile, la « définition de fini » (Definition of Done) sert à :", "options": {"A": "Définir le périmètre global du produit.", "B": "Établir un critère partagé de complétude pour chaque incrément livré.", "C": "Mesurer la vélocité de l'équipe.", "D": "Préparer la rétrospective."}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "L'Agile Practice Guide définit la Definition of Done (DoD) comme un ensemble de critères qualité partagés qui s'appliquent à chaque incrément. C'est un mécanisme de qualité intégrée. Le périmètre global (A) est dans la vision/backlog. La vélocité (C) est un indicateur séparé. La rétrospective (D) est un événement de revue, pas un critère de complétude.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 128},
  {"id": "q-0129", "question": "Quelle technique d'estimation est la plus appropriée en phase de définition initiale d'un projet ?", "options": {"A": "Estimation paramétrique.", "B": "Estimation par analogie (top-down).", "C": "Estimation ascendante (bottom-up).", "D": "Estimation à trois points."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "En phase initiale (peu de détails), l'estimation par analogie (basée sur des projets similaires passés) donne une « rough order of magnitude » (-25% à +75%). Le bottom-up (C) demande un WBS détaillé. Paramétrique (A) requiert des données historiques unitaires. Trois points (D) s'utilise pour des estimations spécifiques d'activités.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 129},
  {"id": "q-0130", "question": "Le client demande d'ajouter une fonctionnalité majeure pendant la phase d'exécution. Que faire ?", "options": {"A": "L'accepter et l'ajouter immédiatement.", "B": "La refuser car le périmètre est figé.", "C": "Soumettre une demande de changement au processus de maîtrise intégrée des changements.", "D": "Demander au sponsor de trancher directement."}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 prescrit que toute modification de la baseline passe par le processus formel de maîtrise intégrée des changements (CCB). Cela évalue impacts coût/délai/qualité/risque. Accepter (A) est du scope creep. Refuser (B) sans analyse est arbitraire. Sauter le processus (D) viole la gouvernance.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 130},
  {"id": "q-0131", "question": "Un projet hybride combine prédictif et agile. Quel élément reste typiquement prédictif ?", "options": {"A": "Le développement logiciel.", "B": "Les jalons de gouvernance et de conformité.", "C": "La rétrospective.", "D": "Le backlog produit."}, "correct": "B", "domain": "Process", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "L'Agile Practice Guide précise qu'en mode hybride, on garde souvent les jalons de gouvernance, audits, et conformité réglementaire en mode prédictif (dates fixes) tandis que la livraison incrémentale reste agile. Le développement (A), la rétrospective (C) et le backlog (D) sont des éléments agiles.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 131},
  {"id": "q-0132", "question": "Le diagramme de Pareto sert à :", "options": {"A": "Comparer le réalisé au planifié.", "B": "Identifier les 20% de causes responsables de 80% des défauts.", "C": "Cartographier les parties prenantes.", "D": "Visualiser le chemin critique."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le diagramme de Pareto (loi 80/20) est un outil qualité du PMBOK qui hiérarchise les causes de problèmes par fréquence ou impact, permettant de focaliser les efforts d'amélioration. Les autres options correspondent à : courbe EVM (A), matrice parties prenantes (C), diagramme de Gantt/réseau (D).", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 132},
  {"id": "q-0133", "question": "Lors du lancement, le chef de projet doit produire en priorité :", "options": {"A": "Le plan de management de la qualité.", "B": "La charte de projet validée par le sponsor.", "C": "Le WBS détaillé.", "D": "Le registre des risques complet."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "La charte de projet (project charter) est le document fondateur produit lors du processus « Élaborer la charte de projet » du groupe de processus « Démarrage » (PMBOK). Elle autorise le projet, désigne le chef de projet, et établit les objectifs de haut niveau. Les autres documents (A, C, D) sont produits durant la phase de planification.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 133},
  {"id": "q-0134", "question": "Un livrable est rejeté par le client lors de la vérification. Quelle est la première action ?", "options": {"A": "Modifier directement le livrable.", "B": "Documenter le défaut et analyser via le processus de maîtrise de la qualité avant d'agir.", "C": "Demander au client de revoir ses exigences.", "D": "Refacturer immédiatement le travail supplémentaire."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (domaine Livraison & Qualité) prescrit de comprendre l'origine du rejet via une analyse formelle (cause racine, criteres d'acceptation). Modifier sans analyse (A) peut rater la vraie cause. Renvoyer la faute au client (C) viole la relation. Refacturer (D) est prématuré avant validation contractuelle.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 134},
  {"id": "q-0135", "question": "Une réserve de management diffère d'une réserve pour aléas par :", "options": {"A": "Son montant plus faible.", "B": "Son contrôle par la direction pour les risques inconnus-inconnus.", "C": "Son inclusion dans la baseline de coût.", "D": "Son usage exclusif pour les risques techniques."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK : la réserve pour aléas (contingency) couvre les risques identifiés (known-unknowns) et fait partie de la baseline. La réserve de management couvre les risques non identifiés (unknown-unknowns), reste hors baseline, et est contrôlée par la direction qui doit l'approuver pour utilisation.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 135},
  {"id": "q-0136", "question": "L'équipe découvre que la vélocité est très inférieure aux estimations. Action en rétrospective ?", "options": {"A": "Augmenter la pression pour atteindre les estimations.", "B": "Réajuster les estimations futures et identifier les obstacles via une analyse honnête.", "C": "Cacher la baisse au sponsor.", "D": "Remplacer les membres les moins productifs."}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "L'Agile Practice Guide prône l'inspection et l'adaptation. La rétrospective sert à identifier honnêtement les obstacles (techniques, organisationnels, externes) et à ajuster les pratiques et estimations. Augmenter la pression (A) dégrade la qualité. Cacher (C) est non-éthique. Remplacer (D) est destructeur sans diagnostic.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 136},
  {"id": "q-0137", "question": "Un contrat à coûts remboursables avec primes incitatives (CPIF) est approprié quand :", "options": {"A": "Le périmètre est totalement défini et stable.", "B": "Le périmètre est incertain et le fournisseur doit être motivé à optimiser les coûts.", "C": "Le projet est de courte durée et à faible budget.", "D": "Le client veut transférer tout le risque au fournisseur."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le CPIF (Cost Plus Incentive Fee) est utilisé quand le périmètre n'est pas figé. Le fournisseur est remboursé de ses coûts plus une prime calculée selon des objectifs (coût, délai, performance). Pour un périmètre fixe (A), un prix fixe convient. Pour transférer le risque (D), un prix forfaitaire est mieux.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 137},
  {"id": "q-0138", "question": "Le chemin critique d'un projet est :", "options": {"A": "Le chemin avec le plus de tâches.", "B": "La séquence de tâches qui détermine la durée minimale du projet.", "C": "Le chemin avec le plus de risques.", "D": "La somme des durées de toutes les tâches."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK, le chemin critique (Critical Path Method, CPM) est la plus longue séquence d'activités dépendantes qui détermine la durée totale du projet. Tout retard sur ce chemin retarde le projet entier. Les activités du chemin critique ont une marge totale nulle.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 138},
  {"id": "q-0139", "question": "Une demande de changement est approuvée par le CCB. Étape suivante ?", "options": {"A": "Mettre à jour les baselines et les plans concernés.", "B": "Communiquer uniquement aux parties prenantes clés.", "C": "Implémenter sans modifier les documents.", "D": "Attendre la prochaine revue de jalon."}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 prescrit qu'après approbation d'un changement par le CCB, on met à jour les baselines (coût, planning, périmètre), les plans subsidiaires, et on communique à TOUTES les parties prenantes concernées via le plan de communication. Implémenter sans documenter (C) crée un désalignement. Attendre (D) bloque l'exécution.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 139},
  {"id": "q-0140", "question": "Un risque a une probabilité de 30% et un impact de 50 000 €. Quelle est sa valeur monétaire attendue (EMV) ?", "options": {"A": "50 000 €.", "B": "15 000 €.", "C": "30 000 €.", "D": "166 667 €."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "La valeur monétaire attendue (Expected Monetary Value) = probabilité × impact = 0,30 × 50 000 = 15 000 €. C'est une technique d'analyse quantitative des risques utilisée notamment dans les arbres de décision.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 140},
  {"id": "q-0141", "question": "Le rôle du Product Owner en Scrum inclut :", "options": {"A": "Estimer la charge des user stories.", "B": "Maximiser la valeur du produit en priorisant le backlog.", "C": "Animer le daily standup.", "D": "Gérer le calendrier de l'équipe."}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Scrum Guide, le Product Owner est responsable de maximiser la valeur en gérant et priorisant le backlog produit. L'estimation (A) est faite par l'équipe de développement. Le daily standup (C) est animé par l'équipe (le Scrum Master facilite). Le calendrier (D) émerge des sprints.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 141},
  {"id": "q-0142", "question": "Quelle action est typique du processus « Maîtriser la qualité » (Control Quality) ?", "options": {"A": "Définir les standards qualité du projet.", "B": "Mesurer les livrables pour vérifier leur conformité aux exigences.", "C": "Auditer les processus qualité.", "D": "Sélectionner les méthodes d'amélioration continue."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK : « Maîtriser la qualité » (Control Quality) est centré sur le contrôle des livrables (mesures, inspections, tests). « Manager la qualité » couvre les audits processus (C) et amélioration (D). « Planifier la qualité » définit les standards (A).", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 142},
  {"id": "q-0143", "question": "Une matrice RACI sert à :", "options": {"A": "Cartographier les risques par probabilité et impact.", "B": "Clarifier qui est Responsable, Approbateur, Consulté, Informé pour chaque activité.", "C": "Suivre l'avancement budgétaire.", "D": "Lister les exigences fonctionnelles."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "La matrice RACI (Responsible, Accountable, Consulted, Informed) est un outil du PMBOK pour clarifier les rôles et responsabilités. Elle évite les zones grises et les doublons. Les autres options correspondent à : matrice de risques (A), courbe S/EVM (C), registre des exigences (D).", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 143},
  {"id": "q-0144", "question": "En méthode Kanban, la limite WIP (Work In Progress) sert à :", "options": {"A": "Limiter le nombre de tâches en cours pour réduire le multitâche et améliorer le flux.", "B": "Définir la capacité maximale du sprint.", "C": "Mesurer la performance individuelle.", "D": "Calculer la vélocité."}, "correct": "A", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "L'Agile Practice Guide précise que Kanban utilise des limites WIP pour exposer les goulots d'étranglement, réduire le multitâche et accélérer le flux (théorie des contraintes). Kanban n'a pas de sprints (B). WIP n'évalue pas les individus (C) ni ne calcule la vélocité (D, propre à Scrum).", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 144},
  {"id": "q-0145", "question": "Le plan de réponse aux risques pour une « opportunité » peut inclure :", "options": {"A": "Éviter, transférer, atténuer.", "B": "Exploiter, partager, améliorer, accepter.", "C": "Accepter ou contourner uniquement.", "D": "Ignorer puis traiter si elle se réalise."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7, les stratégies de réponse aux opportunités (risques positifs) sont : Exploiter, Partager, Améliorer (augmenter probabilité/impact) et Accepter. Pour les menaces, ce sont : Éviter, Transférer, Atténuer, Accepter (option A). Mélanger les deux types est une erreur.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 145},
  {"id": "q-0146", "question": "Un livrable doit être validé. Qui formellement l'accepte ?", "options": {"A": "L'équipe de développement.", "B": "Le sponsor ou le client (selon les critères d'acceptation).", "C": "Le chef de projet.", "D": "Le PMO."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK distingue Verify Scope (validation interne par le PM/équipe) et Validate Scope (acceptation formelle par le client/sponsor selon les critères d'acceptation définis dans la baseline). Le PMO (D) supervise mais n'accepte pas les livrables fonctionnels.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 146},
  {"id": "q-0147", "question": "Une « user story » bien rédigée suit le format :", "options": {"A": "Spécification technique détaillée avec contraintes.", "B": "En tant que [persona], je veux [fonctionnalité], afin de [bénéfice].", "C": "Liste de tâches techniques à implémenter.", "D": "Diagramme UML de la fonctionnalité."}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "L'Agile Practice Guide définit le format INVEST + le template Connextra : « As a [rôle], I want [feature], so that [benefit] ». Cela centre la valeur sur l'utilisateur. Les spécifications techniques (A, C) sont trop détaillées trop tôt. L'UML (D) est un artefact technique séparé.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 147},
  {"id": "q-0148", "question": "Lors de la clôture, quel document capture les apprentissages ?", "options": {"A": "Le rapport final de performance.", "B": "Le registre des apprentissages (lessons learned register).", "C": "Le plan de management du projet.", "D": "La charte de projet."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 prescrit la tenue continue du registre des apprentissages durant TOUT le projet (et pas seulement à la clôture). À la clôture, ce registre est intégré aux actifs organisationnels (OPA) pour bénéficier aux futurs projets.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 148},
  {"id": "q-0149", "question": "Un fournisseur livre un composant non-conforme. Action conforme au contrat ?", "options": {"A": "Le rejeter et appliquer les pénalités contractuelles.", "B": "Accepter avec une remise négociée.", "C": "Soumettre au processus d'administration des contrats : notifier, documenter, déclencher les actions correctives.", "D": "Annuler immédiatement le contrat."}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (domaine Livraison) prescrit l'administration formelle du contrat : notification écrite, documentation de la non-conformité, déclenchement des clauses prévues (corrections, pénalités). Rejeter brutalement (A) ou annuler (D) ne respectent pas la procédure contractuelle. Accepter avec remise (B) doit être documenté formellement.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 149},
  {"id": "q-0150", "question": "Le « sprint zéro » (sprint 0) sert principalement à :", "options": {"A": "Livrer le premier incrément du produit.", "B": "Préparer l'environnement, l'architecture initiale et la vision avant le développement.", "C": "Former l'équipe à Scrum.", "D": "Rédiger la documentation finale."}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "L'Agile Practice Guide reconnaît le concept (informel) de « sprint 0 » pour mettre en place l'infrastructure, l'architecture de référence, le backlog initial et la vision. Il ne livre pas encore de valeur produit (A). La formation (C) est continue. La documentation (D) émerge avec les incréments.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 150},
  {"id": "q-0151", "question": "Une nouvelle réglementation impacte le projet en cours. Action prioritaire ?", "options": {"A": "Analyser l'impact sur le périmètre, le calendrier et le coût, puis soumettre une demande de changement.", "B": "Ignorer si l'impact semble faible.", "C": "Attendre la fin du projet pour s'y conformer.", "D": "Annuler le projet."}, "correct": "A", "domain": "Business", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (domaine Environnement Affaires) impose au PM d'évaluer l'impact des évolutions externes (réglementaires, marché) et de gérer via le processus formel de changement. Ignorer (B) ou attendre (C) crée un risque de non-conformité. Annuler (D) est extrême sans analyse.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 151},
  {"id": "q-0152", "question": "Les bénéfices d'un projet doivent être suivis :", "options": {"A": "Uniquement avant le lancement.", "B": "Pendant toute la durée de vie du projet et après livraison (plan de gestion des bénéfices).", "C": "Seulement à la clôture.", "D": "Par le sponsor exclusivement, sans implication du PM."}, "correct": "B", "domain": "Business", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 introduit le « Benefits Management Plan » qui couvre l'identification, la livraison et la mesure des bénéfices durant ET après le projet. Les bénéfices se matérialisent souvent après la clôture (adoption, ROI). Le PM collabore avec le sponsor mais reste impliqué dans la gouvernance des bénéfices.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 152},
  {"id": "q-0153", "question": "L'alignement stratégique d'un projet est :", "options": {"A": "La conformité du livrable aux exigences techniques.", "B": "La contribution du projet aux objectifs et à la stratégie de l'organisation.", "C": "La satisfaction de l'équipe projet.", "D": "Le respect du budget."}, "correct": "B", "domain": "Business", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 souligne que tout projet doit s'aligner sur la stratégie organisationnelle (« strategic alignment »). C'est le rôle du PMO et du sponsor de garantir cet alignement. Les exigences techniques (A), la satisfaction (C) et le budget (D) sont des critères opérationnels distincts.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 153},
  {"id": "q-0154", "question": "Un projet ne génère plus la valeur attendue à mi-parcours. Action recommandée ?", "options": {"A": "Continuer jusqu'à la fin par engagement.", "B": "Réévaluer la business case avec le sponsor et le comité de pilotage.", "C": "Augmenter le budget pour sauver le projet.", "D": "Cacher la situation pour ne pas alarmer."}, "correct": "B", "domain": "Business", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 demande une réévaluation continue de la business case. Si la valeur n'est plus attendue, il faut envisager l'arrêt, le pivot ou la replanification avec la gouvernance. Continuer aveuglément (A) est un sunk cost fallacy. Augmenter le budget (C) sans justification empire. Cacher (D) est non-éthique.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 154},
  {"id": "q-0155", "question": "Lors d'une transition vers l'agile, le facteur de réussite le plus important est :", "options": {"A": "L'achat d'un outil agile sophistiqué.", "B": "L'adoption d'une culture organisationnelle agile (mindset, leadership, valeurs).", "C": "La certification de tous les membres.", "D": "L'élimination de la documentation."}, "correct": "B", "domain": "Business", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "L'Agile Practice Guide et le PMBOK 7 insistent sur le fait que la transformation agile est avant tout culturelle. Sans changement de mindset (leadership, collaboration, transparence, empowerment), les outils (A) et certifications (C) ne suffisent pas. La documentation (D) reste nécessaire mais plus légère.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 155},
  {"id": "q-0156", "question": "Les exigences de conformité réglementaire doivent être traitées comme :", "options": {"A": "Des éléments optionnels selon l'urgence.", "B": "Des contraintes obligatoires intégrées dès la planification et auditées régulièrement.", "C": "Des sujets à régler en fin de projet.", "D": "Des préoccupations du seul service juridique."}, "correct": "B", "domain": "Business", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (domaine Environnement) considère les exigences de conformité comme des contraintes non-négociables. Elles doivent être intégrées dans la baseline dès la planification et auditées (qualité, sécurité, RGPD, etc.). Le PM coordonne avec le juridique mais ne peut pas s'en désintéresser (D).", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 156},
  {"id": "q-0157", "question": "Une approche agile est typiquement justifiée quand :", "options": {"A": "Le périmètre est totalement figé et les exigences stables.", "B": "L'incertitude est élevée, la valeur émerge par feedback rapide.", "C": "Le projet est court et simple, sans changement attendu.", "D": "Les parties prenantes ne peuvent pas être impliquées."}, "correct": "B", "domain": "Business", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "L'Agile Practice Guide (Stacey Matrix, Cynefin) recommande l'agilité pour les environnements complexes/incertains où la valeur émerge par expérimentation. Un périmètre figé (A) ou un projet simple (C) conviennent au prédictif. L'agile exige une forte implication des parties prenantes — donc (D) est contre-productif.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 157},
  {"id": "q-0158", "question": "Quelle est la priorité du chef de projet face à une crise organisationnelle externe (par ex. fusion d'entreprise) ?", "options": {"A": "Continuer l'exécution sans changement.", "B": "Communiquer avec le sponsor, réévaluer les objectifs, et adapter le plan en conséquence.", "C": "Geler le projet en attendant la stabilisation.", "D": "Demander un transfert vers un autre projet."}, "correct": "B", "domain": "Business", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (Environnement Affaires) demande au PM d'être agile face aux changements externes : communiquer rapidement, réévaluer la business case, et adapter. Continuer aveuglément (A) ignore le contexte. Geler (C) peut faire perdre du momentum. Se retirer (D) est non-professionnel.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 158},
  {"id": "q-0159", "question": "Une partie prenante demande un rapport ne figurant pas dans le plan de communication. Que faire ?", "options": {"A": "Refuser car non prévu.", "B": "L'ajouter sans formalité.", "C": "Évaluer la valeur de l'information, mettre à jour le plan de communication et les attentes.", "D": "Demander au sponsor de trancher."}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 prône une communication adaptée aux besoins des parties prenantes. Évaluer la pertinence et mettre à jour le plan de communication via les change requests si l'effort est significatif. Refuser (A) nuit à l'engagement. Improviser (B) crée du chaos. Escalader (D) systématiquement court-circuite la gouvernance.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 159},
  {"id": "q-0160", "question": "L'équipe agile signale un impediment récurrent lié à un département externe. Rôle du Scrum Master ?", "options": {"A": "Demander à l'équipe de le résoudre seule.", "B": "Travailler à lever l'impediment en négociant avec le département externe.", "C": "Documenter sans agir.", "D": "Reporter à la rétrospective."}, "correct": "B", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Le Scrum Guide définit le Scrum Master comme un servant-leader chargé de lever les impediments, y compris en dehors de l'équipe. Cela inclut négocier et collaborer avec les autres départements. Laisser seul (A), documenter passivement (C) ou attendre (D) ne lèvent pas l'obstacle.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 160},
  {"id": "q-0161", "question": "Pendant le sprint, un bug critique en production est découvert. Action ?", "options": {"A": "Stopper le sprint et tout résoudre immédiatement.", "B": "Évaluer avec le Product Owner si une réorientation du sprint est nécessaire (cancel ou ajout au backlog).", "C": "Ignorer jusqu'au prochain sprint.", "D": "L'attribuer arbitrairement à un développeur."}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Scrum Guide, le Product Owner décide de la priorisation. Si le bug compromet l'objectif du sprint, il peut être annulé (rare). Sinon, on l'ajoute au backlog avec la priorité appropriée. Décider seul (A, D) viole la responsabilité du PO. Ignorer (C) est irresponsable.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 161},
  {"id": "q-0162", "question": "Le sponsor d'un projet change en plein milieu. Action prioritaire du PM ?", "options": {"A": "Continuer comme prévu.", "B": "Organiser une réunion d'alignement avec le nouveau sponsor : business case, objectifs, attentes.", "C": "Demander à l'ancien sponsor de rester impliqué.", "D": "Mettre le projet en pause."}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 considère le sponsor comme la partie prenante clé. Un changement de sponsor exige une réinitialisation de l'alignement : business case, priorités, attentes, niveau d'engagement. Continuer (A) ignore le risque. Maintenir l'ancien (C) crée de l'ambiguïté. Pause (D) est extrême.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 162},
  {"id": "q-0163", "question": "Quel est le principal indicateur agile pour mesurer la prédictibilité de l'équipe ?", "options": {"A": "Le nombre d'user stories complétées.", "B": "La vélocité (story points livrés par sprint) sur plusieurs sprints.", "C": "Le coût par sprint.", "D": "Le nombre de bugs trouvés."}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "L'Agile Practice Guide identifie la vélocité comme indicateur de prédictibilité : sa stabilité sur plusieurs sprints permet d'estimer les livraisons futures. Le nombre brut de stories (A) ne tient pas compte de la complexité. Le coût (C) et les bugs (D) sont d'autres indicateurs distincts.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 163},
  {"id": "q-0164", "question": "Une partie prenante influente s'oppose ouvertement au projet. Première action ?", "options": {"A": "L'éviter pour ne pas générer de conflit.", "B": "Comprendre ses préoccupations via un entretien individuel et adapter la stratégie d'engagement.", "C": "Demander au sponsor de la convaincre.", "D": "Lancer une campagne de communication pour la contrer."}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (domaine Parties Prenantes) prescrit l'écoute active comme première réponse. Comprendre les préoccupations permet d'adapter la stratégie d'engagement (matrice pouvoir/intérêt). Éviter (A) aggrave. Déléguer au sponsor (C) sans diagnostic est inefficace. Contre-attaquer (D) escalade le conflit.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 164},
  {"id": "q-0165", "question": "Un livrable a passé le contrôle qualité mais le client n'est pas satisfait. Cause probable ?", "options": {"A": "L'équipe est incompétente.", "B": "Les critères d'acceptation n'étaient pas suffisamment clairs ou alignés sur les attentes.", "C": "Le contrôle qualité a échoué.", "D": "Le client est de mauvaise foi."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 distingue qualité (conformité aux exigences) et grade (niveau de prestation). Si la qualité est validée mais le client mécontent, c'est souvent que les exigences ou critères d'acceptation n'ont pas capturé ses vraies attentes. Cela demande un travail accru de validation des exigences avec les parties prenantes.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 165},
  {"id": "q-0166", "question": "Un projet entre dans la phase d'exécution avec un plan de management de la qualité incomplet. Action ?", "options": {"A": "Continuer et compléter en parallèle.", "B": "Compléter le plan de management de la qualité avant l'exécution intense, en collaboration avec les parties prenantes qualité.", "C": "Ignorer la qualité dans cette phase.", "D": "Sous-traiter la qualité à un consultant."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (domaine Livraison) impose un plan qualité défini avant l'exécution. Sans définition claire des standards, métriques et contrôles, l'exécution risque de produire des défauts coûteux à corriger. Continuer (A) ou ignorer (C) compromet la qualité. Sous-traiter (D) ne dispense pas de la définition.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 166},
  {"id": "q-0167", "question": "Le rôle du chef de projet dans la gestion proactive des risques inclut :", "options": {"A": "Attendre que les risques se matérialisent.", "B": "Mettre à jour régulièrement le registre des risques, planifier des réponses et surveiller activement.", "C": "Confier toute la gestion aux experts techniques.", "D": "Cacher les risques aux parties prenantes pour éviter la panique."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (domaine Incertitude) impose une gestion proactive : identification continue, analyse qualitative/quantitative, planification des réponses, surveillance. Attendre (A) est réactif et coûteux. Déléguer (C) dilue la responsabilité. Cacher (D) viole l'éthique PMI et l'engagement des parties prenantes.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 167},
  {"id": "q-0168", "question": "Un nouveau membre rejoint l'équipe agile en cours de sprint. Bonne pratique d'intégration ?", "options": {"A": "Lui donner immédiatement des tickets complexes.", "B": "L'associer en pair-programming avec un membre senior pour transfert de connaissance progressif.", "C": "Le laisser observer sans participer pendant 2 semaines.", "D": "Le diriger vers la documentation uniquement."}, "correct": "B", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "L'Agile Practice Guide encourage le pair-programming et le mentoring pour l'intégration. Cela accélère le transfert tacite de connaissance et l'inclusion sociale dans l'équipe. Donner du complexe (A) génère échec. Observation passive (C) ou doc seule (D) sont inefficaces pour l'apprentissage actif.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 168},
  {"id": "q-0169", "question": "Pour gérer efficacement la communication d'un projet international, le PM doit :", "options": {"A": "Imposer l'anglais comme seule langue.", "B": "Adapter le plan de communication à la culture, langue et fuseau horaire de chaque partie prenante.", "C": "Tout passer en mode asynchrone.", "D": "Limiter la communication aux décideurs principaux."}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 souligne l'importance de l'intelligence culturelle. Adapter le format, le canal et la fréquence selon les attentes culturelles évite les malentendus. Imposer une langue (A) exclut. Tout-asynchrone (C) appauvrit. Limiter aux décideurs (D) ignore l'engagement large.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 169},
  {"id": "q-0170", "question": "Le « burn-down chart » montre que l'équipe ne finira pas le sprint. Réaction du Scrum Master ?", "options": {"A": "Demander à l'équipe de réduire la portée avec le Product Owner.", "B": "Accuser l'équipe de mauvaise estimation.", "C": "Cacher le graphique au sponsor.", "D": "Augmenter la durée du sprint."}, "correct": "A", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "L'Agile Practice Guide prescrit la transparence : si la projection montre un échec, l'équipe se concerte avec le PO pour réajuster la portée du sprint (descope). Accuser (B) viole la culture agile. Cacher (C) est non-éthique. Allonger le sprint (D) viole la timebox fixe de Scrum.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 170},
  {"id": "q-0171", "question": "Lors d'une « daily », un développeur explique une solution technique pendant 10 minutes. Action du Scrum Master ?", "options": {"A": "Le laisser finir, c'est important.", "B": "Interrompre poliment et proposer une session séparée pour les détails techniques.", "C": "Mettre fin à la daily immédiatement.", "D": "Couper la parole brutalement."}, "correct": "B", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Le Scrum Guide impose une daily timeboxée à 15 minutes. Le rôle du Scrum Master est de protéger cette timebox tout en respectant les contributions. Une session séparée (« after party ») permet d'approfondir sans bloquer le reste de l'équipe. Laisser dépasser (A), couper brutalement (D) ou clore (C) ne sont pas appropriés.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 171},
  {"id": "q-0172", "question": "Une analyse coût-bénéfice montre que le projet n'est plus rentable. Quelle est la décision recommandée ?", "options": {"A": "Continuer car l'investissement est déjà engagé.", "B": "Présenter l'analyse au sponsor et au comité de pilotage pour décision (continuer, pivoter, arrêter).", "C": "Demander plus de budget pour rattraper.", "D": "Renégocier les exigences sans informer."}, "correct": "B", "domain": "Business", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (Environnement Affaires) demande une révision continue de la business case. Une perte de rentabilité doit être présentée à la gouvernance pour décision éclairée. Continuer (A) est un sunk cost bias. Augmenter le budget (C) sans justification empire. Renégocier sans transparence (D) viole l'éthique.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 172},
  {"id": "q-0173", "question": "Le risque résiduel d'un projet correspond à :", "options": {"A": "Le risque global initial du projet.", "B": "Le risque restant après application des réponses planifiées.", "C": "Un risque non identifié.", "D": "Un risque secondaire."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK : le risque résiduel est ce qui reste après l'implémentation des réponses planifiées. À distinguer du risque secondaire (créé par une réponse) et du risque non identifié (unknown). Le risque global (A) est différent — c'est l'exposition totale du projet.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 173},
  {"id": "q-0174", "question": "Le sponsor exige que le projet soit livré en 6 mois au lieu de 12. Quelle approche ?", "options": {"A": "Accepter en silence et tout faire pour livrer.", "B": "Présenter les options (réduction de périmètre, ressources supplémentaires, qualité réduite) et leurs impacts pour décision éclairée.", "C": "Refuser et démissionner.", "D": "Promettre la livraison sans analyse."}, "correct": "B", "domain": "Business", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 demande une approche professionnelle : analyser les options (crashing, fast-tracking, réduction de périmètre, qualité), présenter trade-offs au sponsor. Promettre l'impossible (A, D) mène à l'échec et viole l'éthique. Refuser sans dialogue (C) est non-professionnel.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 174},
  {"id": "q-0175", "question": "L'amélioration continue (kaizen) en agile s'incarne principalement dans :", "options": {"A": "La revue de sprint.", "B": "La rétrospective de sprint.", "C": "Le daily standup.", "D": "Le planning poker."}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Le Scrum Guide identifie la rétrospective comme le forum dédié à l'inspection et adaptation des pratiques de l'équipe. C'est là que kaizen s'opère concrètement. La revue (A) inspecte le produit ; la daily (C) synchronise ; le planning poker (D) estime.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 175},
  {"id": "q-0176", "question": "Quelle est la principale différence entre un projet et un programme ?", "options": {"A": "La taille du budget.", "B": "Le programme coordonne plusieurs projets liés pour atteindre des bénéfices stratégiques non réalisables individuellement.", "C": "La durée.", "D": "Le nombre de personnes impliquées."}, "correct": "B", "domain": "Business", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 distingue : un projet livre un résultat unique ; un programme coordonne des projets et opérations liés pour des bénéfices stratégiques ; un portefeuille gère projets/programmes alignés sur la stratégie. La taille (A), durée (C) ou taille équipe (D) ne sont pas les critères distinctifs.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 176},
  {"id": "q-0177", "question": "Un chef de projet identifie une opportunité (risque positif) qui pourrait réduire le coût. Stratégie « exploiter » signifie :", "options": {"A": "Augmenter la probabilité que l'opportunité se réalise.", "B": "Partager le bénéfice avec un tiers.", "C": "S'assurer que l'opportunité se réalise (probabilité 100%).", "D": "Ne rien faire et accepter."}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7, les stratégies pour opportunités sont : Exploiter (réaliser à 100%), Améliorer (augmenter probabilité/impact), Partager (avec un partenaire), Accepter (laisser arriver). « Exploiter » garantit la réalisation, par exemple en affectant les meilleures ressources.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 177},
  {"id": "q-0178", "question": "Le « MoSCoW » est une technique de :", "options": {"A": "Planification du chemin critique.", "B": "Priorisation des exigences (Must, Should, Could, Won't).", "C": "Estimation des coûts.", "D": "Analyse des parties prenantes."}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "MoSCoW est une technique de priorisation des exigences couramment utilisée en agile : Must have (obligatoire), Should have (important mais pas vital), Could have (souhaitable si temps), Won't have (hors périmètre actuel). Elle facilite les décisions de scope sous contrainte.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 178},
  {"id": "q-0179", "question": "Lors d'un projet long, les bénéfices doivent être mesurés par :", "options": {"A": "Les indicateurs de performance projet (CPI, SPI).", "B": "Les indicateurs métier (ROI, NPV, satisfaction client, parts de marché).", "C": "Le nombre d'heures travaillées.", "D": "La quantité de documentation produite."}, "correct": "B", "domain": "Business", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (plan de gestion des bénéfices) distingue la performance du projet (CPI, SPI - efficacité de livraison) des bénéfices métier (ROI, NPV, satisfaction, parts de marché - valeur business réelle). Les bénéfices se mesurent souvent après la fin du projet.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 179},
  {"id": "q-0180", "question": "En cas de découverte d'un comportement non éthique chez un fournisseur (corruption), le PM doit :", "options": {"A": "Ignorer pour ne pas créer de problème.", "B": "Signaler immédiatement selon le Code d'éthique PMI et les procédures internes.", "C": "Négocier discrètement avec le fournisseur.", "D": "Attendre la fin du contrat."}, "correct": "B", "domain": "Business", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le Code d'éthique PMI impose Honnêteté, Responsabilité, Respect et Équité. Tout comportement contraire (corruption, fraude) doit être signalé via les canaux officiels (compliance, juridique, direction). Ignorer (A), négocier (C) ou attendre (D) engagent la responsabilité éthique du PM.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 180},
  {"id": "q-0181", "question": "Un chef de projet rejoint une équipe projet en remplacement d'un responsable parti. Lors des premiéres réunions, il constate que les membres de l'équipe ont des opinions divergentes sur la maniére d'aborder les décisions techniques. Les membres de l'équipe ne respectent pas les idées de chacun, et l'environnement devient contre-productif. Cependant, sous la direction du nouveau responsable, l'équipe a commencé a communiquer plus efficacement et a développer des processus et des procédures de collaboration. A quel stade de développement se trouve l'équipe ?", "options": {"A": "Formation", "B": "Tension", "C": "Normalisation", "D": "Performance"}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Durant la phase de normalisation, les membres de l'équipe commencent a collaborer et à adapter leurs habitudes de travail et leurs comportements pour soutenir l'équipe. Ils apprennent a se faire confiance.", "source": "Woloyem PMP Course 2025 — Exam 30 qst -personne1/1-2.pdf", "source_pages": [], "num": 181},
  {"id": "q-0182", "question": "Un projet se compose de trois parties étroitement liées, chacune étant réalis¢e par sa propre Gquipe. Le chef d'équipe, craignant des conflits liés à la combinaison des résultats des trois équipes, demande conseil. Quels conseils le chef de projet devrait-il lui donner ? 1aac2b3bae75092e93", "options": {"A": "dentifiez les conflits potentiels, puis organisez une réunion conjointe hebdomadaire avec les membres des trois équipes pour examiner le travail de chacun.", "B": "Décidez quel travail d’équipe doit être prioritaire, puis retardez le travail des deux autres équipes pour garantir qu’il n’y a AUCUN conflit.", "C": "Documentez les conflits au fur et à mesure qu’ils surviennent et prenez des mesures pour remédier aux problémes qui surviennent.", "D": "Continuez a laisser les trois équipes travailler simultanément, en reconnaissant que les conflits peuvent être résolus lors de la phase de test."}, "correct": "A", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Une communication cohérente est importante pour garantir une probabilité moindre de problémes et pour gérer avec succés les risques existants. 1aac2b3bae75092e93", "source": "Woloyem PMP Course 2025 — Exam 30 qst -personne1/1-2.pdf", "source_pages": [], "num": 182},
  {"id": "q-0183", "question": "Un responsable R&D, partie prenante du projet, visite 5 occasionnellement l'espace de travail de l'équipe agile pour donner des instructions sur les fonctionnalités urgentes. L'équipe commence a travailler. Lors des revues de sprint, le Product Owner est mécontent que l'équipe ait travaillé sur les fonctionnalités demandeées. Comment l'équipe doit-elle résoudre ce probléme ?", "options": {"A": "Escaladez pour vous assurer que le dirigeant n’interfére plus avec |’équipe.", "B": "Rencontrez le directeur exécutif et le propriétaire du produit pour convenir d’un flux de travail.", "C": "Exiger que l’exécutif émette des demandes de modification pour les nouveaux éléments.", "D": "Donnez au dirigeant l’accés pour ajouter de nouveaux éléments au backlog."}, "correct": "B", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Dans ce cas, le responsable R&D contourne le responsable produit et crée des perturbations. Un accord de travail entre le responsable et le responsable produit est nécessaire pour rétablir l'ordre.", "source": "Woloyem PMP Course 2025 — Exam 30 qst -personne1/15-16.pdf", "source_pages": [], "num": 183},
  {"id": "q-0184", "question": "Une équipe projet est petite et ses membres se connaissent 7 depuis longtemps. Le projet est en cours d'exécution. ° Récemment, un membre de l'équipe a informé le nouveau chef de projet qu'un autre membre se plaignait de la gestion du projet. Comment ce nouveau chef de projet devrait-il réagir ?", "options": {"A": "Examinez le plan actuel d’engagement des parties prenantes pour identifier comment résoudre cette difficulté.", "B": "Planifiez une réunion d’équipe pour discuter de la charte et des régles de base actuelles de l’équipe, en particulier en ce qui concerne les attentes en matiére de communication et de travail d’équipe.", "C": "Organisez un événement de renforcement du moral de l’équipe pour améliorer la culture d’équipe.", "D": "Parlez aux membres de |’ équipe individuellement et demandez-leur comment ils aimeraient gérer la situation."}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Une réunion d’équipe est la meilleure solution car elle encourage chaque membre de |’équipe a participer et aboutit a un ensemble de directives claires pour l’équipe.", "source": "Woloyem PMP Course 2025 — Exam 30 qst -personne1/17-18.pdf", "source_pages": [], "num": 184},
  {"id": "q-0185", "question": "Un chef de projet travaille sur plusieurs projets. L'un 8 d'eux, qui compte de nouveaux membres, en est a ses débuts. Les autres projets sont a différents stades d'exécution pour les prochaines semaines. Comment le chef de projet peut-il développer la nouvelle équipe au cours des prochaines semaines ? 1aac2b3bae75092e93", "options": {"A": "A idez les membres de l’équipe a créer un ensemble gg de régles de travail convenues, ou un contrat social, qui encourage la cohésion de l’équipe.", "B": "Suggérez a l’équipe de participer à plusieurs événements de consolidation d’équipe pour normaliser |’ équipe.", "C": "Tenez l’équipe informée en envoyant de courtes mises a jour quotidiennes sur |’état du projet.", "D": "Engagez des conversations personnelles en face a face avec chaque membre de l’équipe pour établir des relations."}, "correct": "A", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Créer un contrat social, ou un ensemble de régles de travail convenues, permettra a l'équipe de normaliser ses activités et de se 1aac2b3bae75092e93/à el prendre en charge en votre absence. Les autres options n'encouragent pas les membres de l'équipe a se développer de maniére autonome et en équipe. 1aac2b3bae75092e93", "source": "Woloyem PMP Course 2025 — Exam 30 qst -personne1/17-18.pdf", "source_pages": [], "num": 185},
  {"id": "q-0186", "question": "L'équipe agile excelle dans la résolution de problémes à techniques, mais lorsque le Product Owner sollicite des idées créatives ou métier, l'équipe reste muette. 1aac2b3bae75092e93 Est-ce un probléme ?", "options": {"A": "Oui, les équipes spécialisées sont sujettes à des taux d’erreur plus élevés.", "B": "Non, les équipes spécialisées sont plus efficaces que les généralistes.", "C": "Oui, le manque de diversité limitera |’ adaptabilité de l’équipe.", "D": "Non, |’équipe est plus performante sans distractions inutiles."}, "correct": "C", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Les compétences en T sont recherchées chez les membres d'une =équipe agile. Un large éventail de compétences permet de travailler de maniére plus autonome et de s'adapter à l'évolution des besoins. 1aac2b3bae75092e93/3", "source": "Woloyem PMP Course 2025 — Exam 30 qst -personne1/23-24.pdf", "source_pages": [], "num": 186},
  {"id": "q-0187", "question": "Scrum des Scrums. Quels critéres un chef de projet doit-il utiliser pour sélectionner le membre le plus adapté ? 1aac2b3bae75092e93", "options": {"A": "Dans quelle mesure le membre connait le travail des autres équipes", "B": "(a mesure dans laquelle le membre applique bien son expertise approfondie", "C": "Dans quelle mesure le membre est-il convaincant en tant qu’orateur public ?", "D": "Depuis combien de temps travaillent-ils avec les méthodes Agile ?"}, "correct": "A", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Le facteur le plus important pour une collaboration efficace entre les équipes dans un Scrum de Scrums est de comprendre le travail == de toutes les équipes. Cette connaissance favorise une coordination efficace pour identifier et résoudre les dépendances et les obstacles. Les autres qualités sont principalement importantes au sein de l'équipe (expertise et influence). 1aac2b3bae75092e93/4 1aac2b3bae75092e93", "source": "Woloyem PMP Course 2025 — Exam 30 qst -personne1/25-26.pdf", "source_pages": [], "num": 187},
  {"id": "q-0188", "question": "Lors de l'exécution d'un projet, un membre clé de l'équipe s'inquiéte de l'approche globale documentée dans le plan de gestion de projet. Lors d'une réunion hebdomadaire d'avancement, il surprend le chef de projet par des commentaires négatifs sur cette approche. Comment le chef de projet doit-il répondre a ses préoccupations ? 1aac2b3bae75092e93", "options": {"A": "Poursuivez la réunion et assurez-vous que les préoccupations sont ajoutées au registre des risques une fois la réunion terminée.", "B": "Poursuivez l'examen des points prévus a l'ordre du jour aprés avoir rappelé au membre de l'équipe les régles de bienséance a respecter en réunion. Ensuite, sollicitez son avis sur les régles de bienséance a respecter.", "C": "Nroubliez pas qu'un projet ne doit PAS avancer si les membres clés de l'équipe sont en désaccord. Profitez de la réunion pour discuter des préoccupations des membres.", "D": "faites un bref commentaire pour reconnaitre les preoccupations du membre de |’équipe, poursuivez la réunion et rencontrez le membre en privé pour discuter de ses préoccupations."}, "correct": "D", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Les conflits doivent être abordés en privé afin de mieux comprendre la préoccupation soulevée. L'examen de la préoccupation aprés la réunion permet au chef de projet de la vérifier et de déterminer les prochaines étapes sans perturber la réunion. 1aac2b3bae75092e93", "source": "Woloyem PMP Course 2025 — Exam 30 qst -personne1/7-8.pdf", "source_pages": [], "num": 188},
  {"id": "q-0189", "question": "En suivant l'avancement de l'équipe agile, le chef de projet 7 constate que la productivité d'un expert est bien inférieure a celle des juniors. C'est surprenant, car l'expert travaille avec diligence sur les taches les plus complexes et produit toujours des résultats impeccables. Quelle est l'explication la plus probable de la faible productivité du développeur ?", "options": {"A": "L'expert travaille plus rapidement et déclare moins d'heures que les membres juniors.", "B": "Les membres plus jeunes de l’équipe sont généralement plus productifs.", "C": "cs estimations des points d’histoire sur le travail de l’expert sont systématiquement trop basses.", "D": "L'expert effectue plus de tests et termine donc moins d'histoires."}, "correct": "C", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Les estimations en points d'histoire serviraient à mesurer l'avancement d'un projet agile, et les heures réellement travaillées &|___ne seraient PAS visibles à moins d'être réajustées. Cependant, il est important de noter qu'une équipe agile est auto-organisée et met l'accent sur la performance collective, et non sur l'effort individuel.", "source": "Woloyem PMP Course 2025 — Exam 30 qst -personne1/27-28.pdf", "source_pages": [], "num": 189},
  {"id": "q-0190", "question": "Le bureau de gestion de projet souhaite assurer un 8 reporting constant sur les dizaines de projets agiles menés simultanément. Il souhaite utiliser des canaux d'information pour partager l'état d'avancement et les principaux enseignements tirés. Comment y parvenir au mieux ? 1aac2b3bae75092e93", "options": {"A": "Placez des moniteurs affichant des graphiques g combinés de combustion des fonctionnalités et un résumé des rétrospectives.", "B": "Utilisez des fenétres Fishbowl pour afficher tous les tableaux et graphiques Kanban des équipes de projet en temps réel.", "C": "Placez des webcams pour diffuser tous les tableaux Kanban et faire défiler les images séquentiellement sur le radiateur.", "D": "Mettre en place une page Wiki interne que toutes les équipes agiles mettent à jour en temps réel et que les utilisateurs consultent a la demande."}, "correct": "A", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "1aac2b3bae75092e93/4 Le graphique d'avancement des fonctionnalités peut servir de mesure commune des progrés, et les legons apprises sont consignées lors des rétrospectives. Les radiateurs d'information sont des écrans physiques utilisés pour partager des informations actualisées au sein de l'organisation. Il ne s'agit pas exclusivement de caméras en direct (distracteurs par bocal a poissons et webcam) et les informations ne sont PAS a la demande (page wiki). 1aac2b3bae75092e93", "source": "Woloyem PMP Course 2025 — Exam 30 qst -personne1/27-28.pdf", "source_pages": [], "num": 190},
  {"id": "q-0191", "question": "Un projet fait appel a un prestataire externe. Un membre de l'équipe du prestataire souléve un probléme avec un membre de l'équipe projet. Les deux personnes ne parviennent pas a trouver une solution. Le chef de projet est conscient du désaccord. Quel type de communication le chef de projet doit-il privilégier pour contacter le fournisseur a ce sujet ?", "options": {"A": "@ Face a face", "B": "Téléphone", "C": "Lettre contractuelle", "D": "E-mail"}, "correct": "A", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "L'interaction en face a face est généralement le moyen le plus &—efficace d'établir les relations de confiance nécessaires à la gestion 1aac2b3bae75092e93'un projet. Une fois les relations établies, l'interaction virtuelle peut être utilisée pour les entretenir.", "source": "Woloyem PMP Course 2025 — Exam 30 qst -personne1/9-10.pdf", "source_pages": [], "num": 191},
  {"id": "q-0192", "question": "Trois équipes de projet travaillent sur des parties d'un 0 méme projet. Ces parties sont étroitement liées. Le chef d'équipe indique que cela pourrait créer des conflits lorsque les résultats des trois équipes sont combinés. Quels conseils le chef de projet devrait-il donner au chef d'équipe ? 1aac2b3bae75092e93", "options": {"A": "dentifiez les conflits potentiels et organisez une réunion conjointe hebdomadaire avec les membres des trois équipes pour surveiller le travail de chacun.", "B": "Décidez quel travail d’équipe doit être prioritaire, puis retardez le travail des deux autres équipes pour garantir qu’il n’y a AUCUN conflit.", "C": "Documentez les conflits au fur et à mesure qu’ils surviennent et prenez des mesures pour remédier aux problémes qui surviennent.", "D": "Encouragez les trois équipes a continuer de travailler simultanément, en reconnaissant que les conflits peuvent être résolus lors de la phase de test."}, "correct": "A", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Avant de décider d’agir, le chef de projet doit déterminer les conflits potentiels et suivre l’avancement du projet. 1aac2b3bae75092e93", "source": "Woloyem PMP Course 2025 — Exam 30 qst -personne1/9-10.pdf", "source_pages": [], "num": 192},
  {"id": "q-0193", "question": "Un livrable ne répondant pas aux spécifications de qualité convenues, le client le rejette. Les membres de l'équipe constatent que le livrable ne répond pas aux attentes en raison d'un probléme avec les piéces fournies par le fournisseur. Ce dèrenière s'engage a ne pas corriger le probléme. Avant de décider des prochaines étapes, que doit faire le chef de projet ? 1 cac2b3bae75092e99", "options": {"A": "Vérifiez l'accord de niveau de service (SLA) établi avec le fournisseur.", "B": "Examiner le plan de gestion des achats et les accords contractuels.", "C": "Vérifiez les rapports d’assurance qualité internes.", "D": "Examinez le plan de gestion des ressources et documentez les lecons apprises."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Un contrat est un accord mutuellement contraignant qui oblige le |] vendeur a fournir les produits, services ou résultats spécifiés ; oblige l’acheteur à rémunérer le vendeur ; et représente une relation juridique susceptible de recours devant les tribunaux.", "source": "Woloyem PMP Course 2025 — Examen processus1/1-2.pdf", "source_pages": [], "num": 193},
  {"id": "q-0194", "question": "L'équipe travaillant sur le projet A a résolu un probléme 8 technique et le projet avance. Le chef de projet a été averti que le méme probléme se reproduirait probablement sur des projets similaires a l'avenir. Que doit faire le chef de projet en premier lieu aprés cet avertissement ?", "options": {"A": "Assurez-vous que le journal des problemes est mis g@ a jour et mettez a jour le registre des legons apprises.", "B": "Créez un rapport de risque et maintenez-le a jour.", "C": "Informez le sponsor du projet de l’avertissement.", "D": "Assurez-vous que le registre des legons apprises est mis à jour."}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Mettez a jour le journal des incidents pour refléter la résolution du _probléme. Ensuite, mettez a jour le registre des retours d'expérience concernant les risques potentiels pour les projets futurs.", "source": "Woloyem PMP Course 2025 — Examen processus1/17-18.pdf", "source_pages": [], "num": 194},
  {"id": "q-0195", "question": "Un fournisseur d'équipements médicaux méne un projet 5 hybride comprenant le développement de logiciels sur mesure par une équipe agile. L'équipe progresse bien, mais la lenteur du processus d'approbation client entraine des retards inutiles. Le client insiste pour que l'approbation ne soit donnée qu'aprés la répétition de tous les cas de test dans l'environnement cible. Comment le chef de projet peut-il accélérer le processus d'approbation tout en instaurant la confiance du client ?", "options": {"A": "Invitez le client à envoyer des représentants pour assister aux tests de l'équipe afin de pré-approuver les tests.", "B": "Elaborez un accord avec le client pour reporter autant de tests que possible a la version finale.", "C": "Proposer de nouvelles conditions pour que les membres de l'équipe travaillent aux cétés des testeurs clients pour exécuter des tests dans leur environnement.", "D": "Laissez l’équipe progresser a son rythme pendant que le client continue de tester et d’approuver les versions précédentes. 1 cac2b3bae75092e99"}, "correct": "C", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "La méthode Agile vise à maximiser la transparence entre le fournisseur et le client, tout en optimisant les taches pour éliminer les taches inutiles. Regrouper les équipes pour éviter les doublons Eest la meilleure solution. Le simple fait d'être témoin ne supprimerait PAS les doublons ; reporter les tests est toujours une mauvaise pratique, car les défauts ne sont pas détectés le plus tét possible ; et une progression non synchronisée entre les équipes pourrait entrainer des reprises de travail en cas de défauts.", "source": "Woloyem PMP Course 2025 — Examen processus1/15-16.pdf", "source_pages": [], "num": 195},
  {"id": "q-0196", "question": "Un programme de changement organisationnel rencontre 6 une résistance interne, un risque identifié précédemment. 1 cac2b3bae75092e99 Un responsable logistique est particuliérement touche, en raison de la réduction de la taille de l'équipe et du rythme de changement induit par une planification agile de la mise en ceuvre prédictive. Son supérieur hi¢rarchique demande officiellement au programme de changement de retarder la mise en ceuvre pour l'équipe logistique. Que doit faire le chef de projet face a cette demande ?", "options": {"A": "Travailler avec le sponsor du programme pour redéfinir les priorités de la séquence du backlog du programme.", "B": "Demandez au sponsor de transmettre la question stratégique au comité exécutif.", "C": "Effectuer une analyse des causes profondes des 38 facteurs clés a l’origine de la résistance du manager.", "D": "Examinez le registre des risques et mettez en ceuvre la réponse aux risques approprice au cas."}, "correct": "D", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "La résistance des parties prenantes était anticipée et de multiples réponses aux risques sont probables. La révision du registre des risques est donc la solution appropriée. Une planification agile permettrait des rétrospectives fréquentes pour affiner les réponses aux risques, ce qui pourrait être plus flexible qu'une réponse entiérement prédictive.", "source": "Woloyem PMP Course 2025 — Examen processus1/15-16.pdf", "source_pages": [], "num": 196},
  {"id": "q-0197", "question": "O Le chef de projet doit mettre a jour les documents d’appel d’offres.", "options": {"A": "Le chef de projet doit obtenir l’acceptation des", "B": "parties prenantes.", "C": "Le chef de projet doit réaffecter l’équipe de projet.", "D": "Le chef de projet devrait réaffecter les fonds non utilisés."}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Les livrables acceptés, formellement validés par le client ou le sponsor lors de la validation du périmétre, sont ensuite transmis au processus de cléture du projet ou de phase. Une documentation officielle est ensuite signée par le client ou le sponsor, confirmant ainsi l'acceptation finale des livrables du projet.", "source": "Woloyem PMP Course 2025 — Examen processus1/23-24.pdf", "source_pages": [], "num": 197},
  {"id": "q-0198", "question": "Passez en revue les caractéristiques suivantes du projet : 5 - Le projet est en phase de démarrage. - Faute de financement, le projet est arrété. - Le chef de projet doit cl6turer le projet. Quelle est la premiére action que le chef de projet doit entreprendre ?", "options": {"A": "Appuyez-vous sur le plan de gestion des communications pour bien informer toutes les parties prenantes.", "B": "Examiner les directives de cléture du projet de Vorganisation. e g", "C": "Déterminer l’impact potentiel de la fin du projet en effectuant une analyse des risques.", "D": "Cléturer tous les processus d’approvisionnement du projet."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "=Les directives ou exigences de cl6ture du projet contiendront les procédures a suivre par |’ organisation.", "source": "Woloyem PMP Course 2025 — Examen processus1/25-26.pdf", "source_pages": [], "num": 198},
  {"id": "q-0199", "question": "Les membres de l'équipe projet consacrent beaucoup de 7 temps a aider le personnel de maintenance et d'exploitation sur un composant de projet récemment mis en service. Le chef de projet doit valider la validation du composant et le transfert de propriété. Quels sont les trois (3) documents que le chef de projet doit utiliser pour prendre cette décision ?", "options": {"A": "Rapport final, mises à jour des actifs du processus organisationnel et accords d'approvisionnement", "B": "Accords d'approvisionnement, mises à jour des documents de projet et mises a jour des actifs des processus organisationnels", "C": "Accords d'approvisionnement, plan d'engagement des parties prenantes et mises a jour des actifs des processus organisationnels", "D": "Rapport final, mises à jour des documents de projet et mises a jour des actifs du processus organisationnel"}, "correct": "D", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Lors de la cléture du projet, le chef de projet examine le plan de gestion du projet afin de s'assurer que tous les travaux ont été =__réalisés et que le projet a atteint ses objectifs. Les documents du projet sont mis aà jour en conséquence. Dans ce cas, il s'agit du rapport final, des mises à jour des documents du projet et des mises a jour des actifs de processus organisationnels. Un projet est terminé, mais le chef de projet et les", "source": "Woloyem PMP Course 2025 — Examen processus1/27-28.pdf", "source_pages": [], "num": 199},
