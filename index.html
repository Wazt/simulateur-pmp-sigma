/* Custom styles for the PMP simulator */

* { -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { font-family: 'Inter', system-ui, sans-serif; }

/* Custom scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(100,116,139,.4); border-radius: 8px; }
::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,.7); }

/* Glass effect */
.glass {
  background: rgba(255,255,255,.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.dark .glass {
  background: rgba(15,23,42,.75);
}

/* Smooth transitions for choice cards */
.choice-card {
  transition: all .2s cubic-bezier(.4,0,.2,1);
}
.choice-card:hover { transform: translateY(-2px); }

/* Progress ring */
.progress-ring {
  transform: rotate(-90deg);
  transition: stroke-dashoffset .35s ease;
}

/* Gradient text */
.gradient-text {
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Print styles */
@media print {
  .no-print { display: none !important; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
  }
}

/* Mobile-friendly tap targets */
button, [role="button"] { min-height: 44px; }

/* Question text */
.question-text {
  line-height: 1.7;
}

/* Loading shimmer */
@keyframes shimmer {
  0% { background-position: -1000px 0; }
  100% { background-position: 1000px 0; }
}
.shimmer {
  background: linear-gradient(90deg, transparent, rgba(99,102,241,.08), transparent);
  background-size: 1000px 100%;
  animation: shimmer 2s infinite;
}

// Helper utilities
window.PMP_HELPERS = {
  formatTime(sec) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },
  shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  },
  pickRandom(arr, n) {
    return window.PMP_HELPERS.shuffle(arr).slice(0, n);
  },
  saveSession(key, data) {
    try { localStorage.setItem('pmp_' + key, JSON.stringify(data)); } catch(e){}
  },
  loadSession(key) {
    try {
      const s = localStorage.getItem('pmp_' + key);
      return s ? JSON.parse(s) : null;
    } catch(e){ return null; }
  },
  clearSession(key) {
    try { localStorage.removeItem('pmp_' + key); } catch(e){}
  },
  domainLabel(d) {
    return { 'People': 'Personnes (42 %)', 'Process': 'Processus (50 %)', 'Business': 'Environnement (8 %)' }[d] || d;
  },
  domainColor(d) {
    return { 'People':'bg-rose-500','Process':'bg-indigo-500','Business':'bg-amber-500' }[d] || 'bg-slate-500';
  },
  approachLabel(a) {
    return { 'Predictive':'Prédictif','Agile':'Agile','Hybride':'Hybride' }[a] || a;
  }
};


// ===== src/utils/search.js =====
// Fuzzy search engine for the Assistant feature
// Searches the question bank and knowledge base
window.PMP_SEARCH = (() => {
  // Common French stopwords to remove from query
  const STOP = new Set([
    'le','la','les','un','une','des','du','de','d','et','ou','où','à','au','aux','en','dans',
    'pour','par','sur','sous','avec','sans','est','sont','être','un','une','que','qui','dont',
    'ce','cette','ces','son','sa','ses','leur','leurs','il','elle','ils','elles','on','nous','vous',
    'l','s','t','n','y','si','mais','plus','tout','toute','tous','toutes','peut','doit','faire','fait',
    'a','ont','être','était','sera','va','vont','aussi','très','bien','aussi'
  ]);

  function tokenize(s) {
    return s.toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g,'') // remove accents
      .replace(/[^a-z0-9\s]/g,' ')
      .split(/\s+/)
      .filter(t => t.length > 2 && !STOP.has(t));
  }

  function scoreText(queryTokens, text) {
    if (!text) return 0;
    const tt = text.toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g,'');
    let score = 0;
    for (const q of queryTokens) {
      // exact word match
      const re = new RegExp('\\b' + q + '\\b', 'g');
      const m = tt.match(re);
      if (m) score += m.length * 3;
      else if (tt.includes(q)) score += 1; // partial
    }
    return score;
  }

  function searchQuestions(query, opts = {}) {
    const qt = tokenize(query);
    if (qt.length === 0) return [];
    const questions = window.PMP_QUESTIONS || [];
    const scored = questions.map(q => {
      const opts = Object.values(q.options || {}).join(' ');
      const txt = q.question + ' ' + opts + ' ' + (q.explanation || '');
      return { q, score: scoreText(qt, txt) };
    });
    return scored
      .filter(s => s.score > 0)
      .sort((a,b) => b.score - a.score)
      .slice(0, opts.limit || 5);
  }

  function searchKnowledge(query, opts = {}) {
    const qt = tokenize(query);
    if (qt.length === 0) return [];
    const items = window.PMP_KNOWLEDGE || [];
    const scored = items.map(k => {
      const tags = (k.tags || []).join(' ');
      const txt = k.topic + ' ' + tags + ' ' + k.summary;
      return { k, score: scoreText(qt, txt) };
    });
    return scored
      .filter(s => s.score > 0)
      .sort((a,b) => b.score - a.score)
      .slice(0, opts.limit || 5);
  }

  // Heuristic answer suggestion based on best-matching question
  function suggestAnswer(query) {
    const matches = searchQuestions(query, { limit: 3 });
    const knowledge = searchKnowledge(query, { limit: 4 });
    return {
      query,
      bestMatch: matches[0] || null,
      otherMatches: matches.slice(1),
      knowledge: knowledge.map(x => x.k),
      confidence: matches[0] ? Math.min(100, Math.round(matches[0].score * 5)) : 0
    };
  }

  return { tokenize, searchQuestions, searchKnowledge, suggestAnswer };
})();

// Countdown timer with visual urgency
function Timer({ totalSec, remaining, onExpire }) {
  const { useEffect, useRef } = React;
  const tickedRef = useRef(false);

  useEffect(() => {
    if (remaining <= 0 && !tickedRef.current) {
      tickedRef.current = true;
      onExpire && onExpire();
    }
  }, [remaining, onExpire]);

  const pct = totalSec > 0 ? (remaining / totalSec) * 100 : 0;
  let color = 'text-emerald-600 dark:text-emerald-400';
  let bg = 'bg-emerald-500';
  if (pct < 50) { color = 'text-amber-600 dark:text-amber-400'; bg = 'bg-amber-500'; }
  if (pct < 20) { color = 'text-rose-600 dark:text-rose-400'; bg = 'bg-rose-500'; }

  return (
    <div className="flex items-center gap-2">
      <div className={`text-xs sm:text-sm font-mono font-bold tabular-nums ${color} ${pct < 10 ? 'animate-pulse' : ''}`}>
        ⏱ {window.PMP_HELPERS.formatTime(Math.max(0, remaining))}
      </div>
      <div className="hidden sm:block w-24 h-2 rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden">
        <div className={`h-full ${bg} transition-all duration-1000`} style={{ width: pct + '%' }}></div>
      </div>
    </div>
  );
}
window.Timer = Timer;

// One question + 4 options + (optional) explanation
function QuestionCard({ question, index, total, selected, onSelect, showExplanation, marked, onToggleMark }) {
  const opts = question.options || {};
  const order = ['A','B','C','D'].filter(k => opts[k]);
  const isCorrect = (k) => {
    const c = (question.correct || '').toUpperCase();
    // support multi-letter answers like "AB"
    return c.includes(k);
  };

  return (
    <div className="animate-slide-up">
      {/* Question meta */}
      <div className="flex flex-wrap items-center gap-2 mb-4">
        <span className="text-xs font-bold text-slate-500 dark:text-slate-400">
          Question {index + 1} <span className="text-slate-400">/ {total}</span>
        </span>
        <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full text-white ${window.PMP_HELPERS.domainColor(question.domain)}`}>
          {question.domain === 'People' ? 'Personnes' : question.domain === 'Process' ? 'Processus' : 'Environnement'}
        </span>
        <span className="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300">
          {window.PMP_HELPERS.approachLabel(question.approach)}
        </span>
        <button
          onClick={onToggleMark}
          className={`ml-auto text-xs font-semibold px-3 py-1.5 rounded-lg transition ${marked ? 'bg-amber-400 text-amber-950' : 'bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-amber-100 dark:hover:bg-amber-900/30'}`}>
          {marked ? '🔖 Marquée' : '🔖 Marquer'}
        </button>
      </div>

      {/* Question */}
      <div className="p-5 sm:p-6 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm">
        <p className="question-text text-base sm:text-lg font-medium text-slate-900 dark:text-slate-100">
          {question.question}
        </p>
      </div>

      {/* Options */}
      <div className="mt-4 space-y-3">
        {order.map(k => {
          const isSelected = selected === k;
          const correct = isCorrect(k);
          let cls = 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 hover:border-brand-400 dark:hover:border-brand-600';
          if (isSelected && !showExplanation) cls = 'bg-brand-50 dark:bg-brand-950/50 border-brand-500';
          if (showExplanation) {
            if (correct) cls = 'bg-emerald-50 dark:bg-emerald-950/40 border-emerald-500';
            else if (isSelected) cls = 'bg-rose-50 dark:bg-rose-950/40 border-rose-500';
            else cls = 'bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-800 opacity-70';
          }
          return (
            <button key={k}
              onClick={() => !showExplanation && onSelect(k)}
              disabled={showExplanation}
              className={`choice-card w-full text-left p-4 sm:p-5 rounded-xl border-2 ${cls} disabled:cursor-default`}>
              <div className="flex items-start gap-3">
                <div className={`flex-shrink-0 w-9 h-9 rounded-full flex items-center justify-center font-bold text-sm border-2 ${
                  showExplanation && correct ? 'border-emerald-500 bg-emerald-500 text-white' :
                  showExplanation && isSelected ? 'border-rose-500 bg-rose-500 text-white' :
                  isSelected ? 'border-brand-500 bg-brand-500 text-white' :
                  'border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300'
                }`}>{k}</div>
                <div className="flex-1 pt-1 text-sm sm:text-base text-slate-700 dark:text-slate-200">
                  {opts[k]}
                </div>
                {showExplanation && correct && <span className="text-emerald-600 text-xl">✓</span>}
                {showExplanation && isSelected && !correct && <span className="text-rose-600 text-xl">✕</span>}
              </div>
            </button>
          );
        })}
      </div>

      {/* Explanation (study/results mode) */}
      {showExplanation && question.explanation && (
        <div className="mt-5 p-5 rounded-2xl bg-gradient-to-br from-brand-50 to-purple-50 dark:from-brand-950/30 dark:to-purple-950/30 border border-brand-200 dark:border-brand-900 animate-fade-in">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-lg">💡</span>
            <span className="font-bold text-brand-900 dark:text-brand-100">
              Réponse correcte : <span className="text-emerald-600 dark:text-emerald-400">{question.correct}</span>
            </span>
          </div>
          <p className="text-sm leading-relaxed text-slate-700 dark:text-slate-300">{question.explanation}</p>
        </div>
      )}
    </div>
  );
}

// Break screen between exam sections
function BreakScreen({ section, totalSections, breakSec, onResume }) {
  const { useState, useEffect } = React;
  const [remaining, setRemaining] = useState(breakSec);

  useEffect(() => {
    if (remaining <= 0) return;
    const id = setInterval(() => setRemaining(r => Math.max(0, r - 1)), 1000);
    return () => clearInterval(id);
  }, [remaining]);

  useEffect(() => {
    if (remaining === 0) onResume();
  }, [remaining, onResume]);

  return (
    <div className="min-h-[80vh] flex items-center justify-center p-6 animate-fade-in">
      <div className="max-w-lg w-full text-center">
        <div className="w-24 h-24 mx-auto mb-6 rounded-3xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center shadow-2xl shadow-emerald-500/30">
          <span className="text-5xl">☕</span>
        </div>
        <h2 className="text-3xl sm:text-4xl font-black mb-2">Pause obligatoire</h2>
        <p className="text-slate-600 dark:text-slate-400 mb-6">

          Profitez de cette pause de 10 minutes pour vous reposer.

        <div className="text-6xl sm:text-7xl font-mono font-black gradient-text mb-6 tabular-nums">

      </div>

}

// Main exam screen — orchestrates questions, timer, sections, breaks
function ExamScreen({ mode, onFinish, onAbort }) {
  const { useState, useEffect, useMemo, useRef } = React;
  const Q = window.PMP_QUESTIONS || [];

  // Config per mode
  const config = useMemo(() => {
    if (mode === 'mini') {
      return { count: 60, totalSec: 75 * 60, sections: [[0,60]], breakAfter: [] };
    }
    // Full official exam: 180 questions, 230 min, 2 breaks (after Q60 and Q120)
    return { count: 180, totalSec: 230 * 60, sections: [[0,60],[60,120],[120,180]], breakAfter: [60,120] };
  }, [mode]);

  // Build exam questions: sample + shuffle for replayability
  const questions = useMemo(() => {
    const shuffled = window.PMP_HELPERS.shuffle(Q);
    return shuffled.slice(0, config.count);
  }, [config.count]);

  // State
  const [currentIdx, setCurrentIdx] = useState(0);
  const [answers, setAnswers] = useState({}); // idx -> 'A'|'B'|'C'|'D'
  const [marked, setMarked] = useState({});
  const [remaining, setRemaining] = useState(config.totalSec);
  const [sectionIdx, setSectionIdx] = useState(0);
  const [onBreak, setOnBreak] = useState(false);
  const [showNav, setShowNav] = useState(false);
  const [showConfirmSubmit, setShowConfirmSubmit] = useState(false);

  // Timer
  useEffect(() => {
    if (onBreak) return;
    if (remaining <= 0) return;
    const id = setInterval(() => setRemaining(r => Math.max(0, r - 1)), 1000);
    return () => clearInterval(id);
  }, [onBreak, remaining]);

  // Auto-submit when time is over
  useEffect(() => {
    if (remaining === 0 && !onBreak) {
      handleSubmit();
    }
  }, [remaining]);

  const [secStart, secEnd] = config.sections[sectionIdx];
  const sectionAnswered = Object.keys(answers).filter(k => +k >= secStart && +k < secEnd).length;
  const sectionTotal = secEnd - secStart;
  const allAnswered = Object.keys(answers).length;

  const setAnswer = (idx, letter) => {
    setAnswers(prev => ({ ...prev, [idx]: letter }));
  };
  const toggleMark = (idx) => {
    setMarked(prev => ({ ...prev, [idx]: !prev[idx] }));
  };

  const goNext = () => {
    if (currentIdx + 1 >= secEnd) {
      // End of section
      if (config.breakAfter.includes(secEnd) && sectionIdx + 1 < config.sections.length) {
        setOnBreak(true);
      } else if (sectionIdx + 1 < config.sections.length) {
        setSectionIdx(sectionIdx + 1);
        setCurrentIdx(secEnd);
      } else {
        setShowConfirmSubmit(true);
      }
    } else {
      setCurrentIdx(currentIdx + 1);
    }
  };
  const goPrev = () => {
    if (currentIdx > secStart) setCurrentIdx(currentIdx - 1);
  };
  const jumpTo = (idx) => {
    if (idx >= secStart && idx < secEnd) setCurrentIdx(idx);
  };
  const resumeFromBreak = () => {
    setOnBreak(false);
    setSectionIdx(sectionIdx + 1);
    setCurrentIdx(config.sections[sectionIdx + 1][0]);
  };
  const handleSubmit = () => {
    const elapsed = config.totalSec - remaining;
    onFinish({ questions, answers, marked, elapsed, mode });
  };

  if (onBreak) {
    return <BreakScreen section={sectionIdx + 1} totalSections={config.sections.length} breakSec={10 * 60} onResume={resumeFromBreak} />;
  }

  const q = questions[currentIdx];
  const overallPct = Math.round(((currentIdx + 1) / questions.length) * 100);

  return (
    <div className="max-w-3xl mx-auto px-4 sm:px-6 py-4 sm:py-6 animate-fade-in">
      {/* Top bar */}
      <div className="flex items-center justify-between gap-2 mb-4 flex-wrap">
        <div className="flex items-center gap-3 text-xs sm:text-sm">
          <div className="font-bold">
            Section <span className="text-brand-600">{sectionIdx + 1}</span>/{config.sections.length}
          </div>
          <div className="text-slate-500">|</div>
          <div className="text-slate-600 dark:text-slate-400">
            {sectionAnswered}/{sectionTotal} répondues
          </div>
        </div>
        <Timer totalSec={config.totalSec} remaining={remaining} onExpire={handleSubmit} />
      </div>

      {/* Progress bar */}
      <div className="w-full h-1.5 rounded-full bg-slate-200 dark:bg-slate-800 mb-6 overflow-hidden">
        <div className="h-full bg-gradient-to-r from-brand-500 to-purple-500 transition-all" style={{ width: overallPct + '%' }}></div>
      </div>

      {/* Question */}
      <QuestionCard
        question={q}
        index={currentIdx}
        total={questions.length}
        selected={answers[currentIdx]}
        onSelect={(letter) => setAnswer(currentIdx, letter)}
        showExplanation={false}
        marked={!!marked[currentIdx]}
        onToggleMark={() => toggleMark(currentIdx)}
      />

      {/* Action bar */}
      <div className="mt-6 flex flex-wrap gap-2 sm:gap-3">
        <button onClick={goPrev} disabled={currentIdx <= secStart}
          className="px-4 py-3 rounded-xl bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 disabled:opacity-40 disabled:cursor-not-allowed font-semibold text-sm">
          ← Précédente
        </button>
        <button onClick={() => setShowNav(true)}
          className="px-4 py-3 rounded-xl bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 font-semibold text-sm">
          ☷ Navigation
        </button>
        <div className="flex-1"></div>
        <button onClick={goNext}
          className="px-5 py-3 rounded-xl bg-gradient-to-r from-brand-600 to-purple-600 text-white font-bold text-sm hover:shadow-lg transition">
          {currentIdx + 1 >= secEnd ? (sectionIdx + 1 < config.sections.length ? 'Section suivante →' : 'Soumettre l\'examen ✓') : 'Suivante →'}
        </button>
      </div>

      {/* Abort link */}
      <div className="mt-8 text-center">
        <button onClick={onAbort} className="text-xs text-slate-500 hover:text-rose-600">
          Abandonner l'examen
        </button>
      </div>

      {/* Navigation modal */}
      {showNav && (
        <NavigationGrid questions={questions} answers={answers} marked={marked} currentIdx={currentIdx}
          sectionRange={[secStart, secEnd]} onJump={jumpTo} onClose={() => setShowNav(false)} />
      )}

      {/* Confirm submit */}
      {showConfirmSubmit && (
        <div className="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
          <div className="bg-white dark:bg-slate-900 rounded-2xl p-6 max-w-md w-full">
            <h3 className="font-bold text-xl mb-2">Soumettre l'examen ?</h3>
            <p className="text-sm text-slate-600 dark:text-slate-400 mb-4">
              Vous avez répondu à <b>{allAnswered}/{questions.length}</b> questions.
              {allAnswered < questions.length && <span className="text-amber-600"> Les questions sans réponse seront comptées comme incorrectes.</span>}
            </p>
            <div className="flex gap-2 justify-end">
              <button onClick={() => setShowConfirmSubmit(false)} className="px-4 py-2 rounded-lg bg-slate-200 dark:bg-slate-800 font-semibold text-sm">Continuer</button>
              <button onClick={handleSubmit} className="px-4 py-2 rounded-lg bg-emerald-600 text-white font-semibold text-sm">Soumettre</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
window.ExamScreen = ExamScreen;

// Results screen — score, by domain breakdown, action to review
function ResultsScreen({ data, onReview, onRestart, onHome }) {
  const { questions, answers, elapsed } = data;
  const correctIds = new Set();
  let correctCount = 0;
  const byDomain = { People: { total: 0, correct: 0 }, Process: { total: 0, correct: 0 }, Business: { total: 0, correct: 0 } };
  const byApproach = { Predictive: { total: 0, correct: 0 }, Agile: { total: 0, correct: 0 }, Hybride: { total: 0, correct: 0 } };

  questions.forEach((q, idx) => {
    const d = q.domain in byDomain ? q.domain : 'Process';
    const a = q.approach in byApproach ? q.approach : 'Predictive';
    byDomain[d].total++;
    byApproach[a].total++;
    const user = answers[idx];
    const correct = (q.correct || '').toUpperCase();
    // Match: for single letter, user matches if equal; for multi-letter (like AB), accept if user is in it
    const isOk = user && correct.includes(user);
    if (isOk) {
      correctCount++;
      correctIds.add(idx);
      byDomain[d].correct++;
      byApproach[a].correct++;
    }
  });

  const total = questions.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  // PMP passing benchmark approx ~ 70% (PMI doesn't publish; this is a guideline)
  const passed = pct >= 70;

  return (
    <div className="max-w-4xl mx-auto px-4 sm:px-6 py-8 animate-fade-in">
      {/* Score hero */}
      <div className="text-center mb-10">
        <div className={`inline-flex items-center justify-center w-40 h-40 sm:w-48 sm:h-48 rounded-full mb-6 ${passed ? 'bg-gradient-to-br from-emerald-400 to-green-600' : 'bg-gradient-to-br from-amber-400 to-rose-600'} shadow-2xl`}>
          <div className="w-32 h-32 sm:w-40 sm:h-40 rounded-full bg-white dark:bg-slate-900 flex flex-col items-center justify-center">
            <div className="text-4xl sm:text-5xl font-black gradient-text">{pct}%</div>
            <div className="text-xs font-semibold text-slate-500 mt-1">{correctCount} / {total}</div>
          </div>
        </div>
        <h2 className="text-3xl sm:text-4xl font-black mb-2">
          {passed ? '🎉 Félicitations !' : '💪 Continue de t\'entraîner'}
        </h2>
        <p className="text-slate-600 dark:text-slate-400 mb-1">
          {passed ? 'Vous êtes au-dessus du seuil estimé de réussite (≈ 70 %).' : 'Le seuil de réussite estimé est ≈ 70 %. Reviens à la révision pour comprendre tes erreurs.'}
        </p>
        <p className="text-xs text-slate-500">Temps écoulé : {window.PMP_HELPERS.formatTime(elapsed)}</p>
      </div>

      {/* By domain */}
      <h3 className="font-bold text-lg mb-3">📊 Performance par domaine</h3>
      <div className="grid sm:grid-cols-3 gap-3 mb-6">
        {Object.entries(byDomain).map(([dom, d]) => {
          const p = d.total > 0 ? Math.round((d.correct / d.total) * 100) : 0;
          return <DomainCard key={dom} domain={dom} pct={p} correct={d.correct} total={d.total} />;
        })}
      </div>

      {/* By approach */}
      <h3 className="font-bold text-lg mb-3">🎯 Performance par approche</h3>
      <div className="grid sm:grid-cols-3 gap-3 mb-8">
        {Object.entries(byApproach).map(([app, d]) => {
          const p = d.total > 0 ? Math.round((d.correct / d.total) * 100) : 0;
          return (
            <div key={app} className="p-4 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
              <div className="flex items-center justify-between mb-2">
                <span className="text-sm font-bold">{window.PMP_HELPERS.approachLabel(app)}</span>
                <span className="text-lg font-black gradient-text">{p}%</span>
              </div>
              <div className="w-full h-2 rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden">
                <div className="h-full bg-gradient-to-r from-brand-500 to-purple-500" style={{ width: p + '%' }}></div>
              </div>
              <div className="text-xs text-slate-500 mt-1.5">{d.correct} / {d.total}</div>
            </div>
          );
        })}
      </div>

      {/* Actions */}
      <div className="flex flex-wrap gap-3 justify-center">
        <button onClick={onReview}
          className="px-6 py-3 rounded-xl bg-gradient-to-r from-brand-600 to-purple-600 text-white font-bold hover:shadow-lg transition">
          📖 Réviser les réponses
        </button>
        <button onClick={onRestart}
          className="px-6 py-3 rounded-xl bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 font-bold">
          🔄 Recommencer
        </button>
        <button onClick={onHome}
          className="px-6 py-3 rounded-xl bg-slate-100 dark:bg-slate-900 hover:bg-slate-200 dark:hover:bg-slate-800 font-bold">
          🏠 Accueil
        </button>
      </div>
    </div>
  );
}

// Review screen — go through each question with full explanation
function ReviewScreen({ data, onBack, onHome }) {
  const { useState } = React;
  const { questions, answers } = data;
  const [idx, setIdx] = useState(0);
  const [filter, setFilter] = useState('all'); // all | wrong | unanswered | marked

  // Build filtered list
  const indexes = questions.map((_, i) => i).filter(i => {
    if (filter === 'all') return true;
    const ua = answers[i];
    const ok = ua && (questions[i].correct || '').toUpperCase().includes(ua);
    if (filter === 'wrong') return ua && !ok;
    if (filter === 'unanswered') return !ua;
    return true;
  });

  if (indexes.length === 0) {
    return (
      <div className="max-w-2xl mx-auto px-4 py-10 text-center">
        <p className="text-lg">Aucune question pour ce filtre.</p>
        <button onClick={() => setFilter('all')} className="mt-4 px-4 py-2 rounded-lg bg-brand-500 text-white">Tout afficher</button>
      </div>
    );
  }

  const safeIdx = Math.min(idx, indexes.length - 1);
  const realIdx = indexes[safeIdx];
  const q = questions[realIdx];
  const ua = answers[realIdx];

  return (
    <div className="max-w-3xl mx-auto px-4 sm:px-6 py-6 animate-fade-in">
      <div className="flex flex-wrap items-center gap-2 mb-4">
        <h2 className="text-xl sm:text-2xl font-black flex-1">📖 Révision détaillée</h2>
        <button onClick={onBack} className="text-xs px-3 py-2 rounded-lg bg-slate-200 dark:bg-slate-800 font-semibold">← Résultats</button>
      </div>

      {/* Filters */}
      <div className="flex gap-2 mb-4 flex-wrap">
        {[
          { id: 'all', label: 'Toutes', count: questions.length },
          { id: 'wrong', label: 'Erreurs', count: questions.filter((qq,i) => answers[i] && !(qq.correct || '').toUpperCase().includes(answers[i])).length },
          { id: 'unanswered', label: 'Non répondues', count: questions.filter((_,i) => !answers[i]).length }
        ].map(f => (
          <button key={f.id} onClick={() => { setFilter(f.id); setIdx(0); }}
            className={`text-xs sm:text-sm font-semibold px-3 py-1.5 rounded-lg transition ${filter === f.id ? 'bg-brand-500 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300'}`}>
            {f.label} <span className="opacity-70">({f.count})</span>
          </button>
        ))}
      </div>

      <div className="text-xs text-slate-500 mb-3">
        Question <b>{safeIdx + 1}</b> sur <b>{indexes.length}</b> (n° original : {realIdx + 1})
        {ua ? (
          (q.correct || '').toUpperCase().includes(ua)
            ? <span className="ml-2 inline-block px-2 py-0.5 rounded-full bg-emerald-100 dark:bg-emerald-950 text-emerald-700 dark:text-emerald-300 font-semibold">✓ Correct</span>
            : <span className="ml-2 inline-block px-2 py-0.5 rounded-full bg-rose-100 dark:bg-rose-950 text-rose-700 dark:text-rose-300 font-semibold">✕ Incorrect (votre rép. : {ua})</span>
        ) : (
          <span className="ml-2 inline-block px-2 py-0.5 rounded-full bg-amber-100 dark:bg-amber-950 text-amber-700 dark:text-amber-300 font-semibold">Non répondue</span>
        )}
      </div>

      <QuestionCard
        question={q}
        index={realIdx}
        total={questions.length}
        selected={ua}
        onSelect={() => {}}
        showExplanation={true}
        marked={false}
        onToggleMark={() => {}}
      />

      <div className="mt-6 flex gap-2 justify-between">
        <button onClick={() => setIdx(Math.max(0, safeIdx - 1))} disabled={safeIdx === 0}
          className="px-4 py-2.5 rounded-xl bg-slate-200 dark:bg-slate-800 disabled:opacity-40 font-semibold text-sm">← Précédente</button>
        <button onClick={onHome} className="px-4 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-900 hover:bg-slate-200 font-semibold text-sm">🏠 Accueil</button>
        <button onClick={() => setIdx(Math.min(indexes.length - 1, safeIdx + 1))} disabled={safeIdx === indexes.length - 1}
          className="px-4 py-2.5 rounded-xl bg-brand-500 text-white disabled:opacity-40 font-semibold text-sm">Suivante →</button>
      </div>
    </div>
  );
}
window.ReviewScreen = ReviewScreen;

          className="px-5 py-2.5 rounded-xl bg-gradient-to-r from-brand-600 to-purple-600 text-white font-bold text-sm">
          Question suivante →
        </button>
      </div>
    </div>
  );
}

// Assistant PMP — paste text or upload a screenshot, get matching questions and PMP knowledge
function Assistant({ onHome }) {
  const { useState, useRef } = React;
  const [text, setText] = useState('');
  const [result, setResult] = useState(null);
  const [ocrStatus, setOcrStatus] = useState('');
  const [imagePreview, setImagePreview] = useState(null);
  const fileRef = useRef(null);

  const search = (q) => {
    const r = window.PMP_SEARCH.suggestAnswer(q);
    setResult(r);
    setTimeout(() => {
      const el = document.getElementById('assistant-result');
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    }, 100);
  };

  const handleSubmit = () => {
    if (!text.trim()) return;
    search(text.trim());
  };

  const handleImage = async (file) => {
    if (!file) return;
    setImagePreview(URL.createObjectURL(file));
    setOcrStatus('Chargement du moteur OCR…');
    try {
      // Lazy load tesseract.js
      if (!window.Tesseract) {
        await loadScript('https://unpkg.com/tesseract.js@5/dist/tesseract.min.js');
      }
      setOcrStatus('Analyse de l\'image en cours…');
      const { data } = await window.Tesseract.recognize(file, 'fra+eng', {
        logger: m => {
          if (m.status === 'recognizing text') {
            setOcrStatus(`Reconnaissance du texte… ${Math.round(m.progress * 100)}%`);
          }
        }
      });
      const extracted = (data.text || '').trim();
      setText(extracted);
      setOcrStatus(`✓ ${extracted.length} caractères extraits`);
      if (extracted.length > 10) search(extracted);
    } catch (e) {
      setOcrStatus('❌ Erreur OCR. Essayez de coller le texte manuellement.');
      console.error(e);
    }
  };

  const loadScript = (src) => new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });

  const onDrop = (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleImage(file);
  };

  // Try to detect question and options in pasted text
  const parsedQuestion = parseQuestionText(text);

  return (
    <div className="max-w-4xl mx-auto px-4 sm:px-6 py-6 animate-fade-in">
      <div className="flex flex-wrap gap-2 items-center mb-5">
        <h2 className="text-2xl sm:text-3xl font-black flex-1">🤖 Assistant PMP</h2>
        <button onClick={onHome} className="text-xs px-3 py-2 rounded-lg bg-slate-200 dark:bg-slate-800 font-semibold">← Accueil</button>
      </div>
      <p className="text-sm text-slate-600 dark:text-slate-400 mb-6">
        Collez une question PMP (texte), ou téléversez une capture d'écran. L'assistant cherche dans la banque de 180 questions et la base de connaissances PMBOK 7 / Agile Practice Guide pour vous proposer la réponse la plus probable et son explication.
      </p>

      {/* Input area */}
      <div className="space-y-4">
        {/* Image upload + drop zone */}
        <div
          onDragOver={e => e.preventDefault()}
          onDrop={onDrop}
          onClick={() => fileRef.current?.click()}
          className="cursor-pointer p-6 rounded-2xl border-2 border-dashed border-slate-300 dark:border-slate-700 hover:border-brand-500 dark:hover:border-brand-500 hover:bg-brand-50/40 dark:hover:bg-brand-950/20 transition text-center">
          <input ref={fileRef} type="file" accept="image/*" className="hidden"
            onChange={e => handleImage(e.target.files?.[0])} />
          <div className="text-4xl mb-2">📸</div>
          <div className="font-bold mb-1">Téléverser une capture d'écran</div>
          <div className="text-xs text-slate-500">Glissez-déposez ou cliquez. OCR (français + anglais) via Tesseract.js.</div>
          {imagePreview && (
            <img src={imagePreview} alt="aperçu" className="mt-4 mx-auto max-h-48 rounded-lg shadow-md" />
          )}
          {ocrStatus && <div className="mt-3 text-xs font-mono text-brand-600 dark:text-brand-400">{ocrStatus}</div>}
        </div>

        {/* Text area */}
        <div>
          <label className="text-xs font-bold text-slate-500 mb-1 block">Ou collez la question ici</label>
          <textarea
            value={text}
            onChange={e => setText(e.target.value)}
            placeholder="Exemple : Un membre de l'équipe agile a quitté en plein sprint. Le retard s'accumule. Que doit faire le chef de projet ?"
            rows={6}
            className="w-full p-4 rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
          />
          <div className="flex gap-2 mt-2">
            <button onClick={handleSubmit} disabled={!text.trim()}
              className="flex-1 px-5 py-3 rounded-xl bg-gradient-to-r from-brand-600 to-purple-600 text-white font-bold disabled:opacity-40">
              🔍 Trouver la réponse
            </button>
            <button onClick={() => { setText(''); setResult(null); setImagePreview(null); setOcrStatus(''); }}
              className="px-4 py-3 rounded-xl bg-slate-200 dark:bg-slate-800 font-semibold text-sm">
              Effacer
            </button>
          </div>
        </div>
      </div>

      {/* Results */}
      {result && <AssistantResult result={result} id="assistant-result" />}
    </div>
  );
}

function parseQuestionText(text) {
  if (!text) return null;
  // try to find options A, B, C, D
  const optPat = /([A-Da-d])[\.\-\)]\s*([^\n]+)/g;
  const opts = {};
  let m;
  while ((m = optPat.exec(text)) !== null) {
    const k = m[1].toUpperCase();
    if (!opts[k]) opts[k] = m[2].trim();
  }
  return Object.keys(opts).length >= 2 ? opts : null;
}

function AssistantResult({ result, id }) {
  const { bestMatch, otherMatches, knowledge, confidence, query } = result;

  return (
    <div id={id} className="mt-8 space-y-4 animate-fade-in">
      <div className="p-5 rounded-2xl bg-gradient-to-br from-brand-50 to-purple-50 dark:from-brand-950/30 dark:to-purple-950/30 border border-brand-200 dark:border-brand-900">
        <div className="flex items-center justify-between mb-2">
          <h3 className="font-bold text-lg">🎯 Analyse de la question</h3>
          {bestMatch && (
            <div className="text-xs font-bold px-3 py-1 rounded-full bg-white dark:bg-slate-900 border border-brand-200 dark:border-brand-800">
              Confiance : {confidence}%
            </div>
          )}
        </div>

        {!bestMatch && (
          <p className="text-sm text-slate-600 dark:text-slate-400">
            Aucune correspondance trouvée dans la banque. Essayez avec plus de mots-clés (concepts PMP : risque, sprint, partie prenante, etc.).
          </p>
        )}

        {bestMatch && (
          <div className="mt-3 p-4 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
            <div className="text-xs font-bold text-emerald-600 dark:text-emerald-400 mb-2">Meilleure correspondance dans la banque PMP</div>
            <p className="font-medium text-sm sm:text-base mb-3">{bestMatch.q.question}</p>
            {Object.entries(bestMatch.q.options).map(([k, v]) => {
              const correct = (bestMatch.q.correct || '').includes(k);
              return (
                <div key={k} className={`flex gap-2 p-2.5 rounded-lg mb-1 text-sm ${correct ? 'bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-300 dark:border-emerald-800' : 'bg-slate-50 dark:bg-slate-900'}`}>
                  <span className={`font-bold w-6 ${correct ? 'text-emerald-700 dark:text-emerald-300' : 'text-slate-500'}`}>{k}.</span>
                  <span className="flex-1">{v}</span>
                  {correct && <span className="text-emerald-600">✓</span>}
                </div>
              );
            })}
            <div className="mt-4 p-3 rounded-lg bg-brand-50 dark:bg-brand-950/40 border border-brand-200 dark:border-brand-900">
              <div className="text-xs font-bold text-brand-700 dark:text-brand-300 mb-1">
                💡 Réponse recommandée : <span className="text-emerald-600 dark:text-emerald-400 text-base">{bestMatch.q.correct}</span>
                <span className="ml-2 text-[10px] font-semibold px-2 py-0.5 rounded-full bg-slate-200 dark:bg-slate-800">
                  {bestMatch.q.domain === 'People' ? 'Personnes' : bestMatch.q.domain === 'Process' ? 'Processus' : 'Environnement'} • {window.PMP_HELPERS.approachLabel(bestMatch.q.approach)}
                </span>
              </div>
              <p className="text-sm leading-relaxed text-slate-700 dark:text-slate-300">{bestMatch.q.explanation}</p>
            </div>
          </div>
        )}
      </div>

      {/* Other matches */}
      {otherMatches && otherMatches.length > 0 && (
        <div className="p-5 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
          <h3 className="font-bold mb-3">📋 Questions similaires</h3>
          <div className="space-y-2">
            {otherMatches.map((m, i) => (
              <details key={i} className="rounded-lg border border-slate-200 dark:border-slate-800 p-3">
                <summary className="cursor-pointer font-medium text-sm">{m.q.question.substring(0, 140)}{m.q.question.length > 140 ? '…' : ''}</summary>
                <div className="mt-3 text-xs">
                  {Object.entries(m.q.options).map(([k, v]) => {
                    const ok = (m.q.correct || '').includes(k);
                    return <div key={k} className={ok ? 'text-emerald-600 dark:text-emerald-400 font-semibold py-1' : 'text-slate-600 dark:text-slate-400 py-0.5'}>{k}. {v} {ok && '✓'}</div>;
                  })}
                  <div className="mt-2 text-xs italic text-slate-600 dark:text-slate-400">{m.q.explanation}</div>
                </div>
              </details>
            ))}
          </div>
        </div>
      )}

      {/* Knowledge */}
      {knowledge && knowledge.length > 0 && (
        <div className="p-5 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
          <h3 className="font-bold mb-3">📖 Concepts PMP pertinents</h3>
          <div className="grid sm:grid-cols-2 gap-3">
            {knowledge.map((k, i) => (
              <div key={i} className="p-3 rounded-lg bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800">
                <div className="text-xs font-bold text-brand-700 dark:text-brand-300 mb-1">{k.topic}</div>
                <div className="text-xs text-slate-600 dark:text-slate-400">{k.summary}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}
window.Assistant = Assistant;

// Root App — manages navigation between views
function App() {
  const { useState, useEffect } = React;
  const [view, setView] = useState('home');     // home | exam | study | assistant | results | review
  const [examMode, setExamMode] = useState('exam'); // 'exam' | 'mini'
  const [examData, setExamData] = useState(null);   // result of an exam session
  const [darkMode, setDarkMode] = useState(() => {
    const saved = window.PMP_HELPERS.loadSession('dark');
    if (saved !== null) return saved;
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  });

  useEffect(() => {
    document.documentElement.classList.toggle('dark', darkMode);
    window.PMP_HELPERS.saveSession('dark', darkMode);
  }, [darkMode]);

  const handleStart = (mode) => {
    if (mode === 'exam') { setExamMode('exam'); setView('exam'); }
    else if (mode === 'mini') { setExamMode('mini'); setView('exam'); }
    else setView(mode);
  };

  const handleFinish = (data) => {
    setExamData(data);
    setView('results');
    window.scrollTo({ top: 0 });
  };

  const handleAbort = () => {
    if (window.confirm('Voulez-vous vraiment abandonner cet examen ? Votre progression sera perdue.')) {
      setView('home');
    }
  };

  return (
    <div className="min-h-screen">
      <Header darkMode={darkMode} onToggleDark={() => setDarkMode(d => !d)}
        onGoHome={() => setView('home')} view={view} />

      {view === 'home' && <Home onStart={handleStart} />}
      {view === 'exam' && <ExamScreen mode={examMode} onFinish={handleFinish} onAbort={handleAbort} />}
      {view === 'study' && <StudyMode onHome={() => setView('home')} />}
      {view === 'assistant' && <Assistant onHome={() => setView('home')} />}
      {view === 'results' && examData && (
        <ResultsScreen data={examData}
          onReview={() => setView('review')}
          onRestart={() => { setView('exam'); }}
          onHome={() => setView('home')} />
      )}
      {view === 'review' && examData && (
        <ReviewScreen data={examData}
          onBack={() => setView('results')}
          onHome={() => setView('home')} />
      )}

      <footer className="mt-12 py-6 px-4 text-center text-xs text-slate-500 border-t border-slate-200 dark:border-slate-800">
        <p>Simulateur PMP — Banque de questions basée sur le PMBOK 7 et l'Agile Practice Guide.</p>
        <p className="mt-1">Application pédagogique. PMP® est une marque déposée du Project Management Institute.</p>
      </footer>
    </div>
  );
}
window.App = App;

(function() {
  const mount = () => {
    const rootEl = document.getElementById('root');
    if (!rootEl || !window.App) {
      // Wait for all babel scripts to finish processing
      return setTimeout(mount, 50);
    }
    const root = ReactDOM.createRoot(rootEl);
    root.render(React.createElement(window.App));
  };
  mount();
})();
