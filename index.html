  <style>
/* Custom styles for the PMP simulator */

* { -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { font-family: 'Inter', system-ui, sans-serif; }

/* Custom scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(100,116,139,.4); border-radius: 8px; }
::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,.7); }

/* Glass effect */
.glass {
  background: rgba(255,255,255,.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.dark .glass {
  background: rgba(15,23,42,.75);
}

/* Smooth transitions for choice cards */
.choice-card {
  transition: all .2s cubic-bezier(.4,0,.2,1);
}
.choice-card:hover { transform: translateY(-2px); }

/* Progress ring */
.progress-ring {
  transform: rotate(-90deg);
  transition: stroke-dashoffset .35s ease;
}

/* Gradient text */
.gradient-text {
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Print styles */
@media print {
  .no-print { display: none !important; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
  }
}

/* Mobile-friendly tap targets */
button, [role="button"] { min-height: 44px; }

/* Question text */
.question-text {
  line-height: 1.7;
}

/* Loading shimmer */
@keyframes shimmer {
  0% { background-position: -1000px 0; }
  100% { background-position: 1000px 0; }
}
.shimmer {
  background: linear-gradient(90deg, transparent, rgba(99,102,241,.08), transparent);
  background-size: 1000px 100%;
  animation: shimmer 2s infinite;
}

  <script type="text/babel" data-presets="env,react">
// ===== src/data/questions.js =====
// AUTO-GENERATED: 180 PMP exam questions in French with detailed explanations
window.PMP_QUESTIONS = [
  {"id": "q-0001", "question": "Un projet impliquant plusieurs fournisseurs, le chef de projet passe en revue le processus de clôture et s'aperçoit qu'il reste un solde financier inattendu. Sur quoi le chef de projet peut-il s'appuyer pour justifier la présence de ce solde?", "options": {"A": "les retours d'expérience,", "B": "l'audit d'approvisionnement,", "C": "les actifs organisationnels,", "D": "l'audit du projet."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "L'audit d'approvisionnement (procurement audit) est l'outil PMBOK 7 dedie a l'examen des processus d'approvisionnement lors de la cloture, y compris la reconciliation financiere et les soldes restants. Selon le PMBOK 7, le domaine de performance Livraison et la phase de cloture des contrats imposent un audit formel pour justifier toute anomalie financiere. Les retours d'experience (A) capturent des lecons mais ne justifient pas un solde. Les OPA (C) sont des actifs entrants, pas un outil de cloture. L'audit du projet (D) est plus large et ne cible pas la dimension contractuelle/financiere des fournisseurs.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 1},
  {"id": "q-0002", "question": "Un membre de l'équipe qui travaillait sur un nouvel outil logiciel se trouve dans un espace public et se dispute sur un codage au lieu de terminer le codage. Comment le chef de projet va gérer cette dispute et amener l'équipe à terminer la tâche?", "options": {"A": "Contacter le service ressources humaines pour informer de la dispute.", "B": "Réunir les membres dans la salle de réunion pour discuter de la nouvelle fonctionnalité et parvenir à une compréhension commune.", "C": "Prendre part à la conversation dans l'espace public en énonçant les attentes concernant la fonctionnalité et demander aux ressources de revenir au bureau.", "D": "Se mettre à proximité pour écouter la dispute et comprendre la situation et reparler avec eux une fois la dispute est terminée."}, "correct": "B", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le principe PMBOK 7 d'environnement collaboratif et de leadership, le chef de projet doit ramener le conflit dans un cadre prive et structure pour favoriser la resolution collaborative (problem-solving) et restaurer la productivite. Reunir l'equipe en salle pour parvenir a une comprehension commune adresse a la fois le comportement public inapproprie et le fond technique. Contacter les RH (A) est une escalade prematuree. Intervenir en public (C) est humiliant et inefficace. Ecouter passivement (D) laisse le conflit s'envenimer.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 2},
  {"id": "q-0003", "question": "Un projet a terminé sa première itération sur six. La performance de la livraison, entre parenthèses la vélocité, a été à 50%. Au cours de la rétrospective de l'itération, l'équipe rend compte que la complexité du travail a été sous-estimée. Que doit faire le chef de projet?", "options": {"A": "Demander le remplacement de certains membres avec plus d'expérience.", "B": "Demander au responsable technique d'aider l'équipe pour résoudre le problème.", "C": "Mettre à jour le journal de points à traiter et le faire remonter aux sponsors.", "D": "Rencontrer l'équipe pour passer en revue les mesures internes qui permettent de résoudre la situation."}, "correct": "D", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "En contexte agile, selon le principe d'equipe auto-organisee du PMBOK 7 et du Guide Agile, le chef de projet doit faciliter une revue collective avec l'equipe pour identifier les actions correctives internes apres une retrospective. Demander un remplacement (A) viole l'esprit d'equipe stable. Remettre la responsabilite au lead technique (B) court-circuite l'equipe. Faire remonter aux sponsors (C) sans avoir d'abord analyse en interne est une escalade prematuree contraire au servant leadership.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 3},
  {"id": "q-0004", "question": "Un chef de projet travaille sur plusieurs projets de construction de bâtiments selon une approche prédictive. La direction générale encourage l'inclusion de la pratique plus agile dans les méthodologies de projets actuelles. Le sponsor du projet souhaite maintenant que les projets adoptent les méthodologies plus agiles. Pour assurer l'utilisation des méthodes agiles dans un projet, que doit faire le chef de projet?", "options": {"A": "faire passer tous les projets existants à des méthodes agiles selon un calendrier strict.", "B": "suspendre les projets en cours pour les aligner sur la nouvelle cadence agile.", "C": "évaluer la culture organisationnelle et le niveau de préparation à la transformation.", "D": "fournir une formation agile aux personnes qui feront partie de l'équipe du projet."}, "correct": "C", "domain": "Process", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 et le Guide Agile insistent sur l'evaluation prealable de la culture organisationnelle et de la maturite avant toute transformation agile (Tailoring Performance Domain). Forcer une bascule (A, B) ignore le facteur humain et provoque une resistance. Former l'equipe (D) est utile mais arrive APRES l'evaluation de la preparation. Sans diagnostic prealable, aucune transformation agile n'est durable.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 4},
  {"id": "q-0005", "question": "L'équipe a identifié un risque lié à l'approvisionnement et a envoyé un e-mail au sponsor pour l'informer. Le sponsor demande au chef de projet plus de détails. Le chef de projet doit examiner avec son équipe", "options": {"A": "Plan de gestion de la qualité", "B": "Plan de gestion des risques", "C": "Plan de gestion des approvisionnements", "D": "Plan de gestion de la communication."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le plan de gestion des risques contient la methodologie, les roles, les seuils et la procedure de reporting des risques. Selon le PMBOK 7 (domaine Incertitude), c'est le document de reference pour structurer la reponse a un risque identifie. Le plan qualite (A) traite la conformite. Le plan d'approvisionnement (C) decrit le comment-acheter mais pas le traitement du risque. Le plan de communication (D) traite la diffusion d'information, pas l'analyse de risque.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 5},
  {"id": "q-0006", "question": "Un chef de projet a récemment été affecté à un projet informatique banquaire. L'équipe travaille selon une approche prédictive depuis plus de 10 ans. La direction souhaite adopter la méthode agile. Le chef de projet rencontre l'équipe pour présenter l'approche agile. La plupart des membres se sont plaints du fait de changer l'approche car les performances de l'équipe ont toujours été supérieures. Choisissez deux réponses", "options": {"A": "Organiser des sessions de formation avec l'équipe afin que celle-ci puisse comprendre l'approche agile.", "B": "Organiser une session de brainstorming avec l'équipe pour comprendre les spécificités du projet de l'équipe et identifier les autres approches possibles pour l'équipe.", "C": "Demander à l'équipe d'identifier le backlog du produit et créer un tableau Kanban.", "D": "S'entretenir avec la direction pour lui expliquer la réticence de l'équipe vis-à-vis de l'approche agile et l'inciter à demander officiellement à l'équipe de mettre en œuvre l'approche agile. E. Interroger les membres de l'équipe les plus récalcitrants pour les persuader d'essayer d'accepter l'approche agile"}, "correct": "AB", "domain": "People", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Selon le principe PMBOK 7 d'equipe et de leadership, il faut d'abord former l'equipe (A) pour lever la meconnaissance et organiser un brainstorming (B) pour co-construire l'approche la plus adaptee aux specificites du projet. Imposer un Kanban (C) avant adhesion est contre-productif. Faire remonter pour imposer par autorite (D) detruit l'engagement. Persuader individuellement les recalcitrants (E) court-circuite la dynamique collective.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 6},
  {"id": "q-0007", "question": "Un projet de recherche termine actuellement une initiative de deux ans. Le chef de projet se concentre sur les activités de clôture de projet. Que doit être considéré en priorité?", "options": {"A": "indiquer le statut d'achèvement du backlog de produit et mettre à jour le plan de management de communication,", "B": "libérer les ressources et organiser un événement pour célébrer l'aboutissement du projet,", "C": "s'assurer que les activités de transfert de connaissances sont exécutées comme prévu,", "D": "tenir une réunion de comité directeur pour l'informer de l'aboutissement du projet."}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7, lors de la cloture, le transfert de connaissances est une priorite strategique pour preserver la valeur creee et nourrir les actifs organisationnels. La capitalisation des lecons et le transfert au benefice des operations sont essentiels. Le statut backlog (A) est marginal en fin de projet predictif. La celebration et liberation (B) viennent apres le transfert formel. Le comite directeur (D) est une communication, pas la priorite operationnelle.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 7},
  {"id": "q-0008", "question": "Lors d'une dernière étape du lancement d'une nouvelle conception, les membres de l'équipe sont en conflit sur certaines fonctionnalités de la conception. Que doit faire le chef de projet?", "options": {"A": "Demander au sponsor de prendre la décision concernant les fonctionnalités.", "B": "Demander aux parties prenantes de réduire le périmètre afin de respecter les délais.", "C": "Passer en revue la conception avec les membres de l'équipe et proposer une nouvelle date de lancement.", "D": "Convoquer une réunion des parties prenantes avec les membres de l'équipe et rechercher un consensus."}, "correct": "D", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Parties prenantes et Equipe), le chef de projet doit faciliter le consensus collaboratif entre l'equipe et les parties prenantes pour resoudre un conflit de conception. Recourir au sponsor (A) est une escalade. Reduire le perimetre unilateralement (B) sacrifie la valeur. Repousser le lancement (C) ne resout pas le desaccord de fond.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 8},
  {"id": "q-0009", "question": "Un projet interagit avec d'autres projets qui se trouvent dans le même portefeuille, mais dont le développement est réalisé à l'étranger. Sur un des projets réalisés à l'international, un changement tactique a été suggéré et il doit être mis en œuvre dans ce projet. Que doit faire le chef de projet à présent?", "options": {"A": "Mettre en œuvre la demande de changement dès que possible pour éviter d'accumuler l'expansion du périmètre.", "B": "Rejeter la demande de changement car elle risque d'avoir un impact négatif sur les performances du projet.", "C": "Rester concentré sur les éléments prioritaires pendant que le changement est soumis au processus de maîtrise du changement.", "D": "Utiliser les relations de l'équipe avec les collègues à l'international pour être averti au plus tôt des changements futurs."}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7, toute demande de changement doit passer par le processus formel de maitrise integree des changements (CCB) avant mise en oeuvre. Le chef de projet doit donc maintenir le focus sur les priorites pendant que le changement suit le circuit officiel. Mettre en oeuvre immediatement (A) viole le controle des changements. Rejeter sans analyse (B) est arbitraire. S'appuyer uniquement sur des relations informelles (D) n'est pas un processus de gouvernance.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 9},
  {"id": "q-0010", "question": "Le chef de projet est affecté dans une entreprise en transition vers l'agile. Toutes les parties prenantes ne croient pas au projet et certains disent que l'ensemble du projet soit défini et planifié au début du projet. Cependant, le sponsor doit trouver une solution rapide pour assurer la conduite du projet. Quelle approche adopter pour le chef de projet?", "options": {"A": "prédictive pour une satisfaction des parties prenantes seniors.", "B": "Approche agile car cela permettrait de disposer plus tôt de fonctionnalités de travail.", "C": "Approche prédictive car cela présentera des bénéfices pour toutes les parties prenantes.", "D": "Approche hybride permettra d'atténuer les préoccupations des parties prenantes."}, "correct": "D", "domain": "Process", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (Tailoring) recommande une approche hybride lorsque coexistent des parties prenantes attachees a la planification predictive et un besoin de livraison rapide. L'hybride concilie la rigueur planificatrice avec la flexibilite agile. Tout-predictif (A, C) ignore le besoin de rapidite. Tout-agile (B) heurte les seniors qui veulent un plan. L'hybride est la reponse equilibree.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 10},
  {"id": "q-0011", "question": "L'entreprise vient de se lancer dans la gestion de projet en approche agile. Le directeur général s'inquiète du processus de la définition du périmètre pour les projets à venir. Que doit faire le chef de projet pour s'assurer que le périmètre du projet est complètement défini?", "options": {"A": "demander au directeur général d'examiner chaque exigence pour s'assurer que tous les projets permettront de livrer des produits demandés,", "B": "aider les sponsors et les parties prenantes à élaborer la vision du produit et à réunir l'équipe ainsi que le product owner pour clarifier les attentes,", "C": "rencontrer le directeur général et le convaincre de revenir à l'utilisation d'approches prédictives pour éviter tout risque,", "D": "demander une augmentation du budget pour permettre, pour mettre en œuvre un processus de double contrôle afin de s'assurer que tous les besoins sont inclus dans les exigences."}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "En agile, le perimetre emerge via une vision produit co-construite entre sponsors, parties prenantes, Product Owner et equipe (PMBOK 7, domaine Planification + Guide Agile). Faire valider chaque exigence par le DG (A) est lourd et non agile. Revenir au predictif (C) trahit l'engagement initial. Augmenter le budget (D) ne resout pas la definition de perimetre.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 11},
  {"id": "q-0012", "question": "Une chaine de vente au détail évalue un projet visant à remplacer le système de paiement dans tous les magasins. Sur plusieurs sites, le projet ne franchit pas le seuil identifié, mais devrait également augmenter la part du marché, améliorer les services à la clientèle et fidéliser davantage les clients. Le projet est prévu comme une mise en œuvre progressive, en s'appuyant sur l'apprentissage à partir des rétrospectives au cours de chaque phase. Comment l'entreprise doit-elle augmenter la valeur du marché du projet?", "options": {"A": "Quantifier les bénéfices tangibles et intangibles attendus dans le plan de gestion des bénéfices pour chaque phase.", "B": "Consulter les experts sur les méthodes de réduction des coûts et d'augmentation de la valeur financière du projet.", "C": "Demander aux responsables des bénéfices de réévaluer les risques identifiés ayant un impact sur les résultats des bénéfices financiers avec le responsable du bénéfice.", "D": "Utiliser un diagramme en arête de poisson pour trouver la cause de baisse de bénéfice avec le responsable des bénéfices."}, "correct": "A", "domain": "Business", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (domaine Livraison de valeur) impose de quantifier benefices tangibles et intangibles dans le plan de gestion des benefices, phase par phase, pour piloter la valeur d'un projet incremental. Reduire les couts (B) est marginal face a la valeur de marche. Reevaluer uniquement les risques (C) est defensif. Un Ishikawa (D) sert a une cause-racine, pas a augmenter la valeur.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 12},
  {"id": "q-0013", "question": "Un Directeur du bureau des projets (PMO) constate que les chefs de projets du développement logiciel ne demandent pas systématiquement l'approbation des chefs de division dans le domaine de la cybersécurité et des opérations avant de déployer le code en production. Le directeur du PMO demande aux chefs de projet de mettre au point une solution à ce problème. Que doit faire le chef de projet pour corriger le problème?", "options": {"A": "Organiser un daily scrum et inviter les chefs de division à y participer afin qu’ils puissent être informés des prochaines releases de code.", "B": "Lancer une structure de gouvernance d'entreprise composée de chefs de division afin de mettre en place des politiques pour les releases de code.", "C": "Créer une nouvelle politique exigeant des chefs de projet qu'ils envoient un email aux chefs de division avant de déployer le code en production", "D": "Fournir aux chefs de division un numéro de téléphone de visioconférence s'ils ont des préoccupations après le déploiement du code en production"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (principe de Stewardship et de Gouvernance) recommande une structure de gouvernance formelle pour institutionnaliser les approbations multi-divisions. Une simple inclusion des chefs de division en daily (A) est insuffisante et n'institutionnalise rien. Un email unilateral (C) ne cree pas de policy. Une simple ligne de visio (D) est reactive. La gouvernance d'entreprise garantit le respect systematique.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 13},
  {"id": "q-0014", "question": "L'équipe de projet planifie à échéancier avec des informations limitées. L'équipe a des difficultés à identifier les tâches détaillées et à estimer leur durée. Quelles sont les trois techniques à utiliser ? Choisissez trois réponses?", "options": {"A": "Estimation relative pour déterminer la taille des tâches ou des livrables.", "B": "Diagramme de Gantt incluant les jalons et les échéanciers.", "C": "Iterations et revues pour continuer à adapter le plan en permanence.", "D": "Planification en vague et approche adaptative. E. Estimation ascendante basée sur un organigramme des travaux WBS."}, "correct": "ACD", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Guide Agile et le PMBOK 7 (planification adaptative), avec des informations limitees on utilise: l'estimation relative (A) via story points, les iterations et revues (C) pour adapter en continu, et la planification en vague (D) pour preciser le proche et garder le lointain en grain large. Le Gantt detaille (B) est inadapte sans visibilite. L'estimation ascendante via WBS (E) suppose un perimetre detaille, contraire a l'hypothese.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 14},
  {"id": "q-0015", "question": "Le chef de projet commence à travailler dans une entreprise de construction. Le chef de projet veut mettre en œuvre des pratiques agiles qui sont pertinentes pour le projet. Que doit faire le chef de projet pour obtenir l'adhésion des différentes parties prenantes?", "options": {"A": "Formation en intelligence émotionnelle,", "B": "Formation en communication,", "C": "Formation agile,", "D": "Formation en négociation."}, "correct": "C", "domain": "People", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Pour obtenir l'adhesion a une demarche agile, la formation agile (PMBOK 7, principe d'equipe + Guide Agile) est l'investissement de base qui permet aux parties prenantes de comprendre les benefices et les pratiques. L'intelligence emotionnelle (A), la communication (B) et la negociation (D) sont utiles mais ne traitent pas la meconnaissance specifique de l'agile.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 15},
  {"id": "q-0016", "question": "Une entreprise souhaite augmenter la valeur commerciale d'un produit sur le marché, sur un marché hautement concurrentiel. Pour ce faire, elle consacre un projet et crée un prototype. L'équipe construit un prototype de façon incrémentielle. Quelles mesures le chef de projet doit-il prendre en priorité?", "options": {"A": "S'assurer que le sponsor est au courant de la date de mise sur le marché,", "B": "Fournir une valeur commerciale dès que possible,", "C": "Insister sur l'utilisation de la méthodologie Kanban,", "D": "Mettre en œuvre un cycle de planifier, dérouler, contrôler, agir, (PDCA)."}, "correct": "B", "domain": "Business", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le principe PMBOK 7 de Valeur et le Guide Agile, livrer de la valeur commerciale au plus tot (early value delivery) est la priorite absolue d'un developpement incremental sur un marche concurrentiel. Informer le sponsor de la date (A) est secondaire. Imposer Kanban (C) ou PDCA (D) est un choix d'outil, pas une priorite de valeur.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 16},
  {"id": "q-0017", "question": "Une organisation peine à démarrer un projet important. Le chef de projet a identifié la définition du périmètre comme l'élément principal empêchant le démarrage du projet, afin que la plupart des éléments du périmètre soient définis et convenus entre les parties prenantes, il reste quelques éléments difficiles à appréhender et très complexes à définir à ce stade. Que doit faire le chef de projet?", "options": {"A": "Proposer que les éléments bien définis du périmètre soient livrés selon une approche prédictive et utiliser une approche agile pour traiter les éléments complexes.", "B": "Maintenir la dynamique des parties prenantes sur la définition du périmètre jusqu'à parvenir à un périmètre complet et détaillé.", "C": "Mettre à jour le registre des risques et faire remonter le problème au PMO.", "D": "diviser le projet en deux projets plus petits afin de travailler exclusivement dans un environnement agile sans l'interférence d'une approche prédictive."}, "correct": "A", "domain": "Process", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (Tailoring) recommande explicitement une approche hybride lorsqu'une partie du perimetre est stable et l'autre incertaine: predictif pour le bien defini, agile pour le complexe. Attendre une definition complete (B) bloque le projet. Escalader au PMO (C) sans proposition est passif. Scinder en deux projets (D) cree de la complexite administrative inutile.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 17},
  {"id": "q-0018", "question": "Le chef de projet invite le directeur général, le sponsor, l'équipe et un représentant du client externe à assister à une réunion dans le but d'analyser le plan de management de projet. Le chef de projet commence à présenter le budget quand le directeur général demande soudainement à mettre fin à la réunion. Qu’aurait dû faire le chef de projet pour éviter cette situation?", "options": {"A": "Examiner le plan de gestion de communication avant d'inviter un représentant externe.", "B": "Examiner le plan de gestion des coûts avec les participants internes et le directeur général avant d'inviter un représentant du client externe.", "C": "Envoyer les dispositives de la présentation aux participants internes en premier lieu, puis au représentant du client externe avant la réunion.", "D": "Réaliser une analyse de cause originale avec le représentant du client externe et consigner les conclusions dans le registre de retour d'expérience."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Stewardship et de Communication), les sujets financiers sensibles doivent etre revus en interne avant exposition a un client externe. Le chef de projet aurait du valider le plan de couts avec les internes et le DG avant d'inviter le client. La revue du plan de communication seul (A) ne traite pas la confidentialite financiere. Pre-diffuser les slides (C) ne resout pas le probleme de confidentialite. L'analyse de cause apres coup (D) arrive trop tard.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 18},
  {"id": "q-0019", "question": "Un chef de projet a récemment rejoint une petite entreprise. Le directeur des opérations de l'entreprise a demandé à l'équipe d'ignorer certaines étapes du processus afin de travailler plus rapidement. Le chef de projet veut s'assurer que ces étapes ne seront pas omises à l'avenir. Que doit faire le chef de projet?", "options": {"A": "Consigner un nouveau risque dans le plan de gestion des risques.", "B": "Réaliser une estimation ascendante des activités.", "C": "Demander des ressources supplémentaires et passer en revue l'estimation du projet.", "D": "Examiner les actifs organisationnels, OPA, et procéder à des estimations par analogie."}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Incertitude), tout comportement qui peut compromettre les processus doit etre consigne au registre des risques pour suivi et reponse. Demande du DOP de sauter des etapes = risque qualite/conformite. L'estimation ascendante (B) ou par analogie (D) n'a aucun lien avec le probleme. Demander plus de ressources (C) n'adresse pas la cause.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 19},
  {"id": "q-0020", "question": "Un chef de projet reçoit une demande d'ajout de fonctionnalité alors que le périmètre a déjà été posé. Que doit faire le chef de projet?", "options": {"A": "Suivre le processus de gestion des risques.", "B": "Processus de gestion des changements.", "C": "Processus de gestion des exigences.", "D": "Processus d'engagement des parties prenantes."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Toute demande d'ajout de fonctionnalite apres validation du perimetre doit passer par le processus formel de gestion des changements et le CCB (PMBOK 7, principe d'Adaptation). Le processus de risques (A) n'est pas le canal de modification de perimetre. Le processus d'exigences (C) est en amont. L'engagement des parties prenantes (D) ne valide pas un changement.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 20},
  {"id": "q-0021", "question": "Le chef de projet agile a remarqué qu'un membre de l'équipe développe des connaissances approfondies sur un sujet spécifique. Les autres membres ont probablement besoin de ces connaissances à l'avenir. Que doit faire le chef de projet agile?", "options": {"A": "Évaluer et réaffecter des tâches de développement à un fournisseur local qui a travaillé sur des projets précédents.", "B": "Déterminer les besoins de communication, l'environnement et les outils nécessaires pour faire passer le message.", "C": "Passer en revue les retours d’expériences des projets précédents et les actifs organisationnels (OPA).", "D": "Documenter le risque dans le plan de gestion des risques et utiliser les réserves pour aléas pour embaucher un fournisseur local."}, "correct": "B", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Equipe et de Communication), pour partager une expertise concentree sur un membre, il faut planifier les besoins en communication, le format et les outils (knowledge sharing, pair programming, communautes de pratique). Recourir a un fournisseur (A) ou aux reserves (D) cree un risque sans traiter la cause. Examiner les OPA (C) ne diffuse pas la connaissance vivante.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 21},
  {"id": "q-0022", "question": "L'équipe effectue la planification du sprint. D’après l'effort estimé, seulement 95% des éléments inclus dans le sprint pourront être livrés. Le Product Owner demande au chef de projet des conseils sur la façon de prioriser les éléments du backlog", "options": {"A": "Risque pour la livraison,", "B": "Complexité technique,", "C": "Valeur commerciale,", "D": "Exactitude de l'estimation."}, "correct": "C", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Le Guide Agile et le PMBOK 7 (Livraison de valeur) imposent la priorisation par valeur commerciale (business value) en tete des criteres du Product Owner. Le risque (A), la complexite (B) et l'exactitude d'estimation (D) sont des criteres secondaires utilises pour affiner, mais la valeur business est premiere.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 22},
  {"id": "q-0023", "question": "Le chef de projet travaille en tant que leader serviteur pour un projet pilote visant à adopter des pratiques agiles. Après trois sprints, l'équipe fait une démonstration du produit aux principales parties prenantes, mais reçoit des commentaires négatifs sur les fonctionnalités du produit. L'équipe estime que toutes les fonctionnalités ont répondus aux critères d'acceptation définis par le product owner (représentant métier) et ne comprend pas ce qui s'est passé. Que doit faire le chef de projet pour atténuer le rejet du produit?", "options": {"A": "Demander à l'équipe de décider collectivement de la façon de soutenir l'équipe.", "B": "Effectuer des cérémonies sans les membres de l'équipe et leur envoyer des notes par e-mail.", "C": "Procéder à des cérémonies distinctes avec ces membres de l'équipe pour leur permettre de rester sur le projet.", "D": "Évaluer d'autres options et essayer de trouver des ressources ayant des compétences similaires."}, "correct": "A", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de servant leadership et d'equipe auto-organisee), le chef de projet doit laisser l'equipe decider collectivement comment se reorganiser pour mieux capter le feedback parties prenantes. Tenir des ceremonies sans l'equipe (B) ou separer les membres (C) viole l'auto-organisation. Remplacer les ressources (D) est une escalade contre-productive.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 23},
  {"id": "q-0024", "question": "Les membres de l'équipe de projet se connaissent depuis plusieurs années. Un nouveau membre vient d'intégrer l'équipe. Il arrive de l'étranger et semble avoir du mal à intégrer. La frustration monte au sein de l'équipe du projet car le nouveau membre fait preuve de lenteur dans l'exécution des activités relevant de ce métier. Que doit faire le chef de projet?", "options": {"A": "encourager l'équipe du projet en place à mieux intégrer le nouvel arrivant ?", "B": "Programmer une activité de développement de l'esprit d'équipe pour renforcer la cohésion de l'équipe et l'intégration.", "C": "Revoir la stratégie de communication de l'équipe.", "D": "s'entretenir en privé avec le nouveau membre de l'équipe."}, "correct": "D", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Leadership et intelligence emotionnelle), avant toute action collective, le chef de projet doit s'entretenir en prive avec le nouveau membre pour comprendre les difficultes d'integration et trouver un soutien personnalise. Encourager l'equipe (A) ou lancer un team building (B) sans diagnostic est premature. Revoir la strategie de communication (C) ne traite pas la cause individuelle.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 24},
  {"id": "q-0025", "question": "Un chef de projet a été choisi pour livrer une des solutions phares d'une entreprise. Les facteurs de réussite essentiels incluent l'agilité, l'adaptation au marché et une réponse rapide aux offres du marché. Quelle est l'une des activités clés que le chef de projet doit entreprendre pour assurer la réussite de l'entreprise?", "options": {"A": "demander aux Scrum Masters d'assister aux ateliers.", "B": "Inviter les membres de l'équipe Scrum en tant que participants facultatifs.", "C": "Demander aux membres de l'équipe Scrum de partager des rétrospectives.", "D": "Inviter les membres de l'équipe Scrum en tant que participants obligatoires."}, "correct": "D", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Guide Agile et le PMBOK 7 (principe d'engagement des parties prenantes), pour assurer agilite et adaptation au marche, les membres Scrum doivent etre invites comme participants OBLIGATOIRES aux ateliers strategiques afin de garantir reactivite et alignement. Les rendre facultatifs (B) ou se limiter aux Scrum Masters (A) reduit l'agilite. Le partage de retrospectives (C) est insuffisant.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 25},
  {"id": "q-0026", "question": "L'équipe travaille depuis deux mois et a toujours manqué les user stories (les récits) prévus. Comment le chef de projet doit-il régler ce problème?", "options": {"A": "Favoriser la modification de la durée de l'itération afin de respecter les engagements.", "B": "S'assurer que la taille du sprint est appropriée pour la durée de l'itération.", "C": "Recruter une ressource hautement qualifiée pour renforcer les compétences.", "D": "Songer à avoir recours à un système de récompense pour encourager une livraison en temps opportun."}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Guide Agile, lorsqu'une equipe rate systematiquement ses engagements de sprint, la cause premiere est souvent un dimensionnement inadequat du sprint par rapport a la capacite/velocite reelle. Ajuster la taille du sprint a la duree de l'iteration (B) est la reponse appropriee. Changer la duree d'iteration (A) sans diagnostic est arbitraire. Recruter (C) ou recompenser (D) ne traite pas la cause systemique.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 26},
  {"id": "q-0027", "question": "Lors d’un suivi d’un livrable, un membre de l'équipe explique au chef de projet ses difficultés à travailler avec un autre membre de l'équipe. Il affirme que l'autre membre de l'équipe, qui est un responsable fonctionnel, est souvent agressif et sur la défensive pendant les réunions. Comment le chef de projet doit-il gérer cette situation?", "options": {"A": "Compétence des membres de l'équipe,", "B": "Avis des parties prenantes du projet,", "C": "Indicateurs clés de performance (KPI) convenus,", "D": "Commentaires du sponsor du projet."}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Mesure et de Leadership), face a un conflit comportemental avec un responsable fonctionnel, le chef de projet doit s'appuyer sur des KPI objectifs convenus pour depersonnaliser le debat et resoudre la situation factuellement. Les avis subjectifs (B), les commentaires sponsor (D) ou la simple competence (A) ne fournissent pas la base objective de resolution.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 27},
  {"id": "q-0028", "question": "À la fin du premier sprint, un chargé de projet remarque qu'un des membres de l'équipe n'est pas très performant. Quelle forme de communication le chargé de projet doit-il utiliser pour gérer la situation?", "options": {"A": "communication verbale informelle, par exemple une conversation.", "B": "communication écrite formelle, par exemple un email en mettant le responsable en copie.", "C": "communication écrite informelle, par exemple un rappel amical.", "D": "communication verbale formelle, par exemple une conversation à la fin de la retrospective du sprint"}, "correct": "A", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Communication et Leadership), pour une premiere intervention sur une performance individuelle, la communication verbale informelle (conversation en tete-a-tete) est appropriee et respectueuse. L'email formel avec copie au manager (B) escalade brutalement. Un rappel ecrit informel (C) est moins efficace qu'un echange direct. Une conversation formelle apres retro (D) expose publiquement la personne.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 28},
  {"id": "q-0029", "question": "Une grande entreprise passe d'une approche prédictive à une approche agile. Une équipe de projet connaissant les pratiques agiles fait face à de sérieux conflits avec les cadres quant aux processus à suivre. Comment résoudre ces conflits?", "options": {"A": "Négocier avec les cadres et convenir un processus.", "B": "Former les cadres sur les pratiques agiles.", "C": "Inclure les cadres dans les rétrospectives d'équipe.", "D": "Demander aux cadres d'utiliser les pratiques agiles."}, "correct": "B", "domain": "People", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Equipe et de Leadership), la cause-racine du conflit entre cadres et equipe est la meconnaissance des pratiques agiles. Former les cadres (B) leve cette cause. Negocier le processus (A) est un compromis sur le fond. Inclure en retrospective (C) est insuffisant si la base manque. Imposer l'agile (D) cree de la resistance.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 29},
  {"id": "q-0030", "question": "Un chef de projet se rend compte que les membres de l'équipe ne connaissent pas l'approche hybride et ne voient pas l'intérêt des stand-up quotidiens. Les membres de l'équipe arrivent souvent en retard, détournent la discussion sur la recherche de solutions ou ne viennent tout simplement pas en réunion. Comment le chef de projet doit-il améliorer cette situation avec l'équipe du projet?", "options": {"A": "demander au sponsor d'ajouter des professionnels expérimentés à l'équipe,", "B": "apporter aux membres de l'équipe le coaching et le mentorat nécessaires,", "C": "approuver le programme de formation approprié pour les membres de l'équipe,", "D": "dédier une ressource à la vérification de la qualité à chaque étape."}, "correct": "B", "domain": "People", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Equipe et Leadership), face a une equipe qui ne comprend pas l'approche hybride, le chef de projet doit fournir coaching et mentorat pour faire monter l'equipe en competence. Ajouter des seniors (A) ne resout pas le deficit de comprehension. Approuver une formation (C) est plus passif que coacher au quotidien. Dedier un controleur qualite (D) traite un symptome, pas la cause.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 30},
  {"id": "q-0031", "question": "Un projet de migration de système en est à l'étape de clôture. Le chef de projet subit des pressions pour clore le projet. Le chef de projet a communiqué avec toutes les parties prenantes, mais le dernier service à migrer indique qu'il n'a pas reçu la notification. Que doit faire le chef de projet?", "options": {"A": "Clore le projet et demander au responsable d'ouvrir un ticket auprès du centre d'assistance.", "B": "Consigner le problème et l'affecter aux membres de l'équipe du projet.", "C": "Faire remonter le problème au sponsor du projet et à la direction générale", "D": "signaler le problème lors de la prochaine réunion sur l'état d'avancement à la fin de la semaine."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7, un point ouvert detecte en cloture doit etre consigne au journal des points a traiter et affecte pour resolution avant cloture. Clore en ignorant (A) est non-conforme. Escalader directement au sponsor (C) est premature. Attendre la prochaine reunion (D) retarde la cloture. La consignation et affectation est la pratique correcte.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 31},
  {"id": "q-0032", "question": "Une entreprise a décidé de lancer un projet visant à éliminer un canal de vente qui n'est pas rentable depuis trois ans. Certains membres de l'équipe du projet sont pessimistes à l'égard du projet. Que doit faire le chef de projet dans cette situation?", "options": {"A": "Fournir au monde de l'équipe des instructions claires et précises sur les objectifs et l'état du projet.", "B": "Faire remonter les préoccupations de l'équipe et demander aux sponsors du projet de modifier la composition de l'équipe.", "C": "Demander aux responsables fonctionnels de décrire directement l'impact du projet à l'équipe.", "D": "Communiquer l'impact et les plans du projet afin de mobiliser l'équipe tout au long du projet."}, "correct": "D", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Engagement et de Leadership), face a une equipe pessimiste sur un projet d'elimination, le chef de projet communique l'impact et les plans pour mobiliser l'equipe sur le sens du projet. Donner uniquement des instructions (A) ne mobilise pas. Demander un changement d'equipe au sponsor (B) est une escalade evitable. Faire intervenir les fonctionnels (C) court-circuite la relation directe.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 32},
  {"id": "q-0033", "question": "Un nouveau système de communication d'une entreprise comprendra des rapports en ligne sous forme de tableaux de bord. Le conseil d'administration peut recevoir des rapports de performance bi-hebdomadaires grâce aux tableaux de bord en ligne. Que doit faire le chef de projet?", "options": {"A": "Mettre à jour le plan de gestion de la communication.", "B": "Revoir le plan de gestion de la configuration.", "C": "Mettre à jour le plan d'engagement des parties prenantes.", "D": "Revoir le plan de management du projet."}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "L'introduction d'un nouveau canal (dashboard en ligne pour le board) modifie les besoins en communication: le plan de gestion de la communication doit etre mis a jour (PMBOK 7, domaine Parties prenantes). Le plan de configuration (B) gere les versions. Le plan d'engagement (C) est complementaire mais ce sont les besoins de communication qui sont impactes. Le plan global (D) est trop large.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 33},
  {"id": "q-0034", "question": "Un chef de projet utilise une approche agile. Au cours de la réunion de planification du sprint, le Product Owner attire l'attention sur un élément du backlog qui, à la fois, apporte une grande valeur commerciale et est facile à mettre en œuvre. Mais les autres membres de l'équipe identifient une forte dépendance de cet élément à un autre élément signalé comme étant de faible valeur commerciale et de grande complexité. Que doit faire le chef de projet pour faciliter la priorisation du backlog", "options": {"A": "Animer la discussion jusqu'à ce que l'équipe parvienne à un accord sur tous éléments.", "B": "Donner la priorité à l'élément signalé comme ayant une valeur commerciale élevée et une faible complexité pour le sprint.", "C": "Donner la priorité à l'élément signalé comme une dépendance avec une faible valeur commerciale et une complexité élevée.", "D": "Aider l'équipe à reporter les éléments suivants pour ce que l'équipe en saura plus."}, "correct": "A", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Guide Agile et le PMBOK 7 (Equipe), face a une dependance forte revelee en planning, le chef de projet facilite la discussion d'equipe pour parvenir a un accord eclaire incluant la dependance. Prioriser l'element seul (B) ignore la dependance. Prioriser le dependant complexe (C) ou reporter (D) sans discussion ne respecte pas le processus collaboratif.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 34},
  {"id": "q-0035", "question": "Le chef de projet souhaite voir combien de nouveaux projets dans le cadre duquel un produit doit être livré à la fin de l'année. Le chef de projet a été informé par le fournisseur qu'un composant fondamental n'a pas pu être livré à temps, ce qui aura un impact sur les échéanciers. Que doit faire le chef de projet à présent pour minimiser l'impact sur le projet?", "options": {"A": "Passer en revue et mettre à jour le journal des points traités et déterminer si d'autres composants peuvent être proposés.", "B": "Programmer une réunion avec toutes les parties prenantes pour reporter l'échéancier du projet.", "C": "Remplacer le fournisseur par un nouveau qui sera en mesure de proposer le composant à temps.", "D": "Ajouter un point à l'ordre de la prochaine revue d'état du projet pour informer les parties prenantes du problème du fournisseur."}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Incertitude et Livraison), face a un retard fournisseur, le chef de projet doit d'abord mettre a jour le journal des points a traiter et evaluer des alternatives techniques (autres composants). Reporter l'echeance (B) sacrifie l'engagement. Changer de fournisseur (C) sans analyse est radical. Simplement informer en revue d'etat (D) est trop passif.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 35},
  {"id": "q-0036", "question": "Le projet prend retard en raison des délais dans la réception des équipements. Cela affecte de nombreuses autres activités. Le gestionnaire responsable de la livraison des équipements informe le chef de projet d'un problème de capacité avec l'équipe qui effectue l'installation. Qu’aurait dû faire le chef de projet pour empêcher que cette situation se produise?", "options": {"A": "procéder des revues périodiques avec le gestionnaire sur la disponibilité des ressources.", "B": "Consulter régulièrement l'équipe d'installation pour vérifier l'absence de conflit.", "C": "Demander au gestionnaire de suivre le plan de gestion des ressources convenu.", "D": "Définir plus clairement les compétences → pertinent à long terme, mais cela n’empêche pas directement les retards dus à la disponibilité."}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le PMBOK 7 (domaine Equipe et Planification) impose des revues periodiques avec les responsables de ressources pour anticiper les conflits de capacite. Des revues regulieres auraient revele le probleme de capacite en amont. Consulter l'equipe d'installation (B) est utile mais c'est avec le manager-resource que se gere la capacite. Le simple respect du plan (C) sans suivi reel est passif. Definir les competences (D) ne previent pas l'indisponibilite.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 36},
  {"id": "q-0037", "question": "Pendant l'exécution d'un projet dans une fonction opérationnelle, le chef de projet fait face à des changements de périmètre et à un retard dans la livraison des tâches critiques. Comment le chef de projet doit- il gérer cette situation?", "options": {"A": "Lancer la demande de changement pour modifier le périmètre et ajuster les délais.", "B": "Organiser une réunion d'équipe pour décider si les changements doivent être inclus.", "C": "Communiquer les préoccupations du PMO au cours des rapports hebdomadaires sur le projet.", "D": "Effectuer une analyse d'impact et présenter les résultats au comité directeur pour approbation."}, "correct": "D", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Adaptation et de Gouvernance), face a un changement de perimetre majeur, le chef de projet realise une analyse d'impact et la presente au comite directeur (CCB) pour approbation. Lancer une demande de changement (A) est correct mais l'analyse d'impact est prealable. Decider en interne (B) court-circuite la gouvernance. Communiquer au PMO (C) ne resout pas la decision.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 37},
  {"id": "q-0038", "question": "Un nouveau vice-président du marketing vient de rejoindre une startup éditrice de logiciels et craint que le modèle agile ne procure pas le niveau de responsabilité requis par son rôle. Que doit faire le chef de projet pour que le vice-président soit confiant dans le fait que le projet respectera ses accords?", "options": {"A": "Exiger la validation appropriée de toutes les exigences par le vice-président du marketing et documenter formellement les accords.", "B": "Établir un comité d'examen exécutif où toutes les parties prenantes examinent et approuvent les fonctionnalités et les exigences.", "C": "Favoriser un environnement de communication ouvert où toutes les parties prenantes peuvent discuter des problèmes et s'entendre sur les objectifs.", "D": "Profiter des sessions de revue-démonstration avec le vice-président pour acter que les accords ont été respectés."}, "correct": "D", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le Guide Agile et le PMBOK 7 (principe d'Engagement des parties prenantes), les sessions de revue-demo sont le mecanisme natif pour donner aux parties prenantes la visibilite et la responsabilite qu'elles attendent. Exiger une validation prealable de tout (A) tue l'agilite. Creer un comite d'examen (B) recreate de la lourdeur predictive. Favoriser la communication ouverte (C) est utile mais moins concret que la demo formelle.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 38},
  {"id": "q-0039", "question": "Le chef de projet d'une entreprise a été chargé de superviser un projet d'expérience client. Dans le cadre du projet, la satisfaction client est une préoccupation majeure. De nombreuses questions client non résolues s'accumulaient au quotidien. Le chef de projet a été informé que l'équipe de service clientèle était submergée par ces questions non résolues. Quelles sont les deux actions que le chef de projet doit entreprendre pour remédier à ce problème ? Choisissez deux réponses?", "options": {"A": "Demander à la direction générale de remplacer le responsable du service clientèle par un responsable qualifié.", "B": "Confirmer l'existence réelle des problèmes en menant une enquête et d'autres analyses susceptibles de détecter les véritables problèmes.", "C": "Demander à l'équipe du service clientèle de traiter en priorité les questions reçues cette semaine.", "D": "Déployer des solutions pour suivre, prioriser et résoudre les questions dans les meilleurs délais. E. Contacter les clients par l'eau et les informer que les problèmes sont en cours de traitement."}, "correct": "BD", "domain": "Process", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Mesure et Livraison), il faut d'abord confirmer le probleme par enquete et analyse (B) puis deployer des solutions de tracking et priorisation (D). Remplacer un manager (A) est une escalade injustifiee. Traiter en priorite la semaine (C) est un palliatif. Informer les clients (E) sans solution structurelle aggrave le ressenti.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 39},
  {"id": "q-0040", "question": "Un projet nécessite l'acquisition d'une grande quantité d'équipements qui doivent être présents sur site avant que toute autre activité ne puisse commencer. Le service des achats a un long processus d'approbation. Que doit faire le chef de projet?", "options": {"A": "Contacter le fournisseur qui a fourni des équipements similaires pour un projet précédent.", "B": "Travailler avec une équipe de gestion des approvisionnements pour trouver d'autres options.", "C": "Demander aux sponsors du projet d'accélérer le processus de sélection du fournisseur.", "D": "Utiliser les équipements existants et les remplacer ultérieurement par de nouveaux équipements."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Approvisionnement et Tailoring), le chef de projet travaille avec l'equipe achats pour explorer des options alternatives (contrats-cadres, fournisseurs pre-approuves) qui respectent le processus tout en accelerant. Contacter un fournisseur unilateralement (A) court-circuite les achats. Demander au sponsor d'accelerer (C) est une escalade. Utiliser puis remplacer (D) cree des risques techniques.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 40},
  {"id": "q-0041", "question": "Le chef de projet est nommé pour gérer un projet d'infrastructure qui couvre plusieurs pays, y compris différents fuseaux horaires au sein d'une sous-région. La plupart des membres de l'équipe du projet ne se rencontreront probablement jamais, mais ils devront collaborer pour s'assurer que les livrables sont atteints. Que doit faire le chef de projet pour favoriser la collaboration entre les membres de l'équipe du projet malgré la distance?", "options": {"A": "Prévoir une méthode de communication et permettre aux membres de l'équipe du projet d'interagir virtuellement.", "B": "Définir les règles de base et identifier un plan de contingence dans le registre des risques.", "C": "Discuter des préoccupations avec le sponsor du projet et modifier la charte du projet pour augmenter le budget pour les interactions.", "D": "Créer une plateforme de type groupe sur les réseaux sociaux pour l'équipe afin d'instaurer une entraide."}, "correct": "A", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Equipe et principe d'environnement collaboratif), pour une equipe virtuelle multi-fuseaux, le chef de projet planifie une methode de communication et fournit les outils d'interaction virtuelle. Definir des regles + plan de contingence (B) ne traite pas la collaboration quotidienne. Modifier la charte/budget (C) est lourd. Un reseau social informel (D) n'est pas structurant.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 41},
  {"id": "q-0042", "question": "Une annonce orage signale qu'un nouveau membre à mobilité réduite rejoint l'équipe Scrum. Le Scrum Master est conscient que certains membres de l'équipe ne sont pas à l'aise de la façon dont la dynamique de l'équipe va évoluer. Que doit faire le Scrum Master?", "options": {"A": "Créer un plan d'engagement des parties prenantes.", "B": "Organiser une réunion pour discuter des aménagements que l'équipe devra prendre.", "C": "Concevoir un plan de gestion de la communication.", "D": "Mettre à jour la charte d'équipe en conséquence. Partie 2"}, "correct": "B", "domain": "People", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Equipe et de Leadership inclusif), pour accueillir un membre a mobilite reduite, le Scrum Master organise une reunion d'equipe pour discuter ouvertement des amenagements necessaires. Le plan d'engagement (A) ou de communication (C) sont des artefacts; la charte d'equipe (D) peut etre mise a jour APRES la discussion. La discussion ouverte est l'action premiere.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 42},
  {"id": "q-0043", "question": "Dans un projet marketing basé sur des itérations, un produit doit être lancé à la sixième itération. Dans la démo de la troisième itération, l'équipe marketing indique qu'elle a besoin de cinq itérations pour lancer le produit et qu'elle n'a pas encore commencé. Qu'aurait dû faire l'équipe du projet pour éviter ce problème?", "options": {"A": "Joindre à joindre une note au plan de management du projet au sujet du membre de l'équipe,", "B": "Enregistrer la contribution du membre de l'équipe dans la matrice responsabilité RACI,", "C": "Envoyer une communication à la direction soulignant les contributions du membre de l'équipe,", "D": "Organiser une réunion d'équipe projet dédiée à la contribution du membre de l'équipe et rédiger un compte-rendu"}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Planification + Equipe) et le Guide Agile, une matrice RACI ou une cartographie claire des contributions aurait revele en amont que l'equipe marketing ne pourrait pas livrer dans les delais prevus. Ajouter une note au plan (A) ne clarifie pas la responsabilite. Une communication retrospective (C) ou une reunion de reconnaissance (D) ne previennent pas le manque d'engagement initial.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 43},
  {"id": "q-0044", "question": "Un projet de transformation d'entreprise comporte un plan de livraison en quatre phases. L'équipe du projet a réussi à livrer une phase du projet. Afin d'améliorer les performances de l'équipe et de favoriser l'autonomie de ses membres, quelles sont les deux mesures que le chef de projet doit prendre ? Choisissez deux réponses?", "options": {"A": "Organiser et affecter les membres de l'équipe à des tâches qui correspondent à leurs points forts.", "B": "Examiner minutieusement toutes les décisions avant exécution.", "C": "Laisser les membres de l'équipe prendre des décisions dans une certaine limite.", "D": "Aider les membres de l'équipe à prendre des décisions dans leur domaine de compétence. E. Encourager les membres de l'équipe à confirmer les décisions auprès du chef de projet."}, "correct": "CD", "domain": "People", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Leadership et Equipe autonome), pour favoriser l'autonomie il faut laisser l'equipe decider dans un perimetre defini (C) et l'aider a decider dans son domaine de competence (D). Affecter selon les forces (A) est utile mais ne developpe pas l'autonomie. Examiner toutes les decisions (B) ou exiger confirmation systematique (E) est contraire a l'autonomisation.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 44},
  {"id": "q-0045", "question": "Un chef de projet est affecté à un projet étendu dans le temps et avec un périmètre complexe. Le client a besoin d'un plan général à long terme aussi que de quelque chose qui fonctionnera immédiatement de manière à ajouter des fonctionnalités au produit au fur et à mesure de la progression du projet. Comment le chef de projet doit-il planifier et livrer ce projet?", "options": {"A": "Planifier le projet avec une approche prédictive à l'aide d'un organigramme des travaux du projet WBS, puis l'exécuter à l'aide d'une approche agile pour livrer la valeur par incrément.", "B": "Planifier le projet avec une approche prédictive et un organigramme des travaux du projet WBS en suivant le plan et livrer la valeur à la fin du projet.", "C": "Choisir une approche agile et gérer le projet conformément aux meilleures pratiques pour garantir la livraison de la valeur au client.", "D": "Convenir avec le client d'un produit minimum viable MVP à livrer immédiatement puis distribuer le reste du périmètre à la fin du projet."}, "correct": "A", "domain": "Process", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (Tailoring), un projet long avec besoin de plan long-terme ET livraison incrementale est l'archetype de l'hybride: WBS predictif pour structurer l'ensemble, executes en increments agiles pour livrer la valeur progressivement. Tout-predictif (B) ne livre pas tot. Tout-agile (C) prive du plan long-terme demande. MVP + tout-en-fin (D) est incoherent.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 45},
  {"id": "q-0046", "question": "Un ressource potentiellement qualifié de l'équipe a reçu une offre d'emploi et quittera bientôt le projet. Que doit faire le chef de projet pour maintenir les performances du projet pendant l'intégration d'un nouveau membre à l'équipe?", "options": {"A": "Motiver le nouveau membre pour qu'il soit performant.", "B": "Partager les documents du projet avec le nouveau membre.", "C": "Offrir des formations interdisciplinaires et un mentorat au nouveau membre.", "D": "Consigner un risque dans le registre des risques et travailler avec le nouveau membre pour l'atténuer."}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Equipe et de Leadership), proposer formation interdisciplinaire et mentorat assure la montee en competence et la performance du nouveau membre. Motiver verbalement (A) est insuffisant. Partager les documents (B) est minimaliste. Consigner un risque (D) est defensif et ne developpe pas la personne.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 46},
  {"id": "q-0047", "question": "Au début d'un projet, la documentation des exigences n'a pas été approuvée. Il a été établi que le responsable d'une partie représentant les utilisateurs aurait été inclus dans aucune des communications de collecte des exigences, lequel des documents a probablement été oublié ou est devenu obsolète", "options": {"A": "charte de projet,", "B": "documentation commerciale,", "C": "registre des parties prenantes,", "D": "registre des risques."}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Le registre des parties prenantes (stakeholder register) est le document qui aurait du recenser le representant des utilisateurs et qui a manifestement ete oublie/non-mis-a-jour. Le PMBOK 7 (domaine Parties prenantes) insiste sur sa tenue. La charte (A) decrit le projet, pas les exigences. Les documents commerciaux (B) sont en amont. Le registre des risques (D) ne recense pas les parties prenantes.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 47},
  {"id": "q-0048", "question": "Au cours de la phase de lancement d'un projet, une partie prenante clé demande des changements fréquents dans le périmètre du projet. Que doit faire le chef de projet pour améliorer l'engagement de la partie prenante?", "options": {"A": "Évaluer l'impact du changement requis et consulter les sponsors exécutifs pour déterminer la meilleure marche à suivre.", "B": "Demander aux avocats de l'entreprise d'écrire à la municipalité de rejeter le changement car il ne fait pas partie du périmètre.", "C": "Demander aux concepteurs de commencer à concevoir une solution pour cette nouvelle exigence pendant que le projet est en cours d'exécution et déterminer le financement de ce changement.", "D": "Demander aux sponsors du projet de financer ce changement car il s'agit d'une nouvelle réglementation, puis commander des matériaux pour commencer à travailler."}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Gouvernance et de Changement), face a des changements frequents d'une partie prenante cle, le chef de projet evalue l'impact et consulte les sponsors executifs pour decider la meilleure marche a suivre via le controle des changements. Recourir aux avocats (B) est conflictuel. Lancer la conception sans approbation (C, D) viole le controle des changements.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 48},
  {"id": "q-0049", "question": "En raison de changements organisationnels, plusieurs parties prenantes clés sont remplacées en milieu de projet. En conséquence, un grand nombre de nouvelles exigences sont formulées. Que doit faire ce projet pour garantir la réussite du projet?", "options": {"A": "Recruter la ressource pour atteindre des objectifs.", "B": "Évaluer les conséquences et rencontrer le client pour lui présenter les scénarios possibles.", "C": "Tenter de réaliser la tâche en interne en ayant recours au nivellement des ressources affectées à d'autres projets.", "D": "Demander à s'entretenir avec le client et lui expliquer que la tâche ne sera pas réalisée."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Adaptation), face a une accumulation de nouvelles exigences, le chef de projet evalue les consequences et rencontre le client avec des scenarios possibles pour decision eclairee. Recruter (A) ou niveler des ressources (C) sont des reactions premature. Refuser categoriquement (D) detruit la relation. La presentation de scenarios respecte le controle des changements et l'engagement client.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 49},
  {"id": "q-0050", "question": "Un chef de projet vient de terminer la phase de planification lorsqu'une nouvelle partie prenante est affectée au projet. Les livrables ont été examinés avec le client, mais la nouvelle partie prenante s'inquiète malgré tout les bénéfices de deux des livrables. Que doit faire le chef de projet pour remédier aux inquiétudes de la partie prenante?", "options": {"A": "Confirmer la mise en place d'un plan de gestion de la communication pour attirer l'attention des parties prenantes de l'entreprise sur cette réussite.", "B": "Impliquer les parties prenantes de l'entreprise dans l'examen du sprint.", "C": "Définir les priorités du backlog du produit avec le sponsor et les parties prenantes clés afin d'offrir des bénéfices commerciaux.", "D": "Mettre en œuvre une enquête de clôture pour les parties prenantes clés."}, "correct": "C", "domain": "Business", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (Livraison de Valeur), pour aligner les benefices avec les attentes d'une nouvelle partie prenante, le chef de projet repriorise le backlog produit avec le sponsor et les parties prenantes cles afin de garantir la livraison de benefices commerciaux. Mettre en avant un plan de communication (A) ne traite pas le fond. Inviter en revue de sprint (B) sans repriorisation est insuffisant. Une enquete de cloture (D) est hors phase.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 50},
  {"id": "q-0051", "question": "Un chef de projet a récemment été affecté à un nouveau projet sur le point de démarrer. L'organisation a déjà signé avec les clients un contrat à prix forfaitaire détaillant le périmètre et la date de livraison finale. Mais le chef de projet a identifié plusieurs contraintes et conditions internes qui empêchent certainement le projet d'être achevé avec le nombre d'itérations initialement prévu. Que doit faire le chef de projet à présent?", "options": {"A": "Créer un journal des hypothèses et associer les hypothèses aux obstacles en fonction de l'impact sur la valeur du projet.", "B": "Créer un plan de gestion des financés pour s'assurer que le projet respecte la date de livraison.", "C": "Créer un plan de contingence au cas où le projet s'écarterait du plan initial.", "D": "Créer un modèle de journal des points traités que sera utilisé pour identifier et suivre les obstacles."}, "correct": "A", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe d'Incertitude), creer un journal des hypotheses et lier hypotheses et obstacles a la valeur projet est la pratique correcte pour rendre transparentes les contraintes internes face a un contrat fixe. Un plan financier (B) ne traite pas les obstacles. Un plan de contingence (C) est utile mais arrive apres l'identification structuree des hypotheses. Un journal des points a traiter (D) ne capture pas les hypotheses.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 51},
  {"id": "q-0052", "question": "Les membres de l'équipe ont une discussion avec le chef de projet. Lors de la dernière réunion rétrospective, l'équipe a réalisé que l'équipement obsolète pourrait nuire à la prochaine itération du projet. L'équipe recommande l'achat de nouveaux équipements, car ils sont essentiels à la réussite du livrable final. Que doit faire le chef de projet à présent?", "options": {"A": "Mettre à jour le registre des risques pour du projet et inclure le risque potentiel des retards ?", "B": "Informer le client que des ressources supplémentaires seront ajoutées afin de lui donner plus de temps pour examiner les documents ?", "C": "Informer le client de sa responsabilité en ce qui concerne l'approbation des documents ?", "D": "Travailler avec le client sur un délai acceptable pour l'approbation des documents ? 83-L'équipe de production commencera bientôt son premier projet agile. Personne dans l'équipe de la direction n'a de connaissances en métier de la méthode agile. Le responsable de la formation ne peut financer que trois inscriptions. Faites correspondre le rôle d'équipe à gauche à la formation appropriée à droite.. Rôle d’équipe Formation équipe de développement Scrum Master Servant leandership Product Owner l'analyse commerciale en pratique"}, "correct": "A", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Incertitude), tout risque identifie en retrospective (equipement obsolete) doit etre consigne au registre des risques avec son impact potentiel et son traitement (achat) avant decision finale. Les options B, C, D portent sur l'approbation client de documents, hors-sujet par rapport au probleme d'equipement.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 52},
  {"id": "q-0053", "question": "Une entreprise a décidé de mettre en œuvre un nouveau système d'archivage. Une fuite de données est survenue pendant la mise en œuvre du projet. Que doit d'abord faire le chef de projet pour gérer le problème?", "options": {"A": "Exécuter la réponse au risque prévue pour gérer le problème.", "B": "Passer en revue les autres méthodes de documentation possibles avec l'équipe.", "C": "Mettre à jour le registre des risques avec le risque et l'impact proposé.", "D": "Demander à l'équipe de corriger le système pour résoudre le problème."}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Incertitude), face a un risque identifie qui s'est materialise (fuite de donnees), la premiere action est d'executer la reponse au risque prevue. Si une reponse a ete planifiee, elle s'applique immediatement. Revoir les methodes de documentation (B) ou demander a corriger (D) sans plan structure est reactif. Mettre a jour le registre (C) vient apres l'execution de la reponse.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 53},
  {"id": "q-0054", "question": "Le chef de projet nouveau dans l'organisation est identifié à risque de non-respect d'une échéance proche en raison de certains retards sur le projet causés par un manque de ressources que doit faire le chef de projet?", "options": {"A": "Examiner la liste des jalons pour déterminer quelles tâches il est possible de gérer en parallèle.", "B": "Examiner le plan de gestion des risques pour identifier une stratégie de réponse.", "C": "Organiser une réunion d'équipe pour discuter de la ligne de conduite.", "D": "Faire remonter le problème au sponsor et lui faire un compte-rendu de la situation."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Incertitude), face a un risque de non-respect d'echeance, le chef de projet consulte le plan de gestion des risques pour identifier la strategie de reponse adequate (mitigation, transfert, etc.). Examiner les jalons (A) ne traite pas la cause. Reunir l'equipe (C) est utile mais le plan de risques structure la decision. Escalader au sponsor (D) est premature.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 54},
  {"id": "q-0055", "question": "L'entreprise lance un projet dans le but d'améliorer l'un de ses produits existants. Tous ces produits sont développés en interne. Que doit faire le chef de projet?", "options": {"A": "S'assurer que le plan d'engrangement de partitionnant exact est correctement documenté.", "B": "Vérifier un document de retour d'expérience pour la phase d'initialisation.", "C": "étudier les retours d'expérience du projet précédent,", "D": "identifier les risques liés à la mise en œuvre de la nouvelle solution et évaluer l'impact sur le projet"}, "correct": "C", "domain": "Process", "approach": "Hybride", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (principe de Stewardship), pour un projet d'amelioration d'un produit existant developpe en interne, etudier les retours d'experience du projet precedent est la base pour eviter de repeter les erreurs et capitaliser. Documenter l'engagement (A) ou un retour d'experience d'initialisation (B) sont moins specifiques. Identifier les risques (D) vient apres l'analyse des lecons existantes.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 55},
  {"id": "q-0056", "question": "Un projet de mise en œuvre d'une nouvelle plateforme de formation en ligne a commencé. Après le sprint, le sponsor du projet demande un changement que doit faire chaque projet à présent", "options": {"A": "Informer particulièrement du changement.", "B": "Valider le travail terminé.", "C": "Faire remonter la demande de changement au sponsor.", "D": "Faciliter la mise à jour du backlog de produits."}, "correct": "D", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "En agile, toute demande de changement est traitee via la mise a jour du backlog produit (PMBOK 7 + Guide Agile). Le Product Owner integre, priorise et le backlog est ajuste. Informer particulierement (A) est vague. Valider le travail (B) ne traite pas le changement. Faire remonter (C) au sponsor inverse les roles.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 56},
  {"id": "q-0057", "question": "En analysant les rapports de statut mensuel de projet, le chef de projet constate que l'indice de performance des délais SPI est de 0.75 et que l'indice de performance des coûts CPI est de 1.25. Le chef de projet doit bientôt faire un premier bilan sur le statut du projet et tient à souligner que le projet est sous contrôle. Comment le chef de projet doit-il rendre compte du statut du projet aux principales parties prenantes?", "options": {"A": "Préparer une présentation détaillée pour les parties prenantes sur la valeur acquise en incluant son mode de calcul et les résultats actuels du projet en termes de valeur acquise.", "B": "Indiquer que l'avancement du projet n'est pas parfaitement conforme au prévu, mais que le projet reste sous contrôle, car le prochain jalon est dans plus d'un mois.", "C": "Indiquer que le projet est en retard sur l'échéancier, mais qu'il est possible d'ajouter une ressource expérimentée supplémentaire pour respecter l'échéancier et maintenir le budget.", "D": "Réaliser une analyse détaillée des causes originaires en utilisant un graphique de Pareto et des diagrammes en arête de poisson pour démontrer que le projet est sous contrôle."}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Selon le PMBOK 7 (domaine Mesure), face a un SPI=0.75 et CPI=1.25, le chef de projet doit presenter la valeur acquise de maniere transparente et detaillee, expliquant le calcul et les resultats. Affirmer que tout va bien (B) sans transparence est malhonnete. Promettre une ressource supplementaire (C) est premature. Pareto/Ishikawa (D) sont outils qualite, pas reporting EVM.", "source": "PMBOK 7 + Agile Practice Guide (curated v2025.06)", "source_pages": [], "num": 57},
