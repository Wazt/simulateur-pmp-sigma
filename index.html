  {"id": "q-0277", "question": "Les 'hypothèses' (assumptions) dans un projet sont :", "options": {"A": "Des risques identifiés qui ont été acceptés", "B": "Des facteurs considérés comme vrais, réels ou certains sans preuve ni démonstration", "C": "Des contraintes imposées par le client ou le commanditaire", "D": "Des estimations approximatives du coût et du délai"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["hypothèses", "planification", "fondamentaux"], "explanation": "Les hypothèses sont des facteurs qui, aux fins de planification, sont considérés comme vrais, réels ou certains sans preuve ni démonstration. Les hypothèses non validées représentent des risques potentiels. Elles sont documentées dans le registre des hypothèses (PMBOK 6, Section 4.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 277},
  {"id": "q-0278", "question": "La réunion de lancement (kick-off meeting) se tient généralement :", "options": {"A": "Avant l'approbation de la charte du projet", "B": "À la fin de la phase de planification, au début de l'exécution", "C": "Après la clôture du projet pour les leçons apprises", "D": "Lors de la première réunion du comité de pilotage"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["réunion de lancement", "exécution", "planification"], "explanation": "La réunion de lancement marque le passage de la planification à l'exécution. Elle permet de présenter l'équipe, les objectifs, le plan de projet et les règles de fonctionnement. Elle est souvent mentionnée dans le cadre du processus 'Développer le plan de management du projet' (PMBOK 6, Section 4.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 278},
  {"id": "q-0279", "question": "Qu'est-ce que le 'gold plating' dans le contexte du management de projet ?", "options": {"A": "Utiliser des matériaux premium pour améliorer la qualité des livrables", "B": "Ajouter des fonctionnalités non demandées au-delà du périmètre défini", "C": "Dépasser le budget prévu pour obtenir un résultat exceptionnel", "D": "Présenter des rapports d'avancement exagérément positifs"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["gold plating", "périmètre", "bonnes pratiques"], "explanation": "Le gold plating consiste à ajouter des fonctionnalités ou à faire plus que ce qui est requis sans approbation du client. Bien qu'il soit parfois bien intentionné, il consomme des ressources non planifiées et peut introduire des risques. Le PMBOK 6 décourage cette pratique (PMBOK 6, Section 5.6).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 279},
  {"id": "q-0280", "question": "Un chef de projet utilise l'estimation par analogie (analogous estimating). Cette technique est :", "options": {"A": "La plus précise mais la plus coûteuse en temps", "B": "Moins précise mais rapide, basée sur des projets similaires passés", "C": "Basée sur des paramètres statistiques et des formules mathématiques", "D": "Réalisée par décomposition des travaux jusqu'au niveau le plus bas"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["estimation", "analogie", "techniques"], "explanation": "L'estimation par analogie (top-down) utilise les paramètres de projets similaires antérieurs comme base d'estimation. Elle est moins précise mais rapide et économique. Elle est particulièrement utile en début de projet quand peu d'informations sont disponibles (PMBOK 6, Section 6.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 280},
  {"id": "q-0281", "question": "L'Estimation à Achèvement (EAC) lorsque le travail restant sera effectué au taux budgété est calculée par :", "options": {"A": "EAC = AC + (BAC - EV)", "B": "EAC = BAC / CPI", "C": "EAC = AC + (BAC - EV) / CPI", "D": "EAC = AC + Bottom-up ETC"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["coûts", "EVM", "EAC", "formule"], "explanation": "Quand on estime que les dépassements/économies actuels sont des événements atypiques et que le travail futur sera exécuté selon le budget, EAC = AC + (BAC - EV). C'est une des quatre formules EAC du PMBOK 6 (Section 7.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 281},
  {"id": "q-0282", "question": "Le 'Travail à Achèvement' (ETC - Estimate To Complete) représente :", "options": {"A": "Le coût total prévu du projet à l'achèvement", "B": "Le coût attendu pour terminer tout le travail restant du projet", "C": "La différence entre le budget et les coûts réels", "D": "Le coût planifié restant jusqu'à la fin du projet"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["coûts", "EVM", "ETC"], "explanation": "L'ETC (Estimate To Complete) est le coût attendu pour achever tout le travail restant. ETC = EAC - AC. Il représente le budget supplémentaire nécessaire pour finir le projet depuis maintenant jusqu'à la clôture (PMBOK 6, Section 7.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 282},
  {"id": "q-0283", "question": "Parmi les suivants, lequel est un exemple de 'facteur environnemental de l'entreprise' (EEF) ?", "options": {"A": "Les leçons apprises de projets antérieurs", "B": "Les modèles standard de documents de l'organisation", "C": "Les conditions du marché et les tendances du secteur", "D": "La base de données de performance des processus"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["EEF", "facteurs environnementaux", "fondamentaux"], "explanation": "Les Facteurs Environnementaux de l'Entreprise (EEF) sont des conditions externes à l'organisation qui influencent le projet : culture d'entreprise, conditions de marché, réglementations gouvernementales, infrastructure, ressources humaines disponibles. Les actifs organisationnels (OPA) sont des ressources internes (PMBOK 6, Section 2.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 283},
  {"id": "q-0284", "question": "Le processus 'Identifier les risques' produit quel EXTRANT principal ?", "options": {"A": "Le plan de management des risques", "B": "Le registre des risques", "C": "La matrice probabilité × impact", "D": "Le rapport sur les risques"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 1, "tags": ["risques", "registre", "ITTO"], "explanation": "Le registre des risques est l'EXTRANT principal du processus Identifier les risques. Il contient la liste des risques identifiés avec leurs caractéristiques. Il est ensuite enrichi par les processus suivants d'analyse et de planification des réponses (PMBOK 6, Section 11.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 284},
  {"id": "q-0285", "question": "Lors de la clôture d'un projet, quelle action est indispensable pour bénéficier aux projets futurs ?", "options": {"A": "Redistribuer les ressources aux équipes fonctionnelles", "B": "Documenter et archiver les leçons apprises", "C": "Obtenir la signature du bon de livraison final", "D": "Calculer le CPI final pour les archives financières"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["clôture", "leçons apprises", "OPA"], "explanation": "La documentation des leçons apprises est une activité clé de la clôture. Elle capture ce qui s'est bien passé, ce qui aurait pu être amélioré et les bonnes pratiques, pour enrichir les actifs organisationnels et améliorer les projets futurs (PMBOK 6, Section 4.7).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 285},
  {"id": "q-0286", "question": "Dans un projet Agile, qu'est-ce qu'un 'Product Backlog' ?", "options": {"A": "La liste des défauts trouvés lors des tests", "B": "La liste ordonnée de toutes les fonctionnalités, améliorations et corrections souhaitées pour le produit", "C": "Le planning détaillé de toutes les itérations du projet", "D": "Le rapport d'avancement du sprint en cours"}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 1, "tags": ["agile", "product backlog", "scrum"], "explanation": "Le Product Backlog est une liste ordonnée et évolutive de tout ce qui pourrait être nécessaire dans le produit. Il est géré par le Product Owner et constitue la seule source des exigences. Les éléments en tête de liste sont généralement plus détaillés (PMBOK 6 Agile Practice Guide).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 286},
  {"id": "q-0287", "question": "Quelle cérémonie Scrum permet à l'équipe d'inspecter le travail accompli et d'adapter le Product Backlog si nécessaire ?", "options": {"A": "Le Sprint Planning", "B": "Le Daily Scrum", "C": "La Sprint Review (démo)", "D": "La Sprint Retrospective"}, "correct": "C", "domain": "Process", "approach": "Agile", "difficulty": 1, "tags": ["agile", "scrum", "sprint review"], "explanation": "La Sprint Review est tenue à la fin de chaque Sprint pour inspecter l'incrément produit et adapter le Product Backlog si nécessaire. C'est une réunion de collaboration avec les parties prenantes (PMBOK 6 Agile Practice Guide).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 287},
  {"id": "q-0288", "question": "Une 'User Story' est généralement formulée selon le format :", "options": {"A": "En tant que [rôle], je veux [fonctionnalité] afin de [bénéfice]", "B": "Le système doit [fonctionnalité] selon [spécification technique]", "C": "La fonctionnalité [X] sera livrée lors du sprint [N] avec une priorité [P]", "D": "Objectif: [résultat], Mesure: [KPI], Délai: [date]"}, "correct": "A", "domain": "Process", "approach": "Agile", "difficulty": 1, "tags": ["agile", "user story", "format"], "explanation": "Une User Story suit généralement le format : 'En tant que [rôle utilisateur], je veux [objectif/fonctionnalité] afin de [bénéfice/valeur]'. Ce format centre la fonctionnalité sur la valeur apportée à l'utilisateur (PMBOK 6 Agile Practice Guide).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 288},
  {"id": "q-0289", "question": "Dans un contexte hybride (prédictif + agile), quelle est la meilleure approche pour gérer les exigences ?", "options": {"A": "Définir toutes les exigences au début et les geler", "B": "Ne définir aucune exigence et laisser l'équipe décider", "C": "Définir les exigences de haut niveau au début et les détailler progressivement", "D": "Changer les exigences à chaque sprint selon les retours"}, "correct": "C", "domain": "Process", "approach": "Hybride", "difficulty": 2, "tags": ["hybride", "exigences", "rolling wave"], "explanation": "Dans un environnement hybride, on combine la planification initiale (prédictif) avec la flexibilité agile. Les exigences de haut niveau sont définies tôt pour la gouvernance, puis détaillées progressivement lors de chaque itération (élaboration progressive). C'est le concept de 'rolling wave planning' (PMBOK 6).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 289},
  {"id": "q-0290", "question": "La vélocité d'une équipe Agile est :", "options": {"A": "La vitesse à laquelle le chef de projet prend des décisions", "B": "Le nombre de story points complétés en moyenne par sprint", "C": "Le ratio coût/valeur des fonctionnalités livrées", "D": "Le nombre de réunions tenues par semaine"}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 2, "tags": ["agile", "vélocité", "story points"], "explanation": "La vélocité est une mesure de la quantité de travail qu'une équipe peut accomplir en un sprint, généralement exprimée en story points. Elle est calculée sur plusieurs sprints pour faire des prévisions de planification (PMBOK 6 Agile Practice Guide).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 290},
  {"id": "q-0291", "question": "Dans le contexte Agile, le terme 'Définition de Terminé' (Definition of Done - DoD) signifie :", "options": {"A": "La date de fin du sprint", "B": "La liste de critères qu'un élément doit satisfaire pour être considéré comme complet", "C": "La signature du client sur les livrables finaux", "D": "Le niveau de documentation requis pour clore un projet"}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 1, "tags": ["agile", "definition of done", "qualité"], "explanation": "La Définition de Terminé (DoD) est un ensemble partagé de critères que l'équipe a convenus pour déterminer quand un élément de travail est vraiment complet. Elle assure la qualité et la transparence sur ce qui constitue 'terminé' pour toute l'équipe (PMBOK 6 Agile Practice Guide).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 291},
  {"id": "q-0292", "question": "Un 'diagramme de flux cumulatif' (Cumulative Flow Diagram - CFD) est utilisé en Agile pour :", "options": {"A": "Suivre la vélocité de l'équipe sprint par sprint", "B": "Visualiser le débit de travail et identifier les goulots d'étranglement", "C": "Planifier les ressources pour les prochains sprints", "D": "Comparer les story points estimés aux story points réels"}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": ["agile", "CFD", "kanban", "flux"], "explanation": "Le diagramme de flux cumulatif (CFD) montre le volume de travail dans chaque état du processus au fil du temps. Il aide à identifier les goulots d'étranglement, à mesurer le temps de cycle et à optimiser le débit de l'équipe (PMBOK 6 Agile Practice Guide).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 292},
  {"id": "q-0293", "question": "Un chef de projet découvre qu'un fournisseur clé ne pourra pas livrer à temps, mettant le projet en péril. Quelle est sa première action ?", "options": {"A": "Informer immédiatement le sponsor et le client", "B": "Analyser l'impact sur le projet et préparer des options de réponse", "C": "Remplacer immédiatement le fournisseur", "D": "Mettre à jour le registre des risques"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["scénario", "fournisseur", "risques", "problèmes"], "explanation": "Avant d'agir, le chef de projet doit analyser l'impact du retard sur les délais, les coûts et le périmètre, puis développer des options (trouver un fournisseur alternatif, replanifier, etc.). Une communication éclairée viendra ensuite. Réagir sans analyse peut aggraver la situation (PMBOK 6, Sections 11, 12).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 293},
  {"id": "q-0294", "question": "Le chef de projet d'un projet informatique remarque que les coûts réels dépassent régulièrement les prévisions. La meilleure approche est :", "options": {"A": "Demander immédiatement une augmentation du budget", "B": "Analyser les causes racines des écarts et mettre en place des actions correctives", "C": "Réduire le périmètre du projet pour respecter le budget", "D": "Changer de méthodologie et passer en Agile"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["scénario", "coûts", "actions correctives"], "explanation": "Face aux écarts de coûts, le chef de projet doit d'abord analyser les causes racines (pourquoi les coûts dépassent les prévisions) avant d'agir. Les actions correctives peuvent inclure l'amélioration des estimations, la réduction des gaspillages, ou la révision des hypothèses (PMBOK 6, Section 7.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 294},
  {"id": "q-0295", "question": "Un membre clé de l'équipe quitte soudainement le projet. Le chef de projet doit prioritairement :", "options": {"A": "Signaler l'événement au registre des risques et l'accepter", "B": "Identifier l'impact sur le projet et gérer le transfert des connaissances", "C": "Augmenter les heures supplémentaires des membres restants", "D": "Demander l'arrêt du projet jusqu'au recrutement d'un remplaçant"}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": ["scénario", "ressources humaines", "risques"], "explanation": "La perte d'un membre clé est un événement de risque. La priorité est d'évaluer l'impact (compétences critiques, activités en cours) et de gérer le transfert de connaissances pour minimiser la disruption. L'action suivante sera de trouver un remplacement ou de réaffecter le travail (PMBOK 6, Sections 9, 11).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 295},
  {"id": "q-0296", "question": "Selon la théorie de Herzberg, lesquels de ces éléments sont des 'facteurs de motivation' (motivators) ?", "options": {"A": "Le salaire et les avantages sociaux", "B": "La sécurité de l'emploi et les conditions de travail", "C": "La reconnaissance, la responsabilité et l'accomplissement", "D": "Les politiques d'entreprise et la supervision"}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["Herzberg", "motivation", "théorie"], "explanation": "Herzberg distingue les facteurs d'hygiène (salaire, conditions de travail, sécurité) qui évitent l'insatisfaction, des vrais motivateurs (reconnaissance, responsabilité, accomplissement, croissance) qui créent la satisfaction et motivent. Les facteurs d'hygiène ne motivent pas directement (PMBOK 6, Section 9.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 296},
  {"id": "q-0297", "question": "Dans un contrat à prix fixe avec intéressement (FPIF - Fixed Price Incentive Fee), qu'est-ce qui se passe si le coût réel est inférieur au coût cible ?", "options": {"A": "Le fournisseur ne reçoit pas d'honoraires supplémentaires", "B": "Les économies sont partagées entre le client et le fournisseur selon un ratio convenu", "C": "Le client garde toutes les économies", "D": "Le fournisseur est pénalisé pour avoir sous-estimé le coût"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["approvisionnements", "FPIF", "contrats"], "explanation": "Dans un contrat FPIF, si le coût réel est inférieur au coût cible, les économies sont partagées selon un ratio de partage convenu (ex: 60/40). Si le coût dépasse le plafond de prix, le fournisseur supporte la totalité du dépassement. Ce contrat incite à la performance (PMBOK 6, Section 12.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 297},
  {"id": "q-0298", "question": "La planification en vagues successives (rolling wave planning) est une technique dans laquelle :", "options": {"A": "Le projet est planifié en détail pour les 6 prochains mois seulement", "B": "Les travaux proches sont planifiés en détail ; les travaux futurs à un niveau plus élevé", "C": "Le planning est revu et mis à jour à chaque fin de sprint", "D": "Seules les activités critiques sont planifiées à l'avance"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["planification", "rolling wave", "élaboration progressive"], "explanation": "La planification en vagues successives est une technique d'élaboration progressive où le travail à réaliser à court terme est planifié en détail, tandis que le travail plus lointain n'est planifié qu'à un niveau moins détaillé. Elle reconnaît qu'on ne peut pas tout planifier à l'avance (PMBOK 6, Section 6.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 298},
  {"id": "q-0299", "question": "Le Tableau de Bord Équilibré (Balanced Scorecard) est utilisé en gestion de projet pour :", "options": {"A": "Évaluer la performance selon quatre perspectives : financière, client, processus et apprentissage", "B": "Suivre uniquement les indicateurs financiers du projet", "C": "Mesurer la vélocité de l'équipe Agile", "D": "Calculer l'indice de performance des coûts et des délais"}, "correct": "A", "domain": "Business", "approach": "Predictive", "difficulty": 2, "tags": ["balanced scorecard", "performance", "stratégie"], "explanation": "Le Tableau de Bord Équilibré (Balanced Scorecard) de Kaplan et Norton évalue la performance selon quatre perspectives : financière, client/parties prenantes, processus internes, et apprentissage/développement. Il donne une vision équilibrée au-delà des seuls indicateurs financiers (PMBOK 6, Section 1.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 299},
  {"id": "q-0300", "question": "Laquelle des affirmations suivantes décrit le mieux le rôle d'un 'Sponsor' de projet ?", "options": {"A": "Il supervise les activités quotidiennes de l'équipe projet", "B": "Il fournit les ressources et le support nécessaires au succès du projet", "C": "Il est responsable de la livraison de tous les livrables du projet", "D": "Il est le principal utilisateur final du produit du projet"}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 1, "tags": ["sponsor", "gouvernance", "parties prenantes"], "explanation": "Le sponsor du projet est la personne ou le groupe qui fournit les ressources et le support pour le projet et qui est responsable de permettre sa réussite. Il gère les enjeux au niveau exécutif, approuve les modifications importantes et tient le chef de projet responsable (PMBOK 6, Section 2.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 300},
  {"id": "q-0301", "question": "La décomposition dans le contexte de la SDP (WBS) signifie :", "options": {"A": "Subdiviser les livrables du projet en composants plus petits et plus faciles à gérer", "B": "Supprimer les activités redondantes du planning", "C": "Regrouper des activités similaires pour optimiser les ressources", "D": "Analyser les risques en les décomposant en sous-risques"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["SDP", "décomposition", "WBS"], "explanation": "La décomposition est la technique utilisée pour créer la SDP. Elle consiste à subdiviser les livrables du projet et le travail de l'équipe en composants plus petits et plus faciles à gérer. La décomposition s'arrête au niveau des lots de travail (work packages) (PMBOK 6, Section 5.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 301},
  {"id": "q-0302", "question": "Le 'Plan de management du projet' est-il :", "options": {"A": "Un document fixe approuvé lors du lancement et jamais modifié", "B": "Un document évolutif mis à jour au fil des changements approuvés", "C": "Uniquement le planning des activités du projet", "D": "Équivalent à la charte du projet"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["plan de management", "évolutif", "intégration"], "explanation": "Le plan de management du projet est un document évolutif qui intègre tous les plans subsidiaires. Il peut être modifié lors de changements approuvés. C'est le référentiel de base du projet mais il n'est pas immuable — les mises à jour passent par le processus de maîtrise intégrée des modifications (PMBOK 6, Section 4.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 302},
  {"id": "q-0303", "question": "Combien de processus le PMBOK 6e édition comprend-il ?", "options": {"A": "42 processus", "B": "47 processus", "C": "49 processus", "D": "52 processus"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 1, "tags": ["PMBOK 6", "processus", "fondamentaux"], "explanation": "Le PMBOK 6e édition comprend 49 processus répartis dans 5 groupes de processus (Démarrage, Planification, Exécution, Surveillance et Maîtrise, Clôture) et 10 domaines de connaissance (PMBOK 6, Introduction).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 303},
  {"id": "q-0304", "question": "Combien de domaines de connaissance le PMBOK 6e édition comprend-il ?", "options": {"A": "8 domaines", "B": "9 domaines", "C": "10 domaines", "D": "12 domaines"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 1, "tags": ["PMBOK 6", "domaines de connaissance", "fondamentaux"], "explanation": "Le PMBOK 6e édition comprend 10 domaines de connaissance : Intégration, Périmètre, Délais, Coûts, Qualité, Ressources, Communications, Risques, Approvisionnements, et Parties Prenantes (PMBOK 6, Introduction).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 304},
  {"id": "q-0305", "question": "Quel groupe de processus du PMBOK 6 contient le plus grand nombre de processus ?", "options": {"A": "Démarrage (2 processus)", "B": "Exécution (10 processus)", "C": "Planification (24 processus)", "D": "Surveillance et Maîtrise (12 processus)"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["PMBOK 6", "groupes de processus", "fondamentaux"], "explanation": "Le groupe Planification contient 24 processus — le plus grand nombre. C'est logique car la planification est la phase la plus complexe où l'on définit comment tous les aspects du projet seront gérés (PMBOK 6, Introduction).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 305},
  {"id": "q-0306", "question": "Lequel des processus suivants appartient au groupe Surveillance et Maîtrise ?", "options": {"A": "Réaliser l'assurance qualité", "B": "Planifier le management des risques", "C": "Maîtriser le périmètre", "D": "Identifier les parties prenantes"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["surveillance et maîtrise", "périmètre", "groupes de processus"], "explanation": "Maîtriser le périmètre (Control Scope) est un processus du groupe Surveillance et Maîtrise. Il surveille l'état du périmètre et gère les modifications de la référence de base du périmètre (PMBOK 6, Section 5.6).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 306},
  {"id": "q-0307", "question": "La 'référence de base de la mesure de performance' (Performance Measurement Baseline) est composée de :", "options": {"A": "La référence de base du périmètre uniquement", "B": "La référence de base du périmètre, de l'échéancier et des coûts intégrés", "C": "La référence de base des coûts et de la qualité", "D": "Le plan de management du projet complet"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["référence de base", "performance", "EVM"], "explanation": "La référence de base de mesure de performance intègre les références de base du périmètre, de l'échéancier et des coûts. Elle est utilisée pour mesurer la performance globale du projet en termes d'avancement (EVM). C'est le 'triple contrainte' intégré (PMBOK 6, Section 4.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 307},
  {"id": "q-0308", "question": "L'analyse des écarts (variance analysis) en surveillance des coûts implique :", "options": {"A": "Comparer les coûts prévus avec les coûts réels seulement", "B": "Analyser EV, PV et AC pour expliquer les écarts de coûts et de délais", "C": "Vérifier si les estimations initiales étaient correctes", "D": "Calculer le CPI uniquement pour décider si le projet continue"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["coûts", "EVM", "analyse des écarts"], "explanation": "L'analyse des écarts dans le contexte de la surveillance des coûts (EVM) compare la valeur acquise (EV), la valeur planifiée (PV) et le coût réel (AC) pour identifier et expliquer les écarts de coûts (CV = EV-AC) et de délais (SV = EV-PV) et prévoir les tendances futures (PMBOK 6, Section 7.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 308},
  {"id": "q-0309", "question": "Une 'réponse de retour' (workaround) en gestion des risques est :", "options": {"A": "Une stratégie planifiée pour éviter un risque connu", "B": "Une réponse non planifiée à un risque qui s'est matérialisé sans plan de contingence", "C": "Un plan de secours activé quand le plan principal échoue", "D": "Une technique pour transférer un risque à un fournisseur"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["risques", "workaround", "réponse"], "explanation": "Un workaround (solution de contournement) est une réponse développée en urgence face à un risque ou problème qui s'est matérialisé sans qu'un plan de contingence ait été préparé. C'est une réponse réactive par opposition aux réponses planifiées (PMBOK 6, Section 11.6).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 309},
  {"id": "q-0310", "question": "La courbe S du projet (S-curve) représente généralement :", "options": {"A": "La relation entre risques et impact dans une matrice de risques", "B": "L'accumulation des coûts ou du travail planifié dans le temps", "C": "La courbe d'apprentissage de l'équipe projet", "D": "La probabilité de complétion du projet à différentes dates"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["coûts", "courbe S", "visualisation"], "explanation": "La courbe S représente l'accumulation des coûts budgétés (ou de la valeur planifiée) dans le temps. Elle prend une forme de S car les dépenses sont faibles au début, augmentent rapidement en phase d'exécution, puis diminuent en fin de projet. C'est un outil visuel de suivi d'avancement (PMBOK 6, Section 7.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 310},
  {"id": "q-0311", "question": "Le concept de 'triple contrainte' en gestion de projet fait référence à :", "options": {"A": "Coûts, qualité et risques", "B": "Périmètre, délais et coûts", "C": "Qualité, ressources et communication", "D": "Parties prenantes, périmètre et qualité"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 1, "tags": ["triple contrainte", "fondamentaux", "périmètre délais coûts"], "explanation": "La triple contrainte (triangle de projet) fait référence aux trois contraintes fondamentales : le Périmètre (quoi), les Délais (quand) et les Coûts (combien). Une modification de l'une de ces contraintes affecte généralement au moins une des deux autres. La qualité est souvent ajoutée comme quatrième élément (PMBOK 6, Section 1.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 311},
  {"id": "q-0312", "question": "Dans un réseau de projet, si l'activité A doit commencer 3 jours après le début de l'activité B, quel type de relation PDM s'applique ?", "options": {"A": "Fin-Début avec décalage positif de 3 jours", "B": "Début-Début avec décalage positif de 3 jours", "C": "Début-Fin avec décalage positif de 3 jours", "D": "Fin-Fin avec décalage négatif de 3 jours"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["délais", "PDM", "décalage", "dépendances"], "explanation": "Une relation Début-Début (SS+3) avec un décalage de +3 jours signifie que l'activité suivante peut démarrer 3 jours après le début de l'activité précédente. Les décalages (leads/lags) modifient les relations de dépendance (PMBOK 6, Section 6.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 312},
  {"id": "q-0313", "question": "La méthode de la chaîne critique (Critical Chain Method) se distingue du chemin critique car elle :", "options": {"A": "N'utilise pas les dépendances entre activités", "B": "Prend en compte les contraintes de ressources et utilise des tampons", "C": "Se concentre uniquement sur les activités à risque élevé", "D": "Élimine toutes les marges dans le planning"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["délais", "chaîne critique", "CCM"], "explanation": "La méthode de la chaîne critique (CCM) tient compte des contraintes de ressources en plus des dépendances logiques. Elle gère les incertitudes via des tampons de projet (project buffer) et des tampons d'alimentation (feeding buffers) plutôt que des marges cachées (PMBOK 6, Section 6.5).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 313},
  {"id": "q-0314", "question": "Quel est le but du processus 'Séquencer les activités' ?", "options": {"A": "Identifier les ressources nécessaires pour chaque activité", "B": "Estimer la durée de chaque activité", "C": "Identifier et documenter les relations logiques entre les activités", "D": "Attribuer les activités aux membres de l'équipe"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 1, "tags": ["délais", "séquençage", "PDM"], "explanation": "Le processus Séquencer les activités identifie et documente les relations entre les activités du projet. Il produit un diagramme réseau de l'échéancier du projet (PDM) en définissant les dépendances obligatoires, discrétionnaires et externes (PMBOK 6, Section 6.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 314},
  {"id": "q-0315", "question": "Le nivellement des ressources (resource leveling) :", "options": {"A": "Peut allonger la durée du projet", "B": "Réduit toujours la durée du projet", "C": "N'affecte pas la durée du projet", "D": "S'applique uniquement aux ressources externes"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["délais", "ressources", "nivellement"], "explanation": "Le nivellement des ressources est une technique d'optimisation qui résout les sur-allocations en reportant ou en prolongeant des activités selon la disponibilité des ressources. Cette technique peut allonger la durée du projet et modifier le chemin critique (PMBOK 6, Section 6.5).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 315},
  {"id": "q-0316", "question": "Un chef de projet constate que son équipe cache des problèmes pour ne pas paraître incompétente. Quelle est la meilleure approche ?", "options": {"A": "Surveiller l'équipe plus étroitement pour identifier les problèmes", "B": "Créer un environnement psychologiquement sûr où l'erreur est une opportunité d'apprentissage", "C": "Sanctionner les membres qui cachent des informations", "D": "Mettre en place des outils de surveillance automatique du code"}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": ["leadership", "culture", "sécurité psychologique"], "explanation": "Un chef de projet efficace crée une culture de sécurité psychologique où les membres de l'équipe se sentent à l'aise pour rapporter les problèmes sans craindre la punition. C'est lié au leadership serviteur et aux principes agiles (PMBOK 6, Section 3 — Rôle du chef de projet).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 316},
  {"id": "q-0317", "question": "Le processus de maîtrise intégrée des modifications assure que :", "options": {"A": "Toutes les modifications sont automatiquement approuvées", "B": "Les modifications sont évaluées, approuvées et communiquées de manière coordonnée", "C": "Aucune modification ne peut être apportée après la phase de planification", "D": "Seul le sponsor peut approuver les modifications"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["intégration", "modifications", "contrôle"], "explanation": "La maîtrise intégrée des modifications assure que les modifications aux livrables, actifs et documents de projet sont examinées, approuvées ou rejetées de façon coordonnée, et que leur impact sur tous les aspects du projet est évalué (PMBOK 6, Section 4.6).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 317},
  {"id": "q-0318", "question": "Les critères d'acceptation dans l'énoncé du périmètre du projet définissent :", "options": {"A": "Le budget maximal acceptable pour chaque livrable", "B": "Les conditions à remplir pour que les livrables soient acceptés", "C": "Les parties prenantes habilitées à accepter les livrables", "D": "Les délais pour la livraison de chaque composant"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["périmètre", "critères d'acceptation", "livrables"], "explanation": "Les critères d'acceptation sont les conditions et les exigences qui doivent être satisfaites avant que les livrables du projet soient acceptés. Ils permettent de définir objectivement ce que 'fait' signifie pour chaque livrable (PMBOK 6, Section 5.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 318},
  {"id": "q-0319", "question": "La technique 'Mind Mapping' (carte mentale) est utilisée dans la gestion du périmètre pour :", "options": {"A": "Calculer la durée des activités", "B": "Organiser visuellement les exigences et stimuler la créativité", "C": "Évaluer les risques liés au périmètre", "D": "Planifier la réunion de revue du périmètre"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["périmètre", "mind mapping", "exigences"], "explanation": "Le Mind Mapping est une technique de collecte et d'organisation des exigences qui crée une structure visuelle reflétant les associations entre les idées. Elle est utilisée dans le processus Recueillir les exigences pour organiser et présenter les informations (PMBOK 6, Section 5.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 319},
  {"id": "q-0320", "question": "Qu'est-ce que la 'prévention sur l'inspection' comme principe de qualité ?", "options": {"A": "Il vaut mieux prévenir les défauts que les détecter et corriger après", "B": "L'inspection est plus efficace que la prévention dans la plupart des cas", "C": "La prévention coûte toujours plus cher que l'inspection", "D": "L'inspection préventive remplace l'assurance qualité"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["qualité", "prévention", "inspection"], "explanation": "Le principe de 'prévention sur l'inspection' stipule qu'il est moins coûteux et plus efficace de prévenir les défauts dès la conception que de les détecter et corriger après production. La qualité est intégrée dans le processus, pas vérifiée seulement à la fin (PMBOK 6, Section 8.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 320},
  {"id": "q-0321", "question": "La 'tolérance' dans le contexte des cartes de contrôle qualité fait référence à :", "options": {"A": "Les limites de contrôle calculées statistiquement (±3 sigma)", "B": "La plage acceptable spécifiée par le client ou les normes", "C": "La marge d'erreur de l'équipe qualité", "D": "Le nombre maximal de défauts tolérés par livraison"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["qualité", "tolérance", "contrôle statistique"], "explanation": "La tolérance représente les limites de spécification définies par les exigences du client ou les normes. Les limites de contrôle (±3 sigma) sont calculées statistiquement pour les cartes de contrôle. Un processus peut être 'sous contrôle' mais produire des résultats hors des tolérances spécifiées (PMBOK 6, Section 8.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 321},
  {"id": "q-0322", "question": "Un chef de projet identifie qu'un certain fournisseur représente un risque d'approvisionnement. Il décide de signer un contrat avec deux fournisseurs différents. Il s'agit d'une stratégie de :", "options": {"A": "Acceptation active", "B": "Transfert du risque", "C": "Atténuation du risque", "D": "Évitement du risque"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["risques", "atténuation", "stratégies", "scénario"], "explanation": "Utiliser deux fournisseurs plutôt qu'un réduit la probabilité et l'impact d'un problème d'approvisionnement — c'est une stratégie d'atténuation. Si le contrat transférait financièrement le risque (par des pénalités ou assurances), ce serait un transfert. L'évitement élimine complètement la cause (PMBOK 6, Section 11.5).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 322},
  {"id": "q-0323", "question": "La technique SWOT (Forces, Faiblesses, Opportunités, Menaces) est utilisée dans le management des risques pour :", "options": {"A": "Évaluer quantitativement la probabilité des risques", "B": "Identifier les risques internes (forces/faiblesses) et externes (opportunités/menaces)", "C": "Prioriser les risques selon leur importance stratégique", "D": "Développer les plans de réponse aux risques critiques"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "SWOT", "identification"], "explanation": "L'analyse SWOT est utilisée dans Identifier les risques pour examiner le projet depuis chacune des quatre perspectives : Forces et Faiblesses (internes à l'organisation) et Opportunités et Menaces (externes). Cela aide à élargir la portée de l'identification des risques (PMBOK 6, Section 11.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 323},
  {"id": "q-0324", "question": "L'appétit pour le risque d'une organisation (risk appetite) est :", "options": {"A": "Le niveau maximal de risque que l'organisation peut absorber", "B": "Le niveau de risque que l'organisation est prête à accepter en poursuivant un objectif", "C": "La liste des risques considérés comme inacceptables", "D": "Le budget alloué à la gestion des risques"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["risques", "appétit pour le risque", "gouvernance"], "explanation": "L'appétit pour le risque est le niveau de risque qu'une organisation accepte de prendre dans la poursuite de ses objectifs. Il diffère du seuil de risque (risk threshold) qui est le niveau spécifique de risque qui déclenche une réponse formelle (PMBOK 6, Section 11.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 324},
  {"id": "q-0325", "question": "Le 'cube des parties prenantes' (stakeholder cube) améliore la grille Pouvoir/Intérêt en ajoutant quelle dimension ?", "options": {"A": "Le budget contrôlé par chaque partie prenante", "B": "L'attitude ou l'engagement de la partie prenante envers le projet", "C": "L'ancienneté de la relation avec l'organisation", "D": "La localisation géographique de la partie prenante"}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": ["parties prenantes", "cube", "modèles"], "explanation": "Le cube des parties prenantes est un modèle tridimensionnel qui ajoute la dimension 'attitude/engagement' (favorable, neutre, opposée) aux dimensions Pouvoir et Intérêt. Il offre une représentation plus riche pour développer les stratégies d'engagement (PMBOK 6, Section 13.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 325},
  {"id": "q-0326", "question": "Un chef de projet découvre qu'une partie prenante importante s'oppose activement au projet. La meilleure stratégie est :", "options": {"A": "Ignorer cette partie prenante et continuer le projet", "B": "Escalader immédiatement au sponsor pour intervention", "C": "Comprendre les préoccupations et chercher à développer un plan d'engagement adapté", "D": "Exclure cette partie prenante des communications du projet"}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": ["parties prenantes", "résistance", "engagement"], "explanation": "La gestion des parties prenantes résistantes requiert de comprendre leurs préoccupations et de développer des stratégies d'engagement appropriées. Ignorer ou exclure des parties prenantes clés peut créer des risques majeurs. L'escalade peut être nécessaire mais ne résout pas le problème sous-jacent (PMBOK 6, Section 13.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 326},
  {"id": "q-0327", "question": "Un appel d'offres (RFP - Request for Proposal) est approprié quand :", "options": {"A": "Le prix est le seul critère de sélection et les spécifications sont claires", "B": "Le client a besoin que le fournisseur propose une solution à un problème défini", "C": "L'achat concerne des articles standardisés disponibles sur catalogue", "D": "Le client veut obtenir uniquement des informations du marché"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["approvisionnements", "RFP", "sollicitation"], "explanation": "Un RFP est utilisé lorsque le client souhaite que les fournisseurs proposent leur propre approche ou solution à un problème. Le client définit le problème/besoin, et les fournisseurs répondent avec leur méthode, leur équipe et leur prix. C'est adapté aux services complexes ou aux projets innovants (PMBOK 6, Section 12.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 327},
  {"id": "q-0328", "question": "La gestion des contrats (contract administration) est réalisée lors de quel processus du PMBOK 6 ?", "options": {"A": "Planifier le management des approvisionnements", "B": "Procéder aux approvisionnements", "C": "Maîtriser les approvisionnements", "D": "Clore les approvisionnements"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["approvisionnements", "gestion contrats", "maîtrise"], "explanation": "Maîtriser les approvisionnements est le processus qui gère les relations avec les fournisseurs, surveille les performances contractuelles, apporte des modifications si nécessaire et clôture les contrats. C'est l'équivalent de la 'contract administration' (PMBOK 6, Section 12.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 328},
  {"id": "q-0329", "question": "Le plan de management des communications doit inclure :", "options": {"A": "Uniquement les réunions de suivi planifiées", "B": "Les informations à communiquer, la fréquence, les canaux, et les responsables de communication", "C": "Le budget alloué aux outils de communication", "D": "Les profils LinkedIn des parties prenantes clés"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["communications", "plan", "planification"], "explanation": "Le plan de management des communications documente : qui a besoin de quelle information, quand, dans quel format, par quel canal, et qui est responsable de la transmettre. Il assure une communication efficace avec toutes les parties prenantes (PMBOK 6, Section 10.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 329},
  {"id": "q-0330", "question": "Une réunion de revue de statut hebdomadaire est un exemple de communication :", "options": {"A": "Pull — les participants accèdent aux informations quand ils le souhaitent", "B": "Push — l'information est envoyée aux participants", "C": "Interactive — communication bidirectionnelle en temps réel", "D": "Asynchrone — les participants répondent à leur propre rythme"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["communications", "interactive", "réunions"], "explanation": "Une réunion est une communication interactive car elle implique un échange bidirectionnel en temps réel entre tous les participants. La communication push (e-mails) et pull (intranet) ne permettent pas cet échange immédiat (PMBOK 6, Section 10.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 330},
  {"id": "q-0331", "question": "Qu'est-ce qu'un 'organigramme fonctionnel' (OBS - Organizational Breakdown Structure) ?", "options": {"A": "Une représentation hiérarchique de l'organisation par unités fonctionnelles", "B": "Le planning de l'équipe projet par activité", "C": "La liste des ressources physiques disponibles", "D": "Le budget par département de l'organisation"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["ressources", "OBS", "structure organisationnelle"], "explanation": "L'OBS est une représentation hiérarchique de l'organisation qui montre les unités fonctionnelles (départements, équipes). Combiné avec la SDP, il permet de créer la matrice de responsabilités (RAM/RACI) en croisant livrables et unités organisationnelles responsables (PMBOK 6, Section 9.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 331},
  {"id": "q-0332", "question": "L'écart sur les ressources physiques dans un projet peut être résolu par :", "options": {"A": "Uniquement par l'ajout de ressources humaines", "B": "La substitution de ressources, la sous-traitance ou la révision du planning", "C": "Toujours en réduisant le périmètre du projet", "D": "En renegociant le contrat avec le client"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["ressources", "physiques", "résolution"], "explanation": "Les écarts sur les ressources physiques peuvent être résolus par plusieurs stratégies : substitution par des ressources équivalentes, sous-traitance de certaines activités, révision du planning pour utiliser les ressources disponibles, ou demande de ressources supplémentaires (PMBOK 6, Section 9.6).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 332},
  {"id": "q-0333", "question": "L'Indice de Performance Nécessaire (TCPI) basé sur le BAC est calculé par :", "options": {"A": "TCPI = (BAC - EV) / (BAC - AC)", "B": "TCPI = EV / AC", "C": "TCPI = (BAC - EV) / EV", "D": "TCPI = (EAC - AC) / BAC"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["coûts", "EVM", "TCPI", "formule"], "explanation": "TCPI = (BAC - EV) / (BAC - AC). Il représente le CPI que le projet doit maintenir pour le reste du travail afin d'atteindre le BAC. Un TCPI > 1 signifie qu'on doit faire mieux que le plan initial — c'est souvent irréaliste si le CPI actuel est < 1 (PMBOK 6, Section 7.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 333},
  {"id": "q-0334", "question": "Un projet a : BAC = 200 000 €, EV = 80 000 €, AC = 100 000 €. Quel est l'Écart de Coûts (CV) ?", "options": {"A": "+20 000 € (sous budget)", "B": "-20 000 € (dépassement)", "C": "+20 000 € (dépassement)", "D": "-20 000 € (sous budget)"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["coûts", "EVM", "CV", "calcul"], "explanation": "CV = EV - AC = 80 000 - 100 000 = -20 000 €. Un CV négatif indique un dépassement de budget (on a dépensé 100 000 € pour 80 000 € de valeur). CPI = 80 000/100 000 = 0,8 confirme qu'on dépense 1,25 € pour chaque euro de valeur créée (PMBOK 6, Section 7.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 334},
  {"id": "q-0335", "question": "Lequel des éléments suivants est un artefact Scrum ?", "options": {"A": "Le diagramme de Gantt", "B": "L'incrément du produit", "C": "Le registre des risques", "D": "Le dictionnaire de la SDP"}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 2, "tags": ["agile", "scrum", "artefacts"], "explanation": "Les artefacts Scrum sont : le Product Backlog, le Sprint Backlog et l'Incrément du Produit (un produit potentiellement livrable à la fin de chaque Sprint). Le diagramme de Gantt et la SDP appartiennent aux approches prédictives (PMBOK 6 Agile Practice Guide).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 335},
  {"id": "q-0336", "question": "Dans Kanban, la pratique de limiter le 'Work in Progress' (WIP) vise à :", "options": {"A": "Réduire le nombre de membres d'équipe nécessaires", "B": "Améliorer le flux et identifier rapidement les goulots d'étranglement", "C": "Augmenter le nombre d'éléments terminés par semaine", "D": "Simplifier le tableau Kanban pour faciliter la lecture"}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 2, "tags": ["agile", "kanban", "WIP", "flux"], "explanation": "La limite WIP en Kanban est conçue pour améliorer le flux de travail. Limiter le nombre d'éléments en cours oblige l'équipe à terminer le travail avant d'en commencer de nouveau, ce qui révèle les goulots d'étranglement et améliore le temps de cycle (PMBOK 6 Agile Practice Guide).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 336},
  {"id": "q-0337", "question": "La 'Définition Prête' (Definition of Ready - DoR) s'applique à :", "options": {"A": "Les critères pour clore un sprint", "B": "Les critères qu'un élément du backlog doit satisfaire avant d'être inclus dans un sprint", "C": "Les conditions pour qu'un livrable soit accepté par le client", "D": "La préparation requise avant la réunion de planning"}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 2, "tags": ["agile", "definition of ready", "backlog"], "explanation": "La Définition Prête (DoR) définit les critères qu'un User Story ou backlog item doit remplir avant de pouvoir être sélectionné pour un sprint. Typiquement : la story est clairement écrite, estimée, et ses critères d'acceptation sont définis (PMBOK 6 Agile Practice Guide).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 337},
  {"id": "q-0338", "question": "Un 'Spike' en développement Agile est :", "options": {"A": "Une fonctionnalité urgente ajoutée en milieu de sprint", "B": "Une activité de recherche ou d'exploration pour réduire l'incertitude", "C": "Un sprint de correction de bugs uniquement", "D": "La réunion de synchronisation entre plusieurs équipes Scrum"}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": ["agile", "spike", "exploration"], "explanation": "Un Spike est un élément du backlog utilisé pour de la recherche, de l'exploration ou de la preuve de concept afin de réduire l'incertitude ou l'ignorance. Il aide l'équipe à comprendre un problème ou évaluer une solution avant de s'engager sur des estimations (PMBOK 6 Agile Practice Guide).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 338},
  {"id": "q-0339", "question": "Un chef de projet reçoit une demande informelle du sponsor pour ajouter une fonctionnalité importante. Quelle est la bonne réaction ?", "options": {"A": "Ajouter immédiatement la fonctionnalité pour satisfaire le sponsor", "B": "Refuser poliment car le périmètre est figé", "C": "Soumettre une demande de modification formelle et évaluer l'impact", "D": "Consulter l'équipe et décider ensemble d'inclure ou non la fonctionnalité"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["scénario", "modifications", "sponsor"], "explanation": "Même si la demande vient du sponsor, toute modification doit passer par le processus formel de maîtrise intégrée des modifications. Le chef de projet doit documenter la demande, évaluer son impact sur le périmètre, les délais et les coûts, et obtenir une approbation formelle avant d'agir (PMBOK 6, Section 4.6).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 339},
  {"id": "q-0340", "question": "En fin de phase de planification, le chef de projet estime que le projet est trop risqué pour continuer. Que doit-il faire ?", "options": {"A": "Continuer quand même pour respecter les engagements pris", "B": "Ignorer les risques et espérer que tout se passe bien", "C": "Documenter les risques et les présenter honnêtement au sponsor pour décision", "D": "Réduire le périmètre sans en informer le sponsor"}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": ["scénario", "éthique", "risques", "sponsor"], "explanation": "Le chef de projet a la responsabilité éthique de communiquer honnêtement les risques au sponsor. Le sponsor est l'autorité qui décide si le projet continue, est modifié ou annulé. Cacher des informations ou prendre des décisions unilatérales importantes viole le Code d'éthique du PMI (PMBOK 6, Section 13.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 340},
  {"id": "q-0341", "question": "Deux chefs de projet doivent partager les mêmes ingénieurs senior sur leurs projets respectifs. Comment ce conflit de ressources devrait-il idéalement être résolu ?", "options": {"A": "Le premier projet commencé a priorité sur les ressources", "B": "Le chef de projet le plus senior obtient les ressources", "C": "Le gestionnaire fonctionnel ou le PMO arbitre selon les priorités organisationnelles", "D": "Chaque chef de projet négocie directement avec les ingénieurs"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["scénario", "ressources", "conflits", "PMO"], "explanation": "Dans une organisation matricielle, les conflits de ressources entre projets sont typiquement résolus par le responsable fonctionnel ou le PMO (Project Management Office) qui a une vue globale des priorités organisationnelles. C'est le rôle de la gouvernance de projet (PMBOK 6, Section 2.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 341},
  {"id": "q-0342", "question": "Un chef de projet Agile remarque que la vélocité de l'équipe diminue sprint après sprint. Quelle est la première chose à investiguer ?", "options": {"A": "Remplacer les membres les moins performants", "B": "Augmenter la durée des sprints pour donner plus de temps", "C": "Identifier les impediments et sources de dette technique qui ralentissent l'équipe", "D": "Réduire la taille du backlog pour rendre les stories plus simples"}, "correct": "C", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": ["agile", "vélocité", "dette technique", "scénario"], "explanation": "Une vélocité décroissante indique souvent la présence d'impediments non résolus (blocages externes, environnement) ou de dette technique croissante (mauvaise qualité du code qui ralentit le développement futur). La Rétrospective est l'espace pour identifier et traiter ces causes (PMBOK 6 Agile Practice Guide).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 342},
  {"id": "q-0343", "question": "Lors de la réunion de lancement, un membre de l'équipe exprime des inquiétudes sur les exigences ambiguës. Le chef de projet doit :", "options": {"A": "Rassurer le membre en disant que tout s'éclaircira en cours de projet", "B": "Documenter le problème et planifier une session de clarification avec les parties prenantes", "C": "Demander au membre de faire de son mieux avec les informations disponibles", "D": "Escalader immédiatement au client pour résolution urgente"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["scénario", "exigences", "ambiguité", "réunion de lancement"], "explanation": "Les ambiguïtés dans les exigences sont un risque majeur. Le chef de projet doit les documenter (registre des risques/hypothèses) et organiser une session de clarification avec les parties prenantes appropriées. Ignorer le problème ou demander à l'équipe de 'faire de son mieux' crée des retravaux coûteux (PMBOK 6, Section 5.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 343},
  {"id": "q-0344", "question": "Un chef de projet reçoit une plainte d'un client selon laquelle le livrable ne correspond pas aux spécifications initiales. Quelle est la première étape ?", "options": {"A": "Vérifier immédiatement les spécifications et comparer avec le livrable", "B": "Escalader au fournisseur responsable du livrable", "C": "Accepter la critique et recommencer le travail sans discussion", "D": "Informer le client que les spécifications ont changé en cours de projet"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["scénario", "qualité", "client", "livrables"], "explanation": "Avant toute action, le chef de projet doit vérifier objectivement les faits : comparer le livrable aux spécifications documentées. Si la plainte est fondée, une demande de modification ou une action corrective est nécessaire. Si les spécifications ont été respectées, une discussion avec le client s'impose (PMBOK 6, Section 8.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 344},
  {"id": "q-0345", "question": "Le bureau des projets (PMO - Project Management Office) joue principalement quel rôle dans une organisation ?", "options": {"A": "Exécuter directement les projets à la place des chefs de projet", "B": "Standardiser les processus de gouvernance et fournir support et ressources aux projets", "C": "Approuver le budget de chaque projet", "D": "Former exclusivement les membres d'équipe aux outils de gestion"}, "correct": "B", "domain": "Business", "approach": "Predictive", "difficulty": 2, "tags": ["PMO", "gouvernance", "organisation"], "explanation": "Le PMO est une structure organisationnelle qui standardise les processus de gouvernance liés aux projets et facilite le partage des ressources, des méthodologies, des outils et des techniques. Il peut avoir un rôle de support, de contrôle ou directif selon les organisations (PMBOK 6, Section 2.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 345},
  {"id": "q-0346", "question": "Le cycle de vie d'un produit (product life cycle) par rapport au cycle de vie d'un projet :", "options": {"A": "Sont la même chose — les termes sont interchangeables", "B": "Le cycle de vie du produit est généralement plus long et peut inclure plusieurs cycles de projets", "C": "Le cycle de vie du projet est toujours plus long que celui du produit", "D": "Le cycle de vie du produit s'arrête à la livraison du projet"}, "correct": "B", "domain": "Business", "approach": "Predictive", "difficulty": 2, "tags": ["cycle de vie", "produit", "projet"], "explanation": "Le cycle de vie d'un projet (du démarrage à la clôture) est différent et généralement plus court que le cycle de vie du produit (de la conception à l'arrêt). Un seul produit peut nécessiter plusieurs projets successifs (développement, amélioration, maintenance) au fil de sa vie (PMBOK 6, Section 1.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 346},
  {"id": "q-0347", "question": "La gestion de portefeuille vise principalement à :", "options": {"A": "Gérer les ressources d'un seul projet complexe", "B": "Sélectionner et prioriser des projets alignés avec la stratégie organisationnelle", "C": "Coordonner plusieurs projets liés qui partagent des livrables", "D": "Standardiser les méthodologies de management dans l'organisation"}, "correct": "B", "domain": "Business", "approach": "Predictive", "difficulty": 2, "tags": ["portefeuille", "stratégie", "gouvernance"], "explanation": "La gestion de portefeuille gère et aligne un ensemble de projets et programmes pour atteindre les objectifs stratégiques organisationnels. Elle implique la sélection, la priorisation et l'arbitrage des ressources entre les initiatives, en s'assurant que chaque investissement génère la valeur maximale pour l'organisation (PMBOK 6, Section 1.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 347},
  {"id": "q-0348", "question": "Qu'est-ce que le 'plan de transition et d'intégration' dans le processus de clôture ?", "options": {"A": "Un plan pour intégrer de nouveaux membres à l'équipe", "B": "Un document décrivant comment le produit sera transféré aux opérations", "C": "Le plan de migration des données du projet vers les archives", "D": "Un accord entre le chef de projet sortant et son successeur"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["clôture", "transition", "opérations"], "explanation": "Le plan de transition décrit comment le produit, service ou résultat du projet sera transféré à l'équipe opérationnelle qui le gérera après la clôture. Il assure la continuité et le support post-livraison (PMBOK 6, Section 4.7).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 348},
  {"id": "q-0349", "question": "L'analyse des documents (document analysis) dans le processus de recueil des exigences consiste à :", "options": {"A": "Analyser les contrats des fournisseurs", "B": "Examiner les documents existants pour identifier les exigences pertinentes", "C": "Documenter formellement toutes les exigences dans le registre", "D": "Analyser les écarts entre les exigences initiales et actuelles"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["périmètre", "exigences", "analyse documents"], "explanation": "L'analyse des documents examine les documents existants (contrats, plans, études de marché, procédures actuelles) pour extraire des exigences pertinentes. C'est une technique du processus Recueillir les exigences (PMBOK 6, Section 5.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 349},
  {"id": "q-0350", "question": "Le prototype dans la collecte des exigences permet de :", "options": {"A": "Créer la version finale du produit rapidement", "B": "Obtenir des retours des parties prenantes sur des exigences tangibles avant l'implémentation", "C": "Tester les performances du système en charge réelle", "D": "Former l'équipe sur les technologies utilisées"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["périmètre", "prototype", "exigences"], "explanation": "Le prototypage permet d'obtenir des retours précoces des parties prenantes en leur présentant un modèle tangible (maquette, POC). Cela aide à clarifier les exigences, découvrir des besoins non exprimés et réduire le risque de livrer le mauvais produit (PMBOK 6, Section 5.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 350},
  {"id": "q-0351", "question": "Dans la méthode PERT, si la durée optimiste d'une tâche est 4j, la plus probable 7j et la pessimiste 16j, quelle est la durée estimée ?", "options": {"A": "7,0 jours", "B": "8,0 jours", "C": "9,0 jours", "D": "7,7 jours"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["délais", "PERT", "calcul", "estimation"], "explanation": "PERT = (O + 4M + P) / 6 = (4 + 4×7 + 16) / 6 = (4 + 28 + 16) / 6 = 48/6 = 8 jours. L'écart-type = (P-O)/6 = (16-4)/6 = 2 jours, indiquant une incertitude notable (PMBOK 6, Section 6.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 351},
  {"id": "q-0352", "question": "Un projet a 4 activités sur son chemin critique. Chacune a 90% de chances d'être terminée à temps. Quelle est la probabilité que le projet se termine à temps ?", "options": {"A": "90%", "B": "65,6%", "C": "36%", "D": "72,9%"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["délais", "probabilité", "chemin critique", "calcul"], "explanation": "La probabilité que le projet se termine à temps = 0,9 × 0,9 × 0,9 × 0,9 = 0,9^4 = 0,6561 ≈ 65,6%. Cela illustre pourquoi les projets ont tendance à être en retard même lorsque chaque activité semble avoir une bonne probabilité d'être à temps (PMBOK 6, Section 6.5).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 352},
  {"id": "q-0353", "question": "La différence entre 'lag' et 'lead' dans les relations de dépendances est :", "options": {"A": "Un lag retarde le début de l'activité suivante ; un lead l'avance", "B": "Un lead retarde l'activité suivante ; un lag l'avance", "C": "Lag et lead sont la même chose dans le PDM", "D": "Un lag s'applique aux relations FF ; un lead aux relations SS"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["délais", "lag", "lead", "dépendances"], "explanation": "Un lag (décalage positif) est un retard ajouté à une dépendance — l'activité suivante attend un certain temps supplémentaire. Un lead (avance ou décalage négatif) permet à l'activité suivante de commencer avant que la précédente ne soit terminée. Exemple: en FS avec lead -2j, on commence l'activité B 2j avant la fin de A (PMBOK 6, Section 6.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 353},
  {"id": "q-0354", "question": "La technique 'Three-Point Estimating' pour les coûts utilise les mêmes principes que PERT. Si cO = 10k€, cM = 15k€, cP = 26k€, le coût estimé est :", "options": {"A": "17 000 €", "B": "15 000 €", "C": "16 000 €", "D": "17 167 €"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["coûts", "estimation", "PERT", "calcul"], "explanation": "Estimation PERT = (cO + 4×cM + cP) / 6 = (10 000 + 4×15 000 + 26 000) / 6 = (10 000 + 60 000 + 26 000) / 6 = 96 000 / 6 = 16 000 €. Cette technique donne une estimation pondérée tenant compte de l'incertitude (PMBOK 6, Section 7.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 354},
  {"id": "q-0355", "question": "Quelle est la différence entre 'coûts directs' et 'coûts indirects' d'un projet ?", "options": {"A": "Les coûts directs sont payés en espèces ; les indirects par virement bancaire", "B": "Les coûts directs sont directement attribuables au projet ; les indirects sont partagés entre plusieurs projets", "C": "Les coûts directs sont internes ; les indirects sont des frais de fournisseurs", "D": "Il n'y a pas de différence pratique dans la gestion des projets"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["coûts", "directs", "indirects", "budget"], "explanation": "Les coûts directs sont directement attribuables à un projet spécifique (salaires équipe projet, matériaux, voyages). Les coûts indirects (overhead) sont partagés entre plusieurs projets (loyer, utilities, services support). Les deux doivent être estimés et budgétés (PMBOK 6, Section 7.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 355},
  {"id": "q-0356", "question": "La technique de 'rapprochement des limites de financement' (funding limit reconciliation) consiste à :", "options": {"A": "Réconcilier les factures des fournisseurs avec le budget", "B": "Ajuster le planning pour respecter les contraintes périodiques de financement", "C": "Comparer le budget approuvé avec les coûts réels en fin de projet", "D": "Négocier avec le sponsor une augmentation du budget"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["coûts", "financement", "planning"], "explanation": "Le rapprochement des limites de financement ajuste le planning des dépenses pour s'aligner sur les contraintes périodiques de financement (ex: l'organisation ne peut financer que 100k€ par trimestre). Cela peut nécessiter de réplanifier des activités (PMBOK 6, Section 7.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 356},
  {"id": "q-0357", "question": "Le processus 'Gérer la qualité' (anciennement 'Assurance Qualité') produit comme principal EXTRANT :", "options": {"A": "Les rapports de contrôle qualité", "B": "Les demandes de modification pour améliorer les processus", "C": "La liste des défauts trouvés", "D": "Le plan de management de la qualité"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["qualité", "gérer la qualité", "ITTO"], "explanation": "Gérer la qualité (anciennement Assurance Qualité) produit des rapports qualité, des résultats d'audit qualité et des demandes de modification pour améliorer les processus. Son principal livrable est l'amélioration continue des processus du projet (PMBOK 6, Section 8.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 357},
  {"id": "q-0358", "question": "La règle 'Sep Outils de Qualité' du PMBOK 6 inclut lequel de ces outils ?", "options": {"A": "Le diagramme de Gantt", "B": "La carte de contrôle et le diagramme en arête de poisson", "C": "La matrice RACI et le registre des risques", "D": "L'analyse de Monte Carlo et l'arbre de décision"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["qualité", "7 outils qualité", "outils"], "explanation": "Les 7 outils de qualité (Basic Quality Tools) incluent : carte de contrôle, diagramme cause-effet (fishbone), feuille de collecte de données, diagramme de flux, histogramme, diagramme de Pareto et diagramme de dispersion. Ces outils aident à analyser et améliorer les processus (PMBOK 6, Section 8.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 358},
  {"id": "q-0359", "question": "La 'négociation' dans le processus 'Constituer l'équipe du projet' est utilisée pour :", "options": {"A": "Négocier les salaires des membres de l'équipe", "B": "Obtenir les ressources humaines compétentes nécessaires auprès des managers fonctionnels", "C": "Négocier les délais avec le sponsor du projet", "D": "Résoudre les conflits entre membres de l'équipe"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["ressources", "négociation", "constitution équipe"], "explanation": "Dans la constitution de l'équipe, la négociation s'applique avec les managers fonctionnels pour obtenir les ressources humaines compétentes. C'est particulièrement critique dans les organisations matricielles (PMBOK 6, Section 9.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 359},
  {"id": "q-0360", "question": "La formation (training) dans le management des ressources est :", "options": {"A": "Une récompense pour la bonne performance", "B": "Un outil pour développer les compétences des membres de l'équipe selon les besoins identifiés", "C": "Une obligation légale uniquement", "D": "Un coût à éviter pour respecter le budget"}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 1, "tags": ["ressources", "formation", "développement équipe"], "explanation": "La formation est un outil du processus Développer l'équipe. Elle vise à améliorer les compétences et connaissances des membres pour augmenter leur capacité à effectuer les activités du projet. Les besoins de formation sont identifiés lors de l'évaluation des compétences actuelles vs requises (PMBOK 6, Section 9.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 360},
  {"id": "q-0361", "question": "Les 'règles de base' (ground rules) d'une équipe de projet servent à :", "options": {"A": "Définir les règles légales applicables au projet", "B": "Établir les attentes claires sur les comportements acceptables au sein de l'équipe", "C": "Fixer les horaires de travail obligatoires", "D": "Définir les critères d'acceptation des livrables"}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 1, "tags": ["ressources", "règles de base", "équipe"], "explanation": "Les règles de base sont des comportements et normes de fonctionnement convenus par l'équipe (ponctualité, communication, résolution de conflits, etc.). Elles augmentent la productivité, réduisent les malentendus et créent un environnement de travail positif (PMBOK 6, Section 9.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 361},
  {"id": "q-0362", "question": "La 'structure de découpage des risques' (RBS - Risk Breakdown Structure) aide à :", "options": {"A": "Calculer la valeur monétaire espérée de chaque risque", "B": "Organiser et catégoriser les risques selon leurs sources", "C": "Planifier les réponses aux risques identifiés", "D": "Estimer la probabilité de chaque risque"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "RBS", "structure"], "explanation": "La RBS est une représentation hiérarchique des catégories et sous-catégories de risques du projet. Elle aide à organiser les risques par source (technique, commercial, organisationnel, externe) pour s'assurer qu'aucune catégorie n'est oubliée lors de l'identification (PMBOK 6, Section 11.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 362},
