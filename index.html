  {"id": "q-0200", "question": "Ala fin d'un projet agile, toutes les stories sont terminées 9 dans les délais et tous les tests réussis, mais le client ne considére pas le produit comme une réussite. Quel est le moyen le plus efficace d'éviter ce probléme lors de futurs projets ?", "options": {"A": "Assurez-vous que la vision du produit est approuvée par le client avant de développer le backlog.", "B": "Convenez avec le client des critéres de réussite a inclure dans la définition de l'opération terminée.", "C": "Recueillez les commentaires des clients sur les démonstrations de versions incrémentielles et les tests utilisateurs.", "D": "Assurez-vous que le plan de test inclut les exigences non fonctionnelles dans le backlog."}, "correct": "C", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Les retours clients/utilisateurs continus et progressifs constituent le meilleur moyen de garantir que le produit répond aux besoins identifiés et non identifiés tout au long de son développement.", "source": "Woloyem PMP Course 2025 — Examen processus1/29-30.pdf", "source_pages": [], "num": 200},
  {"id": "q-0201", "question": "Un fournisseur d'infrastructures énergétiques fournit une 0 preuve de concept de solution complexe a un nouveau client stratégique. Le projet prédictif devrait être achevé en 10 semaines, mais la liste des points a régler sera longue, et certains dépendent d'événements externes dont le calendrier est incertain. Comment le chef de projet doit-il gérer ces points en suspens ? 1 cac2b3bae75092e99", "options": {"A": "Transférer les éléments en suspens au prochain projet avec le client.", "B": "Planifiez cinq itérations agiles pour terminer les taches dés que les conditions le permettent. °", "C": "Délimitez les taches en suspens et supprimez-les de la facture.", "D": "Ajoutez des ressources et réduisez le calendrier pour terminer les taches en suspens."}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Cinq (5) sprints peuvent couvrir la fenétre de dix (10) semaines, et la flexibilité offre la meilleure chance de terminer le travail de maniére ponctuelle.", "source": "Woloyem PMP Course 2025 — Examen processus1/29-30.pdf", "source_pages": [], "num": 201},
  {"id": "q-0202", "question": "Un produit innovant ne parvient pas à satisfaire les 0 consommateurs ciblés malgré des investissements importants en contréle qualité et en campagnes marketing. Quelle pratique agile permettrait de prévenir au mieux de tels échecs ? 1 cac2b3bae75092e99", "options": {"A": "Exécutez des tests d'utilisabilité continus pour les consommateurs sur les versions de produits.", "B": "Aligner les objectifs entre le propriétaire du produit et le marketing.", "C": "Elargir la définition du type de personnalité du consommateur cible.", "D": "Ajoutez davantage de fonctionnalités et de tests au produit minimum viable (MVP)."}, "correct": "A", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Les tests et les retours d’information continus des utilisateurs constituent le moyen le plus efficace d’aligner les exigences sur les besoins des utilisateurs et de les intégrer progressivement dans les versions de produits.", "source": "Woloyem PMP Course 2025 — Examen processus1/9-10.pdf", "source_pages": [], "num": 202},
  {"id": "q-0203", "question": "Woloyem Consulting gére un projet pour une entreprise 3 d'éducation visant a lancer un programme de formation en ligne. Le projet est 4 25 % de son avancement lorsque le responsable de programme change. Le nouveau responsable n'est pas intéressé par le succés du projet, et l'un des modules de formation est retardé car le livrable n'a pas été validé a temps. Que devrait faire le chef de projet pour éviter ce retard ?", "options": {"A": "Mettre a jour le plan de gestion des communications pour refléter un changement dans les besoins de communication.", "B": "Réévaluer les besoins du nouveau product owner pour une meilleure implication", "C": "Metre a jour le plan d'engagement des parties g prenantes pour refléter un changement dans le responsable du programme.", "D": "Communiquer plus fréquemment l'état du projet avec le responsable du programme."}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Justification :", "source": "Woloyem PMP Course 2025 — Mini Examen 60/13-14.pdf", "source_pages": [], "num": 203},
  {"id": "q-0204", "question": "Une coopérative agricole évalue un projet visant a 9 remplacer les 6quipements de culture dans plusieurs fermes situées dans différentes régions. Le projet ne dépasse pas le seuil financier, mais il est également prévu d'augmenter la productivité, d'améliorer la qualité des récoltes et de fidéliser davantage de clients. Le projet est planifié comme une mise en ceuvre progressive s'appuyant sur l'apprentissage des rétrospectives a chaque phase. Comment la coopérative agricole devrait-elle accroitre la valeur du projet ?", "options": {"A": "Consulter des experts sur les méthodes permettant de réduire les coats et d'augmenter la rentabilité de la production.", "B": "Utiliser un diagramme d'Ishikawa pour trouver la cause profonde des avantages financiers inférieurs avec le propriétaire des bénéfices.", "C": "Quantifier les avantages tangibles et intangibles g@ attendus dans le plan de gestion des avantages pour chaque phase.", "D": "Demander au propriétaire des avantages de réévaluer les risques identifiés qui ont un impact sur les résultats des bénéfices financiers."}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Justification :", "source": "Woloyem PMP Course 2025 — Mini Examen 60/19-20.pdf", "source_pages": [], "num": 204},
  {"id": "q-0205", "question": "Woloyem Consulting gére un projet de lancement d'une 3 nouvelle campagne publicitaire pour un client. La campagne inclut l'achat d'un logiciel de gestion des campagnes spécifique, comme mentionné dans les documents du projet et approuvé par le sponsor. Cependant, l'équipe des achats remet en question la nécessité de cette solution spécifique et propose une alternative moins cotteuse. Que devrait faire le chef de projet plus t6t dans le projet pour garantir l'achat du logiciel spécifique ?", "options": {"A": "Rappeler au sponsor du projet la réputation de l'équipe des achats", "B": "Communiquer la charte du projet a l'équipe des achats", "C": "Communiquer le plan de gestion de projet a l'équipe des achats", "D": "inclure un membre de l'équipe des achats dans l'équipe de projet"}, "correct": "D", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Justification : Inclure un membre de l'équipe des achats dans l'équipe de projet dés le début permet d'assurer que l'équipe des achats comprend bien les besoins du projet, les justifications pour l'achat spécifique et les critéres de sélection des fournisseurs. Cela permet de résoudre d'éventuelles divergences avant qu'elles n'affectent le projet et garantit que l'équipe des achats est alignée avec les objectifs du projet. Pourquoi cette réponse est correcte : En impliquant un membre des achats dés le départ, le chef de projet favorise la transparence et l'alignement entre les différentes parties prenantes du projet. Cela permet également de traiter les préoccupations de l'équipe des achats en amont et d'éviter des conflits au moment de l'exécution. Pourquoi les autres réponses ne sont pas correctes :", "source": "Woloyem PMP Course 2025 — Mini Examen 60/23-24.pdf", "source_pages": [], "num": 205},
  {"id": "q-0206", "question": "Woloyem Consulting gére un projet visant a créer une 6 plateforme de cours en ligne pour une université. Le chef de projet sera responsable du suivi du projet une fois que l'accord avec le fournisseur de la plateforme sera signé. Avant le démarrage du projet, il doit s'assurer que les besoins éducatifs sont correctement compris et que les objectifs sont validés. Que doit faire le chef de projet avant le démarrage du projet ? air", "options": {"A": "Informer le sponsor du projet que le chef de projet ne peut pas participer au processus de négociation de l'accord.", "B": "Demander au sponsor du projet d'impliquer le service juridique dans la négociation de l'accord du projet.", "C": "sassurer que les exigences du projet sont g@ comprises et que les objectifs sont vérifiés avant l'approbation d'un accord.", "D": "Informer le sponsor du projet qu'une fois l'accord signé, il ne peut y avoir aucun changement de portée du projet."}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Justification : Pourquoi cette réponse est correcte : La validation des exigences et des objectifs avant la signature de l'accord garantit que les attentes sont bien alignées avec le fournisseur. Cela permet au chef de projet de garantir que le fournisseur est capable de répondre aux besoins du projet et que les objectifs sont clairs. Pourquoi les autres réponses ne sont pas correctes :", "source": "Woloyem PMP Course 2025 — Mini Examen 60/25-26.pdf", "source_pages": [], "num": 206},
  {"id": "q-0207", "question": "Woloyem Consulting gére un projet visant à transformer 9 le programme d'études d'une universite traditionnelle en une approche plus agile. Les enseignants, auparavant habitués a une méthode d'enseignement prédictive, adoptent désormais une approche agile bascée sur le cadre Scrum. Lors de la quatri¢me évaluation de performance du programme, les étudiants signalent que certaines activités ne respectent pas les nouvelles normes d'accréditation de l'université. Que doit faire le responsable pédagogique ?", "options": {"A": "Demander a l'équipe pédagogique de consulter l'agent d'accréditation pour mettre a jour les critéres de réussite des activités d'évaluation précédentes.", "B": "Demander au maitre Scrum de mettre en place une réunion hebdomadaire avec l'agent d'accréditation, le responsable de l'université et l'équipe pédagogique.", "C": "Demander au responsable de l'université de consulter le comité de contrôle des modifications (CCM) pour intégrer les exigences d'accréditation nécessaires.", "D": "Demander au responsable de l'université de revoir réguliérement les activités d'évaluation avec l'agent d'accréditation pour identifier les éventuelles non- conformités."}, "correct": "D", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": [], "explanation": "Justification : Pourquoi cette réponse est correcte : Elle refléte une approche proactive et continue pour garantir la conformité du programme aux normes d'accréditation, favorisant ainsi un processus de révision constant. Pourquoi les autres réponses ne sont pas correctes : ¢ Demander à l'équipe pédagogique de consulter l'agent d'accréditation pour mettre a jour les critéres de réussite des activités d'évaluation précédentes. Bien que la consultation soit importante, cette réponse se concentre sur des activités passées. Le projet devrait viser a résoudre les problémes en temps réel et à prévenir toute non- conformité future. ¢ Demander au maitre Scrum de mettre en place une réunion hebdomadiaire avec l'agent d'accréditation, le responsable de l'université et l'équipe pédagogique. Bien que les réunions réguliéres soient utiles, cette approche semble trop formelle et pourrait ralentir la réactivité et la flexibilité nécessaires dans un environnement agile. ¢ Demander au responsable de l'université de consulter le comité de contréle des modifications (CCM) pour intégrer les exigences d'accréditation nécessaires. Le comité de contrôle des changements est généralement impliqué pour des ajustements majeurs. Ici, un ajustement continu de l'approche pédagogique en lien avec les normes d'accréditation ne nécessite pas une telle démarche formelle. En conclusion, la révision continue des activités d'évaluation en collaboration avec l'agent d'accréditation permet de répondre rapidement aux exigences tout en restant agile.", "source": "Woloyem PMP Course 2025 — Mini Examen 60/29-30.pdf", "source_pages": [], "num": 207},
  {"id": "q-0208", "question": "Woloyem Consulting gére un projet éducatif visant a lancer une plateforme en ligne pour la formation continue. Ala fin du projet, le chef de projet examine le processus de cléture et constate qu'une partie du budget n’a pas été utilisée. Quiest-ce qui aidera le chef de projet à comprendre pourquoi cela s’est produit ?", "options": {"A": "Les politiques internes de l'organisation", "B": "Analyse des legons apprises durant le projet", "C": "Audit des partenariats avec les formateurs", "D": "@ ruait global du projet"}, "correct": "D", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Justification : ¢ Audit global du projet : Correct. Un audit global du projet permet de revoir toutes les facettes du projet, y compris la gestion financiére, les contrats, et l'utilisation des ressources. Cela aide à comprendre pourquoi des fonds sont restés inutilisés, qu'il s'agisse de paiements manqués, de sous- utilisation des ressources, ou d’économies imprévues dans certains aspects du projet. ¢ Les politiques internes de l'organisation : Incorrect. Bien que les politiques internes régissent la gestion financiére, elles ne fournissent pas une analyse détaillée des raisons spécifiques =d'un budget non utilisé dans un projet particulier. ¢ Analyse des lecons apprises durant le projet : Incorrect. Bien que l'analyse des legons apprises soit importante pour les futurs projets, elle ne permet pas de comprendre précisément pourquoi des fonds ont été inutilisés dans un projet en cours, car elle se concentre davantage sur les processus et résultats globaux plutdt que sur les aspects financiers. ¢ Audit des partenariats avec les formateurs : Incorrect. Bien que l'audit des partenariats soit pertinent pour vérifier la conformité avec les contrats et la qualité de la formation, il ne permet pas de comprendre directement pourquoi le budget global n'a pas été totalement utilise.", "source": "Woloyem PMP Course 2025 — Mini Examen 60/3-4.pdf", "source_pages": [], "num": 208},
  {"id": "q-0209", "question": "Woloyem Consulting gére un projet éducatif visant a 1 introduire une nouvelle méthode d'enseignement dans une école. Un enseignant a recemment obtenu une certification pour utiliser une nouvelle technologie éducative. Cependant, cet enseignant constate que ses collégues ne l'utilisent pas en raison d'un manque de connaissance. Comment l'administrateur scolaire peut-il utiliser l'intelligence émotionnelle pour tirer parti de cette situation au bénéfice de l'école ?", "options": {"A": "Promouvoir l'enseignant au poste de directeur pédagogique pour tirer parti des nouvelles compétences auprés des éléves.", "B": "Offrir une récompense aux enseignants qui commencent a utiliser la nouvelle technologie dans leurs cours.", "C": "Demander a l'enseignant de partager ses g connaissances récemment acquises et de former ses collégues.", "D": "Demander un budget pour récompenser l'enseignant afin que les autres soient incités a obtenir la méme certification."}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Justification : Pourquoi cette réponse est correcte : Cela permet a l'équipe de bénéficier directement de l'expertise de l'enseignant certifié, tout en renforgant le leadership et la responsabilisation au sein de l'équipe. Pourquoi les autres réponses ne sont pas correctes : ¢ Promouvoir l'enseignant au poste de directeur pédagogique pour tirer parti des nouvelles compétences auprés des éléves. Bien que la promotion de l'enseignant soit une forme de reconnaissance, cela ne répond pas directement au besoin immédiat de diffuser l'outil au sein de l'équipe. ¢ Offrir une récompense aux enseignants qui commencent a utiliser la nouvelle technologie dans leurs cours. Les récompenses peuvent être motivantes, mais elles ne traitent pas directement du manque de connaissances, qui est la cause fondamentale du probléme. Le partage de compétences est plus pertinent. ¢ Demander un budget pour récompenser l'enseignant afin que les autres soient incités à obtenir la méme certification. Bien que cela puisse motiver certains membres a obtenir la certification, cela ne résout pas le probléme immédiat du manque d'adoption de la technologie par l'équipe. II est plus efficace d'encourager l'enseignant a former ses collégues directement. L'approche de la formation interne est la meilleure maniére d'appliquer l'intelligence émotionnelle et d'encourager la croissance collective au sein de l'équipe.", "source": "Woloyem PMP Course 2025 — Mini Examen 60/31-32.pdf", "source_pages": [], "num": 209},
  {"id": "q-0210", "question": "Woloyem Consulting gére un projet pour développer un 5 nouveau systéme de gestion des récoltes pour un exploitant agricole. Toutes les exigences ont été recueillies. Que devrait dire le chef de projet aux membres de l'équipe de se concentrer sur ?", "options": {"A": "Terminer le projet dans les délais prévus", "B": "Travailler ensemble en équipe", "C": "Réduire les cotits pour le client", "D": "Offrir de la valeur au client"}, "correct": "D", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Justification : Pourquoi les autres réponses ne sont pas correctes :", "source": "Woloyem PMP Course 2025 — Mini Examen 60/35-36.pdf", "source_pages": [], "num": 210},
  {"id": "q-0211", "question": "Woloyem Consulting gére un projet de développement 6 d'un programme de formation pour un organisme éducatif. Au début de Il'exécution du projet, le chef de projet découvre qu'un formateur clé sera indisponible pendant deux semaines, ce qui pourrait entrainer un retard dans la 28 livraison des modules. Que devrait faire le chef de projet en premier ?", "options": {"A": "Mettre a jour le plan de gestion des ressources et le tableau d'allocation des ressources en conséquence.", "B": "Confier les taches à un autre formateur et demander a celui-ci de travailler des horaires prolongés.", "C": "Mettre a jour le calendrier pour refléter les changements de durée du projet.", "D": "Demander à la direction des ressources humaines 38 (RH) de trouver un remplagant et mettre a jour le registre des risques."}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Justification : Le chef de projet doit d'abord réévaluer la gestion des ressources pour identifier comment répartir efficacement les taches et minimiser l'impact de l'indisponibilité de la ressource clé. Cela inclut l'ajustement du plan de gestion des ressources et du tableau d'allocation pour trouver des solutions sans modifier encore le calendrier du projet. Ce premier pas assure que les ressources sont utilisées de maniére optimale avant de décider d'autres mesures. Pourquoi les autres réponses ne sont pas correctes : 4s ¢ Confier les taches à un autre formateur et demander à celui- ci de travailler des horaires prolongés : Cela pourrait entrainer un surmenage et affecter la qualité du travail. De plus, cette solution n'attaque pas directement le probléme de la disponibilité des ressources a long terme. ¢ Mettre a jour le calendrier pour refléter les changements de durée du projet : Modifier immédiatement le calendrier pourrait être prématuré. Le chef de projet devrait d'abord explorer les options pour ajuster les ressources avant de changer la durée du projet. ¢ Demander à la direction des ressources humaines (RH) de trouver un remplacant et mettre a jour le registre des risques : Bien que cette solution puisse être envisagée plus tard, le chef de projet devrait d'abord chercher a gérer la situation avec les ressources existantes et analyser les risques avant de faire appel à un remplacement.", "source": "Woloyem PMP Course 2025 — Mini Examen 60/35-36.pdf", "source_pages": [], "num": 211},
  {"id": "q-0212", "question": "Woloyem Consulting gére un projet de formation pour des 7 agents de santé dans une organisation gouvernementale. Pendant l'exécution du projet, un conflit survient entre le chef de projet et l'un des formateurs à chaque reunion de l'équipe de projet. Le conflit continu empéche l'achévement des modules de formation et des évaluations. Le chef de projet envisage de changer son style de leadership. Que devrait faire le chef de projet ?", "options": {"A": "Porter la situation a attention du sponsor du projet", "B": "fviter le formateur pour prévenir de nouveaux conflits.", "C": "Examiner les documents de compétences du personnel", "D": "Revoir les responsabilités avec le formateur."}, "correct": "D", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Justification : Le chef de projet doit d'abord adresser le probléme de maniére constructive en clarifiant les responsabilités et attentes avec le formateur. Cela permet de résoudre le conflit en identifiant clairement les rdles et en ajustant les attentes, ce qui peut conduire a une meilleure collaboration. Une communication ouverte est essentielle pour minimiser les conflits et améliorer les performances de l'équipe. Pourquoi les autres réponses ne sont pas correctes : ¢ Porter la situation a l'attention du sponsor du projet : Cela pourrait être nécessaire à un stade plus avancée si la situation ne s'améliore pas, mais la premiére étape devrait être une tentative de résolution directe au sein de l'équipe. ¢ Eviter le formateur pour prévenir de nouveaux conflits : Ignorer la situation n'est pas une solution viable a long terme. Cela ne fera que prolonger le conflit et pourrait méme aggraver la situation. ¢ Examiner les documents de compétences du personnel : Bien que cela puisse être utile pour mieux comprendre les forces et faiblesses des membres de l'équipe, cela ne résout pas directement le conflit et n'adresse pas la question immédiate de la dynamique interpersonnelle.", "source": "Woloyem PMP Course 2025 — Mini Examen 60/37-38.pdf", "source_pages": [], "num": 212},
  {"id": "q-0213", "question": "Woloyem Consulting gére l'organisation d'un grand 8 événement en plein air. Le responsable de la logistique encourage son équipe a ignorer certaines régles de sécurité pour accélérer les préparations. Que devrait faire le chef de projet pour s'assurer que toutes les régles de sécurité sont respectées a l'avenir ?", "options": {"A": "[ ancer une révision des régles de sécurité avec le responsable de la logistique et l'équipe.", "B": "Développer de nouvelles régles de sécurité plus simples à suivre pour l'équipe.", "C": "Porter le probleme a l'attention du directeur général et des membres du comité d'organisation.", "D": "Instruire l'équipe de toujours suivre les régles de sécurité."}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": [], "explanation": "Justification : Le chef de projet doit collaborer avec le responsable de la logistique et l'équipe pour réévaluer les régles de sécurité et s'assurer qu'elles sont a la fois pratiques et adaptées au projet. Cette approche proactive permettra de garantir que toutes les procédures sont bien comprises et suivies, tout en respectant les contraintes de temps et de sécurité. Pourquoi les autres réponses ne sont pas correctes : 4s ¢ Développer de nouvelles régles de sécurité plus simples à suivre pour l'équipe : Bien que la simplification des procédures puisse être utile, il est essentiel d'aligner l'équipe sur l'importance de suivre les procédures existantes avant de modifier quoi que ce soit. ¢ Porter le probléme à l'attention du directeur général et des membres du comité d'organisation : Cela pourrait être nécessaire dans des situations extrémes, mais la premiére étape devrait être de résoudre le probléme au niveau de l'équipe avant d'impliquer la direction. ¢ Instruire l'équipe de toujours suivre les régles de sécurité : Bien que l'instruction soit importante, elle doit être accompagnée d'une discussion sur la raison d'être des régles et de leur réévaluation, ce qui aidera à résoudre les problémes sous-jacents.", "source": "Woloyem PMP Course 2025 — Mini Examen 60/37-38.pdf", "source_pages": [], "num": 213},
  {"id": "q-0214", "question": "Quel document autorise formellement un projet et donne au chef de projet l'autorité d'utiliser les ressources organisationnelles pour les activités du projet ?", "options": {"A": "Le plan de management du projet", "B": "La charte du projet", "C": "L'énoncé des travaux du projet", "D": "Le registre des hypothèses"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["intégration", "charte", "démarrage"], "explanation": "La charte du projet est le document qui autorise formellement l'existence d'un projet et confère au chef de projet l'autorité nécessaire pour affecter les ressources organisationnelles aux activités du projet (PMBOK 6, Section 4.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 214},
  {"id": "q-0215", "question": "Le processus 'Élaborer la charte du projet' appartient à quel groupe de processus ?", "options": {"A": "Planification", "B": "Exécution", "C": "Démarrage", "D": "Surveillance et maîtrise"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 1, "tags": ["intégration", "démarrage", "groupes de processus"], "explanation": "Élaborer la charte du projet est un processus du groupe Démarrage. Il marque le début officiel du projet ou d'une phase du projet (PMBOK 6, Section 4.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 215},
  {"id": "q-0216", "question": "Lequel des éléments suivants est un INTRANT du processus 'Élaborer la charte du projet' ?", "options": {"A": "Plan de management des risques", "B": "Cas d'affaire", "C": "Registre des parties prenantes", "D": "Structure de découpage du projet"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["intégration", "ITTO", "charte"], "explanation": "Le cas d'affaire (Business Case) est un intrant clé du processus Élaborer la charte du projet. Il fournit les informations nécessaires pour justifier le projet du point de vue économique (PMBOK 6, Section 4.1.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 216},
  {"id": "q-0217", "question": "Le plan de management du projet est élaboré lors de quel processus ?", "options": {"A": "Diriger et gérer le travail du projet", "B": "Surveiller et maîtriser le travail du projet", "C": "Élaborer le plan de management du projet", "D": "Réaliser la maîtrise intégrée des modifications"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 1, "tags": ["intégration", "planification", "PMP"], "explanation": "Le processus 'Élaborer le plan de management du projet' produit le plan de management du projet en tant qu'EXTRANT principal. Ce plan intègre tous les plans subsidiaires (PMBOK 6, Section 4.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 217},
  {"id": "q-0218", "question": "Un chef de projet reçoit une demande de modification en cours d'exécution. Quel processus est responsable de l'approbation ou du rejet des modifications ?", "options": {"A": "Diriger et gérer le travail du projet", "B": "Réaliser la maîtrise intégrée des modifications", "C": "Surveiller et maîtriser le travail du projet", "D": "Clore le projet ou la phase"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["intégration", "contrôle des modifications"], "explanation": "La maîtrise intégrée des modifications est le processus qui examine les demandes de modification, les approuve et gère les modifications apportées aux livrables, aux actifs organisationnels et au plan de management du projet (PMBOK 6, Section 4.6).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 218},
  {"id": "q-0219", "question": "Un projet se termine avec succès. Quelle est la dernière étape formelle que le chef de projet doit effectuer ?", "options": {"A": "Archiver la documentation du projet", "B": "Obtenir l'acceptation des livrables finaux", "C": "Clore le projet ou la phase", "D": "Libérer les ressources du projet"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["intégration", "clôture"], "explanation": "Clore le projet ou la phase est le dernier processus du management de projet. Il finalise toutes les activités et transfère formellement le produit, service ou résultat. La fermeture formelle inclut notamment les leçons apprises (PMBOK 6, Section 4.7).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 219},
  {"id": "q-0220", "question": "Quel est l'EXTRANT principal du processus 'Diriger et gérer le travail du projet' ?", "options": {"A": "Mesures de performance du travail", "B": "Livrables", "C": "Données de performance du travail", "D": "Demandes de modification approuvées"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["intégration", "ITTO", "exécution"], "explanation": "Les données de performance du travail (raw data) sont un EXTRANT clé du processus Diriger et gérer le travail du projet. Ces données brutes sont ensuite analysées dans les processus de surveillance pour devenir des informations puis des rapports de performance (PMBOK 6, Section 4.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 220},
  {"id": "q-0221", "question": "Quel outil/technique est utilisé dans le processus 'Gérer les connaissances du projet' ?", "options": {"A": "Analyse des parties prenantes", "B": "Gestion des connaissances", "C": "Analyse de la valeur acquise", "D": "Décomposition"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["intégration", "connaissances", "ITTO"], "explanation": "La gestion des connaissances est un outil/technique clé du processus Gérer les connaissances du projet. Elle vise à connecter les personnes qui ont besoin de savoir avec celles qui savent, créant ainsi de nouvelles connaissances organisationnelles (PMBOK 6, Section 4.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 221},
  {"id": "q-0222", "question": "Quel document décrit comment le périmètre du projet sera défini, validé et maîtrisé ?", "options": {"A": "L'énoncé du périmètre du projet", "B": "Le plan de management du périmètre", "C": "La structure de découpage du projet (SDP)", "D": "Le registre des exigences"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["périmètre", "planification"], "explanation": "Le plan de management du périmètre documente comment le périmètre du projet sera défini, développé, surveillé, contrôlé et validé. C'est l'EXTRANT du processus Planifier le management du périmètre (PMBOK 6, Section 5.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 222},
  {"id": "q-0223", "question": "La technique des 'ateliers dirigés' (facilitated workshops) est principalement utilisée dans quel processus du management du périmètre ?", "options": {"A": "Valider le périmètre", "B": "Maîtriser le périmètre", "C": "Recueillir les exigences", "D": "Créer la SDP"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["périmètre", "exigences", "ITTO"], "explanation": "Les ateliers dirigés sont une technique clé du processus Recueillir les exigences. Ils rassemblent des parties prenantes clés pour définir rapidement les exigences inter-fonctionnelles et réconcilier les différences (PMBOK 6, Section 5.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 223},
  {"id": "q-0224", "question": "Quelle est la différence entre 'Valider le périmètre' et 'Maîtriser la qualité' ?", "options": {"A": "Valider le périmètre se concentre sur l'exactitude des livrables ; la qualité se concentre sur leur acceptation", "B": "Valider le périmètre se concentre sur l'acceptation formelle des livrables ; la qualité se concentre sur l'exactitude", "C": "Valider le périmètre implique le client ; la qualité est interne à l'équipe", "D": "Il n'y a pas de différence significative entre les deux processus"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["périmètre", "qualité", "validation"], "explanation": "Valider le périmètre se concentre sur l'acceptation formelle des livrables par le client ou sponsor. Maîtriser la qualité vérifie que les livrables sont corrects et respectent les standards de qualité définis. La qualité précède généralement la validation (PMBOK 6, Section 5.5).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 224},
  {"id": "q-0225", "question": "La Structure de Découpage du Projet (SDP) représente :", "options": {"A": "La séquence dans laquelle les activités doivent être réalisées", "B": "Une décomposition hiérarchique du travail à accomplir pour produire les livrables", "C": "La liste des ressources nécessaires pour chaque activité", "D": "Le budget alloué à chaque phase du projet"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 1, "tags": ["périmètre", "SDP", "WBS"], "explanation": "La SDP (WBS en anglais) est une décomposition hiérarchique orientée livrables de l'ensemble du travail à exécuter par l'équipe de projet pour atteindre les objectifs et produire les livrables requis (PMBOK 6, Section 5.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 225},
  {"id": "q-0226", "question": "Le 'rampement du périmètre' (scope creep) se produit quand :", "options": {"A": "Le périmètre est officiellement étendu après approbation", "B": "Des modifications non contrôlées s'ajoutent progressivement au périmètre du projet", "C": "Le client réduit le périmètre en cours de projet", "D": "Le chef de projet refuse d'ajouter de nouvelles fonctionnalités"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["périmètre", "scope creep", "maîtrise"], "explanation": "Le rampement du périmètre (scope creep) désigne l'ajout non contrôlé de fonctionnalités ou d'exigences sans passer par le processus de maîtrise des modifications. C'est l'une des causes les plus fréquentes de dépassement de budget et de délais (PMBOK 6, Section 5.6).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 226},
  {"id": "q-0227", "question": "Le dictionnaire de la SDP fournit :", "options": {"A": "La liste des jalons du projet", "B": "Une description détaillée du travail pour chaque lot de travail", "C": "Les ressources assignées à chaque activité", "D": "Les dépendances entre les activités du projet"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["périmètre", "SDP", "dictionnaire"], "explanation": "Le dictionnaire de la SDP est un document qui fournit des informations détaillées sur chaque composant de la SDP, incluant la description du travail, les critères d'acceptation, les ressources, les coûts, etc. (PMBOK 6, Section 5.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 227},
  {"id": "q-0228", "question": "La méthode du chemin critique (Critical Path Method - CPM) permet de :", "options": {"A": "Identifier les activités qui peuvent être retardées sans affecter la date de fin du projet", "B": "Calculer le coût total du projet", "C": "Identifier la séquence d'activités la plus longue qui détermine la durée du projet", "D": "Évaluer la probabilité d'achever le projet à la date prévue"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["délais", "CPM", "chemin critique"], "explanation": "La méthode du chemin critique (CPM) identifie la séquence la plus longue d'activités dépendantes dans un projet, déterminant ainsi la durée minimale du projet. Les activités sur le chemin critique ont une marge totale nulle (PMBOK 6, Section 6.5).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 228},
  {"id": "q-0229", "question": "Quelle est la définition de la 'marge totale' (total float) d'une activité ?", "options": {"A": "Le temps dont peut être retardée une activité sans retarder le début de l'activité suivante", "B": "Le temps dont peut être retardée une activité sans retarder la date de fin du projet", "C": "Le temps supplémentaire ajouté au planning pour gérer les incertitudes", "D": "La différence entre la durée optimiste et la durée pessimiste d'une activité"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["délais", "marge", "float"], "explanation": "La marge totale est la durée totale dont peut être retardée ou prolongée une activité par rapport à sa date de début au plus tôt sans retarder la date de fin du projet ni violer une contrainte d'échéancier (PMBOK 6, Section 6.5).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 229},
  {"id": "q-0230", "question": "Dans la méthode PERT, quelle est la formule pour calculer la durée estimée (Te) ?", "options": {"A": "Te = (O + M + P) / 3", "B": "Te = (O + 4M + P) / 6", "C": "Te = (O + 2M + P) / 4", "D": "Te = (O + 3M + P) / 5"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["délais", "PERT", "estimation"], "explanation": "La formule PERT utilise une moyenne pondérée : Te = (Optimiste + 4 × la plus probable + Pessimiste) / 6. La valeur la plus probable (M) reçoit 4 fois le poids des valeurs extrêmes car elle est jugée la plus représentative (PMBOK 6, Section 6.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 230},
  {"id": "q-0231", "question": "Le 'fast tracking' (compression par chevauchement) consiste à :", "options": {"A": "Ajouter des ressources supplémentaires pour réduire la durée des activités", "B": "Exécuter des activités en parallèle qui seraient normalement séquentielles", "C": "Réduire le périmètre du projet pour respecter les délais", "D": "Utiliser une technologie plus rapide pour réaliser les livrables"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["délais", "fast tracking", "compression"], "explanation": "Le fast tracking est une technique de compression d'échéancier qui exécute en parallèle des phases ou activités normalement séquentielles. Cela augmente le risque et peut nécessiter du retravail (PMBOK 6, Section 6.6).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 231},
  {"id": "q-0232", "question": "Le 'crashing' (compression par ajout de ressources) est une technique qui :", "options": {"A": "Réduit le périmètre pour accélérer le projet", "B": "Exécute des activités en parallèle pour gagner du temps", "C": "Ajoute des ressources pour réduire les durées des activités critiques", "D": "Retire des fonctionnalités non essentielles du projet"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["délais", "crashing", "compression"], "explanation": "Le crashing est une technique qui cherche à raccourcir l'échéancier avec le coût additionnel le plus faible. On ajoute des ressources (heures supplémentaires, équipes supplémentaires) aux activités du chemin critique (PMBOK 6, Section 6.6).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 232},
  {"id": "q-0233", "question": "Un diagramme réseau de projet (PDM) utilisant la méthode des antécédents peut représenter quel type de dépendance ?", "options": {"A": "Fin-Début uniquement", "B": "Début-Début, Fin-Début, Début-Fin, Fin-Fin", "C": "Début-Début et Fin-Fin uniquement", "D": "Fin-Début et Début-Début uniquement"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["délais", "PDM", "dépendances"], "explanation": "La méthode des antécédents (PDM) peut représenter quatre types de dépendances : Fin-Début (FS), Fin-Fin (FF), Début-Début (SS), et Début-Fin (SF). La relation FS est la plus courante (PMBOK 6, Section 6.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 233},
  {"id": "q-0234", "question": "Quelle est la différence entre une contrainte 'Au plus tôt' (ASAP) et une contrainte 'Au plus tard' (ALAP) dans un planning de projet ?", "options": {"A": "ASAP planifie une activité le plus tôt possible ; ALAP la planifie le plus tard possible sans retarder le projet", "B": "ASAP s'applique aux activités critiques ; ALAP aux activités non critiques", "C": "ASAP augmente les risques ; ALAP réduit les coûts", "D": "Il n'y a pas de différence pratique entre les deux"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["délais", "contraintes", "planification"], "explanation": "ASAP (As Soon As Possible) planifie l'activité le plus tôt possible dans le planning. ALAP (As Late As Possible) planifie l'activité aussi tard que possible sans compromettre la date de fin du projet. ALAP est utile pour reporter les dépenses (PMBOK 6, Section 6.5).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 234},
  {"id": "q-0235", "question": "La Valeur Acquise (VA ou EV) est définie comme :", "options": {"A": "Le budget alloué au travail planifié", "B": "Le coût réel engagé pour le travail accompli", "C": "La valeur du budget autorisé pour le travail réellement accompli", "D": "La différence entre le budget prévu et le coût réel"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["coûts", "EVM", "valeur acquise"], "explanation": "La Valeur Acquise (VA/EV) est la valeur du budget autorisé affecté au travail effectivement accompli. C'est la mesure physique de l'avancement du projet exprimée en valeur monétaire (PMBOK 6, Section 7.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 235},
  {"id": "q-0236", "question": "La Valeur Planifiée (VP ou PV) représente :", "options": {"A": "Le coût total prévu du projet", "B": "Le budget autorisé pour le travail prévu à une date donnée", "C": "La valeur gagnée par le projet à ce jour", "D": "Le budget restant pour compléter le projet"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["coûts", "EVM", "valeur planifiée"], "explanation": "La Valeur Planifiée (VP/PV) est le budget autorisé affecté au travail devant être accompli pour une activité ou un composant de la SDP à une date donnée. Elle représente ce qui était prévu d'être fait (PMBOK 6, Section 7.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 236},
  {"id": "q-0237", "question": "L'Écart de Délai (ED ou SV) est calculé par la formule :", "options": {"A": "SV = EV - AC", "B": "SV = PV - EV", "C": "SV = EV - PV", "D": "SV = BAC - EV"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["coûts", "EVM", "écart délai"], "explanation": "L'Écart de Délai (SV = Schedule Variance) = EV - PV. Un SV positif indique que le projet est en avance sur le planning. Un SV négatif signifie un retard (PMBOK 6, Section 7.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 237},
  {"id": "q-0238", "question": "L'Indice de Performance des Coûts (IPC ou CPI) est calculé par :", "options": {"A": "CPI = PV / EV", "B": "CPI = EV / AC", "C": "CPI = AC / EV", "D": "CPI = EV / PV"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["coûts", "EVM", "CPI"], "explanation": "Le CPI (Cost Performance Index) = EV / AC. Un CPI > 1 signifie que le projet réalise plus de valeur par dollar dépensé que prévu (sous le budget). Un CPI < 1 indique un dépassement budgétaire (PMBOK 6, Section 7.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 238},
  {"id": "q-0239", "question": "Le Budget à l'Achèvement (BAC) vaut 500 000 €. La Valeur Acquise (EV) est de 200 000 € et le Coût Réel (AC) est de 250 000 €. Quelle est l'Estimation à Achèvement (EAC) si la tendance actuelle se maintient ?", "options": {"A": "550 000 €", "B": "625 000 €", "C": "450 000 €", "D": "500 000 €"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["coûts", "EVM", "EAC", "calcul"], "explanation": "EAC = BAC / CPI. CPI = EV/AC = 200 000/250 000 = 0,8. EAC = 500 000 / 0,8 = 625 000 €. Le projet est en dépassement de coût et si la tendance se maintient, le coût final sera 625 000 € (PMBOK 6, Section 7.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 239},
  {"id": "q-0240", "question": "Le budget d'un projet est de 1 000 000 €. À ce jour, la Valeur Acquise (EV) est 400 000 € et la Valeur Planifiée (PV) est 500 000 €. L'Indice de Performance des Délais (SPI) est :", "options": {"A": "0,8 — le projet est en retard", "B": "1,25 — le projet est en avance", "C": "0,8 — le projet est en avance", "D": "1,25 — le projet est en retard"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["coûts", "EVM", "SPI", "calcul"], "explanation": "SPI = EV/PV = 400 000/500 000 = 0,8. Un SPI < 1 signifie que le projet est en retard sur le planning (on a accompli seulement 80% de ce qui était prévu). Un SPI > 1 signifie de l'avance (PMBOK 6, Section 7.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 240},
  {"id": "q-0241", "question": "Quelle est la différence entre le budget de référence (baseline) des coûts et le budget du projet ?", "options": {"A": "Il n'y a pas de différence", "B": "La référence de base des coûts exclut les réserves de management", "C": "La référence de base des coûts inclut les réserves de management", "D": "Le budget du projet exclut les coûts de main-d'œuvre"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["coûts", "budget", "réserves"], "explanation": "La référence de base des coûts (cost baseline) inclut les réserves pour aléas (contingency reserves) mais exclut les réserves de management. Le budget du projet = référence de base des coûts + réserves de management (PMBOK 6, Section 7.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 241},
  {"id": "q-0242", "question": "La technique d'estimation 'Bottom-Up' consiste à :", "options": {"A": "Utiliser l'expérience d'un expert pour estimer globalement le projet", "B": "Comparer le projet avec des projets similaires passés", "C": "Estimer les travaux individuels et agrégés des niveaux inférieurs", "D": "Utiliser des paramètres statistiques pour prévoir les coûts"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["coûts", "estimation", "bottom-up"], "explanation": "L'estimation ascendante (Bottom-Up) consiste à estimer le coût de chaque lot de travail individuel à partir des niveaux les plus bas, puis à agréger pour obtenir le coût total. C'est la méthode la plus précise mais aussi la plus longue (PMBOK 6, Section 7.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 242},
  {"id": "q-0243", "question": "Le coût de la qualité (CoQ) comprend :", "options": {"A": "Uniquement les coûts de prévention et d'évaluation", "B": "Les coûts de prévention, d'évaluation et de défaillance (interne et externe)", "C": "Uniquement les coûts de correction des défauts", "D": "Le salaire de l'équipe qualité uniquement"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["qualité", "CoQ", "coût de la qualité"], "explanation": "Le coût de la qualité comprend trois catégories : les coûts de prévention (éviter les défauts), les coûts d'évaluation/inspection (vérifier la conformité), et les coûts de défaillance (interne = défauts trouvés avant livraison, externe = défauts trouvés par le client) (PMBOK 6, Section 8.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 243},
  {"id": "q-0244", "question": "Quelle différence y a-t-il entre 'assurance qualité' et 'maîtrise de la qualité' ?", "options": {"A": "L'assurance qualité est proactive (processus) ; la maîtrise de la qualité est réactive (livrables)", "B": "L'assurance qualité inspecte les livrables ; la maîtrise audite les processus", "C": "Il n'y a pas de différence — les deux termes sont synonymes", "D": "L'assurance qualité est faite en interne ; la maîtrise par des tiers"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["qualité", "assurance", "maîtrise"], "explanation": "L'assurance qualité est proactive : elle audite les processus pour garantir qu'ils sont appropriés et produiront des résultats conformes. La maîtrise de la qualité est réactive : elle inspecte les livrables et compare les résultats aux standards de qualité (PMBOK 6, Sections 8.2 et 8.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 244},
  {"id": "q-0245", "question": "Un diagramme de Pareto est utilisé pour :", "options": {"A": "Montrer la relation cause-effet entre les problèmes", "B": "Identifier les causes les plus importantes d'un problème (règle 80/20)", "C": "Suivre l'évolution d'un processus dans le temps", "D": "Comparer les performances de différentes équipes"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["qualité", "Pareto", "outils qualité"], "explanation": "Le diagramme de Pareto (basé sur la règle 80/20) identifie et classe les causes de problèmes par ordre d'importance. Il aide à concentrer les efforts sur les quelques causes vitales (environ 20%) qui produisent la majorité des problèmes (environ 80%) (PMBOK 6, Section 8.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 245},
  {"id": "q-0246", "question": "Quelle est l'utilité d'une carte de contrôle (control chart) dans le management de la qualité ?", "options": {"A": "Identifier toutes les causes possibles d'un défaut", "B": "Déterminer si un processus est stable et prévisible", "C": "Comparer deux alternatives de conception", "D": "Calculer le coût de correction des défauts"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["qualité", "carte de contrôle", "outils qualité"], "explanation": "Une carte de contrôle est un graphique qui trace les résultats d'un processus dans le temps et montre si ce processus est 'sous contrôle' (stable et prévisible). Elle définit des limites de contrôle supérieure et inférieure pour identifier les variations anormales (PMBOK 6, Section 8.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 246},
  {"id": "q-0247", "question": "Le diagramme cause-effet (diagramme d'Ishikawa) est aussi appelé :", "options": {"A": "Diagramme de Pareto", "B": "Diagramme en arête de poisson ou diagramme de Fishbone", "C": "Diagramme de dispersion", "D": "Histogramme de fréquence"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 1, "tags": ["qualité", "Ishikawa", "outils qualité"], "explanation": "Le diagramme cause-effet est aussi connu sous le nom de diagramme d'Ishikawa, diagramme en arête de poisson (fishbone diagram), ou diagramme en arête (PMBOK 6, Section 8.1). Il permet d'identifier les causes racines potentielles d'un problème.", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 247},
  {"id": "q-0248", "question": "La théorie de Maslow dans le contexte du management de projet suggère que :", "options": {"A": "Les membres d'équipe sont principalement motivés par l'argent", "B": "Les besoins humains suivent une hiérarchie de la survie à l'épanouissement", "C": "Un chef de projet doit surveiller étroitement chaque activité", "D": "La motivation diminue lorsque les objectifs sont trop difficiles"}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["ressources", "motivation", "Maslow"], "explanation": "La hiérarchie des besoins de Maslow stipule que les individus sont motivés par des besoins organisés en pyramide : physiologiques, sécurité, appartenance, estime, et réalisation de soi. Les besoins inférieurs doivent être satisfaits avant que les supérieurs deviennent motivants (PMBOK 6, Section 9.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 248},
  {"id": "q-0249", "question": "Selon la théorie X et Y de McGregor, un manager qui adopte la théorie X croit que :", "options": {"A": "Les employés s'auto-motivent et cherchent les responsabilités", "B": "Les employés cherchent naturellement à contribuer à l'organisation", "C": "Les employés évitent le travail et ont besoin d'être contrôlés de près", "D": "La créativité est largement répandue dans l'organisation"}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["ressources", "motivation", "McGregor"], "explanation": "La théorie X de McGregor suppose que les travailleurs sont naturellement paresseux, évitent les responsabilités et doivent être contrôlés et dirigés. La théorie Y suppose à l'inverse que les gens aiment travailler et s'auto-disciplinent (PMBOK 6, Section 9.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 249},
  {"id": "q-0250", "question": "Un chef de projet constate que deux membres de son équipe sont en conflit. Quelle est généralement la meilleure approche pour résoudre durablement ce conflit ?", "options": {"A": "Arbitrage — le chef de projet décide de la solution", "B": "Évitement — laisser le conflit se résoudre seul avec le temps", "C": "Compromis — chacun cède sur quelques points", "D": "Collaboration/résolution de problème — trouver une solution satisfaisante pour tous"}, "correct": "D", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["ressources", "conflits", "résolution"], "explanation": "La résolution de problème (collaboration) est la technique de résolution de conflits la plus efficace à long terme selon le PMBOK 6. Elle implique d'incorporer plusieurs points de vue et perspectives pour parvenir à une solution consensuelle et durable. L'évitement et le lissage sont les moins efficaces (PMBOK 6, Section 9.5).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 250},
  {"id": "q-0251", "question": "Qu'est-ce qu'un histogramme des ressources ?", "options": {"A": "Un graphique montrant l'affectation des ressources dans le temps", "B": "Une liste des compétences requises pour chaque activité", "C": "Le budget alloué aux ressources humaines", "D": "L'organigramme de l'équipe projet"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["ressources", "histogramme", "planification"], "explanation": "Un histogramme des ressources est un graphique à barres qui montre la quantité de ressources (en heures ou en nombre) requises par période de temps. Il permet d'identifier les sur-affectations et de niveler les ressources (PMBOK 6, Section 9.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 251},
  {"id": "q-0252", "question": "Le modèle de développement d'équipe de Tuckman identifie les phases dans cet ordre :", "options": {"A": "Formation, Turbulences, Normalisation, Exécution, Dissolution", "B": "Planification, Exécution, Surveillance, Clôture, Révision", "C": "Initiation, Développement, Production, Performance, Clôture", "D": "Formation, Normalisation, Turbulences, Exécution, Dissolution"}, "correct": "A", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["ressources", "Tuckman", "équipe"], "explanation": "Le modèle de Tuckman décrit les phases de développement d'une équipe : Forming (formation), Storming (turbulences/conflits), Norming (normalisation/établissement de règles), Performing (haute performance), et Adjourning (dissolution) (PMBOK 6, Section 9.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 252},
  {"id": "q-0253", "question": "La formule pour calculer le nombre de canaux de communication potentiels dans un projet est :", "options": {"A": "N × (N-1)", "B": "N × (N-1) / 2", "C": "N + (N-1)", "D": "N² / 2"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["communications", "canaux", "formule"], "explanation": "Le nombre de canaux de communication = N(N-1)/2, où N est le nombre de parties prenantes. Par exemple, avec 5 parties prenantes : 5×4/2 = 10 canaux. Cette formule montre pourquoi la communication devient complexe à mesure que le projet grandit (PMBOK 6, Section 10.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 253},
  {"id": "q-0254", "question": "Si un projet passe de 5 à 10 membres, le nombre de canaux de communication potentiels passe de :", "options": {"A": "10 à 25", "B": "10 à 45", "C": "20 à 50", "D": "5 à 20"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["communications", "canaux", "calcul"], "explanation": "Avec 5 membres : 5×4/2 = 10 canaux. Avec 10 membres : 10×9/2 = 45 canaux. L'augmentation est donc de 10 à 45, soit une multiplication par 4,5 pour doubler l'équipe, illustrant la complexité croissante (PMBOK 6, Section 10.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 254},
  {"id": "q-0255", "question": "Quelle est la différence entre communication 'push' et communication 'pull' ?", "options": {"A": "Push est verbal ; pull est écrit", "B": "Push envoie l'information aux destinataires spécifiques ; pull met l'information à disposition sur demande", "C": "Push est formel ; pull est informel", "D": "Push est utilisé en interne ; pull est utilisé avec les clients"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["communications", "push pull", "méthodes"], "explanation": "La communication push envoie l'information directement aux destinataires identifiés (e-mails, lettres, mémos). La communication pull met l'information à disposition dans un dépôt central que les destinataires accèdent à leur guise (portail intranet, bases de données). La communication interactive (réunions) est une troisième méthode (PMBOK 6, Section 10.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 255},
  {"id": "q-0256", "question": "Dans le management des risques du projet, la 'valeur monétaire espérée' (VME/EMV) est calculée par :", "options": {"A": "VME = Probabilité + Impact", "B": "VME = Probabilité × Impact (en valeur monétaire)", "C": "VME = Impact - Probabilité", "D": "VME = Coût de l'atténuation / Probabilité"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "VME", "EMV", "analyse quantitative"], "explanation": "La Valeur Monétaire Espérée (VME/EMV) = Probabilité × Impact. C'est l'outil statistique utilisé pour évaluer les risques et pour l'analyse par arbre de décision. Un risque positif (opportunité) a une VME positive ; un risque négatif (menace) a une VME négative (PMBOK 6, Section 11.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 256},
  {"id": "q-0257", "question": "La stratégie d'atténuation (mitigation) d'un risque négatif vise à :", "options": {"A": "Transférer entièrement le risque à une tierce partie", "B": "Réduire la probabilité et/ou l'impact du risque en dessous d'un seuil acceptable", "C": "Accepter les conséquences si le risque se réalise", "D": "Éliminer complètement la menace en éliminant sa cause"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "atténuation", "stratégies"], "explanation": "L'atténuation (mitigation) vise à réduire la probabilité ou l'impact (ou les deux) d'un risque négatif à un niveau acceptable. C'est différent de l'évitement (qui élimine la cause) et du transfert (qui déplace la responsabilité) (PMBOK 6, Section 11.5).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 257},
  {"id": "q-0258", "question": "La matrice Probabilité × Impact est utilisée dans quel processus du management des risques ?", "options": {"A": "Identifier les risques", "B": "Planifier le management des risques", "C": "Effectuer une analyse qualitative des risques", "D": "Effectuer une analyse quantitative des risques"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "analyse qualitative", "matrice P×I"], "explanation": "La matrice Probabilité × Impact est l'outil principal de l'analyse qualitative des risques. Elle permet de classer les risques (faible, modéré, élevé) en combinant leur probabilité d'occurrence et leur impact potentiel (PMBOK 6, Section 11.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 258},
  {"id": "q-0259", "question": "Un 'risque résiduel' est :", "options": {"A": "Un risque qui n'a pas encore été identifié", "B": "Un risque qui demeure après la mise en œuvre des réponses aux risques", "C": "Un risque qui se réalise en fin de projet", "D": "Un risque créé par la réponse à un autre risque"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "résiduel", "terminologie"], "explanation": "Un risque résiduel est celui qui subsiste après la mise en œuvre des réponses planifiées aux risques. Il est important de documenter et de surveiller les risques résiduels tout au long du projet (PMBOK 6, Section 11.5).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 259},
  {"id": "q-0260", "question": "Un 'risque secondaire' est :", "options": {"A": "Un risque peu probable et à faible impact", "B": "Un risque qui résulte directement de la mise en œuvre d'une réponse à un risque", "C": "Un risque identifié tardivement dans le projet", "D": "Un risque affectant une partie prenante secondaire"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["risques", "secondaire", "terminologie"], "explanation": "Un risque secondaire est un risque qui émerge directement de l'implémentation d'une réponse à un risque. Par exemple, si vous externalisez une activité pour réduire un risque, le nouveau fournisseur peut introduire de nouveaux risques secondaires (PMBOK 6, Section 11.5).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 260},
  {"id": "q-0261", "question": "Les 'réserves pour aléas' (contingency reserves) sont destinées à :", "options": {"A": "Gérer les risques connus identifiés", "B": "Gérer les risques inconnus ('unknown unknowns')", "C": "Financer les demandes de modification approuvées", "D": "Couvrir les coûts de formation de l'équipe"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["risques", "réserves", "contingency"], "explanation": "Les réserves pour aléas (contingency reserves) sont allouées pour les risques connus identifiés (known unknowns). Les réserves de management couvrent les risques inconnus (unknown unknowns). La distinction est importante pour la gestion budgétaire (PMBOK 6, Section 11.5).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 261},
  {"id": "q-0262", "question": "La simulation de Monte Carlo est utilisée dans quel type d'analyse de risques ?", "options": {"A": "Analyse qualitative des risques", "B": "Identification des risques", "C": "Analyse quantitative des risques", "D": "Planification des réponses aux risques"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "Monte Carlo", "analyse quantitative"], "explanation": "La simulation de Monte Carlo est une technique d'analyse quantitative des risques qui utilise des distributions de probabilité pour simuler des milliers de scénarios possibles et produire une distribution de probabilité des résultats possibles (PMBOK 6, Section 11.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 262},
  {"id": "q-0263", "question": "Dans un contrat à prix fixe ferme (FFP - Firm Fixed Price), qui supporte le risque de dépassement de coûts ?", "options": {"A": "Le client supporte la totalité du risque", "B": "Le fournisseur supporte la totalité du risque", "C": "Le risque est partagé équitablement", "D": "Le risque est partagé selon un ratio négocié"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["approvisionnements", "contrats", "FFP"], "explanation": "Dans un contrat FFP, le fournisseur s'engage à livrer à un prix fixe. Si les coûts réels dépassent le prix convenu, le fournisseur absorbe la différence. Ce type de contrat est donc à risque élevé pour le fournisseur mais sûr pour le client (PMBOK 6, Section 12.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 263},
  {"id": "q-0264", "question": "Un contrat en Régie (Cost Plus Fixed Fee - CPFF) se caractérise par :", "options": {"A": "Un prix total fixe convenu à l'avance", "B": "Le remboursement des coûts réels plus des honoraires fixes", "C": "Le remboursement des coûts plus un pourcentage des coûts comme honoraires", "D": "Un prix fixe avec des incitations basées sur la performance"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["approvisionnements", "contrats", "CPFF"], "explanation": "Dans un contrat CPFF (Cost Plus Fixed Fee), le client rembourse tous les coûts admissibles du fournisseur, plus des honoraires fixes. Le risque financier est supporté par le client. Les honoraires fixes ne varient pas avec les coûts réels (PMBOK 6, Section 12.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 264},
  {"id": "q-0265", "question": "Quel document est utilisé pour solliciter des informations de prix sur des achats simples et standardisés ?", "options": {"A": "Appel d'offres (RFP - Request for Proposal)", "B": "Demande d'information (RFI - Request for Information)", "C": "Demande de devis (RFQ - Request for Quotation)", "D": "Invitation à soumissionner (IFB - Invitation for Bid)"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["approvisionnements", "RFQ", "sollicitation"], "explanation": "La Demande de Devis (RFQ) est utilisée quand le prix est le principal facteur de sélection et que les produits ou services sont standardisés. L'Appel d'offres (RFP) est utilisé quand la solution ou l'approche doit être définie par le fournisseur (PMBOK 6, Section 12.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 265},
  {"id": "q-0266", "question": "La grille Pouvoir/Intérêt dans l'analyse des parties prenantes classe les parties prenantes selon :", "options": {"A": "Leur influence sur le budget et leur présence physique", "B": "Leur niveau d'autorité et leur niveau d'engagement actif dans les résultats du projet", "C": "Leur ancienneté dans l'entreprise et leur expertise technique", "D": "Leur position hiérarchique et leur accès à l'information"}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["parties prenantes", "grille pouvoir/intérêt", "analyse"], "explanation": "La grille Pouvoir/Intérêt classe les parties prenantes selon leur niveau de pouvoir (autorité) et d'intérêt (engagement actif) dans le projet. Elle aide le chef de projet à déterminer quelle attention accorder à chaque groupe (PMBOK 6, Section 13.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 266},
  {"id": "q-0267", "question": "Quel est le niveau d'engagement souhaitable pour la plupart des parties prenantes clés d'un projet ?", "options": {"A": "Non informées", "B": "Résistantes", "C": "Neutres", "D": "Chefs de file (Leading)"}, "correct": "D", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["parties prenantes", "engagement", "niveaux"], "explanation": "Pour les parties prenantes clés, le niveau d'engagement souhaitable est 'Chefs de file (Leading)' — elles connaissent le projet, ses résultats potentiels et s'engagent activement pour sa réussite. Le niveau actuel est comparé au niveau souhaité dans le plan d'engagement des parties prenantes (PMBOK 6, Section 13.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 267},
  {"id": "q-0268", "question": "Le processus 'Identifier les parties prenantes' produit comme EXTRANT principal :", "options": {"A": "Le plan de management des parties prenantes", "B": "Le registre des parties prenantes", "C": "La grille Pouvoir/Intérêt", "D": "Le plan de communication du projet"}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 1, "tags": ["parties prenantes", "registre", "ITTO"], "explanation": "Le registre des parties prenantes est l'EXTRANT principal du processus Identifier les parties prenantes. Il contient des informations sur chaque partie prenante identifiée, ses intérêts, son niveau d'engagement, son potentiel d'impact, etc. (PMBOK 6, Section 13.1).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 268},
  {"id": "q-0269", "question": "Un chef de projet dirige un projet dans une organisation matricielle faible. Cela signifie que :", "options": {"A": "Le chef de projet a une autorité totale sur les ressources", "B": "Le chef de projet a peu d'autorité et partage le contrôle avec les responsables fonctionnels", "C": "Il n'y a pas de chef de projet — les responsables fonctionnels gèrent le projet", "D": "L'équipe projet est dédiée à 100% et ne répond qu'au chef de projet"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["organisation", "structure matricielle", "autorité"], "explanation": "Dans une organisation matricielle faible, l'autorité du chef de projet est limitée. Les responsables fonctionnels contrôlent les ressources et les décisions. À l'opposé, dans une matrice forte, le chef de projet a plus d'autorité (PMBOK 6, Section 2.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 269},
  {"id": "q-0270", "question": "Dans quel type d'organisation le chef de projet a-t-il le plus d'autorité ?", "options": {"A": "Organisation fonctionnelle", "B": "Organisation matricielle faible", "C": "Organisation matricielle équilibrée", "D": "Organisation orientée projet (projectisée)"}, "correct": "D", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["organisation", "projectisée", "autorité"], "explanation": "Dans une organisation orientée projet (projectisée), le chef de projet a une autorité totale ou quasi-totale. L'entreprise est organisée autour des projets, et les membres d'équipe sont souvent dédiés à 100%. C'est l'opposé de l'organisation fonctionnelle où le chef de projet a très peu d'autorité (PMBOK 6, Section 2.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 270},
  {"id": "q-0271", "question": "Les actifs organisationnels (OPAs) incluent :", "options": {"A": "La culture d'entreprise et la structure organisationnelle", "B": "Les politiques, procédures, bases de données de leçons apprises de l'organisation", "C": "Les conditions du marché et les réglementations gouvernementales", "D": "La technologie disponible et les infrastructures"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["OPA", "actifs organisationnels", "fondamentaux"], "explanation": "Les Actifs Organisationnels (OPA - Organizational Process Assets) sont les plans, processus, politiques, procédures et bases de connaissances spécifiques à l'organisation et utilisables dans l'exécution et la gestion des projets. Les facteurs environnementaux de l'entreprise (EEF) incluent des éléments comme la culture et les conditions de marché (PMBOK 6, Section 2.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 271},
  {"id": "q-0272", "question": "Un chef de projet doit prendre une décision éthique difficile. Selon le Code d'éthique du PMI, quelle valeur doit primer ?", "options": {"A": "La loyauté envers le sponsor du projet", "B": "La responsabilité, l'honnêteté, le respect et la justice", "C": "L'achèvement du projet dans les délais et budget", "D": "La satisfaction des parties prenantes les plus influentes"}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["éthique", "PMI", "valeurs"], "explanation": "Le Code d'éthique et de déontologie du PMI repose sur quatre valeurs : la responsabilité (prendre les bonnes décisions), le respect (dignité des personnes), l'équité/justice (décisions impartiales), et l'honnêteté (vérité et transparence). Ces valeurs priment sur les pressions de performance (PMBOK 6, Annexe).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 272},
  {"id": "q-0273", "question": "Un jalon (milestone) dans un projet est :", "options": {"A": "Une activité critique du chemin critique", "B": "Un point de contrôle ou événement significatif avec une durée nulle", "C": "Une phase du projet avec un budget défini", "D": "Une réunion de suivi mensuelle avec les parties prenantes"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 1, "tags": ["jalons", "planification", "fondamentaux"], "explanation": "Un jalon est un point ou événement significatif dans un projet. À la différence des activités, les jalons ont une durée de zéro. Ils servent de points de référence pour marquer des accomplissements importants ou des contraintes d'échéancier (PMBOK 6, Section 6.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 273},
  {"id": "q-0274", "question": "La technique 'Delphi' est utilisée pour :", "options": {"A": "Estimer les durées des activités", "B": "Atteindre un consensus d'experts de manière anonyme", "C": "Identifier les activités du chemin critique", "D": "Calculer le budget du projet"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["Delphi", "experts", "consensus"], "explanation": "La technique Delphi est une méthode de collecte d'informations qui utilise plusieurs rounds d'interrogation anonyme d'experts pour atteindre un consensus. L'anonymat permet d'éviter le biais de conformité. Elle est utilisée notamment pour l'identification des risques (PMBOK 6, Section 11.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 274},
  {"id": "q-0275", "question": "Quelle est la différence entre un 'livrable' et une 'sortie' (output) de processus ?", "options": {"A": "Un livrable est exclusivement externe ; une sortie peut être interne", "B": "Un livrable est un produit tangible ; une sortie peut être un service ou un résultat", "C": "Il n'y a pas de différence — les termes sont synonymes dans le PMBOK", "D": "Une sortie est approuvée par le client ; un livrable l'est par le chef de projet"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["livrables", "terminologie", "fondamentaux"], "explanation": "Dans le PMBOK 6, un livrable est tout résultat, résultat ou capacité unique et vérifiable pour exécuter un service, qui est requis d'être produit pour achever un processus, phase ou projet. Les livrables peuvent être internes ou externes. Toute sortie d'un processus peut être un livrable (PMBOK 6, Glossaire).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 275},
  {"id": "q-0276", "question": "Dans la gestion intégrée des modifications, une demande de modification peut être initiée par :", "options": {"A": "Uniquement le sponsor du projet", "B": "Uniquement le client ou les parties prenantes externes", "C": "Toute partie prenante du projet", "D": "Uniquement le chef de projet ou le comité de pilotage"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["modifications", "intégration", "demandes"], "explanation": "Toute partie prenante peut initier une demande de modification. Ces demandes sont documentées et passent par le processus formel de maîtrise intégrée des modifications pour évaluation, approbation ou rejet par les personnes autorisées (PMBOK 6, Section 4.6).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 276},
