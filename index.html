  {"id": "q-0363", "question": "L'analyse par arbre de décision (decision tree analysis) est particulièrement utile pour :", "options": {"A": "Identifier des risques non encore découverts", "B": "Évaluer plusieurs scénarios avec des incertitudes et calculer la VME", "C": "Planifier les réponses aux risques critiques", "D": "Estimer la probabilité des risques qualitativement"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "arbre de décision", "VME"], "explanation": "L'arbre de décision est une technique d'analyse quantitative des risques qui modélise les décisions et leurs conséquences incertaines. Il calcule la valeur monétaire espérée (VME) de différentes options pour guider les décisions sous incertitude (PMBOK 6, Section 11.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 363},
  {"id": "q-0364", "question": "Lors du processus 'Surveiller les risques', un risque prévu se matérialise. Le chef de projet doit :", "options": {"A": "Mettre à jour le registre des risques et n'en rien faire d'autre", "B": "Appliquer le plan de contingence préparé et documenter l'événement", "C": "Créer une nouvelle stratégie de réponse depuis le début", "D": "Escalader immédiatement au sponsor sans analyse préalable"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "surveillance", "contingence"], "explanation": "Quand un risque identifié se matérialise, le chef de projet applique le plan de contingence (ou response plan) préparé lors de la planification des réponses. L'événement est documenté comme problème (issue) et le registre des risques est mis à jour (PMBOK 6, Section 11.7).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 364},
  {"id": "q-0365", "question": "La matrice de l'évaluation de l'engagement des parties prenantes comporte 5 niveaux. Dans quel ordre sont-ils ?", "options": {"A": "Non informé, Résistant, Neutre, Soutenant, Chef de file", "B": "Opposant, Neutre, Passif, Actif, Promoteur", "C": "Indifférent, Conscient, Soutenant, Résistant, Promoteur", "D": "Non informé, Conscient, Résistant, Soutenant, Chef de file"}, "correct": "D", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": ["parties prenantes", "engagement", "matrice"], "explanation": "Les 5 niveaux d'engagement dans la matrice PMBOK 6 sont : Uninformed (Non informé), Resistant (Résistant), Neutral (Neutre), Supportive (Soutenant), et Leading (Chef de file). Le chef de projet compare l'engagement actuel (C) à l'engagement souhaité (D) pour chaque partie prenante (PMBOK 6, Section 13.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 365},
  {"id": "q-0366", "question": "Le processus 'Surveiller l'engagement des parties prenantes' appartient à quel groupe de processus ?", "options": {"A": "Planification", "B": "Exécution", "C": "Surveillance et Maîtrise", "D": "Démarrage"}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["parties prenantes", "surveillance", "groupes de processus"], "explanation": "Surveiller l'engagement des parties prenantes est un processus du groupe Surveillance et Maîtrise (Section 13.4 du PMBOK 6). Il compare l'engagement actuel des parties prenantes avec le niveau souhaité et ajuste les stratégies en conséquence.", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 366},
  {"id": "q-0367", "question": "Les 'termes et conditions' d'un contrat sont importants car :", "options": {"A": "Ils définissent uniquement le prix et la date de livraison", "B": "Ils définissent les droits et obligations légaux des deux parties", "C": "Ils remplacent le plan de management des approvisionnements", "D": "Ils sont optionnels pour les contrats en régie"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["approvisionnements", "contrat", "termes"], "explanation": "Les termes et conditions d'un contrat définissent les droits, responsabilités, pénalités, résiliation, confidentialité et obligations légales des deux parties. Ils sont juridiquement contraignants et constituent le cadre de la relation contractuelle (PMBOK 6, Section 12.2).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 367},
  {"id": "q-0368", "question": "Dans le processus de clôture des approvisionnements, qu'est-ce que la 'résiliation pour commodité' ?", "options": {"A": "Un contrat terminé quand les travaux sont complétés", "B": "La fin d'un contrat décidée unilatéralement par le client même sans faute du fournisseur", "C": "La résiliation suite à un manquement grave du fournisseur", "D": "Un accord mutuel pour terminer le contrat anticipativement"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["approvisionnements", "résiliation", "contrats"], "explanation": "La résiliation pour commodité (termination for convenience) permet au client de terminer le contrat à tout moment pour n'importe quelle raison, sans faute du fournisseur. Le fournisseur est alors remboursé pour les coûts engagés et reçoit un profit raisonnable (PMBOK 6, Section 12.3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 368},
  {"id": "q-0369", "question": "La technique 'Planning Poker' en Agile est utilisée pour :", "options": {"A": "Planifier les stories pour le prochain sprint", "B": "Estimer les story points par consensus de l'équipe", "C": "Prioriser le product backlog", "D": "Évaluer les risques des stories complexes"}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 2, "tags": ["agile", "planning poker", "estimation"], "explanation": "Le Planning Poker est une technique d'estimation par consensus utilisant des cartes numérotées (suite de Fibonacci). Chaque membre de l'équipe vote simultanément son estimation, puis les différences sont discutées jusqu'à atteindre un consensus. Cela évite les biais d'ancrage (PMBOK 6 Agile Practice Guide).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 369},
  {"id": "q-0370", "question": "Dans SAFe (Scaled Agile Framework), un 'Program Increment' (PI) est :", "options": {"A": "Un sprint de 2 semaines", "B": "Une période de planification et d'exécution de 8-12 semaines avec plusieurs sprints", "C": "Le backlog d'une Release Train Engineer", "D": "La cérémonie de revue à grande échelle"}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 3, "tags": ["agile", "SAFe", "PI Planning", "at scale"], "explanation": "Un Program Increment (PI) dans SAFe est typiquement une période de 8-12 semaines durant laquelle les équipes Agile fournissent de la valeur. Il comprend plusieurs sprints et se termine par un PI Planning et une Innovation & Planning Iteration (PMBOK 6 Agile Practice Guide, Appendix X3).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 370},
  {"id": "q-0371", "question": "Quelle est la principale différence entre Scrum et Kanban ?", "options": {"A": "Scrum est plus adapté aux projets de maintenance ; Kanban au développement logiciel", "B": "Scrum utilise des sprints à durée fixe ; Kanban utilise un flux continu sans itérations", "C": "Kanban est uniquement utilisé dans l'industrie manufacturière", "D": "Scrum ne limite pas le WIP ; Kanban exige des sprints de 2 semaines"}, "correct": "B", "domain": "Process", "approach": "Agile", "difficulty": 2, "tags": ["agile", "scrum", "kanban", "comparaison"], "explanation": "Scrum utilise des sprints à durée fixe (1-4 semaines) avec des rôles et cérémonies définis. Kanban utilise un flux continu de travail avec des limites WIP mais sans sprints ni rôles prescrits. Les deux peuvent être combinés (Scrumban) (PMBOK 6 Agile Practice Guide).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 371},
  {"id": "q-0372", "question": "Un chef de projet découvre que des données ont été falsifiées dans les rapports de performance pour cacher des problèmes au client. Que doit-il faire ?", "options": {"A": "Corriger silencieusement les données sans en parler pour protéger l'équipe", "B": "Ignorer si cela n'impacte pas significativement le projet", "C": "Corriger les données, informer le client et si nécessaire signaler l'incident à la hiérarchie", "D": "Attendre la fin du projet pour révéler les problèmes"}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 3, "tags": ["éthique", "intégrité", "reporting"], "explanation": "Le Code d'éthique du PMI exige honnêteté et intégrité. Falsifier des données est une violation grave — le chef de projet doit corriger les informations, informer le client de la situation réelle et, selon la gravité, signaler l'incident. La dissimulation renforce le problème (PMBOK 6, Annexe — Code d'éthique PMI).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 372},
  {"id": "q-0373", "question": "Un chef de projet reçoit un cadeau de valeur d'un fournisseur dont il évalue l'offre. Selon le Code d'éthique du PMI :", "options": {"A": "Il peut accepter si le cadeau est dans les limites légales locales", "B": "Il doit refuser le cadeau car cela crée un conflit d'intérêts potentiel", "C": "Il peut accepter s'il déclare le cadeau à son manager", "D": "Les cadeaux des fournisseurs sont toujours acceptables dans la culture des affaires"}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["éthique", "conflit d'intérêts", "cadeaux"], "explanation": "Le Code d'éthique du PMI interdit d'accepter des cadeaux ou avantages inappropriés qui pourraient influencer ou paraître influencer les décisions professionnelles. Un cadeau reçu pendant l'évaluation d'une offre crée clairement un conflit d'intérêts (PMBOK 6, Annexe — Code d'éthique PMI).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 373},
  {"id": "q-0374", "question": "Sur l'examen PMP, quelle proportion de questions est basée sur des approches prédictives et quelle proportion sur des approches agiles/hybrides ?", "options": {"A": "50% prédictif / 50% agile", "B": "100% prédictif basé sur PMBOK 6", "C": "Environ 50% agile/hybride et 50% prédictif", "D": "75% prédictif / 25% agile"}, "correct": "C", "domain": "Process", "approach": "Hybride", "difficulty": 1, "tags": ["PMP", "examen", "ECO 2021"], "explanation": "Depuis 2021, l'examen PMP inclut environ 50% de questions sur des approches agiles ou hybrides et 50% sur des approches prédictives. L'examen PMP actuel est basé sur l'ECO (Exam Content Outline) 2021, qui couvre les domaines People, Process et Business Environment (PMI, ECO 2021).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 374},
  {"id": "q-0375", "question": "Les trois domaines de performance du Project Management Professional (PMP) Exam Content Outline 2021 sont :", "options": {"A": "Périmètre, Délais, Coûts", "B": "Démarrage, Planification, Clôture", "C": "Personnes (People), Processus (Process), Environnement Business (Business Environment)", "D": "Technique, Leadership, Stratégie"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["PMP", "ECO 2021", "domaines"], "explanation": "L'ECO PMP 2021 organise les compétences en trois domaines : Personnes (42% — leadership, équipe, parties prenantes), Processus (50% — management technique du projet), et Environnement Business (8% — valeur, stratégie, conformité). Ces domaines remplacent les groupes de processus comme structure de l'examen (PMI, ECO 2021).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 375},
  {"id": "q-0376", "question": "Un projet a : EV = 300 000 €, AC = 320 000 €, PV = 350 000 €. Le projet est :", "options": {"A": "En avance sur le planning et sous le budget", "B": "En retard sur le planning et en dépassement de budget", "C": "En avance sur le planning mais en dépassement de budget", "D": "En retard sur le planning mais sous le budget"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["EVM", "SPI", "CPI", "calcul", "interprétation"], "explanation": "SPI = EV/PV = 300/350 = 0,857 < 1 → en retard. CPI = EV/AC = 300/320 = 0,9375 < 1 → dépassement de budget. Les deux indicateurs sont inférieurs à 1, donc le projet est à la fois en retard et en dépassement de coût (PMBOK 6, Section 7.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 376},
  {"id": "q-0377", "question": "Si le BAC = 1 000 000 €, EV = 600 000 €, AC = 500 000 €, quel est le TCPI basé sur le BAC ?", "options": {"A": "0,80", "B": "1,20", "C": "1,00", "D": "1,60"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["EVM", "TCPI", "calcul"], "explanation": "TCPI = (BAC - EV) / (BAC - AC) = (1 000 000 - 600 000) / (1 000 000 - 500 000) = 400 000 / 500 000 = 0,80. Le CPI actuel = EV/AC = 600k/500k = 1,2 (projet sous budget), donc le TCPI < 1 signifie que le projet peut se permettre d'être légèrement moins efficace pour le reste et atteindre quand même le BAC (PMBOK 6, Section 7.4).", "source": "PMBOK 6e édition (Guide du Corpus des Connaissances en Management de Projet)", "source_pages": [], "num": 377},
  {"num": 378, "id": "pmp-fr-pmbok6p-0378", "question": "Selon le PMBOK 6, 'Élaborer la charte du projet' est le processus consistant à :", "options": {"A": "Définir les livrables détaillés du projet", "B": "Développer un document qui autorise formellement l'existence d'un projet et donne autorité au chef de projet pour allouer des ressources", "C": "Identifier toutes les parties prenantes du projet", "D": "Créer le plan de management du projet"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["intégration", "charte", "définition officielle PMBOK 6"], "explanation": "Définition officielle PMBOK 6 (Section 4.1) : 'Élaborer la charte du projet est le processus consistant à développer un document qui autorise formellement l'existence d'un projet et donne autorité au chef de projet pour allouer des ressources de l'organisation aux activités de ce projet.'", "source": "PMBOK 6", "source_pages": []},
  {"num": 379, "id": "pmp-fr-pmbok6p-0379", "question": "Selon le PMBOK 6, 'Diriger et gérer le travail du projet' est le processus qui consiste à :", "options": {"A": "Surveiller l'état du projet et gérer les modifications", "B": "Guider et exécuter le travail défini dans le plan de management du projet et appliquer les changements approuvés", "C": "Identifier les risques et développer des réponses", "D": "Clôturer toutes les activités du projet"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["intégration", "exécution", "définition officielle PMBOK 6"], "explanation": "Définition officielle PMBOK 6 (Section 4.3) : 'Diriger et gérer le travail du projet est le processus qui consiste à guider et à exécuter le travail défini dans le plan de management du projet et à appliquer les changements approuvés pour atteindre les objectifs du projet.'", "source": "PMBOK 6", "source_pages": []},
  {"num": 380, "id": "pmp-fr-pmbok6p-0380", "question": "Selon le PMBOK 6, 'Gérer les connaissances du projet' est le processus qui consiste à :", "options": {"A": "Former les membres de l'équipe sur les outils de gestion de projet", "B": "Documenter les leçons apprises uniquement en fin de projet", "C": "Utiliser les connaissances existantes et acquérir de nouvelles connaissances pour atteindre les objectifs du projet et contribuer à l'apprentissage organisationnel", "D": "Gérer la base de données des risques du projet"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["intégration", "connaissances", "définition officielle PMBOK 6"], "explanation": "Définition officielle PMBOK 6 (Section 4.4) : 'Gérer les connaissances du projet est le processus qui consiste à utiliser les connaissances existantes et à acquérir de nouvelles connaissances pour atteindre les objectifs du projet et contribuer à l'apprentissage organisationnel.'", "source": "PMBOK 6", "source_pages": []},
  {"num": 381, "id": "pmp-fr-pmbok6p-0381", "question": "Selon le PMBOK 6, 'Valider le périmètre' est le processus qui consiste à :", "options": {"A": "Définir les limites du projet et du produit", "B": "Formaliser l'acceptation des livrables du projet terminés", "C": "Contrôler les modifications apportées au périmètre", "D": "Décomposer les livrables en composants plus petits"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["périmètre", "validation", "définition officielle PMBOK 6"], "explanation": "Définition officielle PMBOK 6 (Section 5.5) : 'Valider le périmètre est le processus qui consiste à formaliser l'acceptation des livrables du projet terminés.' Les livrables vérifiés (output de Maîtriser la qualité) sont une donnée d'entrée ; les livrables acceptés sont une donnée de sortie.", "source": "PMBOK 6", "source_pages": []},
  {"num": 382, "id": "pmp-fr-pmbok6p-0382", "question": "Selon le PMBOK 6, 'Maîtriser le périmètre' est le processus qui consiste à :", "options": {"A": "Formaliser l'acceptation des livrables terminés", "B": "Élaborer l'énoncé détaillé du périmètre du projet", "C": "Maîtriser l'avancement du projet, vérifier le périmètre du produit et intégrer les changements affectant la référence de base du périmètre", "D": "Créer la structure de découpage du projet"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["périmètre", "maîtrise", "définition officielle PMBOK 6"], "explanation": "Définition officielle PMBOK 6 (Section 5.6) : 'Maîtriser le périmètre est le processus qui consiste à maîtriser l'avancement du projet, à vérifier le périmètre du produit et à intégrer les changements affectant la référence de base du périmètre.'", "source": "PMBOK 6", "source_pages": []},
  {"num": 383, "id": "pmp-fr-pmbok6p-0383", "question": "Selon le PMBOK 6, 'Recueillir les exigences' est le processus qui consiste à :", "options": {"A": "Créer la structure de découpage du projet", "B": "Déterminer, documenter et gérer les besoins et les exigences des parties prenantes pour atteindre les objectifs du projet", "C": "Valider les exigences auprès du client avant livraison", "D": "Planifier comment les exigences seront gérées"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 1, "tags": ["périmètre", "exigences", "définition officielle PMBOK 6"], "explanation": "Définition officielle PMBOK 6 (Section 5.2) : 'Recueillir les exigences est le processus qui consiste à déterminer, à documenter et à gérer les besoins et les exigences des parties prenantes pour atteindre les objectifs du projet.'", "source": "PMBOK 6", "source_pages": []},
  {"num": 384, "id": "pmp-fr-pmbok6p-0384", "question": "Selon le PMBOK 6, 'Créer le WBS' (Créer la SDP) est le processus qui consiste à :", "options": {"A": "Planifier la façon dont le périmètre sera défini et validé", "B": "Documenter les exigences des parties prenantes", "C": "Subdiviser les livrables et le travail du projet en composants plus petits et plus faciles à gérer", "D": "Identifier les activités à réaliser pour produire les livrables"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 1, "tags": ["périmètre", "WBS", "SDP", "définition officielle PMBOK 6"], "explanation": "Définition officielle PMBOK 6 (Section 5.4) : 'Créer le WBS est le processus qui consiste à subdiviser les livrables et le travail du projet en composants plus petits et plus faciles à gérer.' Le niveau le plus bas de la SDP est le lot de travail (work package).", "source": "PMBOK 6", "source_pages": []},
  {"num": 385, "id": "pmp-fr-pmbok6p-0385", "question": "Selon le PMBOK 6 FR, quelle stratégie de réponse aux risques négatifs (menaces) 'vise à réduire la probabilité d'occurrence et/ou l'impact d'une menace' ?", "options": {"A": "Éviter", "B": "Transférer", "C": "Atténuer", "D": "Escalader"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "atténuation", "stratégies PMBOK 6"], "explanation": "Définition officielle PMBOK 6 (Section 11.5.2.3) : 'Une stratégie d'atténuation des risques vise à réduire la probabilité d'occurrence et/ou l'impact d'une menace. Une mesure d'atténuation anticipée est souvent plus efficace qu'une tentative de réparation des dommages après la réalisation d'une menace.'", "source": "PMBOK 6", "source_pages": []},
  {"num": 386, "id": "pmp-fr-pmbok6p-0386", "question": "Selon le PMBOK 6 FR, la stratégie 'Éviter' pour les menaces :", "options": {"A": "Déplace la responsabilité vers un tiers", "B": "Est menée par l'équipe projet pour éliminer la menace ou protéger le projet de son impact", "C": "Reconnaît l'existence d'une menace sans qu'aucune mesure proactive ne soit prise", "D": "Réduit la probabilité d'occurrence à un niveau acceptable"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "évitement", "stratégies PMBOK 6"], "explanation": "Définition officielle PMBOK 6 (Section 11.5.2.1) : 'La stratégie d'évitement des risques est menée par l'équipe projet pour éliminer la menace ou protéger le projet de son impact.' Elle peut impliquer de changer certains aspects du plan de management du projet pour éliminer entièrement la menace.", "source": "PMBOK 6", "source_pages": []},
  {"num": 387, "id": "pmp-fr-pmbok6p-0387", "question": "Selon le PMBOK 6 FR, la stratégie 'Transférer' pour les menaces 'déplace la responsabilité d'une menace vers un tiers'. Quel instrument est typiquement utilisé ?", "options": {"A": "Un registre des risques mis à jour", "B": "Une réserve pour aléas constituée", "C": "Une assurance, des cautions, des engagements ou des garanties", "D": "Un plan de contingence détaillé"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "transfert", "stratégies PMBOK 6"], "explanation": "Définition officielle PMBOK 6 (Section 11.5.2.2) : 'Le transfert peut être réalisé grâce à un éventail de mesures, parmi lesquelles l'utilisation d'une assurance, de cautions, d'engagements, de garanties et autres.' Le transfert implique souvent le versement d'une prime de risque à la partie qui assume la menace.", "source": "PMBOK 6", "source_pages": []},
  {"num": 388, "id": "pmp-fr-pmbok6p-0388", "question": "Selon le PMBOK 6 FR, la stratégie 'Escalader' pour les risques est appropriée quand :", "options": {"A": "Le risque a une probabilité très élevée et un impact critique", "B": "La menace est extérieure au périmètre du projet ou la réponse dépasse l'autorité du chef de projet", "C": "Le risque a été accepté passivement sans plan de contingence", "D": "Le transfert à un fournisseur n'est pas possible"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "escalade", "stratégies PMBOK 6"], "explanation": "Définition officielle PMBOK 6 (Section 11.5.2.5) : 'L'escalade est appropriée lorsque l'équipe projet ou le sponsor du projet convient qu'une menace est extérieure au périmètre du projet ou que la réponse proposée dépasse l'autorité du chef de projet.' Les risques escaladés sont gérés au niveau du programme ou portefeuille.", "source": "PMBOK 6", "source_pages": []},
  {"num": 389, "id": "pmp-fr-pmbok6p-0389", "question": "Selon le PMBOK 6 FR, la stratégie 'Exploiter' pour les opportunités vise à :", "options": {"A": "Accroître la probabilité et/ou l'impact d'une opportunité", "B": "S'assurer que l'opportunité se produise bel et bien, augmentant la probabilité à 100%", "C": "Transférer la responsabilité d'une opportunité à un tiers", "D": "Reconnaître l'existence d'une opportunité sans action proactive"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "opportunités", "exploiter", "stratégies PMBOK 6"], "explanation": "Définition officielle PMBOK 6 (Section 11.5.3.1) : 'La stratégie d'exploitation peut être choisie pour les opportunités à priorité élevée lorsque l'organisation souhaite s'assurer que l'opportunité est saisie. Cette stratégie vise à saisir l'avantage associé à une opportunité particulière en veillant à ce qu'elle se produise bel et bien et en augmentant la probabilité d'occurrence à 100%.'", "source": "PMBOK 6", "source_pages": []},
  {"num": 390, "id": "pmp-fr-pmbok6p-0390", "question": "Selon le PMBOK 6 FR, la stratégie 'Améliorer' pour les opportunités consiste à :", "options": {"A": "Éliminer complètement une incertitude positive", "B": "Transférer l'opportunité à un tiers plus compétent", "C": "Accroître la probabilité et/ou l'impact d'une opportunité", "D": "Accepter l'opportunité si elle se réalise"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "opportunités", "améliorer", "stratégies PMBOK 6"], "explanation": "Définition officielle PMBOK 6 (Section 11.5.3.2) : 'La stratégie d'amélioration est utilisée pour accroître la probabilité et/ou l'impact d'une opportunité. Une mesure d'amélioration anticipée est souvent plus efficace que la tentative d'amélioration des bénéfices après la réalisation d'une opportunité.'", "source": "PMBOK 6", "source_pages": []},
  {"num": 391, "id": "pmp-fr-pmbok6p-0391", "question": "Selon le PMBOK 6 FR, la stratégie 'Partager' pour les opportunités implique de :", "options": {"A": "Augmenter la probabilité que l'opportunité se réalise", "B": "Transférer la responsabilité d'une opportunité à un tiers afin qu'il partage une partie de l'avantage si elle se concrétise", "C": "Accepter l'opportunité si elle se réalise sans action proactive", "D": "Éliminer l'incertitude pour garantir la réalisation de l'opportunité"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "opportunités", "partager", "stratégies PMBOK 6"], "explanation": "Définition officielle PMBOK 6 (Section 11.5.3.3) : 'La stratégie de partage implique de transférer la responsabilité d'une opportunité à un tiers afin qu'il partage une partie de l'avantage si elle se concrétise. Il est important de bien choisir le nouveau responsable d'une opportunité partagée afin qu'il soit le mieux à même de saisir l'opportunité.'", "source": "PMBOK 6", "source_pages": []},
  {"num": 392, "id": "pmp-fr-pmbok6p-0392", "question": "Selon le Tableau 7-1 du PMBOK 6 FR, comment se nomment officiellement EV, PV et AC en français ?", "options": {"A": "Valeur estimée, Prix planifié, Coût actuel", "B": "Valeur acquise, Valeur planifiée, Coût réel", "C": "Valeur gagnée, Valeur prévue, Coût admissible", "D": "Valeur accomplie, Plan de valeur, Coût absorbé"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 1, "tags": ["EVM", "terminologie officielle", "PMBOK 6 FR"], "explanation": "Selon le Tableau 7-1 officiel du PMBOK 6 FR (Section 7.4) : EV = Valeur acquise ('mesure du travail effectué exprimée en termes de budget autorisé'), PV = Valeur planifiée ('budget autorisé alloué au travail prévu'), AC = Coût réel ('coûts réels encourus pour le travail exécuté').", "source": "PMBOK 6", "source_pages": []},
  {"num": 393, "id": "pmp-fr-pmbok6p-0393", "question": "Selon le Tableau 7-1 du PMBOK 6 FR, l'Écart de Coût (CV) est défini comme :", "options": {"A": "CV = PV – AC", "B": "CV = EV – PV", "C": "CV = EV – AC", "D": "CV = BAC – EAC"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["EVM", "CV", "formule PMBOK 6"], "explanation": "Tableau 7-1 PMBOK 6 FR : 'L'Écart de Coût (CV) est le montant du déficit ou de l'excédent budgétaire à un point donné dans le temps, exprimé comme la différence entre la valeur acquise et le coût réel. Formule : CV = EV – AC. Résultat positif = inférieur au coût planifié ; Résultat négatif = supérieur au coût planifié.'", "source": "PMBOK 6", "source_pages": []},
  {"num": 394, "id": "pmp-fr-pmbok6p-0394", "question": "Selon le Tableau 7-1 du PMBOK 6 FR, l'Écart de Délais (SV) est :", "options": {"A": "SV = PV – EV", "B": "SV = EV – AC", "C": "SV = EV – PV", "D": "SV = BAC – EV"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["EVM", "SV", "formule PMBOK 6"], "explanation": "Tableau 7-1 PMBOK 6 FR : 'L'Écart de Délais (SV) est la durée d'avance ou de retard du projet par rapport à la date de livraison planifiée, exprimée comme la différence entre la valeur acquise et la valeur planifiée. Formule : SV = EV – PV. Résultat positif = avance par rapport à l'échéancier ; Résultat négatif = retard.'", "source": "PMBOK 6", "source_pages": []},
  {"num": 395, "id": "pmp-fr-pmbok6p-0395", "question": "Selon le PMBOK 6 FR, l'Indice de Performance des Coûts (IPC ou CPI) a pour formule :", "options": {"A": "CPI = PV / AC", "B": "CPI = EV / AC", "C": "CPI = AC / EV", "D": "CPI = EV / PV"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["EVM", "CPI", "formule PMBOK 6"], "explanation": "Tableau 7-1 PMBOK 6 FR : 'L'Indice de Performance des Coûts (CPI) est une mesure de rendement du coût des ressources budgétisées exprimée par le ratio de la valeur acquise rapportée au coût réel. Formule : CPI = EV/AC. Supérieur à 1 = inférieur au coût planifié ; Exactement 1 = conforme ; Inférieur à 1 = supérieur au coût planifié.'", "source": "PMBOK 6", "source_pages": []},
  {"num": 396, "id": "pmp-fr-pmbok6p-0396", "question": "Selon le PMBOK 6 FR, l'Indice de Performance des Délais (IPD ou SPI) a pour formule :", "options": {"A": "SPI = EV / AC", "B": "SPI = PV / EV", "C": "SPI = EV / PV", "D": "SPI = AC / PV"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["EVM", "SPI", "formule PMBOK 6"], "explanation": "Tableau 7-1 PMBOK 6 FR : 'L'Indice de Performance des Délais (SPI) est une mesure de rendement de l'échéancier exprimée par le ratio de la valeur acquise rapportée à la valeur planifiée. Formule : SPI = EV/PV. Supérieur à 1 = avance par rapport à l'échéancier ; Inférieur à 1 = retard.'", "source": "PMBOK 6", "source_pages": []},
  {"num": 397, "id": "pmp-fr-pmbok6p-0397", "question": "Selon le PMBOK 6 FR, l'Écart à Terminaison (VAC) se calcule par la formule :", "options": {"A": "VAC = EV – AC", "B": "VAC = BAC – EAC", "C": "VAC = BAC – EV", "D": "VAC = EAC – AC"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["EVM", "VAC", "formule PMBOK 6"], "explanation": "Tableau 7-1 PMBOK 6 FR : 'L'Écart à Terminaison (VAC) est la projection du montant du déficit ou de l'excédent budgétaire, exprimé comme la différence entre le budget à terminaison et le coût estimé à terminaison. Formule : VAC = BAC – EAC. Résultat positif = sous budget à terminaison ; Résultat négatif = dépassement budgétaire.'", "source": "PMBOK 6", "source_pages": []},
  {"num": 398, "id": "pmp-fr-pmbok6p-0398", "question": "Le PMBOK 6 FR présente 4 formules de calcul de l'EAC (Coût Estimé à Terminaison). Laquelle correspond au scénario où 'le CPI est censé rester le même pour le reste du projet' ?", "options": {"A": "EAC = AC + BAC – EV", "B": "EAC = AC + RAF (estimation ascendante)", "C": "EAC = BAC / CPI", "D": "EAC = AC + [(BAC – EV) / (CPI × SPI)]"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["EVM", "EAC", "formule PMBOK 6", "scénarios"], "explanation": "PMBOK 6 FR (Tableau 7-1, Section 7.4) : Quand 'l'indice de performance des coûts est censé être le même pour le reste du projet', la formule est EAC = BAC/CPI. C'est la formule EAC la plus couramment utilisée dans les questions d'examen PMP.", "source": "PMBOK 6", "source_pages": []},
  {"num": 399, "id": "pmp-fr-pmbok6p-0399", "question": "Dans le PMBOK 6 FR, quand 'le CPI et le SPI influencent le travail restant', la formule EAC est :", "options": {"A": "EAC = BAC / CPI", "B": "EAC = AC + BAC – EV", "C": "EAC = AC + [(BAC – EV) / (CPI × SPI)]", "D": "EAC = AC + RAF"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["EVM", "EAC", "formule CPI SPI", "PMBOK 6"], "explanation": "PMBOK 6 FR (Tableau 7-1) : Quand le CPI et le SPI influencent le reste du travail, EAC = AC + [(BAC – EV) / (CPI × SPI)]. Cette formule est la plus pessimiste car elle tient compte à la fois des mauvaises performances en coût ET en délais pour projeter le coût final.", "source": "PMBOK 6", "source_pages": []},
  {"num": 400, "id": "pmp-fr-pmbok6p-0400", "question": "Selon le PMBOK 6 FR, l'Indice de Performance à Terminaison (TCPI) basé sur le BAC est :", "options": {"A": "TCPI = (BAC – EV) / (BAC – AC)", "B": "TCPI = (EAC – EV) / (EAC – AC)", "C": "TCPI = (BAC – AC) / (BAC – EV)", "D": "TCPI = EV / AC"}, "correct": "A", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["EVM", "TCPI", "formule PMBOK 6"], "explanation": "PMBOK 6 FR (Section 7.4) : 'L'Indice de Performance à Terminaison du Projet (TCPI) représente la mesure de la performance des coûts qui doit être atteinte avec les ressources restantes afin d'atteindre un objectif de management déterminé.' Formule basée sur BAC : TCPI = (BAC – EV) / (BAC – AC).", "source": "PMBOK 6", "source_pages": []},
  {"num": 401, "id": "pmp-fr-pmbok6p-0401", "question": "Selon le PMBOK 6 FR, dans un contrat 'Contrat en régie avec honoraires fixes (CPFF)' :", "options": {"A": "Le vendeur reçoit des honoraires calculés en pourcentage des coûts réels", "B": "Le vendeur est remboursé pour tous les coûts autorisés et reçoit des honoraires fixes calculés sous forme de pourcentage de l'estimation initiale des coûts", "C": "Le prix total est fixé à l'avance, incluant les honoraires", "D": "Les honoraires augmentent si le vendeur dépasse le budget cible"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["approvisionnements", "CPFF", "contrats PMBOK 6"], "explanation": "PMBOK 6 FR (Section 12.1.3.3) : 'Contrat en régie avec honoraires fixes (CPFF) : le vendeur est remboursé pour tous les coûts autorisés pour l'exécution du contrat, et reçoit en plus des honoraires fixes calculés sous forme de pourcentage de l'estimation initiale des coûts du projet. Le montant des honoraires ne change pas, à moins que le périmètre du projet ne change.'", "source": "PMBOK 6", "source_pages": []},
  {"num": 402, "id": "pmp-fr-pmbok6p-0402", "question": "Selon le PMBOK 6 FR, le 'Contrat à prix fixe avec intéressement (FPIF)' : dans ce type de contrat :", "options": {"A": "Tous les coûts sont remboursés plus des honoraires basés sur la performance", "B": "Un prix plafond est défini et tous les coûts dépassant ce prix plafond sont supportés par le vendeur", "C": "Le prix varie selon un indice de prix fixé à l'avance", "D": "Le prix est entièrement fixe sans aucune clause d'ajustement"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["approvisionnements", "FPIF", "contrats PMBOK 6"], "explanation": "PMBOK 6 FR (Section 12.1.3.1) : 'Dans le cas des contrats à prix fixe avec intéressement (FPIF), un prix plafond est défini, et tous les coûts dépassant ce prix plafond sont supportés par le vendeur.' Ce contrat offre une flexibilité avec des clauses d'intéressement liées au coût, l'échéancier ou la performance technique.", "source": "PMBOK 6", "source_pages": []},
  {"num": 403, "id": "pmp-fr-pmbok6p-0403", "question": "Selon le PMBOK 6 FR, le niveau d'engagement 'Neutre' pour une partie prenante signifie qu'elle est :", "options": {"A": "Ignorante de l'existence du projet", "B": "Consciente du projet mais non informée de ses détails", "C": "Consciente du projet, mais ni favorable ni défavorable", "D": "Activement opposée aux résultats du projet"}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["parties prenantes", "engagement neutre", "PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Section 13.2.2.3) : 'Neutre : conscient du projet, mais, pour autant, ni favorable ni défavorable.' Les 5 niveaux sont : Non informée, Résistante, Neutre, Supportif ('conscient du projet et de ses impacts potentiels ; supporte le travail et ses résultats'), et Leader.", "source": "PMBOK 6", "source_pages": []},
  {"num": 404, "id": "pmp-fr-pmbok6p-0404", "question": "Selon le PMBOK 6 FR, le niveau d'engagement 'Leader' (Chef de file) pour une partie prenante signifie qu'elle est :", "options": {"A": "Consciente du projet mais sans opinion définitive", "B": "Consciente du projet et de ses impacts potentiels ; activement engagée à garantir la réussite du projet", "C": "Consciente du projet et supporte le travail et ses résultats", "D": "Au courant des activités du projet mais oppose une résistance"}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["parties prenantes", "engagement leader", "PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Section 13.2.2.3) : 'Leader : conscient du projet et de ses impacts potentiels ; activement engagé à garantir la réussite du projet.' C'est le niveau d'engagement le plus élevé et le plus souhaitable pour les parties prenantes clés.", "source": "PMBOK 6", "source_pages": []},
  {"num": 405, "id": "pmp-fr-pmbok6p-0405", "question": "Selon le PMBOK 6 FR, dans une organisation fonctionnelle, l'autorité du chef de projet est :", "options": {"A": "Totale — le chef de projet a pleine autorité sur les ressources", "B": "Modérée — le chef de projet partage l'autorité avec les managers fonctionnels", "C": "Nulle ou très faible — le chef de projet a peu ou pas d'autorité", "D": "Définie par un contrat entre les départements fonctionnels"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["organisation", "structure fonctionnelle", "autorité PMBOK 6"], "explanation": "PMBOK 6 FR (Tableau 2-1, Section 2.4.4) : Dans une organisation fonctionnelle, l'autorité du chef de projet est 'nulle ou limitée'. Les managers fonctionnels contrôlent les ressources et le budget. C'est à l'opposé de l'organisation orientée projets où le chef de projet a une autorité élevée à quasi-totale.", "source": "PMBOK 6", "source_pages": []},
  {"num": 406, "id": "pmp-fr-pmbok6p-0406", "question": "Selon le PMBOK 6 FR, quelle est la particularité d'une organisation 'orientée projets' (projectisée) en matière de ressources ?", "options": {"A": "Les ressources sont partagées entre les projets selon un calendrier strict", "B": "Les membres de l'équipe sont souvent colocalisés et peuvent être libérés à la fin du projet", "C": "Les ressources appartiennent aux départements fonctionnels et sont prêtées aux projets", "D": "Les ressources ne peuvent pas travailler sur plusieurs projets simultanément"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["organisation", "projectisée", "ressources PMBOK 6"], "explanation": "PMBOK 6 FR (Section 2.4.4) : Dans une organisation orientée projets, les membres de l'équipe sont souvent colocalisés, travaillent ensemble, et 'peuvent être libérés à la fin du projet'. Cette structure offre une grande autonomie au chef de projet mais crée des défis en matière de sécurité d'emploi pour les membres.", "source": "PMBOK 6", "source_pages": []},
  {"num": 407, "id": "pmp-fr-pmbok6p-0407", "question": "Selon le PMBOK 6 FR, la méthode du chemin critique (CPM) permet de :", "options": {"A": "Identifier les ressources sur-allouées et niveler les ressources", "B": "Estimer la durée du projet selon une distribution probabiliste", "C": "Calculer les dates au plus tôt et au plus tard pour les activités sans contraintes de ressources", "D": "Identifier les activités qui peuvent être exécutées en parallèle"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["délais", "CPM", "chemin critique PMBOK 6"], "explanation": "PMBOK 6 FR (Section 6.5.2.2) : La méthode du chemin critique calcule les dates théoriques de début et de fin au plus tôt et au plus tard pour toutes les activités du projet, sans tenir compte des contraintes de ressources. Elle détermine la marge totale de chaque activité et identifie le chemin critique (marge = 0).", "source": "PMBOK 6", "source_pages": []},
  {"num": 408, "id": "pmp-fr-pmbok6p-0408", "question": "Selon le PMBOK 6 FR, la 'marge totale' d'une activité est :", "options": {"A": "La durée dont peut être retardée une activité sans retarder le début de l'activité directement suivante", "B": "La durée dont peut être retardée une activité depuis son début au plus tôt sans retarder la date de fin du projet", "C": "La différence entre la durée optimiste et pessimiste de l'activité", "D": "Le temps supplémentaire réservé pour les imprévus dans le planning"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["délais", "marge totale", "PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Section 6.5.2.2) : La marge totale est 'la durée dont peut être retardée ou allongée une activité planifiée depuis son début au plus tôt sans retarder la date de fin du projet ni violer aucune contrainte d'échéancier.' Les activités sur le chemin critique ont une marge totale de zéro (ou négative).", "source": "PMBOK 6", "source_pages": []},
  {"num": 409, "id": "pmp-fr-pmbok6p-0409", "question": "Selon le PMBOK 6 FR, la 'marge libre' d'une activité est :", "options": {"A": "La durée dont peut être retardée une activité sans retarder la date de fin du projet", "B": "La durée dont peut être retardée une activité depuis son début au plus tôt sans retarder le début au plus tôt de toute activité subséquente", "C": "La réserve de contingence ajoutée à la durée d'une activité critique", "D": "La différence entre la marge totale et la marge de projet"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["délais", "marge libre", "PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Section 6.5.2.2) : La marge libre est 'la durée dont peut être retardée ou allongée une activité planifiée depuis son début au plus tôt sans retarder le début au plus tôt de toute activité subséquente ou violer toute contrainte d'échéancier.' Elle est toujours inférieure ou égale à la marge totale.", "source": "PMBOK 6", "source_pages": []},
  {"num": 410, "id": "pmp-fr-pmbok6p-0410", "question": "Selon le PMBOK 6 FR, quelle est la différence entre 'Gérer la qualité' et 'Maîtriser la qualité' ?", "options": {"A": "Gérer la qualité inspecte les livrables ; Maîtriser la qualité audite les processus", "B": "Gérer la qualité convertit le plan qualité en activités exécutables ; Maîtriser la qualité surveille et enregistre les résultats de l'exécution des activités qualité", "C": "Gérer la qualité est un processus de Planification ; Maîtriser la qualité est en Exécution", "D": "Il n'y a pas de différence — les deux processus sont identiques dans le PMBOK 6"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["qualité", "processus qualité", "PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Sections 8.2 et 8.3) : Gérer la qualité (Exécution) 'convertit le plan de management de la qualité en activités qualité exécutables' — il audite les processus. Maîtriser la qualité (Surveillance et Maîtrise) 'surveille et enregistre les résultats de l'exécution des activités de management de la qualité' — il inspecte les livrables.", "source": "PMBOK 6", "source_pages": []},
  {"num": 411, "id": "pmp-fr-pmbok6p-0411", "question": "Selon le PMBOK 6 FR, le 'Coût de la qualité (CoQ)' comprend les coûts :", "options": {"A": "De prévention uniquement", "B": "D'évaluation et de non-conformité", "C": "De conformité (prévention + évaluation) et de non-conformité (défaillance interne + défaillance externe)", "D": "De prévention, d'évaluation et de formation uniquement"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["qualité", "CoQ", "PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Section 8.1.2.3) : Le Coût de la Qualité comprend les 'coûts de conformité' (coûts de prévention pour éviter les défauts + coûts d'évaluation pour inspecter la conformité) et les 'coûts de non-conformité' (défaillances internes trouvées pendant le projet + défaillances externes découvertes par le client).", "source": "PMBOK 6", "source_pages": []},
  {"num": 412, "id": "pmp-fr-pmbok6p-0412", "question": "Selon le PMBOK 6 FR, dans quel groupe de processus se trouve 'Maîtrise intégrée des modifications' ?", "options": {"A": "Planification", "B": "Exécution", "C": "Surveillance et Maîtrise", "D": "Démarrage"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["intégration", "maîtrise des modifications", "groupes de processus"], "explanation": "PMBOK 6 FR (Section 4.6) : 'Maîtriser les modifications de manière intégrée' est un processus du groupe Surveillance et Maîtrise. Il examine toutes les demandes de modification, les approuve et gère les modifications apportées aux livrables, actifs et documents. Le Comité de Contrôle des Modifications (CCM) peut être impliqué.", "source": "PMBOK 6", "source_pages": []},
  {"num": 413, "id": "pmp-fr-pmbok6p-0413", "question": "Dans le PMBOK 6 FR, l'EXTRANT principal de 'Surveiller et maîtriser le travail du projet' est :", "options": {"A": "Les données de performance du travail", "B": "Les livrables du projet", "C": "Les rapports de performance du travail", "D": "Les demandes de modification approuvées"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["intégration", "surveillance", "ITTO PMBOK 6"], "explanation": "PMBOK 6 FR (Section 4.5) : 'Surveiller et maîtriser le travail du projet' produit comme EXTRANT principal les Rapports de Performance du Travail (Work Performance Reports). Ces rapports compilent les informations de performance et sont distribués aux parties prenantes. Les données brutes (Data) viennent de Diriger et Gérer ; les informations (Information) de différents processus de surveillance ; les rapports (Reports) de ce processus.", "source": "PMBOK 6", "source_pages": []},
  {"num": 414, "id": "pmp-fr-pmbok6p-0414", "question": "Selon le PMBOK 6 FR, la technique 'Liste rapide' (Prompt list) dans Identifier les risques :", "options": {"A": "Est une liste de risques déjà identifiés dans les projets précédents", "B": "Est une liste prédéterminée de catégories de risques servant de cadre aux membres de l'équipe", "C": "Contient les risques approuvés classés par priorité", "D": "Est le résultat de l'analyse qualitative des risques"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["risques", "liste rapide", "identification PMBOK 6"], "explanation": "PMBOK 6 FR (Section 11.2.2.5) : 'Une liste rapide est une liste prédéterminée de catégories de risques pouvant donner lieu à des risques individuels du projet et servir de cadre aux membres de l'équipe lorsqu'ils identifient des risques.' Des exemples de cadres de liste rapide incluent les facteurs PESTLE ou TECOP.", "source": "PMBOK 6", "source_pages": []},
  {"num": 415, "id": "pmp-fr-pmbok6p-0415", "question": "Selon le PMBOK 6 FR, le processus 'Effectuer l'analyse qualitative des risques' hiérarchise les risques en évaluant :", "options": {"A": "Leur valeur monétaire espérée uniquement", "B": "Leur probabilité d'occurrence et leur impact, ainsi que d'autres caractéristiques", "C": "Leur impact financier total sur le projet", "D": "La simulation Monte Carlo de chaque risque"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["risques", "analyse qualitative", "PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Section 11.3) : 'Effectuer l'analyse qualitative des risques est le processus qui consiste à hiérarchiser les risques individuels du projet pour analyse et actions ultérieures en évaluant leur probabilité d'occurrence et leur impact, ainsi que d'autres caractéristiques.' Elle utilise notamment la matrice probabilité × impact.", "source": "PMBOK 6", "source_pages": []},
  {"num": 416, "id": "pmp-fr-pmbok6p-0416", "question": "Selon le PMBOK 6 FR, quels sont les trois types de méthodes de communication ?", "options": {"A": "Verbale, écrite et non-verbale", "B": "Formelle, informelle et semi-formelle", "C": "Interactive, push et pull", "D": "Interne, externe et officielle"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["communications", "méthodes", "PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Section 10.1.2.5) : Les trois méthodes de communication sont : Interactive (multilatérale, réunions, appels), Push (envoi ciblé — e-mails, mémos, rapports) et Pull (accès volontaire — intranet, bases de données, portails). Le choix dépend du type d'information, du destinataire et de l'urgence.", "source": "PMBOK 6", "source_pages": []},
  {"num": 417, "id": "pmp-fr-pmbok6p-0417", "question": "Selon le PMBOK 6 FR, le 'Plan de management des communications' documente notamment :", "options": {"A": "Les budgets alloués aux outils de communication", "B": "Les besoins en communications des parties prenantes, la fréquence, les méthodes et les responsabilités", "C": "Les compétences en communication requises pour chaque membre de l'équipe", "D": "Les résultats des réunions de statut passées"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["communications", "plan", "PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Section 10.1.3.1) : Le Plan de management des communications documente notamment les besoins en communications des parties prenantes du projet, les informations à communiquer, le motif de la distribution, la personne responsable de communiquer les informations, la personne ou groupe destinataire, les méthodes ou technologies utilisées, la fréquence et les processus d'escalade.", "source": "PMBOK 6", "source_pages": []},
  {"num": 418, "id": "pmp-fr-pmbok6p-0418", "question": "Selon le PMBOK 6 FR, quel est le principal résultat du processus 'Développer l'équipe' ?", "options": {"A": "L'organigramme du projet mis à jour", "B": "Les évaluations de performance de l'équipe", "C": "L'amélioration du travail d'équipe, de l'efficacité interpersonnelle et de l'environnement global", "D": "Les missions de travail actualisées pour chaque membre"}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["ressources", "développement équipe", "PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Section 9.4) : 'Développer l'équipe est le processus qui consiste à améliorer les compétences, les interactions des membres de l'équipe et l'environnement global de l'équipe pour améliorer la performance du projet.' L'intérêt principal est d'améliorer le travail d'équipe, développer les compétences et motiver les membres.", "source": "PMBOK 6", "source_pages": []},
  {"num": 419, "id": "pmp-fr-pmbok6p-0419", "question": "Selon le PMBOK 6 FR, les 'récompenses et reconnaissances' dans le management des ressources humaines servent à :", "options": {"A": "Calculer les bonus de fin de projet", "B": "Renforcer les comportements souhaitables par la reconnaissance formelle et informelle des contributions", "C": "Évaluer les performances pour décider des promotions", "D": "Motiver uniquement les membres sous-performants"}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["ressources", "récompenses", "PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Section 9.4.2.6) : Les récompenses et reconnaissances renforcent les comportements souhaitables en reconnaissant et en récompensant les comportements et les performances souhaitables. Elles peuvent être formelles (bonus, promotions) ou informelles (reconnaissance verbale, remerciements). Elles doivent être basées sur des activités sous le contrôle de l'individu.", "source": "PMBOK 6", "source_pages": []},
  {"num": 420, "id": "pmp-fr-pmbok6p-0420", "question": "Selon le PMBOK 6 FR, le processus 'Procéder aux approvisionnements' produit comme EXTRANT principal :", "options": {"A": "Le plan de management des approvisionnements", "B": "Les vendeurs sélectionnés et les accords (contrats) signés", "C": "Les demandes de propositions envoyées aux vendeurs", "D": "Les critères de sélection des sources"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["approvisionnements", "sélection vendeur", "PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Section 12.2) : 'Procéder aux approvisionnements est le processus consistant à obtenir les réponses des vendeurs, à sélectionner un vendeur et à attribuer un contrat.' Ses EXTRANTS principaux sont les vendeurs sélectionnés et les accords (contrats). C'est le processus où la décision d'achat est officialisée.", "source": "PMBOK 6", "source_pages": []},
  {"num": 421, "id": "pmp-fr-pmbok6p-0421", "question": "Selon le PMBOK 6 FR, les 'critères de sélection des sources' dans un processus d'approvisionnement peuvent inclure :", "options": {"A": "Uniquement le prix proposé par le vendeur", "B": "La compréhension du besoin, la capacité technique, le prix, les références et la gestion des risques", "C": "Seulement les certifications et qualifications formelles du vendeur", "D": "Uniquement les délais de livraison proposés"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["approvisionnements", "critères de sélection", "PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Section 12.1.3.7) : Les critères de sélection des sources peuvent inclure la compréhension du besoin, le coût global ou du cycle de vie, la capacité technique et l'approche, le management des risques, l'expérience passée et les références, les droits de propriété intellectuelle, et d'autres critères pertinents au contexte de l'achat.", "source": "PMBOK 6", "source_pages": []},
  {"num": 422, "id": "pmp-fr-pmbok6p-0422", "question": "Selon le PMBOK 6 FR, l'EXTRANT du processus 'Identifier les parties prenantes' est :", "options": {"A": "Le plan de management des parties prenantes", "B": "La grille Pouvoir/Intérêt", "C": "Le registre des parties prenantes et les mises à jour du plan de management du projet", "D": "La stratégie d'engagement des parties prenantes"}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["parties prenantes", "registre", "ITTO PMBOK 6"], "explanation": "PMBOK 6 FR (Section 13.1.3) : Les EXTRANTS d'Identifier les parties prenantes sont le Registre des parties prenantes (liste des parties prenantes identifiées avec leurs caractéristiques, intérêts, engagement, impact potentiel) et des mises à jour du plan de management du projet et des documents du projet. Le plan de management des parties prenantes est produit par le processus suivant.", "source": "PMBOK 6", "source_pages": []},
  {"num": 423, "id": "pmp-fr-pmbok6p-0423", "question": "Selon le PMBOK 6 FR, dans quel groupe de processus se trouve 'Gérer l'engagement des parties prenantes' ?", "options": {"A": "Démarrage", "B": "Planification", "C": "Exécution", "D": "Surveillance et Maîtrise"}, "correct": "C", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["parties prenantes", "engagement", "groupe processus PMBOK 6"], "explanation": "PMBOK 6 FR (Section 13.3) : 'Gérer l'engagement des parties prenantes' est un processus du groupe Exécution. Il consiste à communiquer et à travailler avec les parties prenantes pour satisfaire leurs besoins et attentes, traiter les problèmes et favoriser leur engagement approprié. 'Surveiller l'engagement' est le processus de Surveillance et Maîtrise (13.4).", "source": "PMBOK 6", "source_pages": []},
  {"num": 424, "id": "pmp-fr-pmbok6p-0424", "question": "Selon le PMBOK 6 FR (Chapitre 3), le Triangle de Talents PMI pour les compétences du chef de projet comprend :", "options": {"A": "Technique, Leadership, Management stratégique et organisationnel", "B": "Planification, Exécution et Contrôle", "C": "Communication, Risques et Périmètre", "D": "Coûts, Délais et Qualité"}, "correct": "A", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["chef de projet", "triangle de talents", "PMBOK 6 FR Ch 3"], "explanation": "PMBOK 6 FR (Section 3.4.1) : Le Triangle de Talents PMI identifie trois ensembles de compétences clés du chef de projet : (1) Compétences techniques en management de projet, (2) Compétences en leadership, et (3) Compétences en management stratégique et organisationnel. Ces trois domaines se renforcent mutuellement.", "source": "PMBOK 6", "source_pages": []},
  {"num": 425, "id": "pmp-fr-pmbok6p-0425", "question": "Selon le PMBOK 6 FR, quelle est la différence principale entre 'leadership' et 'management' pour un chef de projet ?", "options": {"A": "Le management concerne les gens ; le leadership concerne les processus", "B": "Le leadership est axé sur la vision et l'influence ; le management est axé sur la direction et l'exécution des processus", "C": "Il n'y a pas de différence significative dans le contexte du management de projet", "D": "Le management est plus important que le leadership dans les projets complexes"}, "correct": "B", "domain": "People", "approach": "Predictive", "difficulty": 2, "tags": ["leadership", "management", "chef de projet PMBOK 6"], "explanation": "PMBOK 6 FR (Section 3.4.5) : Le PMBOK 6 distingue le leadership (axé sur guider, motiver et inspirer — 'faire les bonnes choses') du management (axé sur diriger, contrôler et organiser — 'faire les choses correctement'). Un chef de projet efficace doit maîtriser les deux, en adaptant son style selon le contexte.", "source": "PMBOK 6", "source_pages": []},
  {"num": 426, "id": "pmp-fr-pmbok6p-0426", "question": "Selon le PMBOK 6 FR, comment appelle-t-on le phénomène où l'on planifie à partir des résultats de tous les processus de planification pour produire le plan de management du projet ?", "options": {"A": "La planification descendante (top-down)", "B": "L'élaboration progressive", "C": "Les sorties d'autres processus (outputs from other processes) comme donnée d'entrée", "D": "La convergence de la planification"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["planification", "élaboration progressive", "PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Section 4.2.1.2) : L'élaboration progressive est le concept selon lequel les informations deviennent de plus en plus détaillées au fur et à mesure de l'avancement du projet. Le plan de management du projet intègre progressivement les sorties des processus de planification de tous les domaines de connaissance.", "source": "PMBOK 6", "source_pages": []},
  {"num": 427, "id": "pmp-fr-pmbok6p-0427", "question": "Selon le PMBOK 6 FR (Chapitre 2), les 'Facteurs Environnementaux de l'Entreprise' (FEE) représentent :", "options": {"A": "Les règles et procédures internes de l'organisation", "B": "Les conditions hors du contrôle de l'équipe projet qui influencent ou contraignent le projet", "C": "La base de données des leçons apprises de projets passés", "D": "Les formulaires et modèles standard utilisés dans l'organisation"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 2, "tags": ["FEE", "facteurs environnementaux", "PMBOK 6 FR Ch 2"], "explanation": "PMBOK 6 FR (Section 2.2) : 'Les facteurs environnementaux de l'entreprise désignent les conditions hors du contrôle de l'équipe projet qui influencent ou contraignent le projet.' Ils peuvent être internes (culture, structure de l'organisation, disponibilité des ressources) ou externes (conditions du marché, réglementations, standards du secteur).", "source": "PMBOK 6", "source_pages": []},
  {"num": 428, "id": "pmp-fr-pmbok6p-0428", "question": "Selon le PMBOK 6 FR, lequel des éléments suivants est un Actif Organisationnel (AO) et NON un Facteur Environnemental de l'Entreprise (FEE) ?", "options": {"A": "La culture et le climat de l'organisation", "B": "Les infrastructures physiques disponibles (bâtiments, matériels)", "C": "Les bases de données des leçons apprises et les archives de projets antérieurs", "D": "Les conditions du marché financier externe"}, "correct": "C", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["AO", "FEE", "distinction PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Sections 2.2 et 2.3) : Les bases de données des leçons apprises et les archives de projets antérieurs sont des Actifs Organisationnels (AO) — ressources internes créées par l'organisation. La culture, l'infrastructure physique et les conditions du marché sont des Facteurs Environnementaux (FEE) qui s'imposent de l'extérieur.", "source": "PMBOK 6", "source_pages": []},
  {"num": 429, "id": "pmp-fr-pmbok6p-0429", "question": "Selon le PMBOK 6 FR, 'Définir les activités' est le processus qui consiste à :", "options": {"A": "Établir les dépendances entre les activités", "B": "Identifier et documenter les actions spécifiques à accomplir pour produire les livrables du projet", "C": "Estimer la durée de chaque activité", "D": "Créer l'échéancier du projet"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 1, "tags": ["délais", "définir activités", "PMBOK 6 FR"], "explanation": "PMBOK 6 FR (Section 6.2) : 'Définir les activités est le processus qui consiste à identifier et à documenter les actions spécifiques à accomplir pour produire les livrables du projet.' Ses EXTRANTS incluent la liste des activités, les attributs des activités et la liste des jalons. Il décompose les lots de travail en activités.", "source": "PMBOK 6", "source_pages": []},
  {"num": 430, "id": "pmp-fr-pmbok6p-0430", "question": "Selon le PMBOK 6 FR, la technique 'décomposition' dans 'Définir les activités' produit des :", "options": {"A": "Lots de travail (work packages)", "B": "Activités du planning", "C": "Jalons du projet", "D": "Composants de la SDP"}, "correct": "B", "domain": "Process", "approach": "Predictive", "difficulty": 3, "tags": ["délais", "décomposition", "activités vs SDP PMBOK 6"], "explanation": "PMBOK 6 FR (Section 6.2.2.1) : Dans 'Définir les activités', la décomposition subdivise les lots de travail de la SDP en activités plus petites. Si la SDP crée des lots de travail, Définir les activités décompose ces lots de travail en activités qui constituent le planning. La différence est que les lots de travail focalisent sur les livrables, les activités sur les actions.", "source": "PMBOK 6", "source_pages": []}
];

// Helper utilities
window.PMP_HELPERS = {
  formatTime(sec) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },
  shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  },
  pickRandom(arr, n) {
    return window.PMP_HELPERS.shuffle(arr).slice(0, n);
  },
  saveSession(key, data) {
    try { localStorage.setItem('pmp_' + key, JSON.stringify(data)); } catch(e){}
  },
  loadSession(key) {
    try {
      const s = localStorage.getItem('pmp_' + key);
      return s ? JSON.parse(s) : null;
    } catch(e){ return null; }
  },
  clearSession(key) {
    try { localStorage.removeItem('pmp_' + key); } catch(e){}
  },
  domainLabel(d) {
    return { 'People': 'Personnes (42 %)', 'Process': 'Processus (50 %)', 'Business': 'Environnement (8 %)' }[d] || d;
  },
  domainColor(d) {
    return { 'People':'bg-rose-500','Process':'bg-indigo-500','Business':'bg-amber-500' }[d] || 'bg-slate-500';
  },
  approachLabel(a) {
    return { 'Predictive':'Prédictif','Agile':'Agile','Hybride':'Hybride' }[a] || a;
  }
};

// Fuzzy search engine for the Assistant feature
// Searches the question bank and knowledge base
window.PMP_SEARCH = (() => {
  // Common French stopwords to remove from query
  const STOP = new Set([
    'le','la','les','un','une','des','du','de','d','et','ou','où','à','au','aux','en','dans',
    'pour','par','sur','sous','avec','sans','est','sont','être','que','qui','dont',
    'ce','cette','ces','son','sa','ses','leur','leurs','il','elle','ils','elles','on','nous','vous',
    'l','s','t','n','y','si','mais','plus','tout','toute','tous','toutes','peut','doit','faire','fait',
    'a','ont','était','sera','va','vont','aussi','très','bien'
  ]);

  function tokenize(s) {
    return s.toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g,'') // remove accents
      .replace(/[^a-z0-9\s]/g,' ')
      .split(/\s+/)
      .filter(t => t.length > 2 && !STOP.has(t));
  }

  function scoreText(queryTokens, text) {
    if (!text) return 0;
    const tt = text.toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g,'');
    let score = 0;
    for (const q of queryTokens) {
      // exact word match
      const re = new RegExp('\\b' + q + '\\b', 'g');
      const m = tt.match(re);
      if (m) score += m.length * 3;
      else if (tt.includes(q)) score += 1; // partial
    }
    return score;
  }

  // Fraction of query tokens present (word-boundary) in a text — drives the real confidence
  function coverageRatio(queryTokens, text) {
    if (!text || queryTokens.length === 0) return 0;
    const tt = text.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    let hit = 0;
    for (const q of queryTokens) {
      if (new RegExp('\\b' + q + '\\b').test(tt)) hit++;
    }
    return hit / queryTokens.length;
  }

  function searchQuestions(query, options = {}) {
    const qt = tokenize(query);
    if (qt.length < 3) return []; // trop peu de tokens exploitables pour un match fiable
    const questions = window.PMP_QUESTIONS || [];

    const scored = questions.map(q => {
      const optionsStr = Object.values(q.options || {}).join(' ');
      const txt = q.question + ' ' + optionsStr + ' ' + (q.explanation || '');
      const rawScore = scoreText(qt, txt);
      // la couverture prime : quelle part des tokens de la requête se retrouve dans la question ?
      // le score de fréquence (plafonné) ne sert qu'à départager — sinon une question
      // répétant un même token ("000" dans les montants EVM) volerait le match
      const coverage = coverageRatio(qt, txt);
      const score = coverage * 100 + Math.min(10, rawScore / 10);
      return { q, score, rawScore, coverage };
    });

    const sorted = scored.filter(s => s.rawScore > 0).sort((a,b) => b.score - a.score);

    const MIN_SCORE = 6;      // ≈ 2 mots exacts minimum
    const MIN_COVERAGE = 0.3; // au moins 30 % des tokens de la requête retrouvés
    if (!sorted[0] || sorted[0].rawScore < MIN_SCORE || sorted[0].coverage < MIN_COVERAGE) return [];
    if (sorted[1] && (sorted[0].score - sorted[1].score) < 5) {
      sorted[0].ambiguous = true;
    }
    return sorted.slice(0, options.limit || 5);
  }

  function searchKnowledge(query, opts = {}) {
    const qt = tokenize(query);
    if (qt.length === 0) return [];
    const items = window.PMP_KNOWLEDGE || [];
    const scored = items.map(k => {
      const tags = (k.tags || []).join(' ');
      const txt = k.topic + ' ' + tags + ' ' + k.summary;
      return { k, score: scoreText(qt, txt) };
    });
    return scored
      .filter(s => s.score > 0)
      .sort((a,b) => b.score - a.score)
      .slice(0, opts.limit || 5);
  }

  // Heuristic answer suggestion based on best-matching question
  function suggestAnswer(query) {
    const qt = tokenize(query);
    const matches = searchQuestions(query, { limit: 3 });
    const knowledge = searchKnowledge(query, { limit: 4 });
    const best = matches[0] || null;

    // Confiance réelle = proportion des tokens de la requête retrouvés dans la question matchée
    let confidence = 0;
    if (best) {
      const txt = best.q.question + ' ' + Object.values(best.q.options || {}).join(' ');
      confidence = Math.round(coverageRatio(qt, txt) * 100);
      if (best.ambiguous) confidence = Math.min(confidence, 55);
    }

    return {
      query,
      bestMatch: best,
      otherMatches: matches.slice(1),
      knowledge: knowledge.map(x => x.k),
      confidence,
      ambiguous: !!(best && best.ambiguous)
    };
  }

  return { tokenize, searchQuestions, searchKnowledge, suggestAnswer };
})();

// Countdown timer with visual urgency
function Timer({ totalSec, remaining, onExpire }) {
  const { useEffect, useRef } = React;
  const tickedRef = useRef(false);

  useEffect(() => {
    if (remaining <= 0 && !tickedRef.current) {
      tickedRef.current = true;
      onExpire && onExpire();
    }
  }, [remaining, onExpire]);

  const pct = totalSec > 0 ? (remaining / totalSec) * 100 : 0;
  let color = 'text-emerald-600 dark:text-emerald-400';
  let bg = 'bg-emerald-500';
  if (pct < 50) { color = 'text-amber-600 dark:text-amber-400'; bg = 'bg-amber-500'; }
  if (pct < 20) { color = 'text-rose-600 dark:text-rose-400'; bg = 'bg-rose-500'; }

  return (
    <div className="flex items-center gap-2">
      <div className={`text-xs sm:text-sm font-mono font-bold tabular-nums ${color} ${pct < 10 ? 'animate-pulse' : ''}`}>
        ⏱ {window.PMP_HELPERS.formatTime(Math.max(0, remaining))}
      </div>
      <div className="hidden sm:block w-24 h-2 rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden">
        <div className={`h-full ${bg} transition-all duration-1000`} style={{ width: pct + '%' }}></div>
      </div>
    </div>
  );
}
window.Timer = Timer;

// One question + 4 options + (optional) explanation
function QuestionCard({ question, index, total, selected, onSelect, showExplanation, marked, onToggleMark }) {
  const opts = question.options || {};
  const order = ['A','B','C','D'].filter(k => opts[k]);
  const isCorrect = (k) => {
    const c = (question.correct || '').toUpperCase();
    // support multi-letter answers like "AB"
    return c.includes(k);
  };

  return (
    <div className="animate-slide-up">
      {/* Question meta */}
      <div className="flex flex-wrap items-center gap-2 mb-4">
        <span className="text-xs font-bold text-slate-500 dark:text-slate-400">
          Question {index + 1} <span className="text-slate-400">/ {total}</span>
        </span>
        <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full text-white ${window.PMP_HELPERS.domainColor(question.domain)}`}>
          {question.domain === 'People' ? 'Personnes' : question.domain === 'Process' ? 'Processus' : 'Environnement'}
        </span>
        <span className="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300">
          {window.PMP_HELPERS.approachLabel(question.approach)}
        </span>
        <button
          onClick={onToggleMark}
          className={`ml-auto text-xs font-semibold px-3 py-1.5 rounded-lg transition ${marked ? 'bg-amber-400 text-amber-950' : 'bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-amber-100 dark:hover:bg-amber-900/30'}`}>
          {marked ? '🔖 Marquée' : '🔖 Marquer'}
        </button>
      </div>

      {/* Question */}
      <div className="p-5 sm:p-6 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm">
        <p className="question-text text-base sm:text-lg font-medium text-slate-900 dark:text-slate-100">
          {question.question}
        </p>
      </div>

      {/* Options */}
      <div className="mt-4 space-y-3">
        {order.map(k => {
          const isSelected = selected === k;
          const correct = isCorrect(k);
          let cls = 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 hover:border-brand-400 dark:hover:border-brand-600';
          if (isSelected && !showExplanation) cls = 'bg-brand-50 dark:bg-brand-950/50 border-brand-500';
          if (showExplanation) {
            if (correct) cls = 'bg-emerald-50 dark:bg-emerald-950/40 border-emerald-500';
            else if (isSelected) cls = 'bg-rose-50 dark:bg-rose-950/40 border-rose-500';
            else cls = 'bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-800 opacity-70';
          }
          return (
            <button key={k}
              onClick={() => !showExplanation && onSelect(k)}
              disabled={showExplanation}
              className={`choice-card w-full text-left p-4 sm:p-5 rounded-xl border-2 ${cls} disabled:cursor-default`}>
              <div className="flex items-start gap-3">
                <div className={`flex-shrink-0 w-9 h-9 rounded-full flex items-center justify-center font-bold text-sm border-2 ${
                  showExplanation && correct ? 'border-emerald-500 bg-emerald-500 text-white' :
                  showExplanation && isSelected ? 'border-rose-500 bg-rose-500 text-white' :
                  isSelected ? 'border-brand-500 bg-brand-500 text-white' :
                  'border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300'
                }`}>{k}</div>
                <div className="flex-1 pt-1 text-sm sm:text-base text-slate-700 dark:text-slate-200">
                  {opts[k]}
                </div>
                {showExplanation && correct && <span className="text-emerald-600 text-xl">✓</span>}
                {showExplanation && isSelected && !correct && <span className="text-rose-600 text-xl">✕</span>}
              </div>
            </button>
          );
        })}
      </div>

      {/* Explanation (study/results mode) */}
      {showExplanation && question.explanation && (
        <div className="mt-5 p-5 rounded-2xl bg-gradient-to-br from-brand-50 to-purple-50 dark:from-brand-950/30 dark:to-purple-950/30 border border-brand-200 dark:border-brand-900 animate-fade-in">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-lg">💡</span>
            <span className="font-bold text-brand-900 dark:text-brand-100">
              Réponse correcte : <span className="text-emerald-600 dark:text-emerald-400">{question.correct}</span>
            </span>
          </div>
          <p className="text-sm leading-relaxed text-slate-700 dark:text-slate-300">{question.explanation}</p>
        </div>
      )}

  );
